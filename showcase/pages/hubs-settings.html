<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ajustes del Hub - ERPlora Cloud</title>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <style>
      .stack { display:grid;gap:1rem;max-width:56rem; }
      .form-stack { display:grid;gap:1rem; }
      .card-title { margin:0 0 1rem;font-size:1rem; }
      .domain-row { display:flex;align-items:center;gap:.75rem;flex-wrap:wrap; }
      .domain-row strong { flex:1;min-width:12rem;font-family:monospace; }
      .info-grid { display:grid;grid-template-columns:repeat(2,minmax(0,1fr)); }
      .info-item { padding:.9rem;border-bottom:1px solid var(--ion-color-step-150); }
      .info-item small { display:block;margin-bottom:.2rem;color:var(--ion-color-medium);text-transform:uppercase; }
      @media (max-width:560px) { .info-grid { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      const footer = `
        <footer id="section-tabbar"><ion-segment value="active" aria-label="Navegación de Hubs">
          <ion-segment-button value="active"><iconify-icon icon="lucide:check-circle" width="20" height="20"></iconify-icon><ion-label>Activo</ion-label></ion-segment-button>
          <ion-segment-button value="inactive"><iconify-icon icon="lucide:pause-circle" width="20" height="20"></iconify-icon><ion-label>Inactivo</ion-label></ion-segment-button>
          <ion-segment-button value="create"><iconify-icon icon="lucide:plus-circle" width="20" height="20"></iconify-icon><ion-label>Crear</ion-label></ion-segment-button>
          <ion-segment-button value="domain"><iconify-icon icon="lucide:globe" width="20" height="20"></iconify-icon><ion-label>Dominio</ion-label></ion-segment-button>
        </ion-segment></footer>`;

      defineSaasDashboardPage({
        active: '/dashboard/hubs/',
        title: 'Ajustes del Hub · Terminal principal',
        body: `
          <div class="stack">
            <ion-card>
              <ion-card-content>
                <h2 class="card-title">Ajustes generales</h2>
                <form id="hub-settings-form" class="form-stack">
                  <ion-input label="Nombre del Hub" label-placement="floating" fill="outline" value="Terminal principal" required></ion-input>
                  <ion-textarea label="Dirección" label-placement="floating" fill="outline" rows="3" auto-grow value="Barcelona"></ion-textarea>
                  <ion-button type="submit" size="small" style="justify-self:start"><iconify-icon slot="start" icon="lucide:save" width="15" height="15"></iconify-icon>Guardar cambios</ion-button>
                </form>
              </ion-card-content>
            </ion-card>
            <ion-card>
              <ion-card-content>
                <h2 class="card-title">Dominio personalizado</h2>
                <div class="domain-row">
                  <strong>terminal-principal.erplora.com</strong>
                  <ion-badge color="success">Activo</ion-badge>
                  <ion-button fill="outline" size="small">Gestionar</ion-button>
                </div>
              </ion-card-content>
            </ion-card>
            <ion-card>
              <ion-card-content style="padding:0">
                <h2 class="card-title" style="padding:1rem 1rem 0">Información del Hub</h2>
                <div class="info-grid">
                  <div class="info-item"><small>ID del Hub</small><span style="font-family:monospace">9a0d58ee-5d13-47f7-a68a-395e4f38ae18</span></div>
                  <div class="info-item"><small>Slug</small><span style="font-family:monospace">terminal-principal</span></div>
                  <div class="info-item"><small>Estado</small><ion-badge color="success">Online</ion-badge></div>
                  <div class="info-item"><small>Creado</small><span>12 enero 2025</span></div>
                </div>
              </ion-card-content>
            </ion-card>
          </div>
        `,
        footer,
        setup(doc) {
          doc.getElementById('hub-settings-form')?.addEventListener('submit', (event) => event.preventDefault());
        },
      });
    </script>
  </body>
</html>
