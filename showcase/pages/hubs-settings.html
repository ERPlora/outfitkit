    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />

      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }

    <style>
      /* Geometría puntual de esta vista — solo estructura, sin colores de marca. */

      /* Filas de toggle (notificaciones, integraciones, backups). */
      .ui-toggle-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 0;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.18));
      }
      .ui-toggle-row:first-of-type { border-top: 0; }
      .ui-toggle-row__text { flex: 1 1 auto; }
      .ui-toggle-row__label { font-weight: 600; font-size: .9rem; }
      .ui-toggle-row__desc { color: var(--ion-color-medium); font-size: .8rem; margin-top: 2px; }

      /* Fila de dominio. */
      .ui-domain-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        padding: 10px 12px;
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        border-radius: 8px;
        background: var(--ion-color-step-50, rgba(127,127,127,.04));
        margin-bottom: 8px;
      }
      .ui-domain-name { font-family: monospace; font-size: 13px; flex: 1 1 auto; }

      /* Fila de acción avanzada. */
      .ui-action-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        border-radius: 8px;
        margin-bottom: 8px;
      }
      .ui-action-row--danger {
        border-color: var(--ion-color-danger, #eb445a);
      }
      .ui-action-row__title { font-weight: 600; margin-bottom: 2px; }
      .ui-action-row__desc { font-size: .8rem; color: var(--ion-color-medium); margin: 0; }
      .ui-action-row--danger .ui-action-row__title { color: var(--ion-color-danger, #eb445a); }

      /* Barra sticky de guardado. */
      .ui-save-bar {
        position: sticky;
        bottom: 0;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 14px 0 0;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.18));
        background: var(--ion-background-color, #fff);
        z-index: 10;
        margin-top: 8px;
      }

      /* Añadir dominio: input + botón en línea. */
      .ui-add-domain {
        display: flex;
        gap: 8px;
        align-items: stretch;
        margin-top: 8px;
      }
      .ui-add-domain ion-input { flex: 1; max-width: 300px; }

      /* Layout de campos en fila 2 cols / 3 cols. */
      .ui-fields-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .ui-fields-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
      @media (max-width: 640px) {
        .ui-fields-2 { grid-template-columns: 1fr; }
        .ui-fields-3 { grid-template-columns: 1fr; }
      }

      /* Copiar URL: input + botón. */
      .ui-copy-row { display: flex; gap: 8px; align-items: stretch; }
      .ui-copy-row ion-input { flex: 1; }

      /* Pestaña: ocultar/mostrar. */
      .ui-tab-panel { display: flex; flex-direction: column; gap: 18px; }
      .ui-tab-panel[hidden] { display: none; }

      /* Espacio inferior. */
      .ui-bottom-spacer { height: 32px; }

      /* ion-card section gap. */
      .ui-section-sub {
        font-size: .82rem;
        color: var(--ion-color-medium);
        margin: 0 0 16px;
      }
    </style>
  </head>

        setup(doc) {
          // ── Estado de dominios ──────────────────────────────────────
          const domains = [
            { name: 'pos.acme.com', ssl: true },
            { name: 'tienda.acme.com', ssl: false },
          ];

          // Renderiza la lista de dominios en un contenedor.
          function renderDomains(container) {
            container.innerHTML = '';
            if (domains.length === 0) {
              const p = doc.createElement('p');
              p.style.cssText = 'font-size:12px;color:var(--ion-color-medium);padding:6px 0;margin:0 0 8px';
              p.textContent = 'No hay dominios personalizados.';
              container.appendChild(p);
              return;
            }
            domains.forEach((d) => {
              const row = doc.createElement('div');
              row.className = 'ui-domain-row';
              row.setAttribute('data-domain', d.name);

              const nameEl = doc.createElement('span');
              nameEl.className = 'ui-domain-name';
              nameEl.textContent = d.name;

              const pill = doc.createElement('ok-status-pill');
              pill.setAttribute('tone', d.ssl ? 'success' : 'warning');
              pill.setAttribute('dot', '');
              pill.setAttribute('label', d.ssl ? 'SSL activo' : 'Esperando DNS');
              pill.setAttribute('size', 'sm');

              const btn = doc.createElement('ion-button');
              btn.setAttribute('fill', 'clear');
              btn.setAttribute('size', 'small');
              btn.setAttribute('color', 'danger');
              btn.textContent = 'Quitar';
              btn.addEventListener('click', () => {
                const idx = domains.findIndex((x) => x.name === d.name);
                if (idx !== -1) domains.splice(idx, 1);
                renderDomains(listGeneral);
                renderDomains(listTab);
              });

              row.appendChild(nameEl);
              row.appendChild(pill);
              row.appendChild(btn);
              container.appendChild(row);
            });
          }

          const listGeneral = doc.getElementById('domains-list-general');
          const listTab = doc.getElementById('domains-list-tab');
          if (listGeneral) renderDomains(listGeneral);
          if (listTab) renderDomains(listTab);

          // Añadir dominio (panel General).
          const newDomainGeneral = doc.getElementById('new-domain-general');
          const addBtnGeneral = doc.getElementById('add-domain-general-btn');
          if (addBtnGeneral && newDomainGeneral) {
            addBtnGeneral.addEventListener('click', () => {
              const val = (newDomainGeneral.value || '').trim();
              if (val) {
                domains.push({ name: val, ssl: false });
                newDomainGeneral.value = '';
                renderDomains(listGeneral);
                renderDomains(listTab);
              }
            });
          }

          // Añadir dominio (panel Dominios).
          const newDomainTab = doc.getElementById('new-domain-tab');
          const addBtnTab = doc.getElementById('add-domain-tab-btn');
          if (addBtnTab && newDomainTab) {
            addBtnTab.addEventListener('click', () => {
              const val = (newDomainTab.value || '').trim();
              if (val) {
                domains.push({ name: val, ssl: false });
                newDomainTab.value = '';
                renderDomains(listGeneral);
                renderDomains(listTab);
              }
            });
          }

          // ── Botón Copiar URL ───────────────────────────────────────
          const copyBtn = doc.getElementById('copy-url-btn');
          if (copyBtn) {
            copyBtn.addEventListener('click', () => {
              navigator.clipboard && navigator.clipboard.writeText('acme.erplora.cloud');
              const orig = copyBtn.textContent.trim();
              copyBtn.innerHTML = '<ion-icon slot="start" name="checkmark-outline"></ion-icon>Copiado';
              setTimeout(() => {
                copyBtn.innerHTML = '<ion-icon slot="start" name="copy-outline"></ion-icon>Copiar';
              }, 2000);
            });
          }

          // ── Tabs: mostrar/ocultar paneles ─────────────────────────
          const segment = doc.getElementById('settings-tabs');
          const panels = {
            general: doc.getElementById('panel-general'),
            domains: doc.getElementById('panel-domains'),
            integrations: doc.getElementById('panel-integrations'),
            backups: doc.getElementById('panel-backups'),
            advanced: doc.getElementById('panel-advanced'),
          };

          function showPanel(tab) {
            Object.entries(panels).forEach(([key, el]) => {
              if (!el) return;
              if (key === tab) {
                el.hidden = false;
              } else {
                el.hidden = true;
              }
            });
          }

          if (segment) {
            segment.addEventListener('ionChange', (e) => {
              const val = e.detail && e.detail.value;
              if (val) showPanel(val);
            });
          }
          showPanel('general');
        },
      });
    </script>
  </body>
</html>
