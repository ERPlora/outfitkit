<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Subir módulo · ERPlora Cloud</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_saas-developer.css" />
    <link rel="stylesheet" href="./_saas-developer-pages.css" />
  </head>
  <body>
    <script type="module">
      import { defineDeveloperPage } from './_saas-developer.js';

      defineDeveloperPage({
        activeTab: 'modules',
        title: 'Subir nuevo módulo',
        body: `
          <form class="developer-page developer-section-stack">
            <div class="developer-grid">
              <ion-card>
                <ion-card-content>
                  <h2 class="developer-card-title">Información básica</h2>
                  <p class="developer-card-subtitle">Nombre, descripción y autor.</p>
                  <div class="developer-fields">
                    <ion-input label="Nombre del módulo *" label-placement="stacked" fill="outline" placeholder="Ej.: Gestor de inventario avanzado" required></ion-input>
                    <ion-textarea label="Descripción *" label-placement="stacked" fill="outline" rows="4" placeholder="Describe las funciones y ventajas del módulo…" required></ion-textarea>
                    <ion-input label="Nombre del autor" label-placement="stacked" fill="outline" value="demo@erplora.com" placeholder="Tu nombre o empresa"></ion-input>
                    <p class="developer-field-help">Se mostrará públicamente en la página del módulo.</p>
                    <ion-input label="Versión" label-placement="stacked" fill="outline" value="1.0.0" placeholder="1.0.0"></ion-input>
                  </div>
                </ion-card-content>
              </ion-card>

              <ion-card>
                <ion-card-content>
                  <h2 class="developer-card-title">Precios</h2>
                  <p class="developer-card-subtitle">Gratis, pago único o suscripción mensual.</p>
                  <div class="developer-fields">
                    <ion-select id="module-type-select" label="Tipo de módulo *" label-placement="stacked" fill="outline" interface="popover" placeholder="Selecciona un tipo">
                      <ion-select-option value="free">Gratis</ion-select-option>
                      <ion-select-option value="one_time">Pago único</ion-select-option>
                      <ion-select-option value="subscription">Suscripción mensual</ion-select-option>
                    </ion-select>
                    <div id="price-field" hidden>
                      <ion-input type="number" inputmode="decimal" min="0" step="0.01" label="Precio (EUR) *" label-placement="stacked" fill="outline" placeholder="9,99"></ion-input>
                      <p class="developer-field-help">ERPlora aplica una comisión del 15%. Recibes el 85% del precio de venta.</p>
                    </div>
                  </div>
                </ion-card-content>
              </ion-card>
            </div>

            <ion-card>
              <ion-card-content>
                <h2 class="developer-card-title">Archivos</h2>
                <p class="developer-card-subtitle">ZIP del módulo e imagen de icono opcional.</p>
                <div class="developer-grid">
                  <div>
                    <span class="developer-field-label">Icono del módulo</span>
                    <ok-dropzone id="module-icon" accept="image/*" hint="PNG o JPG · recomendado 512 × 512 px"></ok-dropzone>
                  </div>
                  <div>
                    <span class="developer-field-label">Archivo ZIP del módulo *</span>
                    <ok-dropzone id="module-zip" accept=".zip" max-size="52428800" hint="ZIP · máximo 50 MB"></ok-dropzone>
                  </div>
                </div>
              </ion-card-content>
            </ion-card>

            <ion-card>
              <ion-card-content>
                <h2 class="developer-card-title">Tipos de negocio</h2>
                <p class="developer-card-subtitle">Selecciona los negocios para los que está diseñado el módulo.</p>
                <div class="developer-chip-row">
                  <ion-chip color="primary"><iconify-icon icon="lucide:utensils" width="15" height="15"></iconify-icon><ion-label>Restaurantes</ion-label></ion-chip>
                  <ion-chip><iconify-icon icon="lucide:shopping-bag" width="15" height="15"></iconify-icon><ion-label>Comercio</ion-label></ion-chip>
                  <ion-chip><iconify-icon icon="lucide:scissors" width="15" height="15"></iconify-icon><ion-label>Peluquerías</ion-label></ion-chip>
                  <ion-chip><iconify-icon icon="lucide:wrench" width="15" height="15"></iconify-icon><ion-label>Servicios</ion-label></ion-chip>
                </div>
              </ion-card-content>
            </ion-card>

            <ion-card>
              <ion-card-content>
                <ion-accordion-group>
                  <ion-accordion value="functional-blocks">
                    <ion-item slot="header" lines="none">
                      <iconify-icon slot="start" icon="lucide:layers" width="17" height="17"></iconify-icon>
                      <ion-label><strong>Bloques funcionales</strong><p>Compatibilidad opcional del módulo</p></ion-label>
                    </ion-item>
                    <div slot="content" class="ion-padding">
                      <div class="developer-chip-row">
                        <ion-chip><ion-label>Ventas</ion-label></ion-chip>
                        <ion-chip><ion-label>Inventario</ion-label></ion-chip>
                        <ion-chip><ion-label>Facturación</ion-label></ion-chip>
                        <ion-chip><ion-label>Reservas</ion-label></ion-chip>
                      </div>
                    </div>
                  </ion-accordion>
                </ion-accordion-group>
              </ion-card-content>
            </ion-card>

            <ok-inline-feedback tone="info" heading="Proceso de revisión">
              <p>El equipo revisará el módulo antes de publicarlo en el marketplace. Suele tardar 2–3 días laborables y recibirás el resultado por correo.</p>
            </ok-inline-feedback>

            <div class="developer-actions">
              <ion-button type="submit"><iconify-icon slot="start" icon="lucide:cloud-upload" width="15" height="15"></iconify-icon>Enviar módulo</ion-button>
              <ion-button type="button" fill="outline">Cancelar</ion-button>
            </div>
          </form>`,
        setup(doc) {
          const labels = {
            title: 'Arrastra el archivo aquí o {browse}',
            browse: 'selecciónalo',
            errorType: '“{name}” no es un tipo de archivo aceptado.',
            errorSize: '“{name}” supera el tamaño máximo ({size}).',
            removeLabel: 'Quitar {name}',
          };
          doc.querySelectorAll('ok-dropzone').forEach((dropzone) => { dropzone.labels = labels; });

          const type = doc.getElementById('module-type-select');
          const price = doc.getElementById('price-field');
          type?.addEventListener('ionChange', (event) => {
            price.hidden = !['one_time', 'subscription'].includes(event.detail.value);
          });
        },
      });
    </script>
  </body>
</html>
