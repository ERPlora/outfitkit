<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Hub · Detalle de rol · Manager</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* Geometría puntual de esta vista (estructura, sin colores de marca). */

      /* Tabla de permisos: compacta. */
      .ui-perm-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
      }
      .ui-perm-table th,
      .ui-perm-table td {
        padding: 7px 10px;
        text-align: left;
        border-bottom: 1px solid var(--ion-border-color, rgba(127, 127, 127, 0.15));
      }
      .ui-perm-table th {
        font-weight: 600;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--ion-color-medium);
        white-space: nowrap;
      }
      .ui-perm-table td:not(:first-child) {
        text-align: center;
        width: 60px;
        min-width: 50px;
      }
      .ui-perm-table th:not(:first-child) {
        text-align: center;
      }
      .ui-perm-table td:first-child {
        font-weight: 500;
      }
      .ui-perm-table td:last-child {
        text-align: left;
        color: var(--ion-color-medium);
        font-size: 0.8rem;
      }
      .ui-perm-table th:last-child {
        text-align: left;
      }
      .ui-perm-check {
        color: var(--ion-color-success);
        font-size: 1rem;
        font-weight: 700;
      }
      .ui-perm-dash {
        color: var(--ion-color-medium);
        opacity: 0.5;
      }
      /* Fila sin ningún permiso: ligeramente apagada */
      .ui-perm-table tr.ui-row-none td:first-child {
        color: var(--ion-color-medium);
      }

      /* Lista de usuarios del rol. */
      .ui-users-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .ui-users-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid var(--ion-border-color, rgba(127, 127, 127, 0.15));
      }
      .ui-users-item:last-child {
        border-bottom: 0;
      }
      .ui-users-content {
        flex: 1 1 auto;
        min-width: 0;
      }
      .ui-users-name {
        font-weight: 600;
        font-size: 0.9rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .ui-users-meta {
        font-size: 0.78rem;
        color: var(--ion-color-medium);
        margin-top: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Modal de confirmación de eliminación. */
      .ui-delete-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-top: 12px;
      }
      .ui-delete-label {
        font-size: 0.875rem;
        font-weight: 600;
      }

      /* Responsive: tabla de permisos con scroll horizontal en móvil. */
      .ui-perm-scroll {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Manager"
            description="Acceso completo a operaciones de tienda · 3 usuarios asignados">
            <ion-button slot="actions" fill="outline" size="small" color="medium" id="btn-back">
              <ion-icon slot="start" name="arrow-back-outline"></ion-icon>
              Volver
            </ion-button>
            <ion-button slot="actions" fill="outline" size="small" color="danger" id="btn-delete">
              <ion-icon slot="start" name="trash-outline"></ion-icon>
              Eliminar
            </ion-button>
            <ion-button slot="actions" size="small" id="btn-edit">
              <ion-icon slot="start" name="pencil-outline"></ion-icon>
              Editar
            </ion-button>
          </ok-page-header>

          <!-- Fila 1: información + usuarios asignados -->
          <div class="pg-grid pg-grid-2 pg-mb-4">

            <!-- Tarjeta: Información -->
            <ion-card>
              <ion-card-header>
                <ion-card-title>Información</ion-card-title>
              </ion-card-header>
              <ion-card-content>
                <ok-detail-list id="role-info"></ok-detail-list>
              </ion-card-content>
            </ion-card>

            <!-- Tarjeta: Usuarios asignados -->
            <ion-card>
              <ion-card-header>
                <div style="display:flex;align-items:center;gap:8px">
                  <ion-card-title>Usuarios asignados</ion-card-title>
                  <ion-badge color="medium">3</ion-badge>
                </div>
              </ion-card-header>
              <ion-card-content>
                <ul class="ui-users-list" id="users-list">
                  <li class="ui-users-item">
                    <ok-avatar name="Marta Soler" size="sm" tone="primary"></ok-avatar>
                    <div class="ui-users-content">
                      <div class="ui-users-name">Marta Soler</div>
                      <div class="ui-users-meta">marta@larambla.es · Activo</div>
                    </div>
                    <ok-status-dot tone="ok" size="sm" label="Activo"></ok-status-dot>
                  </li>
                  <li class="ui-users-item">
                    <ok-avatar name="Carles Vila" size="sm"></ok-avatar>
                    <div class="ui-users-content">
                      <div class="ui-users-name">Carles Vila</div>
                      <div class="ui-users-meta">carles@larambla.es · Activo</div>
                    </div>
                    <ok-status-dot tone="ok" size="sm" label="Activo"></ok-status-dot>
                  </li>
                  <li class="ui-users-item">
                    <ok-avatar name="Aina Roig" size="sm"></ok-avatar>
                    <div class="ui-users-content">
                      <div class="ui-users-name">Aina Roig</div>
                      <div class="ui-users-meta">aina@larambla.es · Inactivo</div>
                    </div>
                    <ok-status-dot tone="off" size="sm" label="Inactivo"></ok-status-dot>
                  </li>
                </ul>
              </ion-card-content>
              <div style="padding:8px 16px 12px">
                <ion-button fill="clear" size="small">Ver todos</ion-button>
              </div>
            </ion-card>
          </div>

          <!-- Sección: Permisos -->
          <ion-card>
            <ion-card-header>
              <ion-card-title>Permisos</ion-card-title>
            </ion-card-header>
            <ion-card-content>
              <div class="ui-perm-scroll">
                <table class="ui-perm-table" id="perm-table">
                  <thead>
                    <tr>
                      <th>Módulo</th>
                      <th>Ver</th>
                      <th>Crear</th>
                      <th>Editar</th>
                      <th>Eliminar</th>
                      <th>Especiales</th>
                    </tr>
                  </thead>
                  <tbody id="perm-tbody"></tbody>
                </table>
              </div>
            </ion-card-content>
            <div style="padding:8px 16px 12px">
              <ion-button size="small" id="btn-edit-perms">
                <ion-icon slot="start" name="pencil-outline"></ion-icon>
                Editar permisos
              </ion-button>
            </div>
          </ion-card>

          <!-- Modal confirmación de eliminación -->
          <ion-modal id="delete-modal" is-open="false">
            <ion-header>
              <ion-toolbar>
                <ion-title>Eliminar rol Manager</ion-title>
                <ion-buttons slot="end">
                  <ion-button id="btn-close-modal">
                    <ion-icon slot="icon-only" name="close"></ion-icon>
                  </ion-button>
                </ion-buttons>
              </ion-toolbar>
            </ion-header>
            <ion-content class="ion-padding">
              <ok-inline-feedback tone="warning" heading="3 usuarios usan este rol." class="pg-mb-4">
                Al eliminarlo, esos usuarios pasarán al rol por defecto (Cajero).
              </ok-inline-feedback>
              <p style="font-size:.9rem;margin:0 0 16px">Esta acción no se puede deshacer.</p>
              <div class="ui-delete-field">
                <label class="ui-delete-label" for="confirm-input">
                  Escribe <strong>manager</strong> para confirmar
                </label>
                <ion-input
                  id="confirm-input"
                  fill="outline"
                  placeholder="manager"
                  clearInput>
                </ion-input>
              </div>
            </ion-content>
            <ion-footer>
              <ion-toolbar>
                <ion-buttons slot="start">
                  <ion-button fill="outline" id="btn-cancel-delete">Cancelar</ion-button>
                </ion-buttons>
                <ion-buttons slot="end">
                  <ion-button color="danger" fill="solid" id="btn-confirm-delete" disabled>
                    Eliminar definitivamente
                  </ion-button>
                </ion-buttons>
              </ion-toolbar>
            </ion-footer>
          </ion-modal>
        `,
        setup(doc) {
          // ── ok-detail-list: información del rol ──────────────────────────────
          const roleInfo = doc.getElementById('role-info');
          if (roleInfo) {
            roleInfo.items = [
              { label: 'Nombre',              value: 'Manager' },
              { label: 'Slug',                value: '<code style="font-family:monospace;font-size:.9em">manager</code>', html: true },
              { label: 'Descripción',         value: 'Encargado de turno con acceso a ventas, inventario y empleados, sin permisos de configuración fiscal ni facturación.', full: true },
              { label: 'Tipo',                value: '<ion-badge color="primary" style="--padding-top:4px;--padding-bottom:4px">Personalizado</ion-badge>', html: true },
              { label: 'Creado',              value: '12 abr 2026 · Joan Castell' },
              { label: 'Última modificación', value: '28 abr 2026 · Joan Castell' },
            ];
          }

          // ── Tabla de permisos ────────────────────────────────────────────────
          const permisos = [
            { modulo: 'POS / Ventas',     ver: true,  crear: true,  editar: true,  eliminar: false, especial: 'Anular ticket, descuento > 10%' },
            { modulo: 'Productos',         ver: true,  crear: true,  editar: true,  eliminar: false, especial: '' },
            { modulo: 'Inventario',        ver: true,  crear: true,  editar: true,  eliminar: false, especial: 'Ajuste de stock' },
            { modulo: 'Clientes',          ver: true,  crear: true,  editar: true,  eliminar: true,  especial: '' },
            { modulo: 'Empleados',         ver: true,  crear: false, editar: true,  eliminar: false, especial: 'Solo del propio turno' },
            { modulo: 'Compras',           ver: true,  crear: true,  editar: false, eliminar: false, especial: 'Aprobar < €500' },
            { modulo: 'Informes',          ver: true,  crear: false, editar: false, eliminar: false, especial: '' },
            { modulo: 'Facturación',       ver: false, crear: false, editar: false, eliminar: false, especial: '' },
            { modulo: 'VeriFactu / Fiscal',ver: false, crear: false, editar: false, eliminar: false, especial: '' },
            { modulo: 'Configuración',     ver: false, crear: false, editar: false, eliminar: false, especial: '' },
            { modulo: 'Marketplace',       ver: true,  crear: false, editar: false, eliminar: false, especial: '' },
          ];

          const check = '<span class="ui-perm-check" aria-label="Sí">✓</span>';
          const dash  = '<span class="ui-perm-dash" aria-label="No">—</span>';

          const tbody = doc.getElementById('perm-tbody');
          if (tbody) {
            const none = (p) => !p.ver && !p.crear && !p.editar && !p.eliminar;
            tbody.innerHTML = permisos.map((p) => `
              <tr class="${none(p) ? 'ui-row-none' : ''}">
                <td>${p.modulo}</td>
                <td>${p.ver     ? check : dash}</td>
                <td>${p.crear   ? check : dash}</td>
                <td>${p.editar  ? check : dash}</td>
                <td>${p.eliminar ? check : dash}</td>
                <td>${p.especial || dash}</td>
              </tr>`).join('');
          }

          // ── Modal de eliminación ─────────────────────────────────────────────
          const modal        = doc.getElementById('delete-modal');
          const confirmInput = doc.getElementById('confirm-input');
          const btnDelete    = doc.getElementById('btn-delete');
          const btnClose     = doc.getElementById('btn-close-modal');
          const btnCancel    = doc.getElementById('btn-cancel-delete');
          const btnConfirm   = doc.getElementById('btn-confirm-delete');

          const openModal = () => {
            if (modal) modal.setAttribute('is-open', 'true');
            if (confirmInput) {
              confirmInput.value = '';
              if (btnConfirm) btnConfirm.setAttribute('disabled', '');
            }
          };
          const closeModal = () => {
            if (modal) modal.setAttribute('is-open', 'false');
          };

          const btnBack = doc.getElementById('btn-back');
          if (btnBack) btnBack.addEventListener('click', () => { if (history.length > 1) history.back(); });

          if (btnDelete)  btnDelete.addEventListener('click', openModal);
          if (btnClose)   btnClose.addEventListener('click', closeModal);
          if (btnCancel)  btnCancel.addEventListener('click', closeModal);

          if (confirmInput && btnConfirm) {
            confirmInput.addEventListener('ionInput', (e) => {
              const val = (e.detail && e.detail.value) || '';
              if (val === 'manager') {
                btnConfirm.removeAttribute('disabled');
              } else {
                btnConfirm.setAttribute('disabled', '');
              }
            });
          }

          // Botón "Eliminar definitivamente" (sin implementación real en showcase).
          if (btnConfirm) {
            btnConfirm.addEventListener('click', () => {
              closeModal();
              const toast = document.createElement('ion-toast');
              toast.message  = 'Rol "manager" eliminado (demo).';
              toast.duration = 2500;
              toast.color    = 'danger';
              toast.position = 'bottom';
              document.body.appendChild(toast);
              toast.present();
              toast.addEventListener('didDismiss', () => toast.remove());
            });
          }

          // Botón "Editar" (demo).
          const btnEdit = doc.getElementById('btn-edit');
          if (btnEdit) {
            btnEdit.addEventListener('click', () => {
              const toast = document.createElement('ion-toast');
              toast.message  = 'Ir a editar rol (demo).';
              toast.duration = 1800;
              toast.position = 'bottom';
              document.body.appendChild(toast);
              toast.present();
              toast.addEventListener('didDismiss', () => toast.remove());
            });
          }

          // Botón "Editar permisos" (demo).
          const btnEditPerms = doc.getElementById('btn-edit-perms');
          if (btnEditPerms) {
            btnEditPerms.addEventListener('click', () => {
              const toast = document.createElement('ion-toast');
              toast.message  = 'Ir a editar permisos (demo).';
              toast.duration = 1800;
              toast.position = 'bottom';
              document.body.appendChild(toast);
              toast.present();
              toast.addEventListener('didDismiss', () => toast.remove());
            });
          }
        },
      });
    </script>
  </body>
</html>
