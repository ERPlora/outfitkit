<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Métodos de pago</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* Geometría puntual de esta vista (estructura, sin colores de marca). */

      /* Grid de tarjetas de pago — 2 columnas en desktop, 1 en móvil. */
      .pm-cards-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }
      @media (max-width: 640px) {
        .pm-cards-grid { grid-template-columns: 1fr; }
      }

      /* Contenedor de una tarjeta de pago + sus controles. */
      .pm-card-wrap {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      /* Tarjeta expirada: opacidad reducida. */
      .pm-card-wrap--disabled {
        opacity: 0.6;
      }

      /* Barra de acciones bajo cada tarjeta. */
      .pm-card-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
      }
      .pm-card-meta {
        font-size: 0.78rem;
        color: var(--ion-color-medium);
      }
      .pm-card-meta--danger {
        color: var(--ion-color-danger);
        font-size: 0.78rem;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';
      import { html as h } from 'lit';

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Métodos de pago"
            description="Cobros recurrentes y bajo demanda · Acme Industries SL">
            <div slot="actions">
              <ion-button fill="outline">
                <ion-icon slot="start" name="logo-euro"></ion-icon>
                Conectar Stripe
              </ion-button>
              <ion-button id="btn-add-method">
                <ion-icon slot="start" name="add"></ion-icon>
                Añadir método
              </ion-button>
            </div>
          </ok-page-header>

          <!-- Tarjetas y cuentas guardadas -->
          <ion-card class="pg-mb-4">
            <ion-card-header>
              <ion-card-title>Tarjetas y cuentas guardadas</ion-card-title>
              <ion-card-subtitle>Pulsa una tarjeta para gestionarla</ion-card-subtitle>
            </ion-card-header>
            <ion-card-content>
              <div class="pm-cards-grid">

                <!-- 1 · Visa — predeterminada -->
                <div class="pm-card-wrap">
                  <ok-loyalty-card
                    brand="Visa"
                    tier="brand"
                    tier-label="Predeterminada"
                    number="•••• •••• •••• 4242"
                    holder="ANNA CALVET"
                    points-label="Cuenta principal · facturas"
                    meta-label="VENCE "
                    meta-value="09/27">
                  </ok-loyalty-card>
                  <div class="pm-card-actions">
                    <span class="pm-card-meta">Añadida 12 ene 2025 · Stripe</span>
                    <div style="display:flex;gap:6px">
                      <ion-button fill="clear" size="small">
                        <ion-icon slot="start" name="pencil-outline"></ion-icon>
                        Editar
                      </ion-button>
                      <ion-button fill="clear" size="small" color="danger">
                        <ion-icon slot="start" name="trash-outline"></ion-icon>
                        Eliminar
                      </ion-button>
                    </div>
                  </div>
                </div>

                <!-- 2 · Amex — backup -->
                <div class="pm-card-wrap">
                  <ok-loyalty-card
                    brand="Amex"
                    tier="platinum"
                    tier-label="Backup"
                    number="•••• •••• 7012"
                    holder="IOAN BEILIC"
                    points-label="Empresarial · gastos"
                    meta-label="VENCE "
                    meta-value="04/28">
                  </ok-loyalty-card>
                  <div class="pm-card-actions">
                    <span class="pm-card-meta">Añadida 03 mar 2026 · Stripe</span>
                    <div style="display:flex;gap:6px">
                      <ion-button fill="outline" size="small">
                        <ion-icon slot="start" name="star-outline"></ion-icon>
                        Marcar predeterminada
                      </ion-button>
                      <ion-button fill="clear" size="small">
                        <ion-icon slot="start" name="pencil-outline"></ion-icon>
                        Editar
                      </ion-button>
                    </div>
                  </div>
                </div>

                <!-- 3 · SEPA Caixa — negocio -->
                <div class="pm-card-wrap">
                  <ok-loyalty-card
                    brand="SEPA · Caixa"
                    tier="silver"
                    tier-label="Negocio"
                    number="ES76 •••• •••• 7890"
                    holder="ACME INDUSTRIES SL"
                    points-label="Domiciliación · cuotas"
                    meta-label="MANDATO "
                    meta-value="2024-09">
                  </ok-loyalty-card>
                  <div class="pm-card-actions">
                    <span class="pm-card-meta">Mandato verificado · GoCardless</span>
                    <div style="display:flex;gap:6px">
                      <ion-button fill="clear" size="small">
                        <ion-icon slot="start" name="document-text-outline"></ion-icon>
                        Ver mandato
                      </ion-button>
                      <ion-button fill="clear" size="small">
                        <ion-icon slot="start" name="pencil-outline"></ion-icon>
                        Editar
                      </ion-button>
                    </div>
                  </div>
                </div>

                <!-- 4 · Mastercard — expirada -->
                <div class="pm-card-wrap pm-card-wrap--disabled">
                  <ok-loyalty-card
                    brand="Mastercard"
                    tier="gold"
                    tier-label="Expirada"
                    number="•••• •••• •••• 0091"
                    holder="MARÍA ROVIRA"
                    points-label="Caducó hace 2 meses"
                    meta-label="VENCIÓ "
                    meta-value="03/26">
                  </ok-loyalty-card>
                  <div class="pm-card-actions">
                    <span class="pm-card-meta--danger">Esta tarjeta no se puede cobrar</span>
                    <div style="display:flex;gap:6px">
                      <ion-button fill="clear" size="small">
                        <ion-icon slot="start" name="refresh-outline"></ion-icon>
                        Renovar
                      </ion-button>
                      <ion-button fill="clear" size="small" color="danger">
                        <ion-icon slot="start" name="trash-outline"></ion-icon>
                        Eliminar
                      </ion-button>
                    </div>
                  </div>
                </div>

              </div>
            </ion-card-content>
          </ion-card>

          <!-- Historial de cobros -->
          <ion-card>
            <ion-card-header>
              <ion-card-title>Historial de cobros</ion-card-title>
            </ion-card-header>
            <ion-card-content>
              <ok-data-table id="charges-dt" style="display:block"></ok-data-table>
            </ion-card-content>
          </ion-card>
        `,

        setup(doc) {
          /* ── Tabla de historial de cobros ── */
          const dt = doc.getElementById('charges-dt');
          if (dt) {
            dt.columns = [
              { key: 'date',    header: 'Fecha',    width: '9rem', render: (r) => h`<span style="font-variant-numeric:tabular-nums;font-size:.85rem">${r.date}</span>` },
              { key: 'concept', header: 'Concepto', width: 'minmax(11rem,1.5fr)' },
              { key: 'org',     header: 'Hub / Org', width: 'minmax(10rem,1fr)' },
              {
                key: 'method',
                header: 'Método',
                width: '10rem',
                render: (r) => {
                  const c = r.methodType === 'visa' ? 'primary' : 'medium';
                  return h`<ion-badge style="--background:color-mix(in srgb,var(--ion-color-${c}) 15%,transparent);--color:var(--ion-color-${c});--padding-top:4px;--padding-bottom:4px;font-size:.75rem">${r.method}</ion-badge>`;
                },
              },
              {
                key: 'amount',
                header: 'Importe',
                width: '7rem',
                align: 'right',
                render: (r) => h`<span style="font-variant-numeric:tabular-nums;font-weight:600">${r.amount}</span>`,
              },
              {
                key: 'status',
                header: 'Estado',
                width: '8rem',
                render: (r) => {
                  const STATE_COLOR = { 'Pagado': 'success', 'Reintento': 'warning', 'Fallido': 'danger' };
                  const c = STATE_COLOR[r.status] ?? 'medium';
                  return h`<ok-status-pill tone=${c} dot label=${r.status} size="sm"></ok-status-pill>`;
                },
              },
              {
                key: 'invoice',
                header: 'Factura',
                width: '8rem',
                align: 'right',
                render: (r) => h`<ion-button fill="clear" size="small"><ion-icon slot="start" name="document-outline"></ion-icon>${r.invoice}</ion-button>`,
              },
            ];

            dt.rows = [
              { date: '02 may 2026', concept: 'Suscripción Business · mayo',    org: 'Acme Industries SL',  method: 'Visa •• 4242',       methodType: 'visa',   amount: '€890,00',  status: 'Pagado',    invoice: 'F-2026-0512' },
              { date: '28 abr 2026', concept: 'Add-on: 3 terminales extra',     org: 'Hub Cornellà',        method: 'Visa •• 4242',       methodType: 'visa',   amount: '€135,00',  status: 'Pagado',    invoice: 'F-2026-0498' },
              { date: '15 abr 2026', concept: 'Suscripción Business · abril',   org: 'Acme Industries SL',  method: 'Visa •• 4242',       methodType: 'visa',   amount: '€890,00',  status: 'Pagado',    invoice: 'F-2026-0411' },
              { date: '10 abr 2026', concept: 'Servicio onboarding (1 vez)',    org: 'Acme Industries SL',  method: 'SEPA Caixa',          methodType: 'sepa',   amount: '€450,00',  status: 'Reintento', invoice: 'F-2026-0398' },
              { date: '02 abr 2026', concept: 'Hub Manresa · staging',          org: 'Hub Manresa',         method: 'Visa •• 4242',       methodType: 'visa',   amount: '€220,00',  status: 'Pagado',    invoice: 'F-2026-0367' },
              { date: '15 mar 2026', concept: 'Suscripción Business · marzo',   org: 'Acme Industries SL',  method: 'Visa •• 4242',       methodType: 'visa',   amount: '€890,00',  status: 'Pagado',    invoice: 'F-2026-0312' },
              { date: '28 feb 2026', concept: 'Soporte premium · febrero',      org: 'Acme Industries SL',  method: 'Mastercard •• 0091', methodType: 'mc',     amount: '€180,00',  status: 'Fallido',   invoice: 'F-2026-0244' },
              { date: '15 feb 2026', concept: 'Suscripción Business · febrero', org: 'Acme Industries SL',  method: 'Visa •• 4242',       methodType: 'visa',   amount: '€890,00',  status: 'Pagado',    invoice: 'F-2026-0218' },
            ];
          }

          /* ── Botón "Añadir método" → action sheet ── */
          const btnAdd = doc.getElementById('btn-add-method');
          if (btnAdd) {
            btnAdd.addEventListener('click', () => {
              const s = document.createElement('ion-action-sheet');
              s.header = 'Añadir método de pago';
              s.buttons = [
                { text: 'Tarjeta de crédito / débito', icon: 'card-outline' },
                { text: 'Débito SEPA (domiciliación)', icon: 'business-outline' },
                { text: 'Cancelar', role: 'cancel' },
              ];
              document.body.appendChild(s);
              s.present();
              s.addEventListener('didDismiss', () => s.remove());
            });
          }

        },
      });
    </script>
  </body>
</html>
