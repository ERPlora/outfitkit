<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Terminales activos - ERPlora Cloud</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/ok-data-table.js"></script>
  </head>
  <body>
    <script type="module">
      import { html as h } from 'lit';
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      /* Datos representativos del contrato Hub actual. No son métricas de producción: sirven para
       * mostrar todos los estados que _build_hubs_datatable_config admite en la lista activa. */
      const HUBS = [
        {
          id: 'hub-active', kind: 'cloud', name: 'Terminal principal', slug: 'terminal-principal',
          plan: 'Standard', status: 'active', statusLabel: 'Activo', statusTone: 'success',
          nextInvoice: '31 jul 2026', cpu: [20, 28, 24, 35, 31, 38, 34],
          ram: [42, 46, 45, 49, 52, 50, 54], db: [6, 7, 7, 8, 8, 9, 9],
        },
        {
          id: 'hub-deploying', kind: 'cloud', name: 'Nueva tienda', slug: 'nueva-tienda',
          plan: 'Starter', status: 'deploying', statusLabel: 'Desplegando', statusTone: 'primary',
          nextInvoice: '31 jul 2026', cpu: [], ram: [], db: [],
        },
        {
          id: 'hub-stopped', kind: 'cloud', name: 'Terminal detenido', slug: 'terminal-detenido',
          plan: 'Pro', status: 'stopped', statusLabel: 'Detenido', statusTone: 'medium',
          nextInvoice: '31 jul 2026', cpu: [0, 0, 0], ram: [0, 0, 0], db: [4, 4, 4],
        },
        {
          id: 'hub-payment', kind: 'cloud', name: 'Pendiente de pago', slug: 'pendiente-pago',
          plan: 'Starter', status: 'pending_payment', statusLabel: 'Pago pendiente', statusTone: 'warning',
          nextInvoice: '—', cpu: [], ram: [], db: [],
        },
        {
          id: 'hub-local', kind: 'local', name: 'Caja local', slug: 'caja-local',
          plan: '—', status: 'local', statusLabel: 'Local', statusTone: 'primary',
          nextInvoice: '—', cpu: [], ram: [], db: [],
        },
        {
          id: 'hub-error', kind: 'cloud', name: 'Terminal con incidencia', slug: 'terminal-incidencia',
          plan: 'Enterprise', status: 'error', statusLabel: 'Error', statusTone: 'danger',
          nextInvoice: '31 jul 2026', cpu: [], ram: [], db: [],
        },
      ];

      const OPEN_ACTION = { id: 'open', label: 'Abrir Terminal', icon: 'lucide:external-link' };
      const LOCAL_ACTIONS = [
        { id: 'migrate', label: 'Migrar a Cloud', icon: 'lucide:upload-cloud' },
      ];
      const PENDING_ACTIONS = [
        { id: 'resume-payment', label: 'Reanudar pago', icon: 'lucide:credit-card' },
        { id: 'edit', label: 'Editar', icon: 'lucide:pencil' },
        { id: 'users', label: 'Usuarios', icon: 'lucide:users' },
        { id: 'modules', label: 'Módulos', icon: 'lucide:box' },
        { id: 'qr', label: 'Código QR', icon: 'lucide:qr-code' },
        { id: 'delete', label: 'Eliminar', icon: 'lucide:trash-2', danger: true },
      ];
      const CLOUD_ACTIONS = [
        { id: 'edit', label: 'Editar', icon: 'lucide:pencil' },
        { id: 'update', label: 'Actualizar Hub', icon: 'lucide:download-cloud' },
        { id: 'restart', label: 'Reiniciar', icon: 'lucide:rotate-ccw' },
        { id: 'shutdown', label: 'Apagar', icon: 'lucide:power' },
        { id: 'upgrade-plan', label: 'Mejorar plan', icon: 'lucide:trending-up' },
        { id: 'users', label: 'Usuarios', icon: 'lucide:users' },
        { id: 'modules', label: 'Módulos', icon: 'lucide:box' },
        { id: 'qr', label: 'Código QR', icon: 'lucide:qr-code' },
        { id: 'delete', label: 'Eliminar', icon: 'lucide:trash-2', danger: true },
      ];
      const BULK_ACTIONS = [
        { id: 'bulk-restart', label: 'Reiniciar seleccionados', icon: 'refresh-outline' },
        { id: 'bulk-update', label: 'Actualizar seleccionados', icon: 'cloud-download-outline' },
        { id: 'bulk-shutdown', label: 'Apagar seleccionados', icon: 'power-outline', color: 'danger' },
      ];

      function rowActionsFor(row) {
        if (row.kind === 'local') {
          return [{ id: 'manage', label: 'Gestionar', icon: 'lucide:more-horizontal', children: LOCAL_ACTIONS }];
        }
        if (row.status === 'pending_payment') {
          return [{ id: 'manage', label: 'Gestionar', icon: 'lucide:more-horizontal', children: PENDING_ACTIONS }];
        }
        return [
          OPEN_ACTION,
          { id: 'manage', label: 'Gestionar', icon: 'lucide:more-horizontal', children: CLOUD_ACTIONS },
        ];
      }

      function showToast(message) {
        const toast = document.createElement('ion-toast');
        toast.message = message;
        toast.duration = 1600;
        toast.position = 'bottom';
        document.body.appendChild(toast);
        toast.present();
        toast.addEventListener('didDismiss', () => toast.remove());
      }

      function runAction(action, row) {
        if (action.id === 'migrate') {
          const alert = document.createElement('ion-alert');
          alert.header = action.label;
          alert.message = 'Esta función está en desarrollo.';
          alert.buttons = ['Cerrar'];
          document.body.appendChild(alert);
          alert.present();
          alert.addEventListener('didDismiss', () => alert.remove());
          return;
        }
        showToast(`${action.label}: ${row.name}`);
      }

      function openActions(parent, row) {
        const sheet = document.createElement('ion-action-sheet');
        sheet.header = parent.label;
        sheet.buttons = [
          ...parent.children.map((action) => ({
            text: action.label,
            role: action.danger ? 'destructive' : undefined,
            handler: () => runAction(action, row),
          })),
          { text: 'Cerrar', role: 'cancel' },
        ];
        document.body.appendChild(sheet);
        sheet.present();
        sheet.addEventListener('didDismiss', () => sheet.remove());
      }

      function actionsCell(row) {
        const wrap = document.createElement('span');
        wrap.style.cssText = 'display:inline-flex;align-items:center;justify-content:flex-end;gap:2px';
        for (const action of rowActionsFor(row)) {
          const button = document.createElement('ion-button');
          button.setAttribute('size', 'small');
          button.setAttribute('fill', 'clear');
          button.setAttribute('aria-label', action.label);
          button.title = action.label;
          button.style.cssText = 'margin:0;min-width:44px;min-height:44px';
          const icon = document.createElement('iconify-icon');
          icon.setAttribute('icon', action.icon);
          icon.setAttribute('width', '18');
          icon.setAttribute('height', '18');
          button.appendChild(icon);
          button.addEventListener('click', (event) => {
            event.stopPropagation();
            if (action.children) openActions(action, row);
            else runAction(action, row);
          });
          wrap.appendChild(button);
        }
        return wrap;
      }

      const terminalCell = (row) => h`
        <span style="display:flex;align-items:center;gap:.6rem;min-width:0">
          <span style="display:grid;place-items:center;flex:none;width:2rem;height:2rem;border-radius:999px;font-size:12px;font-weight:700;color:var(--ion-color-${row.statusTone});background:rgba(var(--ion-color-${row.statusTone}-rgb),.14)">
            ${row.name.charAt(0)}
          </span>
          <span style="display:flex;flex-direction:column;min-width:0">
            <span style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${row.name}</span>
            <span style="font-size:12px;opacity:.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${row.slug}</span>
          </span>
        </span>`;

      const statusCell = (row) => h`
        <ion-badge style="--background:rgba(var(--ion-color-${row.statusTone}-rgb),.14);--color:var(--ion-color-${row.statusTone});--padding-start:10px;--padding-end:10px;--padding-top:4px;--padding-bottom:4px">
          ${row.statusLabel}
        </ion-badge>`;

      function sparklineCell(row, key) {
        const values = row[key];
        if (!values?.length) return '—';
        const width = 88;
        const height = 28;
        const min = Math.min(...values);
        const max = Math.max(...values);
        const span = Math.max(max - min, 1);
        const points = values.map((value, index) => {
          const x = values.length === 1 ? width / 2 : (index / (values.length - 1)) * width;
          const y = height - 3 - ((value - min) / span) * (height - 6);
          return `${x.toFixed(1)},${y.toFixed(1)}`;
        }).join(' ');
        return h`
          <svg viewBox="0 0 ${width} ${height}" width="88" height="28" aria-label="Serie de ${key}">
            <polyline points=${points} fill="none" stroke="var(--ion-color-primary)" stroke-width="1.75" vector-effect="non-scaling-stroke"></polyline>
          </svg>`;
      }

      const footer = `
        <footer id="section-tabbar">
          <ion-segment value="active" aria-label="Navegación de Hubs">
            <ion-segment-button value="active">
              <iconify-icon icon="lucide:check-circle" width="20" height="20"></iconify-icon>
              <ion-label>Activo</ion-label>
            </ion-segment-button>
            <ion-segment-button value="inactive">
              <iconify-icon icon="lucide:pause-circle" width="20" height="20"></iconify-icon>
              <ion-label>Inactivo</ion-label>
            </ion-segment-button>
            <ion-segment-button value="create">
              <iconify-icon icon="lucide:plus-circle" width="20" height="20"></iconify-icon>
              <ion-label>Crear</ion-label>
            </ion-segment-button>
            <ion-segment-button value="domain">
              <iconify-icon icon="lucide:globe" width="20" height="20"></iconify-icon>
              <ion-label>Dominio</ion-label>
            </ion-segment-button>
          </ion-segment>
        </footer>`;

      defineSaasDashboardPage({
        active: '/dashboard/hubs/',
        title: 'Terminales activos',
        body: `
          <div class="dash-fill">
            <ok-data-table id="hubs-active" fill>
              <div slot="toolbar" class="okdt-filters">
                <ion-select id="hubs-status-filter" class="okdt-filter" interface="popover"
                            aria-label="Estado" placeholder="Todos los estados">
                  <ion-select-option value="">Todos los estados</ion-select-option>
                  <ion-select-option value="active">Activo</ion-select-option>
                  <ion-select-option value="deploying">Desplegando</ion-select-option>
                  <ion-select-option value="stopped">Detenido</ion-select-option>
                  <ion-select-option value="error">Error</ion-select-option>
                  <ion-select-option value="pending_payment">Pago pendiente</ion-select-option>
                </ion-select>
                <ion-select id="hubs-plan-filter" class="okdt-filter" interface="popover"
                            aria-label="Plan" placeholder="Todos los planes">
                  <ion-select-option value="">Todos los planes</ion-select-option>
                  <ion-select-option value="Starter">Starter</ion-select-option>
                  <ion-select-option value="Standard">Standard</ion-select-option>
                  <ion-select-option value="Pro">Pro</ion-select-option>
                  <ion-select-option value="Enterprise">Enterprise</ion-select-option>
                  <ion-select-option value="Max">Max</ion-select-option>
                </ion-select>
              </div>
            </ok-data-table>
          </div>`,
        footer,
        setup(doc) {
          const table = doc.getElementById('hubs-active');
          const statusFilter = doc.getElementById('hubs-status-filter');
          const planFilter = doc.getElementById('hubs-plan-filter');
          if (!table) return;

          table.rowKey = 'id';
          table.columns = [
            { key: 'name', header: 'Terminal', width: 'minmax(13rem,1.35fr)', sortable: true, render: terminalCell },
            { key: 'plan', header: 'Plan', width: '8rem' },
            { key: 'status', header: 'Estado', width: '9rem', render: statusCell },
            { key: 'nextInvoice', header: 'Próxima factura', width: '10rem', sortable: true },
            { key: 'cpu', header: 'CPU', width: '7rem', render: (row) => sparklineCell(row, 'cpu') },
            { key: 'ram', header: 'RAM', width: '7rem', render: (row) => sparklineCell(row, 'ram') },
            { key: 'db', header: 'Conexiones (org)', width: '9rem', render: (row) => sparklineCell(row, 'db') },
            { key: '_actions', header: '', width: 'max-content', align: 'right', render: actionsCell },
          ];
          table.rows = HUBS;
          table.searchKeys = ['name', 'slug'];
          table.searchPlaceholder = 'Buscar terminales…';
          table.pageSize = 10;
          table.pageSizes = [10, 25, 50, 100];
          table.views = true;
          table.selectable = true;
          table.primaryAction = { label: 'Crear Terminal', icon: 'add' };
          table.menuActions = BULK_ACTIONS;
          table.cardTitle = (row) => row.name;
          table.cardIcon = () => 'git-network-outline';
          table.labels = {
            empty: 'No hay terminales activos',
            columns: 'Columnas',
            columnsVisible: 'Columnas visibles',
            rowsPerPage: 'Filas por página',
            perPageShort: '{n} / pág.',
            viewList: 'Vista lista',
            viewCards: 'Vista tarjetas',
            selected: '{n} seleccionados',
          };

          const applyFilters = () => {
            table.rows = HUBS.filter((row) => {
              const status = statusFilter?.value;
              const plan = planFilter?.value;
              const statusMatch = !status || row.status === status;
              const planMatch = !plan || row.plan === plan;
              return statusMatch && planMatch;
            });
          };
          statusFilter?.addEventListener('ionChange', applyFilters);
          planFilter?.addEventListener('ionChange', applyFilters);

          let selected = [];
          table.addEventListener('selectionChange', (event) => {
            selected = event.detail?.keys || [];
          });
          table.addEventListener('menuAction', (event) => {
            const action = BULK_ACTIONS.find((item) => item.id === event.detail?.actionId);
            if (!action) return;
            showToast(selected.length ? `${action.label}: ${selected.length}` : 'Selecciona al menos un terminal.');
          });
          table.addEventListener('primaryAction', () => showToast('Abrir creación de Terminal'));
        },
      });
    </script>
  </body>
</html>
