<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Asistente · ERPlora Cloud</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <style>
      .assistant-page { display:flex; flex-direction:column; width:min(100%,56rem); height:calc(100vh - 150px); min-height:32rem; margin:0 auto; gap:1rem; }
      .assistant-heading { display:flex; align-items:center; justify-content:space-between; gap:1rem; }
      .assistant-heading h1 { display:flex; align-items:center; gap:.5rem; margin:0; font-size:1.15rem; }
      .assistant-messages { display:flex; flex:1 1 auto; flex-direction:column; gap:.75rem; min-height:0; overflow-y:auto; }
      .assistant-message { max-width:78%; padding:.75rem .9rem; border-radius:14px; background:var(--ion-card-background); border:1px solid var(--ion-border-color); }
      .assistant-message.user { align-self:flex-end; color:var(--ion-color-primary-contrast); background:var(--ion-color-primary); border-color:var(--ion-color-primary); }
      .assistant-message p { margin:0; line-height:1.5; }
      .assistant-form { display:flex; align-items:flex-end; gap:.5rem; padding-top:.75rem; border-top:1px solid var(--ion-border-color); }
      .assistant-form ion-textarea { flex:1 1 auto; }
      @media (max-width:560px) { .assistant-page { height:calc(100vh - 136px); } .assistant-message { max-width:90%; } .assistant-form { align-items:stretch; flex-direction:column; } .assistant-form ion-button { width:100%; } }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      defineSaasDashboardPage({
        active: '/dashboard/assistant/',
        title: 'Asistente',
        body: `
          <div class="assistant-page">
            <div class="assistant-heading">
              <h1><iconify-icon icon="lucide:sparkles" width="20" height="20" style="color:var(--ion-color-primary)"></iconify-icon>Cloud Assistant</h1>
              <ion-button id="assistant-new-chat" size="small" fill="clear"><iconify-icon slot="start" icon="lucide:plus" width="16" height="16"></iconify-icon>Nuevo chat</ion-button>
            </div>
            <div id="cloud-assistant-messages" class="assistant-messages">
              <ok-inline-feedback id="assistant-empty" tone="info" heading="Pregúntame sobre tus hubs, planes o facturación.">
                <ul>
                  <li>¿Cuántos hubs tengo? ¿Hay alguno con errores?</li>
                  <li>¿Cuál es mi gasto mensual actual?</li>
                  <li>Muéstrame la URL de mi hub de QA.</li>
                </ul>
              </ok-inline-feedback>
            </div>
            <form id="cloud-assistant-form" class="assistant-form">
              <input type="hidden" name="message" id="cloud-assistant-message-input" />
              <ion-textarea id="cloud-assistant-textarea" data-bind="message" rows="2" auto-grow="true" fill="outline" placeholder="Escribe tu pregunta…"></ion-textarea>
              <ion-button id="cloud-assistant-send" type="submit"><iconify-icon slot="start" icon="lucide:send" width="16" height="16"></iconify-icon>Enviar</ion-button>
            </form>
          </div>`,
        setup(doc) {
          const messages = doc.getElementById('cloud-assistant-messages');
          const empty = doc.getElementById('assistant-empty');
          const form = doc.getElementById('cloud-assistant-form');
          const textarea = doc.getElementById('cloud-assistant-textarea');
          const hidden = doc.getElementById('cloud-assistant-message-input');

          function appendMessage(text, role) {
            const bubble = doc.createElement('div');
            bubble.className = `assistant-message ${role}`;
            const paragraph = doc.createElement('p');
            paragraph.textContent = text;
            bubble.append(paragraph);
            empty.hidden = true;
            messages.append(bubble);
            messages.scrollTop = messages.scrollHeight;
          }

          function send() {
            const text = String(textarea.value ?? '').trim();
            if (!text) return;
            hidden.value = text;
            appendMessage(text, 'user');
            textarea.value = '';
            hidden.value = '';
            window.setTimeout(() => appendMessage(
              'Tienes 3 hubs activos. Todos han sincronizado correctamente durante la última hora.',
              'assistant',
            ), 250);
          }

          form.addEventListener('submit', (event) => { event.preventDefault(); send(); });
          textarea.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); send(); }
          });
          doc.getElementById('assistant-new-chat').addEventListener('click', () => {
            messages.querySelectorAll('.assistant-message').forEach((message) => message.remove());
            empty.hidden = false;
            textarea.value = '';
          });
        },
      });
    </script>
  </body>
</html>
