<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Pedido confirmado</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* Geometría puntual de esta vista — sin colores de marca a mano. */

      .success-center {
        max-width: 720px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* Hero de confirmación */
      .success-hero {
        text-align: center;
        padding: 32px 20px 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      .success-check {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        background: color-mix(in srgb, var(--ion-color-success) 15%, transparent);
        color: var(--ion-color-success);
        display: grid;
        place-items: center;
        box-shadow: 0 0 0 8px color-mix(in srgb, var(--ion-color-success) 8%, transparent);
      }
      .success-check ion-icon {
        font-size: 42px;
      }
      .success-title {
        font-size: 2rem;
        font-weight: 700;
        margin: 0;
        letter-spacing: -0.03em;
      }
      .success-meta {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        font-size: 13px;
        color: var(--ion-color-medium);
      }
      .success-meta strong {
        color: var(--ion-text-color);
        font-family: var(--ion-font-family-monospace, monospace);
      }
      /* Lista de artículos del pedido */
      .order-item {
        display: grid;
        grid-template-columns: 48px 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px dashed var(--ion-border-color, rgba(127,127,127,.2));
      }
      .order-item:last-child {
        border-bottom: none;
      }
      .order-thumb {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        background: var(--ion-color-step-100, rgba(127,127,127,.1));
        display: grid;
        place-items: center;
        font-size: 10px;
        font-family: var(--ion-font-family-monospace, monospace);
        color: var(--ion-color-medium);
        font-weight: 600;
      }
      .order-thumb--a { background: color-mix(in srgb, var(--ion-color-warning) 25%, var(--ion-color-step-100)); }
      .order-thumb--b { background: color-mix(in srgb, var(--ion-color-tertiary) 20%, var(--ion-color-step-100)); }
      .order-thumb--c { background: color-mix(in srgb, var(--ion-color-success) 20%, var(--ion-color-step-100)); }
      .order-thumb--d { background: color-mix(in srgb, var(--ion-color-secondary) 20%, var(--ion-color-step-100)); }
      .order-item__name {
        font-size: 14px;
        font-weight: 500;
      }
      .order-item__qty {
        font-size: 12px;
        color: var(--ion-color-medium);
        margin-top: 2px;
      }
      .order-item__price {
        font-size: 14px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        font-family: var(--ion-font-family-monospace, monospace);
        text-align: right;
      }

      /* Filas de resumen de importes */
      .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 0;
        font-size: 13px;
        color: var(--ion-color-medium);
        font-variant-numeric: tabular-nums;
      }
      .summary-row strong {
        color: var(--ion-text-color);
        font-weight: 500;
      }
      .summary-row .discount {
        color: var(--ion-color-success);
        font-weight: 600;
      }
      .summary-divider {
        border: none;
        border-top: 1px dashed var(--ion-border-color, rgba(127,127,127,.2));
        margin: 6px 0;
      }
      .summary-total {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-top: 4px;
      }
      .summary-total__label {
        font-size: 12px;
        color: var(--ion-color-medium);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .summary-total__value {
        font-size: 26px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.03em;
      }

      /* Bloque de entrega */
      .delivery-block {
        background: var(--ion-color-step-50, rgba(127,127,127,.04));
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        border-radius: 8px;
        padding: 14px 16px;
        display: grid;
        grid-template-columns: 36px 1fr;
        gap: 14px;
        align-items: center;
      }
      .delivery-icon {
        width: 36px;
        height: 36px;
        background: color-mix(in srgb, var(--ion-color-primary) 12%, transparent);
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--ion-color-primary);
      }
      .delivery-label {
        font-size: 11px;
        color: var(--ion-color-medium);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .delivery-value {
        font-size: 16px;
        font-weight: 600;
        margin-top: 2px;
      }
      .delivery-sub {
        font-size: 12px;
        color: var(--ion-color-medium);
        margin-top: 2px;
        line-height: 1.4;
      }

      /* Botones de acción */
      .actions-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      @media (max-width: 640px) {
        .actions-row { grid-template-columns: repeat(2, 1fr); }
      }

      /* Tarjetas de ayuda (3 columnas) */
      .help-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }
      @media (max-width: 720px) {
        .help-grid { grid-template-columns: 1fr; }
      }
      .help-card {
        display: flex;
        gap: 12px;
        padding: 14px;
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        border-radius: 10px;
        text-decoration: none;
        color: inherit;
        cursor: pointer;
        transition: border-color .15s, transform .15s;
      }
      .help-card:hover {
        border-color: var(--ion-color-primary);
        transform: translateY(-1px);
      }
      .help-card__icon {
        width: 36px;
        height: 36px;
        flex-shrink: 0;
        background: var(--ion-color-step-100, rgba(127,127,127,.08));
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--ion-color-medium);
      }
      .help-card__icon ion-icon {
        font-size: 18px;
      }
      .help-card__title {
        font-size: 13px;
        font-weight: 600;
      }
      .help-card__desc {
        font-size: 12px;
        color: var(--ion-color-medium);
        margin-top: 2px;
        line-height: 1.4;
      }

      /* Sección "Mientras esperas" */
      .section-title {
        font-size: 16px;
        font-weight: 600;
        margin: 8px 0 12px;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Pedido confirmado"
            description="Equipamiento POS · Marketplace ERPlora">
          </ok-page-header>

          <div class="success-center pg-mt-2">

            <!-- SECCIÓN 1: Hero de confirmación -->
            <section class="success-hero">
              <div class="success-check">
                <ion-icon name="checkmark-outline"></ion-icon>
              </div>
              <h2 class="success-title">¡Pedido confirmado!</h2>
              <div class="success-meta">
                <span>Pedido <strong>#PED-2026-0142</strong></span>
                <span aria-hidden="true">·</span>
                <span>Confirmación enviada a <strong>ioan@acme.com</strong></span>
              </div>
              <ok-status-pill tone="success" icon="checkmark-circle-outline" label="Pago recibido · 8 may 2026 · 14:32"></ok-status-pill>
            </section>

            <!-- SECCIÓN 2: Resumen del pedido -->
            <ion-card>
              <ion-card-header>
                <div style="display:flex;justify-content:space-between;align-items:baseline">
                  <ion-card-title>Resumen del pedido</ion-card-title>
                  <span style="font-size:12px;color:var(--ion-color-medium);font-family:var(--ion-font-family-monospace,monospace)">
                    5 artículos · €2 286 IVA inc.
                  </span>
                </div>
              </ion-card-header>
              <ion-card-content>

                <!-- Lista de artículos -->
                <div id="order-items">
                  <div class="order-item">
                    <div class="order-thumb order-thumb--a">TPV</div>
                    <div>
                      <div class="order-item__name">Terminal POS Modelo X Pro</div>
                      <div class="order-item__qty">2 ud · €890 / ud</div>
                    </div>
                    <div class="order-item__price">€1 780</div>
                  </div>
                  <div class="order-item">
                    <div class="order-thumb order-thumb--d">Air</div>
                    <div>
                      <div class="order-item__name">Lector SumUp Air contactless</div>
                      <div class="order-item__qty">1 ud · €39</div>
                    </div>
                    <div class="order-item__price">€39</div>
                  </div>
                  <div class="order-item">
                    <div class="order-thumb order-thumb--c">Star</div>
                    <div>
                      <div class="order-item__name">Impresora térmica Star TSP143 III</div>
                      <div class="order-item__qty">1 ud · €229</div>
                    </div>
                    <div class="order-item__price">€229</div>
                  </div>
                  <div class="order-item">
                    <div class="order-thumb order-thumb--b">Acc</div>
                    <div>
                      <div class="order-item__name">Bundle accesorios POS · 8 piezas</div>
                      <div class="order-item__qty">1 ud · €85</div>
                    </div>
                    <div class="order-item__price">€85</div>
                  </div>
                </div>

                <!-- Desglose de importes -->
                <div style="margin-top:16px">
                  <div class="summary-row">
                    <span>Subtotal</span>
                    <strong>€2 222</strong>
                  </div>
                  <div class="summary-row">
                    <span>Envío estándar</span>
                    <ion-badge color="success">Gratis</ion-badge>
                  </div>
                  <div class="summary-row">
                    <span>IVA 21 %</span>
                    <strong>€467</strong>
                  </div>
                  <div class="summary-row">
                    <span>Descuento BUNDLE10</span>
                    <span class="discount">−€403</span>
                  </div>
                  <hr class="summary-divider" />
                  <div class="summary-total">
                    <span class="summary-total__label">Total pagado</span>
                    <span class="summary-total__value">€2 286</span>
                  </div>
                </div>

                <!-- Bloque de entrega -->
                <div class="delivery-block" style="margin-top:20px">
                  <div class="delivery-icon">
                    <ion-icon name="car-outline" style="font-size:20px"></ion-icon>
                  </div>
                  <div>
                    <div class="delivery-label">Entrega estimada</div>
                    <div class="delivery-value">12 may 2026 · entre 09:00 y 14:00</div>
                    <div class="delivery-sub">
                      SEUR · Calle Velázquez 47, 4º izq · 28001 Madrid · Recibirás un email con el seguimiento.
                    </div>
                  </div>
                </div>

              </ion-card-content>
            </ion-card>

            <!-- SECCIÓN 3: Botones de acción -->
            <div class="actions-row">
              <ion-button fill="outline" expand="block">
                <ion-icon slot="start" name="document-text-outline"></ion-icon>
                Ver factura
              </ion-button>
              <ion-button fill="outline" expand="block">
                <ion-icon slot="start" name="download-outline"></ion-icon>
                Descargar PDF
              </ion-button>
              <ion-button fill="outline" expand="block">
                <ion-icon slot="start" name="cart-outline"></ion-icon>
                Volver a la tienda
              </ion-button>
              <ion-button fill="outline" expand="block">
                <ion-icon slot="start" name="chatbubble-outline"></ion-icon>
                Contactar soporte
              </ion-button>
            </div>

            <!-- SECCIÓN 4: Mientras esperas -->
            <section>
              <h3 class="section-title">Mientras esperas tu pedido</h3>
              <div class="help-grid">
                <button class="help-card" type="button" id="help-config">
                  <div class="help-card__icon">
                    <ion-icon name="settings-outline"></ion-icon>
                  </div>
                  <div>
                    <div class="help-card__title">Configura tu hub</div>
                    <div class="help-card__desc">Tutorial paso a paso para tener todo listo cuando llegue el equipo.</div>
                  </div>
                </button>
                <button class="help-card" type="button" id="help-videos">
                  <div class="help-card__icon">
                    <ion-icon name="videocam-outline"></ion-icon>
                  </div>
                  <div>
                    <div class="help-card__title">Vídeos del Modelo X</div>
                    <div class="help-card__desc">12 vídeos cortos sobre primer arranque, atajos y operativa diaria.</div>
                  </div>
                </button>
                <button class="help-card" type="button" id="help-community">
                  <div class="help-card__icon">
                    <ion-icon name="people-outline"></ion-icon>
                  </div>
                  <div>
                    <div class="help-card__title">Únete a la comunidad</div>
                    <div class="help-card__desc">Foro y Slack con más de 2 400 comerciantes ERPlora.</div>
                  </div>
                </button>
              </div>
            </section>

            <!-- SECCIÓN 5: Callout informativo -->
            <ok-inline-feedback
              tone="info"
              heading="No tienes que hacer nada más">
              Si todo es correcto, recibirás actualizaciones automáticas por email cuando el pedido
              se prepare, salga del almacén y llegue a tu dirección. Si necesitas modificar algo,
              contacta con soporte en las próximas <strong>2 horas</strong>.
            </ok-inline-feedback>

          </div>
        `,
        setup(doc) {
          // Botones de acción: listeners CSP-safe
          doc.querySelectorAll('.actions-row ion-button').forEach((btn) => {
            btn.addEventListener('click', () => {
              // En el showcase solo mostramos un toast de feedback
              const toast = document.createElement('ion-toast');
              toast.message = btn.textContent.trim();
              toast.duration = 1800;
              toast.position = 'bottom';
              document.body.appendChild(toast);
              toast.present();
              toast.addEventListener('didDismiss', () => toast.remove());
            });
          });

          // Tarjetas de ayuda: feedback al pulsar
          const helpMessages = {
            'help-config':    'Abriendo tutorial de configuración…',
            'help-videos':    'Abriendo biblioteca de vídeos…',
            'help-community': 'Abriendo foro de la comunidad…',
          };
          Object.keys(helpMessages).forEach((id) => {
            const el = doc.getElementById(id);
            if (!el) return;
            el.addEventListener('click', () => {
              const toast = document.createElement('ion-toast');
              toast.message = helpMessages[id];
              toast.duration = 1500;
              toast.position = 'bottom';
              document.body.appendChild(toast);
              toast.present();
              toast.addEventListener('didDismiss', () => toast.remove());
            });
          });
        },
      });
    </script>
  </body>
</html>
