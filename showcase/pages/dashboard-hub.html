<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERPlora Hub · Inicio</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <style>
      .dashboard-pane[hidden] { display: none; }
      .dashboard-pane { min-height: 100%; }
      .dashboard-summary { display: grid; gap: 1rem; }
      .dashboard-app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 1rem; padding: 0.5rem; }
      .dashboard-app { border: 0; background: transparent; color: inherit; display: grid; justify-items: center; gap: 0.45rem; cursor: pointer; }
      .dashboard-app-box { display: grid; place-items: center; width: 58px; height: 58px; border-radius: 15px; background: var(--ion-color-step-100); font-size: 1.7rem; }
      .dashboard-app-label { font-size: 0.8rem; text-align: center; }
      .dashboard-activity { display: flex; flex-direction: column; height: 100%; min-height: 24rem; }
      .dashboard-activity > ok-data-table { flex: 1 1 auto; min-height: 0; }
      .dashboard-tabs { width: min(100%, 34rem); margin: 0 auto; }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      const APPS = [
        { id: 'sales', label: 'Ventas', icon: 'trending-up-outline' },
        { id: 'inventory', label: 'Inventario', icon: 'cube-outline' },
        { id: 'customers', label: 'Clientes', icon: 'people-outline' },
        { id: 'staff', label: 'Personal', icon: 'person-outline' },
      ];
      const ACTIVITY = [
        { id: 'a1', time: '18:42', module: 'Ventas', event: 'Venta completada', actor: 'Marta Soler', status: 'ok' },
        { id: 'a2', time: '18:34', module: 'Inventario', event: 'Stock actualizado', actor: 'Sistema', status: 'ok' },
        { id: 'a3', time: '18:20', module: 'Caja', event: 'Movimiento registrado', actor: 'Joan Castell', status: 'info' },
      ];

      defineHubPage({
        active: '/dashboard',
        title: 'Inicio',
        body: `
          <section id="dashboard-summary" class="dashboard-pane dashboard-summary">
            <ion-list inset id="dashboard-setup-list">
              <ion-list-header><ion-label color="danger">1 módulo necesita configuración</ion-label></ion-list-header>
              <ion-item lines="none">
                <ion-icon slot="start" name="receipt-outline"></ion-icon>
                <ion-label class="ion-text-wrap"><h3>Facturación</h3><p>Completa los datos fiscales antes de emitir facturas.</p></ion-label>
                <ion-button slot="end" size="small">Configurar</ion-button>
              </ion-item>
            </ion-list>
            <ok-widget-board id="dashboard-board" editable storage-key="dashboard-hub"></ok-widget-board>
            <ion-list inset>
              <ion-list-header>Este terminal</ion-list-header>
              <ion-item><ion-label>Plan</ion-label><ion-note slot="end">Profesional</ion-note></ion-item>
              <ion-item><ion-label>Estado</ion-label><ion-badge slot="end" color="success">Activo</ion-badge></ion-item>
              <ion-item><ion-label>Próxima factura</ion-label><ion-note slot="end">1 ago 2026</ion-note></ion-item>
              <ion-item lines="none"><ion-label>Bridge</ion-label><ion-badge slot="end" color="success">Conectado</ion-badge></ion-item>
            </ion-list>
            <ion-button expand="block" fill="outline" id="dashboard-open-system">
              <ion-icon slot="start" name="hardware-chip-outline"></ion-icon>Sistema
            </ion-button>
          </section>

          <section id="dashboard-apps" class="dashboard-pane" hidden>
            <div id="dashboard-app-grid" class="dashboard-app-grid"></div>
          </section>

          <section id="dashboard-activity" class="dashboard-pane dashboard-activity" hidden>
            <ok-data-table id="dashboard-activity-table" fill></ok-data-table>
          </section>
        `,
        footer: `
          <ion-toolbar>
            <ion-segment id="dashboard-tabs" class="dashboard-tabs" value="resumen">
              <ion-segment-button value="resumen"><ion-icon name="home-outline"></ion-icon><ion-label>Resumen</ion-label></ion-segment-button>
              <ion-segment-button value="apps"><ion-icon name="apps-outline"></ion-icon><ion-label>Aplicaciones</ion-label></ion-segment-button>
              <ion-segment-button value="actividad"><ion-icon name="time-outline"></ion-icon><ion-label>Actividad</ion-label></ion-segment-button>
            </ion-segment>
          </ion-toolbar>
        `,
        setup(doc) {
          const board = doc.getElementById('dashboard-board');
          board.widgets = [
            {
              id: 'data-export', title: 'Exportar e importar datos', icon: 'cloud-download-outline', category: 'Sistema', size: 'md',
              render(cell) {
                const card = doc.createElement('ion-card');
                card.innerHTML = '<ion-card-header><ion-card-title>Exportar e importar datos</ion-card-title></ion-card-header><ion-card-content>Copias portables de los datos del Hub.</ion-card-content>';
                cell.append(card);
              },
            },
          ];
          board.presets = [{ id: 'default', label: 'Predeterminado', widgets: ['data-export'] }];
          board.labels = { customize: 'Personalizar panel', close: 'Cerrar', presets: 'Presets', active: 'Activos', available: 'Disponibles', empty: 'Panel vacío' };

          const appGrid = doc.getElementById('dashboard-app-grid');
          APPS.forEach((app) => {
            const button = doc.createElement('button');
            button.type = 'button';
            button.className = 'dashboard-app';
            button.innerHTML = `<span class="dashboard-app-box"><ion-icon name="${app.icon}"></ion-icon></span><span class="dashboard-app-label">${app.label}</span>`;
            button.addEventListener('click', () => { window.location.hash = `#/p/module-${app.id}`; });
            appGrid.append(button);
          });
          const addApp = doc.createElement('button');
          addApp.type = 'button';
          addApp.className = 'dashboard-app';
          addApp.innerHTML = '<span class="dashboard-app-box"><ion-icon name="add-outline"></ion-icon></span><span class="dashboard-app-label">Añadir módulo</span>';
          appGrid.append(addApp);

          const activityTable = doc.getElementById('dashboard-activity-table');
          activityTable.fill = true;
          activityTable.searchable = true;
          activityTable.views = ['table', 'cards'];
          activityTable.pageSize = 25;
          activityTable.columns = [
            { key: 'time', header: 'Hora', sortable: true },
            { key: 'module', header: 'Módulo', sortable: true, filterable: true, filterType: 'select', options: [...new Set(ACTIVITY.map((row) => row.module))].map((value) => ({ value, label: value })) },
            { key: 'event', header: 'Actividad', sortable: true, filterable: true, filterType: 'text' },
            { key: 'actor', header: 'Usuario', sortable: true, filterable: true, filterType: 'text' },
            { key: 'status', header: 'Estado', filterable: true, filterType: 'select', options: [{ value: 'ok', label: 'Correcto' }, { value: 'info', label: 'Información' }] },
          ];
          activityTable.rows = ACTIVITY;

          doc.getElementById('dashboard-tabs').addEventListener('ionChange', (event) => {
            const target = event.detail.value;
            doc.getElementById('dashboard-summary').hidden = target !== 'resumen';
            doc.getElementById('dashboard-apps').hidden = target !== 'apps';
            doc.getElementById('dashboard-activity').hidden = target !== 'actividad';
          });
          doc.getElementById('dashboard-open-system').addEventListener('click', () => {
            window.parent.location.hash = '#/p/system-index';
          });
        },
      });
    </script>
  </body>
</html>
