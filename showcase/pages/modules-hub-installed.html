<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Hub · Apps</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>

    <style>
      [hidden] { display: none !important; }

      .apps-fill,
      .apps-panel {
        height: 100%;
        min-height: 420px;
      }

      ok-data-table[fill] {
        height: 100%;
      }

      .consent-intro {
        margin: 0 0 12px;
        color: var(--ion-color-medium);
        line-height: 1.5;
      }

      .consent-actions {
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      // Fallback demo literal de AppsPage.vue. El catálogo Cloud conserva este mismo contrato.
      const MODULES_DEMO = [
        { id: 'inventory', name: 'Inventario', desc: 'Productos, stock y movimientos', price: 'Gratis', installed: true, cat: 'Operación' },
        { id: 'pos', name: 'TPV / POS', desc: 'Punto de venta y caja', price: 'Gratis', installed: true, cat: 'Ventas' },
        { id: 'customers', name: 'Clientes (CRM)', desc: 'Fichas, grupos y actividad', price: 'Gratis', installed: true, cat: 'Ventas' },
        { id: 'invoice', name: 'Facturación', desc: 'Facturas y rectificativas', price: '9 €/mes', installed: false, cat: 'Finanzas' },
        { id: 'couriers', name: 'Envíos', desc: 'Integración con transportistas', price: '12 €/mes', installed: false, cat: 'Logística' },
        { id: 'appointments', name: 'Reservas', desc: 'Agenda y citas online', price: '7 €/mes', installed: false, cat: 'Operación' },
        { id: 'messaging', name: 'Mensajería', desc: 'WhatsApp y email unificados', price: '15 €/mes', installed: false, cat: 'Comunicación' },
        { id: 'analytics', name: 'Analítica', desc: 'Cuadros de mando e informes', price: '9 €/mes', installed: false, cat: 'BI' },
      ];

      // listInstalledModules() es la fuente de verdad de esta pestaña. En un showcase sin runtime
      // el fallback honesto es el mismo que usa AppsPage cuando falla la petición: lista vacía.
      let installedModules = [];
      let catalogModules = MODULES_DEMO.map((module) => ({
        ...module,
        state: module.installed ? 'installed' : 'available',
        stateLabel: module.installed ? 'Instalado' : 'Disponible',
      }));

      const DT_LABELS_ES = {
        search: 'Buscar…',
        empty: 'Sin resultados',
        filters: 'Filtros',
        clear: 'Limpiar',
        apply: 'Aplicar',
        moreActions: 'Más acciones',
        rowsPerPage: 'Filas por página',
        perPageShort: '{n} / pág.',
        viewList: 'Vista lista',
        viewCards: 'Vista tarjetas',
        columnsVisible: 'Columnas visibles',
        columns: 'Columnas',
        actions: 'Acciones',
        close: 'Cerrar',
        filterPlaceholder: 'Filtrar…',
        noValues: 'Sin valores',
        showing: 'Mostrando {from}–{to} de',
        recordSingular: 'registro',
        recordPlural: 'registros',
      };

      function badgeCell(text, tone) {
        const badge = document.createElement('span');
        badge.textContent = text;
        badge.style.cssText =
          'display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;' +
          `background:rgba(var(--ion-color-${tone}-rgb),.14);` +
          `color:var(--ion-color-${tone}-shade,var(--ion-color-${tone}))`;
        return badge;
      }

      function configureBaseTable(table) {
        table.views = ['cards', 'table'];
        table.defaultView = 'cards';
        table.pageSize = 10;
        table.columnPicker = true;
        table.labels = DT_LABELS_ES;
      }

      defineHubPage({
        active: 'apps',
        title: 'Apps',
        body: `
          <div class="apps-fill">
            <ok-data-table id="mine-table" fill></ok-data-table>
            <ok-data-table id="catalog-table" fill hidden></ok-data-table>
          </div>

          <ion-modal id="consent-modal">
            <ion-header class="ion-no-border">
              <ion-toolbar>
                <ion-title>Permisos solicitados</ion-title>
                <ion-buttons slot="end">
                  <ion-button class="consent-close" aria-label="Cerrar">
                    <ion-icon slot="icon-only" name="close-outline"></ion-icon>
                  </ion-button>
                </ion-buttons>
              </ion-toolbar>
            </ion-header>
            <ion-content class="ion-padding">
              <p class="consent-intro">
                Este módulo solicita estos permisos. Podrás revisarlos después en Ajustes → Permisos.
              </p>
              <ion-list id="consent-list" lines="full"></ion-list>
              <div class="consent-actions">
                <ion-button id="consent-confirm" expand="block">
                  <ion-icon slot="start" name="download-outline"></ion-icon>
                  Instalar y conceder
                </ion-button>
                <ion-button class="consent-close" expand="block" fill="outline">Cancelar</ion-button>
              </div>
            </ion-content>
          </ion-modal>

          <ion-toast id="apps-toast" duration="2500" position="bottom"></ion-toast>
        `,
        footer: `
          <ion-footer class="ion-no-border apps-footer">
            <ion-toolbar>
              <ion-segment id="apps-tabs" value="mine">
                <ion-segment-button value="mine">
                  <ion-icon name="cube-outline"></ion-icon>
                  <ion-label>Mis módulos</ion-label>
                </ion-segment-button>
                <ion-segment-button value="all">
                  <ion-icon name="storefront-outline"></ion-icon>
                  <ion-label>Catálogo</ion-label>
                </ion-segment-button>
                <ion-segment-button value="paid">
                  <ion-icon name="wallet-outline"></ion-icon>
                  <ion-label>Pago</ion-label>
                </ion-segment-button>
              </ion-segment>
            </ion-toolbar>
          </ion-footer>
        `,
        setup(doc) {
          const mineTable = doc.getElementById('mine-table');
          const catalogTable = doc.getElementById('catalog-table');
          const tabs = doc.getElementById('apps-tabs');
          const toast = doc.getElementById('apps-toast');
          const consent = doc.getElementById('consent-modal');

          configureBaseTable(mineTable);
          mineTable.searchKeys = ['name'];
          mineTable.searchPlaceholder = 'Buscar módulo instalado…';
          mineTable.columns = [
            { key: 'name', header: 'Módulo' },
            { key: 'version', header: 'Versión', format: (row) => `v${String(row.version ?? '')}` },
            {
              key: 'status',
              header: 'Estado',
              filterable: true,
              filterType: 'select',
              render: (row) => badgeCell(
                row.status === 'active'
                  ? 'Activo'
                  : row.status === 'inactive_auto'
                    ? 'Inactivo (en cascada)'
                    : 'Inactivo',
                row.status === 'active' ? 'success' : row.status === 'inactive_auto' ? 'warning' : 'medium',
              ),
            },
          ];
          mineTable.actions = [
            { id: 'toggle', label: 'Activar/Desactivar', icon: 'power-outline' },
            { id: 'uninstall', label: 'Desinstalar', icon: 'trash', color: 'danger' },
          ];
          mineTable.rows = installedModules;

          configureBaseTable(catalogTable);
          catalogTable.searchKeys = ['name', 'desc', 'cat'];
          catalogTable.searchPlaceholder = 'Buscar en el catálogo…';
          catalogTable.columns = [
            { key: 'name', header: 'Módulo' },
            { key: 'cat', header: 'Categoría', filterable: true, filterType: 'select', render: (row) => badgeCell(String(row.cat ?? ''), 'medium') },
            { key: 'desc', header: 'Descripción' },
            { key: 'price', header: 'Precio', filterable: true, filterType: 'select', render: (row) => badgeCell(String(row.price ?? ''), row.price === 'Gratis' ? 'success' : 'medium') },
            { key: 'stateLabel', header: 'Estado', align: 'center', filterable: true, filterType: 'select', render: (row) => badgeCell(String(row.stateLabel), row.state === 'installed' ? 'success' : 'medium') },
          ];
          catalogTable.actions = [
            { id: 'install', label: 'Instalar', icon: 'download-outline', disabled: (row) => row.state !== 'available' },
          ];
          catalogTable.rows = catalogModules;

          function showToast(message, color = 'primary') {
            toast.message = message;
            toast.color = color;
            toast.isOpen = true;
          }

          function showTab(value) {
            const mine = value === 'mine';
            mineTable.hidden = !mine;
            catalogTable.hidden = mine;
            if (!mine) {
              catalogTable.rows = value === 'paid'
                ? catalogModules.filter((module) => module.price !== 'Gratis')
                : catalogModules;
            }
          }

          tabs.addEventListener('ionChange', (event) => {
            const value = event.detail?.value;
            if (value === 'mine' || value === 'all' || value === 'paid') showTab(value);
          });

          mineTable.addEventListener('rowAction', (event) => {
            const { actionId, row } = event.detail || {};
            if (!row) return;
            if (actionId === 'toggle') {
              row.status = row.status === 'active' ? 'inactive' : 'active';
              installedModules = [...installedModules];
              mineTable.rows = installedModules;
              showToast(row.status === 'active' ? `${row.name} activado.` : `${row.name} desactivado.`, row.status === 'active' ? 'success' : 'primary');
            }
            if (actionId === 'uninstall') {
              installedModules = installedModules.filter((module) => module.id !== row.id);
              mineTable.rows = installedModules;
              showToast(`${row.name} desinstalado.`);
            }
          });

          catalogTable.addEventListener('rowAction', (event) => {
            const { actionId, row } = event.detail || {};
            if (actionId !== 'install' || !row || row.state !== 'available') return;
            row.state = 'installed';
            row.stateLabel = 'Instalado';
            catalogModules = [...catalogModules];
            catalogTable.rows = catalogModules;
            showToast(`${row.name} instalado correctamente.`, 'success');
          });

          doc.querySelectorAll('.consent-close').forEach((button) => {
            button.addEventListener('click', () => consent.dismiss());
          });
          doc.getElementById('consent-confirm').addEventListener('click', () => consent.dismiss());
          toast.addEventListener('didDismiss', () => { toast.isOpen = false; });

          showTab('mine');
        },
      });
    </script>
  </body>
</html>
