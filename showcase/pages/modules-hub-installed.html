<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Hub · Módulos instalados</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';
      import { html as h } from 'lit';

      // Datos de módulos instalados.
      const MODULES_ACTIVE = [
        { id: 'sales',     name: 'Sales',        version: 'v2.4.1',        status: 'active',  system: false, icon: 'cart-outline',                 color: 'primary',   desc: 'Motor universal de ventas. Tickets, pedidos, devoluciones, descuentos, tarifas.' },
        { id: 'pos',       name: 'POS',           version: 'v1.9.3',        status: 'active',  system: false, icon: 'receipt-outline',               color: 'secondary', desc: 'Terminal punto de venta para hostelería y retail. KDS, comandero, caja.' },
        { id: 'employees', name: 'Employees',     version: 'v1.4.0',        status: 'active',  system: true,  icon: 'people-outline',                color: 'success',   desc: 'Gestión de empleados, fichajes, turnos, vacaciones. Módulo del sistema.' },
        { id: 'verifactu', name: 'Verifactu ES',  version: 'v0.8.2',        status: 'active',  system: false, icon: 'checkmark-done-circle-outline', color: 'primary',   desc: 'Cumplimiento Verifactu / AEAT. Remisión automática de facturas a Hacienda.' },
        { id: 'inventory', name: 'Inventory',     version: 'v3.0.0-beta.4', status: 'error',   system: false, icon: 'cube-outline',                  color: 'warning',   desc: 'Stock, almacenes, lotes y trazabilidad.' },
        { id: 'orders',    name: 'Orders',        version: 'v1.2.5',        status: 'active',  system: false, icon: 'list-outline',                  color: 'secondary', desc: 'Pedidos web, delivery, recogida y reservas integradas con sales.' },
        { id: 'tables',    name: 'Tables',        version: 'v1.1.0',        status: 'active',  system: false, icon: 'grid-outline',                  color: 'tertiary',  desc: 'Gestión de mesas y zonas para hostelería. Canvas interactivo y asignación de pedidos.' },
        { id: 'loyalty',   name: 'Loyalty',       version: 'v0.6.2',        status: 'active',  system: false, icon: 'star-outline',                  color: 'warning',   desc: 'Programa de fidelización con puntos, sellos y recompensas. Integrado con POS y Orders.' },
      ];

      const MODULES_INACTIVE = [
        { id: 'whatsapp',  name: 'WhatsApp Inbox', version: 'v0.5.1', status: 'inactive', system: false, icon: 'logo-whatsapp',         color: 'medium', desc: 'Bandeja de entrada de WhatsApp integrada con el asistente y el sistema de pedidos.' },
        { id: 'invoicing', name: 'Invoicing',       version: 'v1.0.3', status: 'inactive', system: false, icon: 'document-text-outline', color: 'medium', desc: 'Facturación completa F1/F2/R1 con PDF y envío por email.' },
      ];

      // Estado → etiqueta/color (badges shadow-safe con vars inline — .ion-color-* no penetra shadow).
      const STATUS_LABEL = { active: 'Activo', inactive: 'Desactivado', error: 'Error de migración' };
      const STATUS_COLOR = { active: 'success', inactive: 'medium', error: 'danger' };

      const statusBadge = (s) => {
        const c = STATUS_COLOR[s] ?? 'medium';
        return h`<ion-badge style="--background:color-mix(in srgb,var(--ion-color-${c}) 15%,transparent);--color:var(--ion-color-${c});--padding-top:4px;--padding-bottom:4px">${STATUS_LABEL[s]}</ion-badge>`;
      };

      // Cuerpo de tarjeta de módulo (renderCard de ok-data-table).
      const renderModuleCard = (r) => h`
        <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:10px">
          <div style="width:40px;height:40px;border-radius:10px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:20px;background:color-mix(in srgb,var(--ion-color-${r.color}) 15%,transparent);color:var(--ion-color-${r.color})">
            <ion-icon name="${r.icon}"></ion-icon>
          </div>
          <div style="flex:1 1 auto;min-width:0">
            <div style="font-size:14px;font-weight:600;margin-bottom:2px">${r.name}</div>
            <div style="font-size:11.5px;color:var(--ion-color-medium);margin-bottom:6px">ERPlora · ${r.version}${r.system ? ' · sistema' : ''}</div>
            ${statusBadge(r.status)}
          </div>
          ${r.system
            ? h`<ion-toggle checked disabled size="small"></ion-toggle>`
            : h`<ion-toggle .checked=${r.status !== 'inactive'} size="small" data-mod-id="${r.id}"></ion-toggle>`
          }
        </div>
        <p style="font-size:13px;color:var(--ion-color-medium);line-height:1.45;margin:0 0 6px">
          ${r.status === 'error'
            ? h`${r.desc} <strong style="color:var(--ion-color-danger)">Falta migración ${r.version}.</strong>`
            : r.desc
          }
        </p>`;

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Módulos del Hub"
            description="8 instalados · 2 desactivados · 1 con error">
            <div slot="actions">
              <ion-button fill="outline" size="small">
                <ion-icon slot="start" name="cloud-upload-outline"></ion-icon>
                Subir paquete
              </ion-button>
              <ion-button size="small">
                <ion-icon slot="start" name="storefront-outline"></ion-icon>
                Ir al Marketplace
              </ion-button>
            </div>
          </ok-page-header>

          <!-- Banner CTA Marketplace -->
          <ok-inline-feedback
            id="marketplace-banner"
            class="pg-mb-4"
            tone="info"
            heading="Explora más módulos en el Marketplace"
            icon="storefront-outline"
            dismissible>
            Inventario avanzado, e-commerce, RRHH, contabilidad… 96 módulos disponibles para tu sector.
            <div slot="actions">
              <ion-button size="small">
                <ion-icon slot="start" name="open-outline"></ion-icon>
                Ver Marketplace
              </ion-button>
            </div>
          </ok-inline-feedback>

          <!-- Tabs internos -->
          <ion-segment id="modules-tab" value="active" class="pg-mb-4">
            <ion-segment-button value="active">
              <ion-label>
                Activos
                <ion-badge color="primary" style="margin-left:6px">8</ion-badge>
              </ion-label>
            </ion-segment-button>
            <ion-segment-button value="inactive">
              <ion-label>
                Desactivados
                <ion-badge color="medium" style="margin-left:6px">2</ion-badge>
              </ion-label>
            </ion-segment-button>
            <ion-segment-button value="available">
              <ion-label>
                Disponibles
                <ion-badge color="medium" style="margin-left:6px">88</ion-badge>
              </ion-label>
            </ion-segment-button>
          </ion-segment>

          <!-- Pestaña: Activos -->
          <div id="tab-active">
            <ok-data-table id="dt-active" style="display:block"></ok-data-table>
          </div>

          <!-- Pestaña: Desactivados -->
          <div id="tab-inactive" hidden>
            <ok-data-table id="dt-inactive" style="display:block"></ok-data-table>
          </div>

          <!-- Pestaña: Disponibles -->
          <div id="tab-available" hidden>
            <ok-empty-state
              icon="storefront-outline"
              heading="96 módulos disponibles en el Marketplace"
              message="Amplía tu hub con módulos de inventario avanzado, e-commerce, RRHH, contabilidad y mucho más.">
            </ok-empty-state>
            <div style="text-align:center;margin-top:20px">
              <ion-button>
                <ion-icon slot="start" name="open-outline"></ion-icon>
                Abrir Marketplace
              </ion-button>
            </div>
          </div>
        `,
        setup(doc) {
          // ── Configurar ok-data-table (activos) ──────────────────────────
          const dtActive = doc.getElementById('dt-active');
          dtActive.rowKey = (r) => r.id;
          dtActive.views = ['cards', 'table'];
          dtActive.viewMode = 'cards';
          dtActive.searchable = true;
          dtActive.searchKeys = ['name', 'desc', 'version'];
          dtActive.labels = { search: 'Buscar módulo (sales, pos, verifactu…)' };
          dtActive.columns = [
            { key: 'name',    header: 'Módulo',  width: 'minmax(10rem,1.2fr)', render: (r) => h`<span style="font-weight:600">${r.name}</span>` },
            { key: 'version', header: 'Versión', width: '9rem' },
            { key: 'status',  header: 'Estado',  width: '10rem', render: (r) => statusBadge(r.status) },
          ];
          dtActive.cardIcon = (r) => r.icon;
          dtActive.cardTitle = (r) => r.name;
          dtActive.renderCard = renderModuleCard;
          dtActive.actions = [
            { id: 'configure', icon: 'settings-outline', label: 'Configurar' },
            { id: 'log',       icon: 'terminal-outline', label: 'Ver log',              show: (r) => r.status === 'error' },
            { id: 'retry',     icon: 'refresh-outline',  label: 'Reintentar migración', color: 'primary', show: (r) => r.status === 'error' },
            { id: 'uninstall', icon: 'trash-outline',    label: 'Desinstalar',          color: 'danger',  show: (r) => !r.system },
          ];
          dtActive.rows = MODULES_ACTIVE;

          // ── Configurar ok-data-table (inactivos) ────────────────────────
          const dtInactive = doc.getElementById('dt-inactive');
          dtInactive.rowKey = (r) => r.id;
          dtInactive.views = ['cards', 'table'];
          dtInactive.viewMode = 'cards';
          dtInactive.searchable = true;
          dtInactive.searchKeys = ['name', 'desc', 'version'];
          dtInactive.labels = { search: 'Buscar módulo…' };
          dtInactive.columns = [
            { key: 'name',    header: 'Módulo',  width: 'minmax(10rem,1.2fr)', render: (r) => h`<span style="font-weight:600">${r.name}</span>` },
            { key: 'version', header: 'Versión', width: '9rem' },
            { key: 'status',  header: 'Estado',  width: '10rem', render: (r) => statusBadge(r.status) },
          ];
          dtInactive.cardIcon = (r) => r.icon;
          dtInactive.cardTitle = (r) => r.name;
          dtInactive.renderCard = renderModuleCard;
          dtInactive.actions = [
            { id: 'configure', icon: 'settings-outline', label: 'Configurar' },
            { id: 'uninstall', icon: 'trash-outline',    label: 'Desinstalar', color: 'danger' },
          ];
          dtInactive.rows = MODULES_INACTIVE;

          // ── Estado del tab activo ────────────────────────────────────────
          const tabs = {
            active:    doc.getElementById('tab-active'),
            inactive:  doc.getElementById('tab-inactive'),
            available: doc.getElementById('tab-available'),
          };
          const seg = doc.getElementById('modules-tab');

          const showTab = (val) => {
            Object.keys(tabs).forEach((k) => {
              const el = tabs[k];
              if (el) el.hidden = k !== val;
            });
          };

          if (seg) {
            seg.addEventListener('ionChange', (e) => {
              const val = e.detail && e.detail.value;
              if (val) showTab(val);
            });
          }
          showTab('active');

          // ── Acciones de fila ─────────────────────────────────────────────
          const handleRowAction = async (e) => {
            const { actionId, row } = e.detail || {};
            if (actionId === 'uninstall') {
              const alert = document.createElement('ion-alert');
              alert.header  = 'Desinstalar módulo';
              alert.message = `¿Seguro que quieres desinstalar <strong>${row.name}</strong>? Esta acción no se puede deshacer.`;
              alert.buttons = [
                { text: 'Cancelar', role: 'cancel' },
                { text: 'Desinstalar', role: 'destructive', cssClass: 'ok-danger' },
              ];
              document.body.appendChild(alert);
              await alert.present();
              alert.addEventListener('didDismiss', () => alert.remove());
              return;
            }
            if (actionId === 'retry') {
              const toast = document.createElement('ion-toast');
              toast.message  = `Reintentando migración de ${row.name}…`;
              toast.duration = 2500;
              toast.position = 'bottom';
              toast.color    = 'primary';
              document.body.appendChild(toast);
              toast.present();
              toast.addEventListener('didDismiss', () => toast.remove());
              return;
            }
            if (actionId === 'configure' || actionId === 'log') {
              const toast = document.createElement('ion-toast');
              toast.message  = actionId === 'log'
                ? `Abriendo log de ${row.name}…`
                : `Configuración de ${row.name}…`;
              toast.duration = 1500;
              toast.position = 'bottom';
              document.body.appendChild(toast);
              toast.present();
              toast.addEventListener('didDismiss', () => toast.remove());
            }
          };

          doc.getElementById('dt-active').addEventListener('rowAction', handleRowAction);
          doc.getElementById('dt-inactive').addEventListener('rowAction', handleRowAction);

          // ── Toggle activar/desactivar (delegado al documento) ───────────
          doc.addEventListener('ionChange', (e) => {
            const toggle = e.target;
            if (toggle.tagName !== 'ION-TOGGLE' || toggle.disabled) return;
            const modId  = toggle.getAttribute('data-mod-id');
            if (!modId) return;
            const checked = e.detail && e.detail.checked;
            const mod     = [...MODULES_ACTIVE, ...MODULES_INACTIVE].find((m) => m.id === modId);
            const name    = mod ? mod.name : modId;
            const toast   = document.createElement('ion-toast');
            toast.message  = checked ? `${name} activado correctamente.` : `${name} desactivado.`;
            toast.duration = 2200;
            toast.position = 'bottom';
            toast.color    = checked ? 'success' : 'medium';
            document.body.appendChild(toast);
            toast.present();
            toast.addEventListener('didDismiss', () => toast.remove());
          });
        },
      });
    </script>
  </body>
</html>
