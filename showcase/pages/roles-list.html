<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Hub · Roles y permisos</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';
      import { html as h } from 'lit';

      // Mapa origen → tone de ok-status-pill
      const ORIGEN_TONE = { Sistema: 'neutral', 'Solución': 'info', Custom: 'neutral' };

      // Celda de nombre del rol: avatar de iniciales + nombre + descripción
      const nombreRol = (r) => h`
        <span style="display:inline-flex;align-items:center;gap:.6rem">
          <ok-avatar name=${r.nombre} size="sm" tone=${r.tono}></ok-avatar>
          <span>
            <div style="font-weight:600">${r.nombre}</div>
            <div style="font-size:.78rem;color:var(--ion-color-medium)">${r.descripcion}</div>
          </span>
        </span>`;

      // Celda de origen
      const origenBadge = (origen) => h`<ok-status-pill
          tone=${ORIGEN_TONE[origen] ?? 'neutral'}
          label=${origen}
          dot></ok-status-pill>`;

      // Celda de usuarios
      const usuariosPill = (n) => h`
        <ion-badge style="--background:color-mix(in srgb, var(--ion-color-medium) 15%, transparent);--color:var(--ion-color-medium);--padding-top:5px;--padding-bottom:5px;--padding-start:8px;--padding-end:8px;border-radius:12px;font-weight:500">
          ${n}
        </ion-badge>`;

      // Celda de permisos
      const permisosPill = (txt, destacado) => h`
        <ion-badge style="--background:color-mix(in srgb, ${destacado ? 'var(--ion-color-primary)' : 'var(--ion-color-medium)'} 12%, transparent);--color:${destacado ? 'var(--ion-color-primary)' : 'var(--ion-color-medium)'};--padding-top:5px;--padding-bottom:5px;--padding-start:8px;--padding-end:8px;border-radius:12px;font-weight:500">
          ${txt}
        </ion-badge>`;

      // Celda de estado
      const estadoPill = () => h`<ok-status-pill tone="success" label="Activo" dot></ok-status-pill>`;

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Roles y permisos"
            description="4 roles · 5 empleados asignados">
            <ion-button slot="actions" size="small">
              <ion-icon slot="start" name="add"></ion-icon>
              Nuevo rol
            </ion-button>
          </ok-page-header>

          <ok-data-table id="roles-dt" style="display:block"></ok-data-table>
        `,
        setup(doc) {
          const dt = doc.getElementById('roles-dt');

          dt.title = 'Roles';
          dt.rowKey = (r) => r.id;
          dt.searchable = true;
          dt.searchKeys = ['nombre', 'descripcion', 'origen'];
          dt.searchPlaceholder = 'Buscar rol…';
          dt.csv = false;

          // Columnas
          dt.columns = [
            {
              key: 'nombre',
              header: 'Rol',
              width: 'minmax(14rem, 2fr)',
              sortable: true,
              render: (r) => nombreRol(r),
            },
            {
              key: 'origen',
              header: 'Origen',
              width: 'minmax(8rem, .9fr)',
              render: (r) => origenBadge(r.origen),
            },
            {
              key: 'usuarios',
              header: 'Usuarios',
              width: '7.5rem',
              align: 'center',
              sortable: true,
              render: (r) => usuariosPill(r.usuarios),
            },
            {
              key: 'permisos',
              header: 'Permisos',
              width: '9rem',
              align: 'center',
              render: (r) => permisosPill(r.permisos, r.permisoDestacado),
            },
            {
              key: 'estado',
              header: 'Estado',
              width: '7.5rem',
              render: () => estadoPill(),
            },
          ];

          // Acciones por fila
          dt.actions = [
            { id: 'editar', icon: 'create-outline', label: 'Editar' },
            { id: 'menu', icon: 'ellipsis-horizontal', label: 'Más' },
          ];

          // Datos de los 4 roles
          dt.rows = [
            {
              id: 'admin',
              nombre: 'Admin',
              descripcion: 'Acceso total al Hub',
              tono: 'primary',
              origen: 'Sistema',
              usuarios: '1 usuario',
              permisos: 'Acceso total *',
              permisoDestacado: true,
              editable: false,
            },
            {
              id: 'manager',
              nombre: 'Manager',
              descripcion: 'Operación, ventas, empleados (sin facturación)',
              tono: 'auto',
              origen: 'Solución',
              usuarios: '1 usuario',
              permisos: '28 permisos',
              permisoDestacado: false,
              editable: true,
            },
            {
              id: 'cajero',
              nombre: 'Cajero',
              descripcion: 'POS y caja',
              tono: 'auto',
              origen: 'Solución',
              usuarios: '1 usuario',
              permisos: '12 permisos',
              permisoDestacado: false,
              editable: true,
            },
            {
              id: 'cocinero',
              nombre: 'Cocinero',
              descripcion: 'KDS y comandas (custom)',
              tono: 'auto',
              origen: 'Custom',
              usuarios: '2 usuarios',
              permisos: '6 permisos',
              permisoDestacado: false,
              editable: true,
            },
          ];

          // Menú de acciones por fila
          dt.addEventListener('rowAction', (e) => {
            const { actionId, row } = e.detail || {};

            if (actionId === 'editar') {
              if (!row.editable) {
                const toast = document.createElement('ion-toast');
                toast.message = `El rol "${row.nombre}" es de sistema y no se puede editar.`;
                toast.duration = 2200;
                toast.position = 'bottom';
                toast.color = 'warning';
                document.body.appendChild(toast);
                toast.present();
                toast.addEventListener('didDismiss', () => toast.remove());
                return;
              }
              const toast = document.createElement('ion-toast');
              toast.message = `Editando rol: ${row.nombre}`;
              toast.duration = 1800;
              toast.position = 'bottom';
              document.body.appendChild(toast);
              toast.present();
              toast.addEventListener('didDismiss', () => toast.remove());
              return;
            }

            if (actionId === 'menu') {
              const buttons = [
                { text: 'Ver detalles', icon: 'eye-outline' },
                ...(row.editable
                  ? [
                      { text: 'Editar', icon: 'create-outline' },
                      { text: 'Duplicar', icon: 'copy-outline' },
                    ]
                  : []),
                ...(row.origen === 'Custom'
                  ? [{ text: 'Eliminar', role: 'destructive', icon: 'trash-outline' }]
                  : []),
                { text: 'Cancelar', role: 'cancel' },
              ];
              const sheet = document.createElement('ion-action-sheet');
              sheet.header = row.nombre;
              sheet.buttons = buttons;
              document.body.appendChild(sheet);
              sheet.present();
              sheet.addEventListener('didDismiss', () => sheet.remove());
            }
          });

        },
      });
    </script>
  </body>
</html>
