<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERPlora Hub · Ausencias</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>

    <style>
      .time-off-page { display:flex; flex-direction:column; height:100%; min-height:0; }
      .time-off-page > ok-data-table { flex:1 1 auto; min-height:0; }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      // Datos de muestra con la forma exacta de staff.time_off.list.
      const TIME_OFF_FIXTURE = [
        {
          id: 'off-1', staff_id: 'm1', staff_name: 'Ana Ruiz', leave_type: 'vacation',
          start_date: '2026-07-20', end_date: '2026-07-24', is_full_day: 1,
          start_time: null, end_time: null, status: 'pending', approved_by: null,
          approved_at: null, reason: 'Vacaciones de verano', notes: '',
        },
        {
          id: 'off-2', staff_id: 'm2', staff_name: 'Luis Gil', leave_type: 'training',
          start_date: '2026-07-28', end_date: '2026-07-28', is_full_day: 1,
          start_time: null, end_time: null, status: 'approved', approved_by: 'admin',
          approved_at: '2026-07-12T10:00:00Z', reason: 'Formación', notes: '',
        },
        {
          id: 'off-3', staff_id: 'm1', staff_name: 'Ana Ruiz', leave_type: 'personal',
          start_date: '2026-08-03', end_date: '2026-08-03', is_full_day: 0,
          start_time: '10:00', end_time: '13:00', status: 'rejected', approved_by: null,
          approved_at: null, reason: 'Asunto personal', notes: '',
        },
      ];

      const LEAVE_TYPE_OPTIONS = [
        { value: 'vacation', label: 'Vacaciones' },
        { value: 'sick', label: 'Baja médica' },
        { value: 'personal', label: 'Personal' },
        { value: 'training', label: 'Formación' },
        { value: 'other', label: 'Otro' },
      ];

      const STATUS_OPTIONS = [
        { value: 'pending', label: 'Pendientes' },
        { value: 'approved', label: 'Aprobadas' },
        { value: 'rejected', label: 'Rechazadas' },
        { value: 'cancelled', label: 'Canceladas' },
      ];

      const LABELS = {
        search:'Buscar…', empty:'Sin solicitudes de ausencia.', filters:'Filtros', clear:'Limpiar',
        apply:'Aplicar', moreActions:'Más acciones', rowsPerPage:'Filas por página',
        perPageShort:'{n} / pág.', viewList:'Vista lista', viewCards:'Vista tarjetas',
        columnsVisible:'Columnas visibles', columns:'Columnas', actions:'Acciones', close:'Cerrar',
        filterPlaceholder:'Filtrar…', noValues:'Sin valores', showing:'Mostrando {from}–{to} de',
        recordSingular:'solicitud', recordPlural:'solicitudes',
      };

      let requests = TIME_OFF_FIXTURE.map((request) => ({ ...request }));
      const state = { page:0, pageSize:50, sort:'id', dir:'asc', search:'', filters:{} };

      function badge(text, color) {
        const element = document.createElement('ion-badge');
        element.textContent = text;
        element.color = color;
        return element;
      }

      function statusBadge(row) {
        const labels = { pending:'Pendiente', approved:'Aprobada', rejected:'Rechazada', cancelled:'Cancelada' };
        const colors = { pending:'warning', approved:'success', rejected:'danger', cancelled:'medium' };
        return badge(labels[row.status] ?? row.status, colors[row.status] ?? 'medium');
      }

      function leaveType(row) {
        return LEAVE_TYPE_OPTIONS.find((option) => option.value === row.leave_type)?.label ?? row.leave_type;
      }

      function matchesDateRange(value, filter) {
        if (filter == null || filter === '') return true;
        if (typeof filter !== 'object') return String(value).includes(String(filter));
        const from = filter.from ?? filter.min ?? filter.start;
        const to = filter.to ?? filter.max ?? filter.end;
        return (!from || String(value) >= String(from)) && (!to || String(value) <= String(to));
      }

      defineHubPage({
        active: '/m/staff/time-off',
        title: 'Ausencias',
        body: `
          <div class="time-off-page">
            <ok-data-table id="time-off-table" fill></ok-data-table>
          </div>
          <ion-toast id="time-off-toast" duration="2200" position="bottom"></ion-toast>
        `,
        setup(doc) {
          const table = doc.getElementById('time-off-table');
          const toast = doc.getElementById('time-off-toast');

          table.serverSide = true;
          table.fill = true;
          table.views = true;
          table.cardTitle = (row) => String(row.staff_name ?? '—');
          table.cardIcon = () => 'airplane-outline';
          table.searchable = true;
          table.searchPlaceholder = 'Buscar miembro…';
          table.pageSize = 50;
          table.sort = 'id';
          table.sortDir = 'asc';
          table.columnPicker = true;
          table.labels = LABELS;
          table.columns = [
            { key: 'staff_name', header: 'Miembro', sortable:true, filterable:true, filterType:'text' },
            {
              key: 'leave_type', header: 'Tipo', sortable:true, filterable:true, filterType:'select',
              options: LEAVE_TYPE_OPTIONS, format: leaveType,
            },
            { key: 'start_date', header: 'Desde', sortable:true, filterable:true, filterType: 'daterange' },
            { key: 'end_date', header: 'Hasta', sortable:true, filterable:true, filterType: 'daterange' },
            {
              key: 'status', header: 'Estado', sortable:true, filterable:true, filterType:'select',
              options: STATUS_OPTIONS, render: statusBadge,
            },
          ];
          table.actions = [
            { id: 'approve', label: 'Aprobar', icon: 'checkmark-circle-outline', color: 'primary' },
            { id: 'reject', label: 'Rechazar', icon: 'close-circle-outline', color: 'medium' },
          ];

          function queryPage() {
            const search = state.search.trim().toLocaleLowerCase('es');
            let filtered = requests.filter((request) => {
              if (search && !request.staff_name.toLocaleLowerCase('es').includes(search)) return false;
              for (const [key, value] of Object.entries(state.filters)) {
                if (value == null || value === '' || (Array.isArray(value) && value.length === 0)) continue;
                if (key === 'start_date' || key === 'end_date') {
                  if (!matchesDateRange(request[key], value)) return false;
                } else if (Array.isArray(value)) {
                  if (!value.map(String).includes(String(request[key]))) return false;
                } else if (String(request[key]).toLocaleLowerCase('es') !== String(value).toLocaleLowerCase('es')) {
                  return false;
                }
              }
              return true;
            });
            filtered.sort((left, right) => {
              const result = String(left[state.sort] ?? '').localeCompare(String(right[state.sort] ?? ''), 'es', { numeric:true });
              return state.dir === 'desc' ? -result : result;
            });
            const start = state.page * state.pageSize;
            table.page = state.page;
            table.pageSize = state.pageSize;
            table.sort = state.sort;
            table.sortDir = state.dir;
            table.total = filtered.length;
            table.rows = filtered.slice(start, start + state.pageSize);
          }

          function emitCommand(commandName, payload) {
            doc.dispatchEvent(new CustomEvent('erplora:demo-command', {
              detail:{ commandName, payload }, bubbles:true,
            }));
          }

          table.addEventListener('rowAction', (event) => {
            const { actionId, row } = event.detail ?? {};
            if (!row) return;
            if (row.status !== 'pending') return;
            const status = actionId === 'approve' ? 'approved' : actionId === 'reject' ? 'rejected' : '';
            if (!status) return;
            requests = requests.map((request) => request.id === row.id ? { ...request, status } : request);
            emitCommand('staff.time_off.set_status', { time_off_id:row.id, status });
            toast.message = status === 'approved' ? 'Ausencia aprobada.' : 'Ausencia rechazada.';
            toast.color = status === 'approved' ? 'success' : 'medium';
            toast.isOpen = true;
            queryPage();
          });
          table.addEventListener('pageChange', (event) => { state.page = Number(event.detail) || 0; queryPage(); });
          table.addEventListener('pageSizeChange', (event) => {
            state.pageSize = Number(event.detail) || 50; state.page = 0; queryPage();
          });
          table.addEventListener('sortChange', (event) => {
            state.sort = event.detail?.sort || 'id';
            state.dir = event.detail?.dir === 'desc' ? 'desc' : 'asc';
            queryPage();
          });
          table.addEventListener('searchChange', (event) => {
            state.search = String(event.detail ?? ''); state.page = 0; queryPage();
          });
          table.addEventListener('filterChange', (event) => {
            const key = event.detail?.col ?? event.detail?.key;
            if (!key) return;
            state.filters[key] = event.detail?.value;
            state.page = 0;
            queryPage();
          });
          toast.addEventListener('didDismiss', () => { toast.isOpen = false; });

          queryPage();
        },
      });
    </script>
  </body>
</html>
