<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Invitar miembro - ERPlora Cloud</title>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <style>
      .form-card { max-width:42rem; }
      .hint { margin:.75rem 0 0;color:var(--ion-color-medium);font-size:.8rem; }
      .actions { display:flex;align-items:center;gap:.5rem;margin-top:1.25rem; }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      defineSaasDashboardPage({
        active: '/dashboard/organizations/',
        title: 'Invitar miembro',
        body: `
          <ion-card class="form-card">
            <ion-card-content>
              <form id="invite-organization-member-form">
                <ion-input id="organization-member-email" label="Correo electrónico"
                           label-placement="floating" fill="outline" type="email"
                           placeholder="usuario@ejemplo.com" required autofocus></ion-input>
                <input type="hidden" name="role" value="member" />
                <p class="hint">El usuario se añadirá como miembro. Los roles y permisos se gestionan dentro de cada Hub.</p>
                <div class="actions">
                  <ion-button type="button" fill="clear">Cancelar</ion-button>
                  <ion-button type="submit">
                    <iconify-icon slot="start" icon="lucide:user-plus" width="16" height="16"></iconify-icon>
                    Invitar miembro
                  </ion-button>
                </div>
              </form>
            </ion-card-content>
          </ion-card>
        `,
        setup(doc) {
          doc.getElementById('invite-organization-member-form')?.addEventListener('submit', (event) => {
            event.preventDefault();
          });
        },
      });
    </script>
  </body>
</html>
