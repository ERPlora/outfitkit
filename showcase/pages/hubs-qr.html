<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acceso QR del Hub - ERPlora Cloud</title>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
      .stack { display:grid;gap:1rem;max-width:42rem; }
      .qr-card { text-align:center; }
      #qr-container { display:flex;justify-content:center;margin:2rem auto; }
      .access-url { color:var(--ion-color-medium);font-family:monospace;font-size:.82rem;overflow-wrap:anywhere; }
      .steps { margin:0;padding:0;list-style:none; }
      .steps li { display:flex;align-items:center;gap:.75rem;padding:.85rem 0;border-bottom:1px solid var(--ion-color-step-150); }
      .steps li:last-child { border-bottom:0; }
      .step-number { display:grid;flex:none;place-items:center;width:1.8rem;height:1.8rem;border-radius:50%;color:var(--ion-color-primary-contrast);background:var(--ion-color-primary);font-weight:700; }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      const footer = `
        <footer id="section-tabbar"><ion-segment value="active" aria-label="Navegación de Hubs">
          <ion-segment-button value="active"><iconify-icon icon="lucide:check-circle" width="20" height="20"></iconify-icon><ion-label>Activo</ion-label></ion-segment-button>
          <ion-segment-button value="inactive"><iconify-icon icon="lucide:pause-circle" width="20" height="20"></iconify-icon><ion-label>Inactivo</ion-label></ion-segment-button>
          <ion-segment-button value="create"><iconify-icon icon="lucide:plus-circle" width="20" height="20"></iconify-icon><ion-label>Crear</ion-label></ion-segment-button>
          <ion-segment-button value="domain"><iconify-icon icon="lucide:globe" width="20" height="20"></iconify-icon><ion-label>Dominio</ion-label></ion-segment-button>
        </ion-segment></footer>`;

      defineSaasDashboardPage({
        active: '/dashboard/hubs/',
        title: 'Acceso QR · Terminal principal',
        body: `
          <div class="stack">
            <ion-card class="qr-card">
              <ion-card-content>
                <p>Escanea este código QR con la app ERPlora Bridge para configurarla automáticamente.</p>
                <div id="qr-container" aria-label="Código QR de Terminal principal"></div>
                <strong>Terminal principal</strong>
                <p class="access-url">https://terminal-principal.erplora.com</p>
                <ion-button fill="outline" size="small"><iconify-icon slot="start" icon="lucide:globe" width="15" height="15"></iconify-icon>Abrir web</ion-button>
              </ion-card-content>
            </ion-card>
            <ion-card>
              <ion-card-header><ion-card-title>Cómo usarlo</ion-card-title></ion-card-header>
              <ion-card-content>
                <ol class="steps">
                  <li><span class="step-number">1</span><span>Descarga la app ERPlora Bridge en tu dispositivo.</span></li>
                  <li><span class="step-number">2</span><span>Pulsa «Escanear QR» al abrir la app.</span></li>
                  <li><span class="step-number">3</span><span>Apunta la cámara al código QR de arriba.</span></li>
                  <li><span class="step-number">4</span><span>Tu dispositivo se configurará automáticamente.</span></li>
                </ol>
              </ion-card-content>
            </ion-card>
          </div>
        `,
        footer,
        setup(doc) {
          const container = doc.getElementById('qr-container');
          if (container && window.QRCode) {
            new window.QRCode(container, {
              text: 'erplora://connect?hub=terminal-principal',
              width: 200,
              height: 200,
              correctLevel: window.QRCode.CorrectLevel.M,
            });
          }
        },
      });
    </script>
  </body>
</html>
