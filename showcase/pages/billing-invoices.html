<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Facturas · ERPlora Cloud</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
  </head>
  <body>
    <script type="module">
      import { html as h } from 'lit';
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      /* Valores de muestra; el esquema procede de _invoices_config en billing/views.py. */
      const INVOICES = [
        { id: 'INV-2026-0042', invoiceNumber: 'INV-2026-0042', meta: 'Hub Central', customer: 'Hub Central', status: 'paid', total: 340.50, issueDate: '2026-07-12', kind: 'hub_subscription', hub: 'Hub Central' },
        { id: 'INV-2026-0041', invoiceNumber: 'INV-2026-0041', meta: 'Inventario', customer: 'Inventario', status: 'pending', total: 79.00, issueDate: '2026-07-05', kind: 'module', hub: 'Hub Central' },
        { id: 'INV-2026-0038', invoiceNumber: 'INV-2026-0038', meta: 'Hub Norte', customer: 'Hub Norte', status: 'failed', total: 120.00, issueDate: '2026-06-18', kind: 'hub_subscription', hub: 'Hub Norte' },
        { id: 'INV-2026-0032', invoiceNumber: 'INV-2026-0032', meta: 'Punto de venta', customer: 'Punto de venta', status: 'refunded', total: 45.00, issueDate: '2026-06-02', kind: 'module', hub: 'Hub Norte' },
        { id: 'INV-2026-0029', invoiceNumber: 'INV-2026-0029', meta: 'Hub Central', customer: 'Hub Central', status: 'draft', total: 340.50, issueDate: '2026-05-25', kind: 'hub_subscription', hub: 'Hub Central' },
      ];

      const STATUS = {
        paid: ['Pagada', 'success'],
        pending: ['Pendiente', 'warning'],
        failed: ['Fallida', 'danger'],
        refunded: ['Reembolsada', 'tertiary'],
        draft: ['Borrador', 'medium'],
      };

      const money = new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' });
      const date = new Intl.DateTimeFormat('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });

      const invoiceCell = (row) => h`
        <span style="display:flex;align-items:center;gap:.6rem;min-width:0">
          <ion-avatar style="display:grid;place-items:center;flex:none;width:2rem;height:2rem;color:var(--ion-color-primary);font-size:11px;font-weight:700;background:rgba(var(--ion-color-primary-rgb),.14)">
            <span style="display:grid;width:100%;height:100%;place-items:center">IN</span>
          </ion-avatar>
          <span style="display:grid;min-width:0">
            <strong>${row.invoiceNumber}</strong>
            <small style="color:var(--ion-color-medium)">${row.meta}</small>
          </span>
        </span>`;

      const statusCell = (row) => {
        const [label, tone] = STATUS[row.status] || [row.status, 'medium'];
        return h`<ion-badge style="--background:rgba(var(--ion-color-${tone}-rgb),.14);--color:var(--ion-color-${tone});--padding-start:10px;--padding-end:10px;--padding-top:4px;--padding-bottom:4px">${label}</ion-badge>`;
      };

      defineSaasDashboardPage({
        active: '/dashboard/billing/',
        title: 'Facturas',
        body: `
          <div class="dash-fill">
            <ok-data-table id="invoices-dt" server-side fill>
              <div slot="toolbar" class="okdt-filters">
                <ion-select class="okdt-filter" data-okdt-param="hub" interface="popover"
                            aria-label="Hub" placeholder="Todos los hubs">
                  <ion-select-option value="">Todos los hubs</ion-select-option>
                  <ion-select-option value="Hub Central">Hub Central</ion-select-option>
                  <ion-select-option value="Hub Norte">Hub Norte</ion-select-option>
                </ion-select>
                <ion-select class="okdt-filter" data-okdt-param="status" interface="popover"
                            aria-label="Estado" placeholder="Todos los estados">
                  <ion-select-option value="">Todos los estados</ion-select-option>
                  <ion-select-option value="paid">Pagada</ion-select-option>
                  <ion-select-option value="pending">Pendiente</ion-select-option>
                  <ion-select-option value="failed">Fallida</ion-select-option>
                  <ion-select-option value="refunded">Reembolsada</ion-select-option>
                  <ion-select-option value="draft">Borrador</ion-select-option>
                </ion-select>
                <ion-select class="okdt-filter" data-okdt-param="invoice_type" interface="popover"
                            aria-label="Tipo" placeholder="Todos los tipos">
                  <ion-select-option value="">Todos los tipos</ion-select-option>
                  <ion-select-option value="module">Módulo</ion-select-option>
                  <ion-select-option value="hub_subscription">Hub</ion-select-option>
                </ion-select>
                <span class="okdt-daterange" role="group" aria-label="Periodo">
                  <input type="date" class="okdt-filter" data-okdt-param="issue_date_from" aria-label="Periodo desde" />
                  <span aria-hidden="true">→</span>
                  <input type="date" class="okdt-filter" data-okdt-param="issue_date_to" aria-label="Periodo hasta" />
                </span>
              </div>
            </ok-data-table>
          </div>`,
        footer: `
          <footer id="section-tabbar">
            <ion-segment value="invoices" aria-label="Navegación de facturación">
              <ion-segment-button value="invoices">
                <iconify-icon icon="lucide:file-text" width="20" height="20"></iconify-icon>
                <ion-label>Facturas</ion-label>
              </ion-segment-button>
              <ion-segment-button value="subscriptions">
                <iconify-icon icon="lucide:repeat" width="20" height="20"></iconify-icon>
                <ion-label>Suscripciones</ion-label>
              </ion-segment-button>
              <ion-segment-button value="purchases">
                <iconify-icon icon="lucide:shopping-bag" width="20" height="20"></iconify-icon>
                <ion-label>Compras</ion-label>
              </ion-segment-button>
            </ion-segment>
          </footer>`,
        setup(doc) {
          const table = doc.getElementById('invoices-dt');
          if (!table) return;

          table.rowKey = 'id';
          table.columns = [
            { key: 'invoiceNumber', header: 'Factura', width: 'minmax(13rem,1.35fr)', sortable: true, render: invoiceCell },
            { key: 'customer', header: 'Cliente', width: 'minmax(11rem,1fr)', sortable: false },
            { key: 'status', header: 'Estado', width: '9rem', sortable: false, render: statusCell },
            { key: 'total', header: 'Total', width: '9rem', align: 'right', sortable: true, format: (row) => money.format(row.total) },
            { key: 'issueDate', header: 'Fecha', width: '10rem', sortable: true, format: (row) => date.format(new Date(`${row.issueDate}T00:00:00`)) },
          ];
          table.rows = INVOICES;
          table.total = INVOICES.length;
          table.searchable = true;
          table.searchPlaceholder = 'Buscar facturas…';
          table.actions = [{ id: 'view', label: 'Ver', icon: 'eye-outline' }];
          table.menuActions = [{ id: 'export', label: 'Exportar CSV', icon: 'download-outline' }];
          table.views = true;
          table.pageSize = 10;
          table.pageSizes = [10, 25, 50];
          table.labels = {
            empty: 'Todavía no hay facturas',
            columns: 'Columnas',
            columnsVisible: 'Columnas visibles',
            rowsPerPage: 'Filas por página',
            perPageShort: '{n} / pág.',
            showing: 'Mostrando {from}–{to} de',
            recordSingular: 'factura',
            recordPlural: 'facturas',
            actions: 'Acciones',
            exportCsv: 'Exportar CSV',
          };

          const state = { query: '', sort: '', dir: 'asc' };
          const controls = [...doc.querySelectorAll('[data-okdt-param]')];
          const valueOf = (name) => doc.querySelector(`[data-okdt-param="${name}"]`)?.value || '';
          const refresh = () => {
            const needle = state.query.trim().toLocaleLowerCase('es');
            const hub = valueOf('hub');
            const status = valueOf('status');
            const type = valueOf('invoice_type');
            const from = valueOf('issue_date_from');
            const to = valueOf('issue_date_to');
            let rows = INVOICES.filter((row) =>
              (!needle || [row.invoiceNumber, row.customer, row.hub].some((value) => value.toLocaleLowerCase('es').includes(needle))) &&
              (!hub || row.hub === hub) && (!status || row.status === status) &&
              (!type || row.kind === type) && (!from || row.issueDate >= from) && (!to || row.issueDate <= to));
            if (state.sort) rows = [...rows].sort((a, b) => (a[state.sort] > b[state.sort] ? 1 : -1) * (state.dir === 'asc' ? 1 : -1));
            table.rows = rows;
            table.total = rows.length;
            table.page = 0;
          };
          controls.forEach((control) => control.addEventListener(control.tagName === 'ION-SELECT' ? 'ionChange' : 'change', refresh));
          table.addEventListener('searchChange', (event) => { state.query = String(event.detail || ''); refresh(); });
          table.addEventListener('sortChange', (event) => { state.sort = event.detail.sort; state.dir = event.detail.dir; refresh(); });
          table.addEventListener('menuAction', (event) => {
            if (event.detail.actionId !== 'export') return;
            const toast = doc.createElement('ion-toast');
            toast.message = 'Exportando facturas…';
            toast.duration = 1400;
            doc.body.appendChild(toast);
            toast.present();
            toast.addEventListener('didDismiss', () => toast.remove());
          });
          table.addEventListener('rowAction', (event) => {
            const toast = doc.createElement('ion-toast');
            toast.message = `Abriendo ${event.detail.row.invoiceNumber}`;
            toast.duration = 1400;
            doc.body.appendChild(toast);
            toast.present();
            toast.addEventListener('didDismiss', () => toast.remove());
          });

          doc.querySelector('ion-segment')?.addEventListener('ionChange', (event) => {
            const targets = { subscriptions: 'billing-subscriptions', purchases: 'billing-purchases' };
            if (targets[event.detail.value]) window.parent.location.hash = `#/p/${targets[event.detail.value]}`;
          });
        },
      });
    </script>
  </body>
</html>
