<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Terminales inactivos - ERPlora Cloud</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/ok-data-table.js"></script>
  </head>
  <body>
    <script type="module">
      import { html as h } from 'lit';
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      /* La lista inactiva usa los mismos campos del DataTableConfig de Django y un conjunto de
       * acciones deliberadamente menor: Reactivar es la única acción válida por fila. */
      const HUBS = [
        {
          id: 'hub-suspended', name: 'Terminal suspendido', slug: 'terminal-suspendido',
          plan: 'Standard', status: 'suspended', statusLabel: 'Suspendido', statusTone: 'warning',
          created: '14 ene 2026',
        },
        {
          id: 'hub-stopped', name: 'Terminal detenido', slug: 'terminal-detenido',
          plan: 'Starter', status: 'stopped', statusLabel: 'Detenido', statusTone: 'medium',
          created: '3 dic 2025',
        },
        {
          id: 'hub-error', name: 'Terminal con incidencia', slug: 'terminal-incidencia',
          plan: 'Pro', status: 'error', statusLabel: 'Error', statusTone: 'danger',
          created: '18 nov 2025',
        },
      ];

      const REACTIVATE_ACTION = {
        id: 'reactivate',
        label: 'Reactivar',
        icon: 'refresh-outline',
        color: 'primary',
      };

      const terminalCell = (row) => h`
        <span style="display:flex;align-items:center;gap:.6rem;min-width:0">
          <span style="display:grid;place-items:center;flex:none;width:2rem;height:2rem;border-radius:999px;font-size:12px;font-weight:700;color:var(--ion-color-warning);background:rgba(var(--ion-color-warning-rgb),.14)">
            ${row.name.charAt(0)}
          </span>
          <span style="display:flex;flex-direction:column;min-width:0">
            <span style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${row.name}</span>
            <span style="font-size:12px;opacity:.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${row.slug}</span>
          </span>
        </span>`;

      const statusCell = (row) => h`
        <ion-badge style="--background:rgba(var(--ion-color-${row.statusTone}-rgb),.14);--color:var(--ion-color-${row.statusTone});--padding-start:10px;--padding-end:10px;--padding-top:4px;--padding-bottom:4px">
          ${row.statusLabel}
        </ion-badge>`;

      function showToast(message) {
        const toast = document.createElement('ion-toast');
        toast.message = message;
        toast.duration = 1600;
        toast.position = 'bottom';
        document.body.appendChild(toast);
        toast.present();
        toast.addEventListener('didDismiss', () => toast.remove());
      }

      const footer = `
        <footer id="section-tabbar">
          <ion-segment value="inactive" aria-label="Navegación de Hubs">
            <ion-segment-button value="active">
              <iconify-icon icon="lucide:check-circle" width="20" height="20"></iconify-icon>
              <ion-label>Activo</ion-label>
            </ion-segment-button>
            <ion-segment-button value="inactive">
              <iconify-icon icon="lucide:pause-circle" width="20" height="20"></iconify-icon>
              <ion-label>Inactivo</ion-label>
            </ion-segment-button>
            <ion-segment-button value="create">
              <iconify-icon icon="lucide:plus-circle" width="20" height="20"></iconify-icon>
              <ion-label>Crear</ion-label>
            </ion-segment-button>
            <ion-segment-button value="domain">
              <iconify-icon icon="lucide:globe" width="20" height="20"></iconify-icon>
              <ion-label>Dominio</ion-label>
            </ion-segment-button>
          </ion-segment>
        </footer>`;

      defineSaasDashboardPage({
        active: '/dashboard/hubs/',
        title: 'Terminales inactivos',
        body: `
          <div class="dash-fill">
            <ok-data-table id="hubs-inactive" fill>
              <div slot="toolbar" class="okdt-filters">
                <ion-select id="hubs-status-filter" class="okdt-filter" interface="popover"
                            aria-label="Estado" placeholder="Todos los estados">
                  <ion-select-option value="">Todos los estados</ion-select-option>
                  <ion-select-option value="suspended">Suspendido</ion-select-option>
                  <ion-select-option value="stopped">Detenido</ion-select-option>
                  <ion-select-option value="error">Error</ion-select-option>
                </ion-select>
                <ion-select id="hubs-plan-filter" class="okdt-filter" interface="popover"
                            aria-label="Plan" placeholder="Todos los planes">
                  <ion-select-option value="">Todos los planes</ion-select-option>
                  <ion-select-option value="Starter">Starter</ion-select-option>
                  <ion-select-option value="Standard">Standard</ion-select-option>
                  <ion-select-option value="Pro">Pro</ion-select-option>
                  <ion-select-option value="Enterprise">Enterprise</ion-select-option>
                  <ion-select-option value="Max">Max</ion-select-option>
                </ion-select>
              </div>
            </ok-data-table>
          </div>`,
        footer,
        setup(doc) {
          const table = doc.getElementById('hubs-inactive');
          const statusFilter = doc.getElementById('hubs-status-filter');
          const planFilter = doc.getElementById('hubs-plan-filter');
          if (!table) return;

          table.rowKey = 'id';
          table.columns = [
            { key: 'name', header: 'Terminal', width: 'minmax(13rem,1.4fr)', sortable: true, render: terminalCell },
            { key: 'plan', header: 'Plan', width: '8rem' },
            { key: 'status', header: 'Estado', width: '9rem', render: statusCell },
            { key: 'created', header: 'Creado', width: '10rem', sortable: true },
          ];
          table.rows = HUBS;
          table.searchKeys = ['name', 'slug'];
          table.searchPlaceholder = 'Buscar terminales…';
          table.pageSize = 10;
          table.pageSizes = [10, 25, 50, 100];
          table.views = true;
          table.actions = [REACTIVATE_ACTION];
          table.cardTitle = (row) => row.name;
          table.cardIcon = () => 'git-network-outline';
          table.labels = {
            empty: 'No hay terminales inactivos',
            columns: 'Columnas',
            columnsVisible: 'Columnas visibles',
            rowsPerPage: 'Filas por página',
            perPageShort: '{n} / pág.',
            viewList: 'Vista lista',
            viewCards: 'Vista tarjetas',
          };

          const applyFilters = () => {
            table.rows = HUBS.filter((row) => {
              const status = statusFilter?.value;
              const plan = planFilter?.value;
              const statusMatch = !status || row.status === status;
              const planMatch = !plan || row.plan === plan;
              return statusMatch && planMatch;
            });
          };
          statusFilter?.addEventListener('ionChange', applyFilters);
          planFilter?.addEventListener('ionChange', applyFilters);

          table.addEventListener('rowAction', (event) => {
            if (event.detail?.actionId !== REACTIVATE_ACTION.id) return;
            showToast(`Reactivar: ${event.detail?.row?.name || 'Terminal'}`);
          });
        },
      });
    </script>
  </body>
</html>
