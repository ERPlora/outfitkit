<!doctype html>
<html lang="es" data-theme="erplora-light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Desactivar autenticación en dos pasos - ERPlora Cloud</title>

    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/ok-inline-feedback.js"></script>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      defineSaasDashboardPage({
        active: '/dashboard/settings/',
        title: 'Desactivar autenticación en dos pasos',
        body: `
          <div style="max-width:520px;margin:0 auto">
            <ion-button type="button" fill="clear" size="small">
              <iconify-icon slot="start" icon="lucide:arrow-left" width="16" height="16"></iconify-icon>
              Volver a ajustes de 2FA
            </ion-button>

            <ion-card>
              <ion-card-header>
                <ion-card-title style="display:flex;align-items:center;gap:.6rem;color:var(--ion-color-danger)">
                  <iconify-icon icon="lucide:triangle-alert" width="22" height="22"></iconify-icon>
                  Desactivar autenticación en dos pasos
                </ion-card-title>
              </ion-card-header>
              <ion-card-content>
                <ok-inline-feedback tone="danger" heading="Esto reducirá la seguridad de tu cuenta">
                  Sin autenticación en dos pasos, tu cuenta quedará protegida únicamente por tu contraseña.
                </ok-inline-feedback>

                <p style="margin:1.25rem 0;color:var(--ion-color-medium);line-height:1.55">
                  ¿Seguro que quieres desactivar la autenticación en dos pasos? Ya no necesitarás
                  un código de verificación para iniciar sesión.
                </p>

                <form method="post" action="">
                  <div style="display:flex;gap:.65rem;flex-wrap:wrap">
                    <ion-button type="button" fill="outline">Cancelar</ion-button>
                    <ion-button type="submit" color="danger">Desactivar 2FA</ion-button>
                  </div>
                </form>
              </ion-card-content>
            </ion-card>
          </div>`,
      });
    </script>
  </body>
</html>
