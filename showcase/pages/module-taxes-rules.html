<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERPlora Hub · Reglas por jurisdicción</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>

    <style>
      .taxes-page {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
      }

      .taxes-page > ok-data-table {
        flex: 1 1 auto;
        min-height: 0;
      }

      .taxes-form {
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
      }

      .taxes-form ion-note {
        line-height: 1.4;
      }

      .taxes-form ion-button {
        align-self: flex-end;
      }

      @media (max-width: 520px) {
        .taxes-form ion-button {
          width: 100%;
          margin-inline: 0;
        }
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      // Copia auditable de las seis reglas IVA ES de seed/install.sqlite.sql (ADR-0085).
      const RULE_FIXTURE = [
        { "id": "taxrule-es-product-generic", "country_code": "ES", "region_code": null, "tax_category_key": "product.generic", "rate_pct": 21, "tax_type": "vat", "parent_id": null, "component_label": null, "valid_from": "2012-09-01", "valid_to": null, "is_active": 1 },
        { "id": "taxrule-es-service-generic", "country_code": "ES", "region_code": null, "tax_category_key": "service.generic", "rate_pct": 21, "tax_type": "vat", "parent_id": null, "component_label": null, "valid_from": "2012-09-01", "valid_to": null, "is_active": 1 },
        { "id": "taxrule-es-restaurant-food", "country_code": "ES", "region_code": null, "tax_category_key": "restaurant.food", "rate_pct": 10, "tax_type": "vat", "parent_id": null, "component_label": null, "valid_from": "2012-09-01", "valid_to": null, "is_active": 1 },
        { "id": "taxrule-es-restaurant-drink", "country_code": "ES", "region_code": null, "tax_category_key": "restaurant.drink", "rate_pct": 10, "tax_type": "vat", "parent_id": null, "component_label": null, "valid_from": "2012-09-01", "valid_to": null, "is_active": 1 },
        { "id": "taxrule-es-restaurant-delivery", "country_code": "ES", "region_code": null, "tax_category_key": "restaurant.delivery", "rate_pct": 10, "tax_type": "vat", "parent_id": null, "component_label": null, "valid_from": "2012-09-01", "valid_to": null, "is_active": 1 },
        { "id": "taxrule-es-restaurant-alcohol", "country_code": "ES", "region_code": null, "tax_category_key": "restaurant.alcohol", "rate_pct": 21, "tax_type": "vat", "parent_id": null, "component_label": null, "valid_from": "2012-09-01", "valid_to": null, "is_active": 1 }
      ];

      const CATEGORIES = [
        ['restaurant.food', 'Restaurant — food'],
        ['restaurant.drink', 'Restaurant — drink'],
        ['restaurant.alcohol', 'Restaurant — alcohol'],
        ['restaurant.delivery', 'Restaurant — delivery'],
        ['service.generic', 'Service — generic'],
        ['product.generic', 'Product — generic'],
      ];
      const TAX_TYPES = [
        ['vat', 'IVA'],
        ['surcharge', 'Recargo'],
        ['sales_tax', 'Sales tax'],
        ['withholding', 'Retención'],
        ['excise', 'Especial'],
        ['import_duty', 'Arancel'],
      ];
      const TYPE_LABELS = Object.fromEntries(TAX_TYPES);
      let rules = RULE_FIXTURE.map((row) => ({ ...row }));
      const commandLog = [];
      const queryLog = [];

      function recordCommand(name, payload) {
        commandLog.push({ name, payload: { ...payload } });
        document.dispatchEvent(new CustomEvent('erplora:preview-command', { detail: { name, payload } }));
      }

      function recordQuery(name, params) {
        queryLog.push({ name, params: { ...params } });
      }

      defineHubPage({
        active: '/m/taxes/rules',
        title: 'Reglas por jurisdicción',
        body: `
          <div class="taxes-page">
            <ok-data-table id="taxes-rules-table" fill>
              <form id="taxes-rule-form" slot="create" class="taxes-form">
                <ion-input id="tax-rule-country" fill="outline" label="País" label-placement="floating" placeholder="ES" minlength="2" maxlength="2" required></ion-input>
                <ion-input id="tax-rule-region" fill="outline" label="Región" label-placement="floating" placeholder="Opcional" maxlength="10"></ion-input>
                <ion-select id="tax-rule-category" fill="outline" label="Categoría" label-placement="floating" interface="popover" required>
                  ${CATEGORIES.map(([key, name]) => `<ion-select-option value="${key}">${name} (${key})</ion-select-option>`).join('')}
                </ion-select>
                <ion-input id="tax-rule-rate" fill="outline" label="%" label-placement="floating" type="number" min="0" step="0.01" placeholder="21" required></ion-input>
                <ion-select id="tax-rule-type" fill="outline" label="Tipo" label-placement="floating" interface="popover" value="vat">
                  ${TAX_TYPES.map(([value, label]) => `<ion-select-option value="${value}">${label}</ion-select-option>`).join('')}
                </ion-select>
                <ion-input id="tax-rule-valid-from" fill="outline" label="Vigente desde" label-placement="floating" type="date"></ion-input>
                <ion-input id="tax-rule-valid-to" fill="outline" label="Vigente hasta" label-placement="floating" type="date"></ion-input>
                <ion-input id="tax-rule-parent" fill="outline" label="ID regla raíz" label-placement="floating" placeholder="Opcional"></ion-input>
                <ion-input id="tax-rule-component-label" fill="outline" label="Etiqueta componente" label-placement="floating" placeholder="Recargo de equivalencia" maxlength="120"></ion-input>
                <ion-note>
                  Para multi-impuesto, indica la regla raíz y una etiqueta para el componente.
                </ion-note>
                <ion-button id="tax-rule-save" type="submit">Añadir</ion-button>
              </form>
            </ok-data-table>
          </div>
        `,
        setup(doc) {
          const table = doc.getElementById('taxes-rules-table');
          const form = doc.getElementById('taxes-rule-form');
          const countryInput = doc.getElementById('tax-rule-country');
          const regionInput = doc.getElementById('tax-rule-region');
          const categoryInput = doc.getElementById('tax-rule-category');
          const rateInput = doc.getElementById('tax-rule-rate');
          const typeInput = doc.getElementById('tax-rule-type');
          const validFromInput = doc.getElementById('tax-rule-valid-from');
          const validToInput = doc.getElementById('tax-rule-valid-to');
          const parentInput = doc.getElementById('tax-rule-parent');
          const componentLabelInput = doc.getElementById('tax-rule-component-label');
          const saveButton = doc.getElementById('tax-rule-save');
          const state = {
            page: 0,
            pageSize: 50,
            sort: 'country_code',
            dir: 'asc',
            search: '',
            filters: {},
          };

          table.columns = [
            {
              key: 'tax_category_key',
              header: 'Categoría',
              sortable: true,
              filterable: true,
              filterType: 'select',
              options: CATEGORIES.map(([value, label]) => ({ value, label: `${label} (${value})` })),
              format: (row) => row.parent_id && row.component_label
                ? `↳ ${row.tax_category_key} · ${row.component_label}`
                : String(row.tax_category_key || '—'),
            },
            { key: 'country_code', header: 'País', sortable: true, filterable: true, filterType: 'text' },
            { key: 'region_code', header: 'Región', sortable: true, filterable: true, filterType: 'text', format: (row) => String(row.region_code || '—') },
            { key: 'rate_pct', header: '%', align: 'right', sortable: true, format: (row) => `${Number(row.rate_pct).toFixed(2)}%` },
            {
              key: 'tax_type',
              header: 'Tipo',
              sortable: true,
              filterable: true,
              filterType: 'select',
              options: TAX_TYPES.map(([value, label]) => ({ value, label })),
              format: (row) => TYPE_LABELS[row.tax_type] || row.tax_type,
            },
            { key: 'valid_from', header: 'Vigente desde', sortable: true, format: (row) => String(row.valid_from || '—') },
            { key: 'valid_to', header: 'Vigente hasta', sortable: true, format: (row) => String(row.valid_to || '—') },
            {
              key: 'is_active',
              header: 'Activa',
              sortable: true,
              filterable: true,
              filterType: 'select',
              options: [{ value: '1', label: 'Sí' }, { value: '0', label: 'No' }],
              format: (row) => Number(row.is_active) ? 'Sí' : 'No',
            },
          ];
          table.actions = [{ id: 'deactivate', label: 'Desactivar', icon: 'power-outline', color: 'danger' }];
          table.serverSide = true;
          table.fill = true;
          table.addable = true;
          table.views = true;
          table.cardTitle = (row) => String(row.tax_category_key || '—');
          table.cardIcon = () => 'options-outline';
          table.searchable = true;
          table.searchPlaceholder = 'Buscar categoría o país…';
          table.emptyMessage = 'Sin reglas fiscales.';
          table.pageSize = 50;
          table.sort = 'country_code';
          table.sortDir = 'asc';

          function matchesRange(value, filter) {
            if (!filter || typeof filter !== 'object') return true;
            const from = filter.from ?? filter.min;
            const to = filter.to ?? filter.max;
            const number = Number(value);
            return (from == null || from === '' || number >= Number(from))
              && (to == null || to === '' || number <= Number(to));
          }

          function queryPage() {
            recordQuery('taxes.rules.list', { ...state });
            const term = state.search.trim().toLocaleLowerCase('es');
            const filtered = rules
              .filter((row) => {
                if (term && !`${row.country_code} ${row.region_code || ''} ${row.tax_category_key}`.toLocaleLowerCase('es').includes(term)) return false;
                return Object.entries(state.filters).every(([key, value]) => {
                  if (value == null || value === '') return true;
                  if (key === 'rate_pct') return matchesRange(row.rate_pct, value);
                  if (key === 'country_code' || key === 'region_code') {
                    return String(row[key] || '').toLocaleLowerCase('es').includes(String(value).toLocaleLowerCase('es'));
                  }
                  return String(row[key] ?? '') === String(value);
                });
              })
              .sort((left, right) => {
                const result = String(left[state.sort] ?? '').localeCompare(String(right[state.sort] ?? ''), 'es', { numeric: true });
                return state.dir === 'desc' ? -result : result;
              });

            const start = state.page * state.pageSize;
            table.rows = filtered.slice(start, start + state.pageSize);
            table.total = filtered.length;
            table.page = state.page;
            table.pageSize = state.pageSize;
            table.sort = state.sort;
            table.sortDir = state.dir;
          }

          table.addEventListener('rowAction', (event) => {
            if (event.detail.actionId !== 'deactivate') return;
            const row = event.detail.row;
            if (!Number(row.is_active)) return;
            recordCommand('taxes.rules.deactivate', { rule_id: row.id });
            rules = rules.filter((candidate) => candidate.id !== row.id);
            queryPage();
          });

          form.addEventListener('submit', (event) => {
            event.preventDefault();
            const country_code = String(countryInput.value || '').trim().toUpperCase();
            const tax_category_key = String(categoryInput.value || '').trim();
            const rateRaw = String(rateInput.value ?? '').trim();
            if (!/^[A-Z]{2}$/.test(country_code) || !tax_category_key || rateRaw === '' || Number(rateRaw) < 0) return;

            const payload = {
              country_code,
              tax_category_key,
              rate_pct: Number(rateRaw),
              tax_type: String(typeInput.value || 'vat'),
            };
            const optional = [
              ['region_code', String(regionInput.value || '').trim().toUpperCase()],
              ['valid_from', String(validFromInput.value || '').trim()],
              ['valid_to', String(validToInput.value || '').trim()],
              ['parent_id', String(parentInput.value || '').trim()],
              ['component_label', String(componentLabelInput.value || '').trim()],
            ];
            for (const [key, value] of optional) if (value) payload[key] = value;

            saveButton.disabled = true;
            recordCommand('taxes.rules.create', payload);
            rules = [...rules, {
              id: `preview-tax-rule-${rules.length + 1}`,
              region_code: null,
              parent_id: null,
              component_label: null,
              valid_from: null,
              valid_to: null,
              is_active: 1,
              ...payload,
            }];
            for (const input of [countryInput, regionInput, categoryInput, rateInput, validFromInput, validToInput, parentInput, componentLabelInput]) input.value = '';
            typeInput.value = 'vat';
            table.close();
            state.page = 0;
            queryPage();
            saveButton.disabled = false;
          });

          table.addEventListener('pageChange', (event) => { state.page = Number(event.detail) || 0; queryPage(); });
          table.addEventListener('pageSizeChange', (event) => {
            state.pageSize = Number(event.detail) || 50;
            state.page = 0;
            queryPage();
          });
          table.addEventListener('sortChange', (event) => {
            state.sort = event.detail.sort;
            state.dir = event.detail.dir;
            queryPage();
          });
          table.addEventListener('searchChange', (event) => {
            state.search = String(event.detail || '');
            state.page = 0;
            queryPage();
          });
          table.addEventListener('filterChange', (event) => {
            state.filters[event.detail.col] = event.detail.value;
            state.page = 0;
            queryPage();
          });

          queryPage();
        },
      });
    </script>
  </body>
</html>
