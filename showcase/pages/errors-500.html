<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · 500 — Error del servidor</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <ok-error-page
            id="err500"
            variant="danger"
            code="500 · Internal Server Error"
            title="Algo no funciona en nuestro lado"
            message="Nuestro equipo ya ha recibido el reporte y está investigando. Intentaremos restablecer el servicio automáticamente en unos segundos."
            details-label="Detalles técnicos"
            retry-label="Reintentando en"
            retry-seconds="30"
            meta="trace · 7c8b-4f2a-3b81-9c2e · 2026-05-08 14:32 UTC">

            <!-- Acciones principales -->
            <ion-button slot="actions" fill="outline" id="btn-copy-trace">
              <ion-icon slot="start" name="copy-outline"></ion-icon>
              Copiar trace ID
            </ion-button>
            <ion-button slot="actions" color="danger" id="btn-retry">
              <ion-icon slot="start" name="refresh-outline"></ion-icon>
              Reintentar ahora
            </ion-button>

          </ok-error-page>
        `,
        setup(doc) {
          const errPage = doc.getElementById('err500');

          // Traza técnica (prop de objeto, no atributo).
          if (errPage) {
            errPage.trace = [
              'Trace ID:    7c8b-4f2a-3b81-9c2e',
              'Request ID:  req_01HXYZ123ABC',
              'Path:        /dashboard/billing/invoices/',
              'Method:      GET',
              'Status:      500',
              'Server:      cloud-eu-west-1-7c2f',
              'Released:    v2.2.0 (sha 850419c)',
              'Timestamp:   2026-05-08T14:32:18.421Z',
            ].join('\n');

            // Atajos de navegación (prop array).
            errPage.shortcuts = [
              {
                title: 'Estado del sistema',
                href: '/status/',
                icon: 'pulse-outline',
              },
              {
                title: 'Contactar soporte',
                href: '/help/contact/',
                icon: 'chatbubble-ellipses-outline',
              },
              {
                title: 'Volver al inicio',
                href: '/',
                icon: 'home-outline',
              },
            ];

            // Cuando el componente emite ok-retry (cuenta atrás a 0) → recargar.
            errPage.addEventListener('ok-retry', () => {
              location.reload();
            });
          }

          // Botón «Copiar trace ID» — CSP-safe (sin onclick inline).
          const btnCopy = doc.getElementById('btn-copy-trace');
          if (btnCopy) {
            btnCopy.addEventListener('click', () => {
              const traceId = '7c8b-4f2a-3b81-9c2e';
              if (navigator.clipboard) {
                navigator.clipboard.writeText(traceId);
              }
            });
          }

          // Botón «Reintentar ahora».
          const btnRetry = doc.getElementById('btn-retry');
          if (btnRetry) {
            btnRetry.addEventListener('click', () => {
              location.reload();
            });
          }
        },
      });
    </script>
  </body>
</html>
