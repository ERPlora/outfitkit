<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Usuarios - ERPlora Cloud</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/ok-data-table.js"></script>
  </head>
  <body>
    <script type="module">
      import { html as h } from 'lit';
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      /* Esquema de la vista real: una fila por membresía de organización gestionable.
       * Los nombres son datos de muestra; columnas, filtros y acciones proceden de users/views.py. */
      const USERS = [
        { id: 'm1', name: 'Lucía Torres', email: 'lucia@demo.es', organization: 'ERPlora Demo', role: 'Owner', joined: '14 jul 2026' },
        { id: 'm2', name: 'Adrián Vega', email: 'adrian@demo.es', organization: 'ERPlora Demo', role: 'Admin', joined: '2 jul 2026' },
        { id: 'm3', name: 'Marta Soler', email: 'marta@central.es', organization: 'Central Barcelona', role: 'Manager', joined: '26 jun 2026' },
        { id: 'm4', name: 'Pablo Ríos', email: 'pablo@central.es', organization: 'Central Barcelona', role: 'Employee', joined: '18 jun 2026' },
        { id: 'm5', name: 'Nuria Vidal', email: 'nuria@norte.es', organization: 'Sucursal Norte', role: 'Admin', joined: '9 jun 2026' },
        { id: 'm6', name: 'Álex Romero', email: 'alex@norte.es', organization: 'Sucursal Norte', role: 'Manager', joined: '28 may 2026' },
        { id: 'm7', name: 'Elena Martí', email: 'elena@demo.es', organization: 'ERPlora Demo', role: 'Employee', joined: '12 may 2026' },
      ];

      const FILTERS = [
        { id: 'users-role-filter', key: 'role', label: 'Todos los roles' },
        { id: 'users-organization-filter', key: 'organization', label: 'Todas las organizaciones' },
      ];

      const roleTone = {
        Owner: 'success',
        Admin: 'warning',
        Manager: 'medium',
        Employee: 'tertiary',
      };

      const userCell = (row) => h`
        <span style="display:flex;align-items:center;gap:.6rem;min-width:0">
          <ion-avatar style="display:grid;place-items:center;flex:0 0 auto;width:2rem;height:2rem;color:var(--ion-color-primary);font-size:12px;font-weight:700;background:rgba(var(--ion-color-primary-rgb),.15)">
            <span style="display:grid;width:100%;height:100%;place-items:center">${row.name.charAt(0)}</span>
          </ion-avatar>
          <span style="display:flex;flex-direction:column;min-width:0">
            <span style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${row.name}</span>
            <span style="font-size:12px;opacity:.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${row.email}</span>
          </span>
        </span>`;

      const roleCell = (row) => {
        const tone = roleTone[row.role] || 'medium';
        return h`
          <ion-badge style="--background:rgba(var(--ion-color-${tone}-rgb),.14);--color:var(--ion-color-${tone}-shade,var(--ion-color-${tone}));--padding-start:10px;--padding-end:10px;--padding-top:4px;--padding-bottom:4px">
            ${row.role}
          </ion-badge>`;
      };

      defineSaasDashboardPage({
        active: '/dashboard/users/',
        title: 'Usuarios',
        body: `
          <div class="dash-fill">
            <ok-data-table id="users-dt" server-side fill>
              <div slot="toolbar" class="okdt-filters">
                <ion-select id="users-role-filter" class="okdt-filter" interface="popover"
                            aria-label="Rol" placeholder="Todos los roles">
                  <ion-select-option value="">Todos los roles</ion-select-option>
                  <ion-select-option value="Owner">Owner</ion-select-option>
                  <ion-select-option value="Admin">Admin</ion-select-option>
                  <ion-select-option value="Manager">Manager</ion-select-option>
                  <ion-select-option value="Employee">Employee</ion-select-option>
                </ion-select>
                <ion-select id="users-organization-filter" class="okdt-filter" interface="popover"
                            aria-label="Organización" placeholder="Todas las organizaciones">
                  <ion-select-option value="">Todas las organizaciones</ion-select-option>
                  <ion-select-option value="ERPlora Demo">ERPlora Demo</ion-select-option>
                  <ion-select-option value="Central Barcelona">Central Barcelona</ion-select-option>
                  <ion-select-option value="Sucursal Norte">Sucursal Norte</ion-select-option>
                </ion-select>
              </div>
            </ok-data-table>
          </div>`,
        footer: `
          <footer id="section-tabbar">
            <ion-segment value="users" aria-label="Navegación de usuarios">
              <ion-segment-button value="users">
                <iconify-icon icon="lucide:users" width="20" height="20"></iconify-icon>
                <ion-label>Usuarios</ion-label>
              </ion-segment-button>
              <ion-segment-button value="invite">
                <iconify-icon icon="lucide:user-plus" width="20" height="20"></iconify-icon>
                <ion-label>Invitar</ion-label>
              </ion-segment-button>
            </ion-segment>
          </footer>`,
        setup(doc) {
          const table = doc.getElementById('users-dt');
          if (!table) return;

          table.rowKey = 'id';
          table.columns = [
            { key: 'name', header: 'Usuario', width: 'minmax(14rem,1.5fr)', render: userCell },
            { key: 'organization', header: 'Organización', width: 'minmax(11rem,1fr)', sortable: true },
            { key: 'role', header: 'Rol', width: '8rem', render: roleCell },
            { key: 'joined', header: 'Alta', width: '9rem', sortable: true },
          ];
          table.rows = USERS;
          table.searchKeys = ['name', 'email', 'organization', 'role'];
          table.searchPlaceholder = 'Buscar usuarios…';
          table.pageSize = 10;
          table.pageSizes = [10, 25, 50];
          table.views = true;
          table.primaryAction = { label: 'Invitar usuario', icon: 'add' };
          table.labels = {
            empty: 'Sin usuarios',
            columns: 'Columnas',
            columnsVisible: 'Columnas visibles',
            rowsPerPage: 'Filas por página',
            perPageShort: '{n} / pág.',
            viewList: 'Vista lista',
            viewCards: 'Vista tarjetas',
            showing: 'Mostrando {from}–{to} de',
            recordSingular: 'registro',
            recordPlural: 'registros',
          };

          const state = { query: '', page: 0, pageSize: 10, sort: 'joined', dir: 'desc' };
          const refresh = () => {
            let rows = USERS.filter((row) => FILTERS.every((filter) => {
              const control = doc.getElementById(filter.id);
              return !control?.value || row[filter.key] === control.value;
            }));
            if (state.query) {
              const query = state.query.toLocaleLowerCase('es');
              rows = rows.filter((row) => table.searchKeys.some((key) =>
                String(row[key] || '').toLocaleLowerCase('es').includes(query)));
            }
            rows.sort((left, right) => {
              const result = String(left[state.sort] || '').localeCompare(String(right[state.sort] || ''), 'es');
              return state.dir === 'desc' ? -result : result;
            });
            const start = state.page * state.pageSize;
            table.rows = rows.slice(start, start + state.pageSize);
            table.total = rows.length;
            table.page = state.page;
            table.pageSize = state.pageSize;
            table.sort = state.sort;
            table.sortDir = state.dir;
          };
          FILTERS.forEach((filter) => doc.getElementById(filter.id)?.addEventListener('ionChange', () => {
            state.page = 0;
            refresh();
          }));

          table.addEventListener('searchChange', (event) => {
            state.query = String(event.detail || '');
            state.page = 0;
            refresh();
          });
          table.addEventListener('pageChange', (event) => {
            state.page = Number(event.detail) || 0;
            refresh();
          });
          table.addEventListener('pageSizeChange', (event) => {
            state.pageSize = Number(event.detail) || 10;
            state.page = 0;
            refresh();
          });
          table.addEventListener('sortChange', (event) => {
            state.sort = event.detail?.sort || 'joined';
            state.dir = event.detail?.dir || 'desc';
            state.page = 0;
            refresh();
          });
          refresh();

          table.addEventListener('primaryAction', () => {
            const segment = doc.querySelector('ion-segment');
            if (segment) segment.value = 'invite';
            const toast = doc.createElement('ion-toast');
            toast.message = 'La invitación se completa en la pestaña Invitar.';
            toast.duration = 1800;
            toast.position = 'bottom';
            doc.body.appendChild(toast);
            toast.present();
            toast.addEventListener('didDismiss', () => toast.remove());
          });
        },
      });
    </script>
  </body>
</html>
