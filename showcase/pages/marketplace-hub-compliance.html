<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Marketplace · Cumplimiento</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* ── Sección de país ─────────────────────────────────────────────────── */
      .ui-country-section {
        margin-bottom: 24px;
      }

      .ui-country-head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        background: var(--ion-color-step-50, rgba(127,127,127,.04));
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        border-radius: 10px 10px 0 0;
        border-bottom: none;
      }

      .ui-country-flag {
        font-size: 22px;
        line-height: 1;
        flex: 0 0 auto;
      }

      .ui-country-name {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
        flex: 1 1 auto;
      }

      /* ── Tabla de requisitos ─────────────────────────────────────────────── */
      .ui-req-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--ion-card-background, var(--ion-background-color, #fff));
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        border-radius: 0 0 10px 10px;
        overflow: hidden;
        font-size: 13.5px;
      }

      .ui-req-table thead th {
        text-align: left;
        padding: 9px 14px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--ion-color-medium);
        font-weight: 600;
        border-bottom: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        background: var(--ion-color-step-50, rgba(127,127,127,.04));
        white-space: nowrap;
      }

      .ui-req-table thead th.ui-col-right {
        text-align: right;
      }

      .ui-req-table tbody td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--ion-border-color, rgba(127,127,127,.1));
        vertical-align: top;
      }

      .ui-req-table tbody tr:last-child td {
        border-bottom: none;
      }

      .ui-req-name {
        display: block;
        font-weight: 600;
        margin-bottom: 3px;
        color: var(--ion-text-color);
      }

      .ui-req-desc {
        display: block;
        font-size: 12px;
        color: var(--ion-color-medium);
        line-height: 1.45;
      }

      .ui-col-vigencia {
        white-space: nowrap;
        width: 130px;
      }

      .ui-col-estado {
        text-align: right;
        width: 140px;
        white-space: nowrap;
      }

      /* ── Breadcrumb ──────────────────────────────────────────────────────── */
      .ui-breadcrumb {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 14px;
        font-size: 13px;
        color: var(--ion-color-medium);
      }

      .ui-breadcrumb ion-button {
        margin: 0;
        --padding-start: 0;
        --padding-end: 4px;
        font-size: 13px;
      }

      /* Ajuste responsive: colapsar columnas en móvil */
      @media (max-width: 600px) {
        .ui-col-vigencia { display: none; }
        .ui-req-table thead th:nth-child(3) { display: none; }
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      /* ── Datos de requisitos por país ───────────────────────────────────── */
      const PAISES = [
        {
          id: 'es',
          flag: '🇪🇸',
          nombre: 'España',
          estado: { tono: 'warning', label: '2 sin instalar' },
          requisitos: [
            {
              nombre: 'VeriFactu — facturación verificable',
              desc: 'Sistema obligatorio de registro y firma de facturas para AEAT desde julio 2026.',
              modulo: 'verifactu',
              moduloTono: 'primary',
              vigencia: 'desde 01/07/2026',
              estadoTono: 'warning',
              estadoLabel: 'No instalado',
            },
            {
              nombre: 'Modelo 303 — IVA trimestral',
              desc: 'Declaración trimestral del Impuesto sobre el Valor Añadido.',
              modulo: 'fiscal_es',
              moduloTono: 'neutral',
              vigencia: 'trimestral',
              estadoTono: 'success',
              estadoLabel: 'Instalado',
            },
            {
              nombre: 'Modelo 347 — operaciones >3.005,06 €',
              desc: 'Declaración anual de operaciones con terceras personas.',
              modulo: 'fiscal_es',
              moduloTono: 'neutral',
              vigencia: 'anual · marzo',
              estadoTono: 'success',
              estadoLabel: 'Instalado',
            },
            {
              nombre: 'SII — Suministro Inmediato Información',
              desc: 'Solo para grandes empresas y exportadores. Envío de libros registro IVA en 4 días.',
              modulo: 'fiscal_es',
              moduloTono: 'neutral',
              vigencia: '4 días desde emisión',
              estadoTono: 'neutral',
              estadoLabel: 'Opcional',
            },
            {
              nombre: 'Modelo 111 — retenciones IRPF nóminas',
              desc: 'Declaración trimestral de retenciones practicadas a empleados.',
              modulo: 'payroll_es',
              moduloTono: 'neutral',
              vigencia: 'trimestral',
              estadoTono: 'warning',
              estadoLabel: 'No instalado',
            },
            {
              nombre: 'RGPD — Reglamento Protección de Datos',
              desc: 'Tratamiento de datos personales. Incluido en el Hub por defecto.',
              modulo: 'Hub core',
              moduloTono: 'info',
              esCore: true,
              vigencia: 'permanente',
              estadoTono: 'success',
              estadoLabel: 'Cumple',
            },
          ],
        },
        {
          id: 'pt',
          flag: '🇵🇹',
          nombre: 'Portugal',
          estado: { tono: 'neutral', label: 'Sin operaciones' },
          requisitos: [
            {
              nombre: 'SAF-T (PT) — fichero fiscal mensual',
              desc: 'Envío del fichero SAF-T a la Autoridade Tributária todos los meses.',
              modulo: 'fiscal_pt · próximamente',
              moduloTono: 'info',
              vigencia: 'mensual',
              estadoTono: 'neutral',
              estadoLabel: 'Próximamente',
            },
            {
              nombre: 'ATCUD + QR en facturas',
              desc: 'Código único validado y QR obligatorio en todas las facturas emitidas.',
              modulo: 'fiscal_pt · próximamente',
              moduloTono: 'info',
              vigencia: 'desde 2023',
              estadoTono: 'neutral',
              estadoLabel: 'Próximamente',
            },
          ],
        },
        {
          id: 'fr',
          flag: '🇫🇷',
          nombre: 'Francia',
          estado: { tono: 'neutral', label: 'Sin operaciones' },
          requisitos: [
            {
              nombre: 'Facturación electrónica B2B',
              desc: 'Obligatoria desde septiembre 2026. PDP/PPF certificada para envío.',
              modulo: 'fiscal_fr · próximamente',
              moduloTono: 'info',
              vigencia: 'desde 09/2026',
              estadoTono: 'neutral',
              estadoLabel: 'Próximamente',
            },
            {
              nombre: 'Logiciel certifié NF525',
              desc: 'Software de caja registradora certificado anti-fraude.',
              modulo: 'pos · certificación pendiente',
              moduloTono: 'info',
              vigencia: 'permanente',
              estadoTono: 'neutral',
              estadoLabel: 'Próximamente',
            },
          ],
        },
        {
          id: 'eu',
          flag: '🇪🇺',
          nombre: 'Unión Europea',
          estado: { tono: 'success', label: 'Cumple' },
          requisitos: [
            {
              nombre: 'RGPD / GDPR',
              desc: 'Protección de datos personales en todos los Estados miembros.',
              modulo: 'Hub core',
              moduloTono: 'info',
              esCore: true,
              vigencia: 'permanente',
              estadoTono: 'success',
              estadoLabel: 'Cumple',
            },
            {
              nombre: 'VIES — verificación VAT comunitario',
              desc: 'Validación del número IVA de clientes intracomunitarios en tiempo real.',
              modulo: 'customers',
              moduloTono: 'neutral',
              vigencia: 'por operación',
              estadoTono: 'success',
              estadoLabel: 'Activo',
            },
            {
              nombre: 'Modelo 349 — operaciones intracomunitarias',
              desc: 'Declaración mensual o trimestral de entregas y adquisiciones intracomunitarias.',
              modulo: 'fiscal_es',
              moduloTono: 'neutral',
              vigencia: 'mensual / trimestral',
              estadoTono: 'success',
              estadoLabel: 'Instalado',
            },
          ],
        },
      ];

      /* ── Renderizado de tabla de requisitos (HTML string) ───────────────── */
      function renderReqTable(requisitos) {
        const filas = requisitos.map((r) => {
          const moduloHtml = `<ok-status-pill tone="${r.moduloTono}" size="sm">${r.modulo}</ok-status-pill>`;
          const estadoHtml = `<ok-status-pill tone="${r.estadoTono}" size="sm">${r.estadoLabel}</ok-status-pill>`;
          return `
            <tr>
              <td>
                <span class="ui-req-name">${r.nombre}</span>
                <span class="ui-req-desc">${r.desc}</span>
              </td>
              <td>${moduloHtml}</td>
              <td class="ui-col-vigencia"><span class="ui-req-desc">${r.vigencia}</span></td>
              <td class="ui-col-estado">${estadoHtml}</td>
            </tr>`;
        }).join('');

        return `
          <table class="ui-req-table" aria-label="Requisitos">
            <thead>
              <tr>
                <th>Requisito</th>
                <th>Módulo</th>
                <th class="ui-col-vigencia">Vigencia</th>
                <th class="ui-col-right" style="width:140px">Estado</th>
              </tr>
            </thead>
            <tbody>${filas}</tbody>
          </table>`;
      }

      /* ── Secciones de país (HTML string) ────────────────────────────────── */
      function renderPaises() {
        return PAISES.map((p) => {
          const estadoBadge = `<ok-status-pill tone="${p.estado.tono}" dot size="sm">${p.estado.label}</ok-status-pill>`;
          return `
            <section class="ui-country-section">
              <div class="ui-country-head">
                <span class="ui-country-flag" aria-hidden="true">${p.flag}</span>
                <h2 class="ui-country-name">${p.nombre}</h2>
                ${estadoBadge}
              </div>
              ${renderReqTable(p.requisitos)}
            </section>`;
        }).join('');
      }

      definePage({
        bare: true,
        body: `
          <!-- Breadcrumb -->
          <nav class="ui-breadcrumb" aria-label="Ruta de navegación">
            <ion-button fill="clear" size="small">
              <ion-icon slot="start" name="arrow-back-outline"></ion-icon>
              Marketplace
            </ion-button>
            <span aria-hidden="true">/</span>
            <span>Cumplimiento</span>
          </nav>

          <!-- Cabecera de página -->
          <ok-page-header
            heading="Cumplimiento legal"
            description="Módulos obligatorios y recomendados según el país de operación"
            class="pg-mb-4">
          </ok-page-header>

          <!-- Secciones por país (renderizado dinámico) -->
          <div id="compliance-paises"></div>
        `,
        setup(doc) {
          /* Inyectar secciones de país */
          const container = doc.getElementById('compliance-paises');
          if (container) {
            container.innerHTML = renderPaises();
          }
        },
      });
    </script>
  </body>
</html>
