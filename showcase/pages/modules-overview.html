<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resumen developer · ERPlora Cloud</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_saas-developer.css" />
    <link rel="stylesheet" href="./_saas-developer-pages.css" />
  </head>
  <body>
    <script type="module">
      import { defineDeveloperPage } from './_saas-developer.js';

      defineDeveloperPage({
        activeTab: 'overview',
        title: 'Developer Dashboard',
        body: `
          <div class="developer-page developer-section-stack">
            <ok-inline-feedback tone="info" heading="Hazte vendedor">
              <p>Publica y vende tus módulos en el marketplace de ERPlora.</p>
              <ion-button size="small">Empezar</ion-button>
            </ok-inline-feedback>

            <ok-inline-feedback tone="warning" heading="Conecta Stripe para recibir pagos">
              <p>Configura tu cuenta bancaria para retirar tus ingresos.</p>
              <ion-button size="small">
                <iconify-icon slot="start" icon="simple-icons:stripe" width="14" height="14"></iconify-icon>
                Conectar
              </ion-button>
            </ok-inline-feedback>

            <section class="developer-kpis" style="--developer-kpi-columns:4" aria-label="Resumen del vendedor">
              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:wallet" width="12" height="12"></iconify-icon>Ingresos totales</div>
                <div class="developer-kpi-value">4.682,00 €</div>
                <div class="developer-kpi-sub">Neto, después de comisión</div>
              </div>
              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:clock" width="12" height="12"></iconify-icon>Saldo pendiente</div>
                <div class="developer-kpi-value">386,40 €</div>
                <div class="developer-kpi-sub">Disponible en el próximo pago</div>
              </div>
              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:download" width="12" height="12"></iconify-icon>Descargas</div>
                <div class="developer-kpi-value">2.037</div>
                <div class="developer-kpi-sub">Todos los módulos</div>
              </div>
              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:box" width="12" height="12"></iconify-icon>Mis módulos</div>
                <div class="developer-kpi-value">5</div>
                <div class="developer-kpi-sub">3 publicados</div>
              </div>
            </section>

            <div class="developer-grid">
              <ion-card>
                <ion-card-content>
                  <h2 class="developer-card-title">Ingresos recientes</h2>
                  <p class="developer-card-subtitle">Últimas transacciones</p>
                  <ion-list lines="full">
                    <ion-item>
                      <ion-label><strong>Inventario Avanzado</strong><p>16 jul 2026</p></ion-label>
                      <ion-note slot="end" color="success"><strong>41,65 €</strong><br /><ion-badge color="success">Pagado</ion-badge></ion-note>
                    </ion-item>
                    <ion-item>
                      <ion-label><strong>Reservas Online</strong><p>14 jul 2026</p></ion-label>
                      <ion-note slot="end" color="success"><strong>24,65 €</strong><br /><ion-badge color="warning">Pendiente</ion-badge></ion-note>
                    </ion-item>
                  </ion-list>
                  <ion-button fill="clear" size="small">Ver todos<iconify-icon slot="end" icon="lucide:arrow-right" width="13" height="13"></iconify-icon></ion-button>
                </ion-card-content>
              </ion-card>

              <ion-card>
                <ion-card-content>
                  <h2 class="developer-card-title">Pagos recientes</h2>
                  <p class="developer-card-subtitle">Transferencias bancarias directas</p>
                  <ion-list lines="full">
                    <ion-item button detail="true">
                      <ion-label><strong>612,30 €</strong><p>05 jul 2026, 09:40</p></ion-label>
                      <ion-badge slot="end" color="success">Pagado</ion-badge>
                    </ion-item>
                    <ion-item button detail="true">
                      <ion-label><strong>438,70 €</strong><p>05 jun 2026, 10:15</p></ion-label>
                      <ion-badge slot="end" color="success">Pagado</ion-badge>
                    </ion-item>
                  </ion-list>
                  <ion-button fill="clear" size="small">Ver todos<iconify-icon slot="end" icon="lucide:arrow-right" width="13" height="13"></iconify-icon></ion-button>
                </ion-card-content>
              </ion-card>
            </div>
          </div>`,
      });
    </script>
  </body>
</html>
