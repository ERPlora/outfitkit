<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERPlora Hub · Eventos VeriFactu</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <style>
      .verifactu-events-page { display:flex; flex-direction:column; height:100%; min-height:0; }
      .verifactu-events-page > ok-data-table { flex:1 1 auto; min-height:0; }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      // No hay seed oficial: ejemplos con la forma exacta de events_list.sql.
      const EVENT_FIXTURE = [
        { "id":"event-006", "record_id":"vf-0004", "event_type":"record_accepted", "severity":"info", "message":"Registro aceptado por la AEAT", "details":"{}", "timestamp":"2026-07-18T13:12:05" },
        { "id":"event-005", "record_id":"vf-0002", "event_type":"transmission_retry", "severity":"warning", "message":"La transmisión se reintentará automáticamente", "details":"{\"attempt\":1}", "timestamp":"2026-07-18T09:46:25" },
        { "id":"event-004", "record_id":"vf-0001", "event_type":"record_rejected", "severity":"error", "message":"La AEAT rechazó el registro", "details":"{\"code\":\"1100\"}", "timestamp":"2026-07-17T18:30:41" },
        { "id":"event-003", "record_id":null, "event_type":"chain_validated", "severity":"info", "message":"Cadena íntegra: 4 registros validados", "details":"{\"valid\":true}", "timestamp":"2026-07-17T17:00:00" },
        { "id":"event-002", "record_id":null, "event_type":"diagnostic", "severity":"debug", "message":"Autodiagnóstico completado", "details":"{}", "timestamp":"2026-07-17T16:55:00" },
        { "id":"event-001", "record_id":null, "event_type":"certificate_expiry", "severity":"critical", "message":"El certificado fiscal ha caducado", "details":"{}", "timestamp":"2026-06-01T08:00:00" }
      ];

      defineHubPage({
        active: '/m/verifactu/events',
        title: 'Eventos',
        body: `<div class="verifactu-events-page"><ok-data-table id="verifactu-events-table" fill></ok-data-table></div>`,
        setup(doc) {
          const table = doc.getElementById('verifactu-events-table');
          const rows = EVENT_FIXTURE.map((row) => ({ ...row }));
          const state = { page:0, pageSize:50, sort:'id', dir:'asc', search:'', filters:{} };
          const SEVERITY = { debug:'Debug', info:'Info', warning:'Aviso', error:'Error', critical:'Crítico' };
          table.columns = [
            { key: 'timestamp', header: 'Cuándo', sortable: true, filterable: true, filterType: 'text' },
            {
              key: 'severity', header: 'Severidad', sortable: true, filterable: true, filterType: 'select',
              options: [
                { value: 'debug', label: 'Debug' }, { value: 'info', label: 'Info' },
                { value: 'warning', label: 'Aviso' }, { value: 'error', label: 'Error' },
                { value: 'critical', label: 'Crítico' },
              ],
              format: (row) => SEVERITY[row.severity] || row.severity,
            },
            { key: 'event_type', header: 'Tipo', sortable: true, filterable: true, filterType: 'text' },
            { key: 'message', header: 'Mensaje', sortable: true, filterable: true, filterType: 'text' },
          ];
          table.serverSide = true;
          table.fill = true;
          table.views = true;
          table.cardTitle = (row) => String(row.message || row.event_type || '—');
          table.cardIcon = () => 'time-outline';
          table.searchable = true;
          table.searchPlaceholder = 'Buscar tipo o mensaje…';
          table.emptyMessage = 'Sin eventos.';
          table.pageSize = 50;
          table.sort = 'id';
          table.sortDir = 'asc';

          function queryPage() {
            doc.dispatchEvent(new CustomEvent('erplora:preview-query', { detail:{ name:'verifactu.events.list', params:{ ...state } } }));
            const term = state.search.trim().toLocaleLowerCase('es');
            const filtered = rows.filter((row) => {
              if (term && !`${row.event_type} ${row.message}`.toLocaleLowerCase('es').includes(term)) return false;
              return Object.entries(state.filters).every(([key, value]) => value == null || value === ''
                || (key === 'severity' ? row.severity === value : String(row[key] ?? '').toLocaleLowerCase('es').includes(String(value).toLocaleLowerCase('es'))));
            }).sort((a, b) => {
              const result = String(a[state.sort] ?? '').localeCompare(String(b[state.sort] ?? ''), 'es', { numeric:true });
              return state.dir === 'desc' ? -result : result;
            });
            const start = state.page * state.pageSize;
            table.rows = filtered.slice(start, start + state.pageSize); table.total = filtered.length;
            table.page = state.page; table.pageSize = state.pageSize; table.sort = state.sort; table.sortDir = state.dir;
          }
          table.addEventListener('pageChange', (event) => { state.page = Number(event.detail) || 0; queryPage(); });
          table.addEventListener('pageSizeChange', (event) => { state.pageSize = Number(event.detail) || 50; state.page = 0; queryPage(); });
          table.addEventListener('sortChange', (event) => { state.sort = event.detail.sort; state.dir = event.detail.dir; state.page = 0; queryPage(); });
          table.addEventListener('searchChange', (event) => { state.search = String(event.detail || ''); state.page = 0; queryPage(); });
          table.addEventListener('filterChange', (event) => { state.filters[event.detail.col] = event.detail.value; state.page = 0; queryPage(); });
          queryPage();
        },
      });
    </script>
  </body>
</html>
