<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora · Cafetería La Rambla · Inicio</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* ── Geometría de la página pública (estructura pura, sin colores de marca a mano) ── */

      /* Modo bare: la página pública necesita escapar del page-wrap/ion-padding
       * para que el nav y el hero ocupen todo el ancho. */
      ion-app { display: block; }
      ion-content {
        --overflow: auto;
        --padding-top: 0 !important;
        --padding-end: 0 !important;
        --padding-bottom: 0 !important;
        --padding-start: 0 !important;
      }
      /* page-wrap centra el contenido — la pub-shell lo sobreescribe a ancho completo */
      .page-wrap { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }

      /* Shell de la página pública: columna full-height */
      .pub-shell {
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
      }

      /* Navbar pública sticky */
      .pub-nav {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 20px;
        background: color-mix(in srgb, var(--ion-background-color) 90%, transparent);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
      }

      .pub-nav__brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }

      .pub-nav__logo {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: var(--ion-color-primary);
        color: var(--ion-color-primary-contrast);
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 16px;
        letter-spacing: -0.04em;
        flex: 0 0 auto;
      }

      .pub-nav__name {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--ion-text-color);
      }

      .pub-nav__links {
        display: inline-flex;
        gap: 4px;
        align-items: center;
      }

      .pub-nav__link {
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 14px;
        color: var(--ion-color-medium);
        text-decoration: none;
        transition: background .15s, color .15s;
      }
      .pub-nav__link:hover {
        color: var(--ion-text-color);
        background: var(--ion-color-step-50, rgba(127,127,127,.08));
      }

      @media (max-width: 640px) {
        .pub-nav__links { display: none; }
      }

      /* Hero */
      .pub-hero {
        position: relative;
        padding: clamp(48px, 10vw, 96px) 20px;
        text-align: center;
        overflow: hidden;
      }

      .pub-hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 70% 60% at 50% 0%, color-mix(in srgb, var(--ion-color-primary) 14%, transparent) 0%, transparent 60%),
          radial-gradient(ellipse 50% 40% at 20% 100%, color-mix(in srgb, var(--ion-color-warning) 8%, transparent) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }
      .pub-hero > * { position: relative; z-index: 1; }

      .pub-hero__logo {
        width: 88px;
        height: 88px;
        border-radius: 22px;
        background: var(--ion-color-primary);
        color: var(--ion-color-primary-contrast);
        display: grid;
        place-items: center;
        margin: 0 auto 20px;
        font-weight: 800;
        font-size: 36px;
        letter-spacing: -0.04em;
        box-shadow: 0 8px 32px color-mix(in srgb, var(--ion-color-primary) 35%, transparent);
      }

      .pub-hero__name {
        font-size: clamp(32px, 5vw, 52px);
        font-weight: 700;
        letter-spacing: -0.03em;
        color: var(--ion-text-color);
        margin: 0;
        line-height: 1.05;
      }

      .pub-hero__tagline {
        font-size: 17px;
        color: var(--ion-color-medium);
        max-width: 560px;
        margin: 16px auto 32px;
        line-height: 1.6;
      }

      .pub-hero__actions {
        display: inline-flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }

      /* Secciones de contenido */
      .pub-section {
        padding: 48px 20px;
        max-width: 1120px;
        margin-inline: auto;
        width: 100%;
        box-sizing: border-box;
      }

      .pub-section__title {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--ion-text-color);
        margin: 0 0 24px;
        text-align: center;
      }

      /* Info cards: 3 columnas en desktop */
      .pub-info-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      @media (max-width: 768px) {
        .pub-info-grid { grid-template-columns: 1fr; }
      }

      /* Tarjeta de info */
      .pub-card-title {
        font-size: 16px;
        font-weight: 700;
        margin: 0;
      }

      .pub-hours-dl {
        margin: 0;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 6px 14px;
        font-size: 14px;
      }
      .pub-hours-dl dt {
        color: var(--ion-color-medium);
        font-weight: 400;
      }
      .pub-hours-dl dd {
        margin: 0;
        font-variant-numeric: tabular-nums;
      }

      /* Mapa placeholder */
      .pub-map {
        aspect-ratio: 16 / 9;
        border-radius: 12px;
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        background:
          linear-gradient(135deg, var(--ion-color-step-50, rgba(127,127,127,.05)), var(--ion-color-step-100, rgba(127,127,127,.1))),
          repeating-linear-gradient(45deg, transparent 0 12px, color-mix(in srgb, var(--ion-border-color, rgba(127,127,127,.2)) 60%, transparent) 12px 13px);
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
      }

      .pub-map__pin {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--ion-color-primary);
        color: var(--ion-color-primary-contrast);
        display: grid;
        place-items: center;
        box-shadow: 0 4px 20px color-mix(in srgb, var(--ion-color-primary) 50%, transparent);
        animation: pin-pulse 2.4s ease-out infinite;
      }

      @keyframes pin-pulse {
        0%, 100% { box-shadow: 0 4px 20px color-mix(in srgb, var(--ion-color-primary) 50%, transparent); }
        50%       { box-shadow: 0 4px 20px color-mix(in srgb, var(--ion-color-primary) 50%, transparent), 0 0 0 16px color-mix(in srgb, var(--ion-color-primary) 14%, transparent); }
      }

      /* Footer */
      .pub-foot {
        margin-top: auto;
        padding: 24px 20px;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
        background: var(--ion-color-step-50, rgba(127,127,127,.04));
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        font-size: 13px;
        color: var(--ion-color-medium);
      }

      .pub-foot__legal {
        display: inline-flex;
        gap: 16px;
        flex-wrap: wrap;
      }

      .pub-foot__legal a {
        color: var(--ion-color-medium);
        text-decoration: none;
      }
      .pub-foot__legal a:hover {
        color: var(--ion-text-color);
      }

      /* Texto de contacto */
      .pub-contact-phone {
        display: block;
        font-weight: 600;
        font-size: 16px;
        color: var(--ion-text-color);
        text-decoration: none;
        margin-bottom: 6px;
      }
      .pub-contact-email {
        display: block;
        font-size: 13px;
        color: var(--ion-color-medium);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <div class="pub-shell">

            <!-- Navbar pública sticky -->
            <nav class="pub-nav" role="navigation" aria-label="Navegación principal">
              <a href="/" class="pub-nav__brand" aria-label="Cafetería La Rambla — inicio">
                <span class="pub-nav__logo">L</span>
                <span class="pub-nav__name">Cafetería La Rambla</span>
              </a>
              <div class="pub-nav__links">
                <a href="/public/catalog" class="pub-nav__link">Carta</a>
                <a href="#contact" class="pub-nav__link">Contacto</a>
                <a href="#hours" class="pub-nav__link">Horarios</a>
                <ion-button id="btn-staff" size="small" fill="outline" href="/login">
                  <ion-icon slot="start" name="person-outline"></ion-icon>
                  Acceso staff
                </ion-button>
              </div>
            </nav>

            <!-- Hero -->
            <header class="pub-hero">
              <div class="pub-hero__logo" aria-hidden="true">L</div>
              <h1 class="pub-hero__name">Cafetería La Rambla</h1>
              <p class="pub-hero__tagline">
                Café de especialidad, bocadillos artesanos y dulces caseros en el corazón de Barcelona.
                Pide online y recoge en tienda — listo en 10 minutos.
              </p>
              <div class="pub-hero__actions">
                <ion-button id="btn-order" size="large" href="/public/catalog">
                  <ion-icon slot="start" name="storefront-outline"></ion-icon>
                  Pedir online
                </ion-button>
                <ion-button id="btn-map" size="large" fill="outline" href="#map">
                  <ion-icon slot="start" name="navigate-outline"></ion-icon>
                  Cómo llegar
                </ion-button>
              </div>
            </header>

            <!-- Tarjetas de información -->
            <section class="pub-section" aria-labelledby="info-heading">
              <div class="pub-info-grid">

                <!-- Ubicación -->
                <ion-card id="contact">
                  <ion-card-header>
                    <ion-card-title class="pub-card-title">Ubicación</ion-card-title>
                    <ion-card-subtitle>
                      <ion-badge color="primary">L1 · L3 Catalunya</ion-badge>
                    </ion-card-subtitle>
                  </ion-card-header>
                  <ion-card-content>
                    <p style="margin:0 0 6px;font-weight:500">Calle Major 12</p>
                    <p style="margin:0 0 16px;font-size:14px;color:var(--ion-color-medium)">
                      08002 Barcelona<br>
                      A 2 min de la Rambla
                    </p>
                    <ion-button fill="clear" size="small" href="https://maps.google.com/?q=Calle+Major+12+Barcelona" target="_blank" rel="noopener noreferrer">
                      <ion-icon slot="start" name="map-outline"></ion-icon>
                      Abrir en Maps
                    </ion-button>
                  </ion-card-content>
                </ion-card>

                <!-- Horario -->
                <ion-card id="hours">
                  <ion-card-header>
                    <ion-card-title class="pub-card-title">Horario</ion-card-title>
                    <ion-card-subtitle>
                      <ok-status-pill tone="success" dot label="Abierto ahora"></ok-status-pill>
                    </ion-card-subtitle>
                  </ion-card-header>
                  <ion-card-content>
                    <dl class="pub-hours-dl">
                      <dt>Lun – Vie</dt>
                      <dd>07:00 – 21:00</dd>
                      <dt>Sábado</dt>
                      <dd>08:00 – 22:00</dd>
                      <dt>Domingo</dt>
                      <dd>09:00 – 15:00</dd>
                    </dl>
                  </ion-card-content>
                </ion-card>

                <!-- Contacto -->
                <ion-card>
                  <ion-card-header>
                    <ion-card-title class="pub-card-title">Contacto</ion-card-title>
                  </ion-card-header>
                  <ion-card-content>
                    <a href="tel:+34931234567" class="pub-contact-phone">+34 931 234 567</a>
                    <a href="mailto:hola@larambla.cafe" class="pub-contact-email">hola@larambla.cafe</a>
                    <div style="margin-top:16px">
                      <ion-button id="btn-whatsapp" fill="clear" size="small">
                        <ion-icon slot="start" name="logo-whatsapp"></ion-icon>
                        WhatsApp
                      </ion-button>
                    </div>
                  </ion-card-content>
                </ion-card>

              </div>
            </section>

            <!-- Mapa -->
            <section class="pub-section" id="map" aria-labelledby="map-heading">
              <h2 class="pub-section__title" id="map-heading">Dónde estamos</h2>
              <div class="pub-map" role="img" aria-label="Mapa de ubicación: Calle Major 12, 08002 Barcelona">
                <div class="pub-map__pin" aria-hidden="true">
                  <ion-icon name="location" style="font-size:20px"></ion-icon>
                </div>
              </div>
            </section>

            <!-- Footer -->
            <footer class="pub-foot">
              <div>© 2026 Cafetería La Rambla · Powered by ERPlora</div>
              <div class="pub-foot__legal">
                <a href="/legal/privacy">Privacidad</a>
                <a href="/legal/terms">Términos</a>
                <a href="/legal/cookies">Cookies</a>
              </div>
            </footer>

          </div>
        `,
        setup(doc) {
          // Botón WhatsApp → navegar (CSP-safe, sin onclick inline).
          const btnWa = doc.getElementById('btn-whatsapp');
          if (btnWa) {
            btnWa.addEventListener('click', () => {
              window.open('https://wa.me/34931234567', '_blank', 'noopener,noreferrer');
            });
          }

          // Botón «Cómo llegar» → ancla suave al mapa.
          const btnMap = doc.getElementById('btn-map');
          if (btnMap) {
            btnMap.addEventListener('click', (e) => {
              e.preventDefault();
              const mapEl = doc.getElementById('map');
              if (mapEl) mapEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
          }
        },
      });
    </script>
  </body>
</html>
