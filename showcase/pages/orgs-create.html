<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Nueva organización</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* Geometría puntual de esta vista (estructura, sin colores de marca). */
      .ui-intro-title {
        margin: 0 0 6px;
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: -.03em;
      }
      .ui-intro-sub {
        margin: 0 0 18px;
        font-size: .9rem;
        line-height: 1.55;
        color: var(--ion-color-medium);
        max-width: 620px;
      }

      /* Campos del formulario. */
      .ui-fields { display: flex; flex-direction: column; gap: 20px; }

      .ui-label { display: block; font-weight: 600; font-size: .9rem; margin-bottom: 6px; }
      .ui-hint { display: block; margin-top: 6px; font-size: .78rem; color: var(--ion-color-medium); }

      /* Prefijo de URL inline. */
      .ui-url-group {
        display: flex; align-items: center;
        border: 1.5px solid var(--ion-border-color, rgba(127,127,127,.25));
        border-radius: 8px;
        overflow: hidden;
        background: var(--ion-item-background, var(--ion-background-color));
      }
      .ui-url-prefix {
        padding: 0 10px;
        font-size: .88rem;
        color: var(--ion-color-medium);
        background: var(--ion-color-step-50, rgba(127,127,127,.07));
        border-right: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        white-space: nowrap;
        height: 44px;
        display: flex; align-items: center;
        flex-shrink: 0;
      }
      .ui-url-group ion-input {
        --border-width: 0;
        --padding-start: 10px;
        flex: 1 1 auto;
      }

      /* Selector de color de marca (toggle group). */
      .ui-color-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .ui-color-btn {
        cursor: pointer;
        border: 2px solid var(--ion-border-color, rgba(127,127,127,.25));
        border-radius: 8px;
        padding: 6px 14px;
        background: transparent;
        font-size: .85rem;
        font-weight: 500;
        color: var(--ion-text-color);
        transition: border-color .15s, background .15s;
      }
      .ui-color-btn[aria-pressed="true"] {
        border-color: var(--ion-color-primary);
        background: color-mix(in srgb, var(--ion-color-primary) 12%, transparent);
        color: var(--ion-color-primary);
      }

      /* Footer de acciones. */
      .ui-foot {
        display: flex; align-items: center; justify-content: flex-end; gap: 10px;
        margin-top: 8px;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        padding-top: 16px;
        flex-wrap: wrap;
      }
      @media (max-width: 560px) {
        .ui-foot { justify-content: stretch; flex-direction: column; }
        .ui-foot ion-button { width: 100%; }
      }

      /* Sidebar de vista previa. */
      .ui-preview {
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        border-radius: 14px;
        padding: 20px;
        background: var(--ion-color-step-50, rgba(127,127,127,.04));
      }
      .ui-preview__eyebrow {
        font-size: .68rem; text-transform: uppercase; letter-spacing: .07em;
        color: var(--ion-color-medium); margin-bottom: 12px;
      }

      /* Tarjeta de la org en la preview. */
      .ui-org-card {
        display: flex; align-items: center; gap: 12px;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        background: var(--ion-item-background, var(--ion-background-color));
      }
      .ui-org-avatar {
        width: 42px; height: 42px; border-radius: 10px;
        display: grid; place-items: center;
        font-weight: 700; font-size: 15px; flex-shrink: 0;
        background: var(--ion-color-primary); color: var(--ion-color-primary-contrast);
        transition: background .2s;
      }
      .ui-org-name {
        font-weight: 600; font-size: .9rem;
        color: var(--ion-text-color);
        min-height: 1.1em;
      }
      .ui-org-url {
        font-family: monospace; font-size: .75rem;
        color: var(--ion-color-medium); margin-top: 2px;
      }

      /* Divisor de la preview. */
      .ui-preview hr {
        border: 0; border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.18));
        margin: 16px 0;
      }
      .ui-preview-after-eyebrow {
        font-size: .68rem; text-transform: uppercase; letter-spacing: .07em;
        color: var(--ion-color-medium); margin-bottom: 10px;
      }

      /* Lista "Tras crearla podrás". */
      .ui-checklist {
        list-style: none; padding: 0; margin: 0;
        display: flex; flex-direction: column; gap: 8px;
        font-size: .85rem;
      }
      .ui-checklist li {
        display: flex; align-items: center; gap: 10px;
        color: var(--ion-text-color);
      }
      .ui-check-icon {
        width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
        display: grid; place-items: center;
        font-size: 11px; font-weight: 700;
        background: color-mix(in srgb, var(--ion-color-success) 18%, transparent);
        color: var(--ion-color-success);
      }

      .ui-preview-trial {
        font-size: .75rem;
        color: var(--ion-color-medium);
        line-height: 1.5;
        margin: 14px 0 0;
      }
      .ui-preview-trial strong { color: var(--ion-text-color); font-weight: 600; }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        active: 'orgs',
        bare: true,
        body: `
          <ok-page-header
            heading="Nueva organización"
            description="Crea un contenedor para tus hubs, usuarios y datos de facturación.">
            <ion-button slot="actions" fill="outline" size="small" id="btn-cancel">
              <ion-icon slot="start" name="close-outline"></ion-icon>
              Cancelar
            </ion-button>
          </ok-page-header>

          <!-- Introducción -->
          <div style="margin-bottom: 22px; max-width: 700px;">
            <h2 class="ui-intro-title">Crear una organización</h2>
            <p class="ui-intro-sub">
              Una organización es solo un <strong>contenedor</strong> para tus hubs.
              Los hubs dentro comparten <strong>base de datos, usuarios, datos fiscales y métodos de pago</strong>.
              Plan, suscripciones y direcciones se configuran después desde la pestaña correspondiente.
            </p>
          </div>

          <!-- Formulario + Vista previa -->
          <div class="pg-cols" style="align-items: start;">

            <!-- IZQUIERDA · formulario -->
            <ion-card>
              <ion-card-content>
                <div class="ui-fields">

                  <!-- Nombre -->
                  <ion-input
                    id="org-name"
                    label="Nombre *"
                    label-placement="stacked"
                    fill="outline"
                    placeholder="Acme Industries SL"
                    inputmode="text"
                    helper-text="Cómo verás esta organización en la cabecera y la sidebar."
                    clearInput></ion-input>

                  <!-- URL / slug -->
                  <div>
                    <label class="ui-label" for="org-slug">URL *</label>
                    <div class="ui-url-group">
                      <span class="ui-url-prefix">erplora.com/o/</span>
                      <ion-input
                        id="org-slug"
                        placeholder="acme"
                        inputmode="url"></ion-input>
                    </div>
                    <small class="ui-hint">Solo minúsculas, números y guiones. Se usa en URLs y APIs internas. No se puede cambiar después.</small>
                  </div>

                  <!-- Sector (opcional) -->
                  <ion-select
                    id="org-sector"
                    label="Sector (opcional)"
                    label-placement="stacked"
                    fill="outline"
                    interface="popover"
                    placeholder="— Seleccionar —"
                    helper-text="Solo se usa para sugerirte plantillas y módulos relevantes — no cambia el plan ni precio.">
                    <ion-select-option value="retail">Retail / comercio</ion-select-option>
                    <ion-select-option value="hospitality">Hostelería / restauración</ion-select-option>
                    <ion-select-option value="manufacturing">Manufactura</ion-select-option>
                    <ion-select-option value="services">Servicios profesionales</ion-select-option>
                    <ion-select-option value="health">Salud / bienestar</ion-select-option>
                    <ion-select-option value="education">Educación / formación</ion-select-option>
                    <ion-select-option value="logistics">Logística / transporte</ion-select-option>
                    <ion-select-option value="other">Otro</ion-select-option>
                  </ion-select>

                  <!-- Color de marca -->
                  <div>
                    <div style="font-weight: 600; font-size: .9rem; margin-bottom: 8px;">Color de marca</div>
                    <div class="ui-color-group" id="color-group">
                      <button type="button" class="ui-color-btn" data-color="primary" aria-pressed="true">Terracota</button>
                      <button type="button" class="ui-color-btn" data-color="success" aria-pressed="false">Verde</button>
                      <button type="button" class="ui-color-btn" data-color="tertiary" aria-pressed="false">Azul</button>
                      <button type="button" class="ui-color-btn" data-color="warning" aria-pressed="false">Ámbar</button>
                      <button type="button" class="ui-color-btn" data-color="danger" aria-pressed="false">Rojo</button>
                    </div>
                    <small class="ui-hint">Solo cosmético. Lo cambias cuando quieras.</small>
                  </div>

                </div>

                <!-- Footer de acciones -->
                <div class="ui-foot">
                  <ion-button fill="outline" id="btn-cancel-2">
                    <ion-icon slot="start" name="close-outline"></ion-icon>
                    Cancelar
                  </ion-button>
                  <ion-button id="btn-crear" disabled>
                    <ion-icon slot="start" name="business-outline"></ion-icon>
                    Crear organización
                  </ion-button>
                </div>
              </ion-card-content>
            </ion-card>

            <!-- DERECHA · vista previa -->
            <div class="pg-stack">
              <div class="ui-preview">
                <div class="ui-preview__eyebrow">Vista previa</div>

                <div class="ui-org-card">
                  <div class="ui-org-avatar" id="preview-avatar">AC</div>
                  <div>
                    <div class="ui-org-name" id="preview-name">Tu organización</div>
                    <div class="ui-org-url">erplora.com/o/<span id="preview-slug">acme</span></div>
                  </div>
                </div>

                <hr />

                <div class="ui-preview-after-eyebrow">Tras crearla podrás</div>
                <ul class="ui-checklist">
                  <li>
                    <span class="ui-check-icon">✓</span>
                    Crear hubs (cada hub = una tienda/punto de venta)
                  </li>
                  <li>
                    <span class="ui-check-icon">✓</span>
                    Invitar miembros del equipo
                  </li>
                  <li>
                    <span class="ui-check-icon">✓</span>
                    Configurar facturación, datos fiscales y direcciones
                  </li>
                  <li>
                    <span class="ui-check-icon">✓</span>
                    Elegir plan y suscripciones por hub
                  </li>
                  <li>
                    <span class="ui-check-icon">✓</span>
                    Comprar equipo y añadir métodos de pago
                  </li>
                </ul>
                <p class="ui-preview-trial">
                  Empiezas en plan <strong>Trial</strong> sin cobro durante 14 días.
                </p>
              </div>
            </div>

          </div>
        `,
        setup(doc) {
          // ── Estado reactivo del formulario ─────────────────────────────────
          const state = {
            name: '',
            slug: '',
            color: 'primary',
          };

          // Mapa de color → variable CSS de Ionic
          const COLOR_VAR = {
            primary:  'var(--ion-color-primary)',
            success:  'var(--ion-color-success)',
            tertiary: 'var(--ion-color-tertiary)',
            warning:  'var(--ion-color-warning)',
            danger:   'var(--ion-color-danger)',
          };

          const nameInput = doc.getElementById('org-name');
          const slugInput = doc.getElementById('org-slug');
          const btnCrear  = doc.getElementById('btn-crear');
          const previewAvatar = doc.getElementById('preview-avatar');
          const previewName   = doc.getElementById('preview-name');
          const previewSlug   = doc.getElementById('preview-slug');

          // Convierte el nombre a un slug válido.
          const toSlug = (str) =>
            str
              .toLowerCase()
              .normalize('NFD').replace(/[̀-ͯ]/g, '')
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-|-$/g, '')
              .slice(0, 40);

          // Actualiza la vista previa y el estado del botón.
          const refresh = () => {
            const initials = (state.name || 'AC').slice(0, 2).toUpperCase();
            previewAvatar.textContent = initials;
            previewAvatar.style.background = COLOR_VAR[state.color] || COLOR_VAR.primary;
            previewName.textContent = state.name || 'Tu organización';
            previewSlug.textContent = state.slug || 'acme';
            // Habilitar el botón solo si nombre y slug tienen contenido.
            if (btnCrear) {
              btnCrear.disabled = !(state.name.length > 0 && state.slug.length > 0);
            }
          };

          // Nombre → auto-generar slug + actualizar preview.
          if (nameInput) {
            nameInput.addEventListener('ionInput', (e) => {
              state.name = (e.detail && e.detail.value) || nameInput.value || '';
              // Solo auto-genera el slug si el usuario no lo ha editado manualmente.
              if (!state._slugManual) {
                state.slug = toSlug(state.name);
                if (slugInput) slugInput.value = state.slug;
              }
              refresh();
            });
          }

          // Slug → solo actualiza si el usuario lo toca directamente.
          if (slugInput) {
            slugInput.addEventListener('ionInput', (e) => {
              state._slugManual = true;
              state.slug = ((e.detail && e.detail.value) || slugInput.value || '')
                .toLowerCase().replace(/[^a-z0-9-]/g, '').slice(0, 40);
              if (slugInput.value !== state.slug) slugInput.value = state.slug;
              refresh();
            });
          }

          // Selector de color de marca.
          const colorGroup = doc.getElementById('color-group');
          if (colorGroup) {
            colorGroup.querySelectorAll('.ui-color-btn').forEach((btn) => {
              btn.addEventListener('click', () => {
                state.color = btn.getAttribute('data-color') || 'primary';
                colorGroup.querySelectorAll('.ui-color-btn').forEach((b) => {
                  b.setAttribute('aria-pressed', String(b === btn));
                });
                refresh();
              });
            });
          }

          // Botones de cancelar (sin navegación real en el showcase).
          [doc.getElementById('btn-cancel'), doc.getElementById('btn-cancel-2')].forEach((btn) => {
            if (btn) btn.addEventListener('click', () => history.back());
          });

          // Inicializar.
          refresh();
        },
      });
    </script>
  </body>
</html>
