<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crear organización - ERPlora Cloud</title>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <style>
      .form-card { max-width: 42rem; }
      .actions { display:flex;align-items:center;gap:.5rem;margin-top:1.25rem; }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      defineSaasDashboardPage({
        active: '/dashboard/organizations/',
        title: 'Crear organización',
        body: `
          <ion-card class="form-card">
            <ion-card-content>
              <form id="create-organization-form">
                <ion-input id="organization-name" label="Nombre de la organización"
                           label-placement="floating" fill="outline" type="text"
                           placeholder="Mi empresa" required autofocus></ion-input>
                <div class="actions">
                  <ion-button type="button" fill="clear">Cancelar</ion-button>
                  <ion-button type="submit">
                    <iconify-icon slot="start" icon="lucide:plus" width="16" height="16"></iconify-icon>
                    Crear organización
                  </ion-button>
                </div>
              </form>
            </ion-card-content>
          </ion-card>
        `,
        setup(doc) {
          doc.getElementById('create-organization-form')?.addEventListener('submit', (event) => {
            event.preventDefault();
          });
        },
      });
    </script>
  </body>
</html>
