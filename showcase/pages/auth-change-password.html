<!doctype html>
<html lang="es" data-theme="erplora-light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Cambiar contraseña - ERPlora Cloud</title>

    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/ok-inline-feedback.js"></script>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      const managementFooter = `
        <footer id="section-tabbar">
          <ion-segment value="profile" aria-label="Navegación de cuenta">
            <ion-segment-button value="settings">
              <iconify-icon icon="lucide:settings" width="20" height="20"></iconify-icon>
              <ion-label>Ajustes</ion-label>
            </ion-segment-button>
            <ion-segment-button value="devices">
              <iconify-icon icon="lucide:smartphone" width="20" height="20"></iconify-icon>
              <ion-label>Dispositivos</ion-label>
            </ion-segment-button>
            <ion-segment-button value="sessions">
              <iconify-icon icon="lucide:shield-check" width="20" height="20"></iconify-icon>
              <ion-label>Sesiones</ion-label>
            </ion-segment-button>
            <ion-segment-button value="profile">
              <iconify-icon icon="lucide:user" width="20" height="20"></iconify-icon>
              <ion-label>Perfil</ion-label>
            </ion-segment-button>
          </ion-segment>
        </footer>`;

      defineSaasDashboardPage({
        active: '/dashboard/settings/',
        title: 'Cambiar contraseña',
        body: `
          <div style="max-width:720px;margin:0 auto">
            <div style="margin-bottom:1.25rem">
              <h1 style="margin:0;font-size:1.5rem">Cambiar contraseña</h1>
              <p style="margin:.35rem 0 0;color:var(--ion-color-medium)">
                Elige una contraseña segura que no uses en otros sitios.
              </p>
            </div>

            <ok-inline-feedback tone="info" heading="Requisitos de la contraseña">
              <ul style="margin:.35rem 0 0;padding-left:1.25rem;line-height:1.55">
                <li>Al menos 8 caracteres</li>
                <li>Debe ser diferente de la contraseña actual</li>
                <li>Combina letras, números y símbolos para mejorar la seguridad</li>
              </ul>
            </ok-inline-feedback>

            <ion-card style="margin-top:1rem">
              <ion-card-header><ion-card-title>Cambia tu contraseña</ion-card-title></ion-card-header>
              <ion-card-content>
                <form method="post" action="" style="display:grid;gap:1rem">
                  <div>
                    <ion-input data-bind="old_password" type="password" name="old_password_ion"
                               label="Contraseña actual" label-placement="floating" fill="outline"
                               required autocomplete="current-password">
                      <ion-input-password-toggle slot="end"></ion-input-password-toggle>
                    </ion-input>
                    <input type="hidden" name="old_password" />
                  </div>

                  <div>
                    <ion-input data-bind="new_password1" type="password" name="new_password1_ion"
                               label="Nueva contraseña" label-placement="floating" fill="outline"
                               required minlength="8" autocomplete="new-password">
                      <ion-input-password-toggle slot="end"></ion-input-password-toggle>
                    </ion-input>
                    <input type="hidden" name="new_password1" />
                  </div>

                  <div>
                    <ion-input data-bind="new_password2" type="password" name="new_password2_ion"
                               label="Confirma la nueva contraseña" label-placement="floating" fill="outline"
                               required minlength="8" autocomplete="new-password">
                      <ion-input-password-toggle slot="end"></ion-input-password-toggle>
                    </ion-input>
                    <input type="hidden" name="new_password2" />
                  </div>

                  <ion-button type="submit" color="primary" expand="block">Cambiar contraseña</ion-button>
                </form>
              </ion-card-content>
            </ion-card>

            <ion-card>
              <ion-card-header><ion-card-title>Consejos de seguridad</ion-card-title></ion-card-header>
              <ion-list lines="full">
                <ion-item><iconify-icon slot="start" icon="lucide:shield-check" width="18" height="18" style="color:var(--ion-color-success)"></iconify-icon><ion-label>Usa una contraseña única para esta cuenta</ion-label></ion-item>
                <ion-item><iconify-icon slot="start" icon="lucide:shield-check" width="18" height="18" style="color:var(--ion-color-success)"></iconify-icon><ion-label>Evita datos personales en tu contraseña</ion-label></ion-item>
                <ion-item><iconify-icon slot="start" icon="lucide:shield-check" width="18" height="18" style="color:var(--ion-color-success)"></iconify-icon><ion-label>Considera utilizar un gestor de contraseñas</ion-label></ion-item>
                <ion-item><iconify-icon slot="start" icon="lucide:shield-check" width="18" height="18" style="color:var(--ion-color-success)"></iconify-icon><ion-label>Cambia tu contraseña con regularidad</ion-label></ion-item>
              </ion-list>
            </ion-card>
          </div>`,
        footer: managementFooter,
        setup(doc) {
          const inputs = doc.querySelectorAll('ion-input[data-bind]');
          for (const inp of inputs) {
            const name = inp.getAttribute('data-bind');
            const form = inp.closest('form');
            const hidden = form?.querySelector(`input[type="hidden"][name="${name}"]`);
            if (!form || !hidden) continue;
            const sync = () => { hidden.value = inp.value != null ? String(inp.value) : ''; };
            inp.addEventListener('ionInput', sync);
            inp.addEventListener('ionChange', sync);
            form.addEventListener('submit', sync);
          }
        },
      });
    </script>
  </body>
</html>
