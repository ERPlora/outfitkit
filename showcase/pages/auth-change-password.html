<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Cambiar contraseña</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* Geometría puntual de esta vista (estructura, sin colores de marca). */

      /* Contenedor centrado de formulario (max 560px, igual que la referencia). */
      .ui-pwd-wrap {
        max-width: 560px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      /* Campos del formulario. */
      .ui-field { display: flex; flex-direction: column; gap: 6px; }

      .ui-label {
        display: block;
        font-weight: 600;
        font-size: .9rem;
      }
      .ui-label--req::after { content: " *"; color: var(--ion-color-danger); }

      .ui-hint { font-size: .78rem; color: var(--ion-color-medium); margin: 0; }

      /* Input con botón de mostrar/ocultar. */
      .ui-input-eye {
        position: relative;
        display: flex;
        align-items: center;
      }
      .ui-input-eye ion-input {
        flex: 1 1 auto;
        --padding-end: 44px;
      }
      .ui-eye-btn {
        position: absolute;
        right: 8px;
        background: transparent;
        border: 0;
        cursor: pointer;
        color: var(--ion-color-medium);
        display: flex;
        align-items: center;
        padding: 4px;
      }

      /* Barra de fortaleza de contraseña. */
      .ui-strength { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
      .ui-strength__head {
        display: flex;
        justify-content: space-between;
        font-size: .78rem;
        color: var(--ion-color-medium);
      }
      .ui-strength__bar-track {
        height: 6px;
        border-radius: 3px;
        background: var(--ion-border-color, rgba(127,127,127,.2));
        overflow: hidden;
      }
      .ui-strength__bar {
        height: 100%;
        border-radius: 3px;
        width: 0%;
        transition: width .25s ease, background .25s ease;
        background: var(--ion-color-medium);
      }
      .ui-strength__bar--weak   { background: var(--ion-color-danger); }
      .ui-strength__bar--medium { background: var(--ion-color-warning); }
      .ui-strength__bar--strong { background: var(--ion-color-success); }

      /* Checklist de requisitos. */
      .ui-req-list {
        list-style: none;
        padding: 0;
        margin: 6px 0 0;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 6px 14px;
        font-size: .8rem;
      }
      .ui-req-list li {
        display: flex;
        gap: 6px;
        align-items: center;
        color: var(--ion-color-medium);
      }
      .ui-req-list li.ui-ok { color: var(--ion-color-success); }

      /* Fila de feedback (match/no-match). */
      .ui-match {
        display: none;
        gap: 6px;
        align-items: center;
        font-size: .8rem;
        margin-top: 2px;
      }
      .ui-match--ok  { display: flex; color: var(--ion-color-success); }
      .ui-match--err { display: flex; color: var(--ion-color-danger); }

      /* Toggle row (cerrar sesiones). */
      .ui-toggle-row {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 12px 0 0;
      }
      .ui-toggle-row__text { flex: 1 1 auto; }
      .ui-toggle-row__label { font-weight: 600; font-size: .9rem; }
      .ui-toggle-row__desc  { color: var(--ion-color-medium); font-size: .8rem; margin-top: 2px; }

      /* Footer de acciones de la tarjeta. */
      .ui-card-foot {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        padding-top: 16px;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        flex-wrap: wrap;
      }
      @media (max-width: 480px) {
        .ui-card-foot ion-button { width: 100%; }
      }

      /* Pie de página (enlace FIDO2). */
      .ui-page-foot {
        text-align: center;
        font-size: .78rem;
        color: var(--ion-color-medium);
      }

      /* Separador dentro de la tarjeta. */
      .ui-divider {
        height: 1px;
        background: var(--ion-border-color, rgba(127,127,127,.2));
        margin: 4px 0;
      }

      /* Header de la tarjeta (título + badge). */
      .ui-card-head {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }
      .ui-card-head h3 { margin: 0; font-size: 1rem; font-weight: 700; }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Cambiar contraseña"
            description="Renueva tu contraseña cada 90 días para mantener tu cuenta segura.">
          </ok-page-header>

          <!-- Tabs de sub-sección: Contraseña / Sesiones / Dispositivos / Eliminar cuenta -->
          <ion-segment id="security-tabs" value="password" style="margin-bottom:1.25rem">
            <ion-segment-button value="password">
              <ion-label>Contraseña</ion-label>
            </ion-segment-button>
            <ion-segment-button value="sessions">
              <ion-label>Sesiones</ion-label>
            </ion-segment-button>
            <ion-segment-button value="devices">
              <ion-label>Dispositivos</ion-label>
            </ion-segment-button>
            <ion-segment-button value="delete">
              <ion-label>Eliminar cuenta</ion-label>
            </ion-segment-button>
          </ion-segment>

          <div class="ui-pwd-wrap">

            <!-- Callout de requisitos -->
            <ok-inline-feedback
              tone="info"
              heading="Requisitos de la nueva contraseña">
              Tu contraseña debe tener al menos 12 caracteres, incluir mayúsculas, números y un símbolo.
            </ok-inline-feedback>

            <!-- Tarjeta: Credenciales -->
            <ion-card>
              <ion-card-content>

                <div class="ui-card-head">
                  <h3>Credenciales</h3>
                  <ion-badge color="primary">
                    <ion-icon name="shield-checkmark-outline" style="vertical-align:middle;margin-right:3px"></ion-icon>
                    2FA activo
                  </ion-badge>
                </div>

                <div class="pg-stack">

                  <!-- Campo: Contraseña actual -->
                  <div class="ui-field">
                    <label class="ui-label ui-label--req" for="pwd-current">Contraseña actual</label>
                    <div class="ui-input-eye">
                      <ion-input
                        id="pwd-current"
                        type="password"
                        fill="outline"
                        placeholder="••••••••••••"
                        autocomplete="current-password">
                      </ion-input>
                      <button
                        class="ui-eye-btn"
                        id="btn-eye-current"
                        type="button"
                        aria-label="Mostrar u ocultar contraseña actual">
                        <ion-icon name="eye-outline" id="icon-eye-current"></ion-icon>
                      </button>
                    </div>
                    <p class="ui-hint">
                      ¿Olvidaste tu contraseña actual?
                      <ion-text color="primary">
                        <a href="#" style="text-decoration:none">Restablecer por email</a>
                      </ion-text>.
                    </p>
                  </div>

                  <!-- Campo: Nueva contraseña -->
                  <div class="ui-field">
                    <label class="ui-label ui-label--req" for="pwd-new">Nueva contraseña</label>
                    <div class="ui-input-eye">
                      <ion-input
                        id="pwd-new"
                        type="password"
                        fill="outline"
                        placeholder="Mínimo 12 caracteres"
                        autocomplete="new-password">
                      </ion-input>
                      <button
                        class="ui-eye-btn"
                        id="btn-eye-new"
                        type="button"
                        aria-label="Mostrar u ocultar nueva contraseña">
                        <ion-icon name="eye-outline" id="icon-eye-new"></ion-icon>
                      </button>
                    </div>

                    <!-- Barra de fortaleza -->
                    <div class="ui-strength">
                      <div class="ui-strength__head">
                        <span>Fortaleza</span>
                        <span id="strength-label">—</span>
                      </div>
                      <div class="ui-strength__bar-track">
                        <div class="ui-strength__bar" id="strength-bar"></div>
                      </div>
                    </div>

                    <!-- Checklist de requisitos -->
                    <ul class="ui-req-list" id="req-list">
                      <li id="req-length">
                        <ion-icon name="ellipse-outline" id="icon-req-length"></ion-icon>
                        12+ caracteres
                      </li>
                      <li id="req-case">
                        <ion-icon name="ellipse-outline" id="icon-req-case"></ion-icon>
                        Mayús. y minús.
                      </li>
                      <li id="req-number">
                        <ion-icon name="ellipse-outline" id="icon-req-number"></ion-icon>
                        Al menos 1 número
                      </li>
                      <li id="req-symbol">
                        <ion-icon name="ellipse-outline" id="icon-req-symbol"></ion-icon>
                        Al menos 1 símbolo
                      </li>
                    </ul>
                  </div>

                  <!-- Campo: Confirmar nueva contraseña -->
                  <div class="ui-field">
                    <label class="ui-label ui-label--req" for="pwd-confirm">Confirmar nueva contraseña</label>
                    <div class="ui-input-eye">
                      <ion-input
                        id="pwd-confirm"
                        type="password"
                        fill="outline"
                        placeholder="Repite la contraseña"
                        autocomplete="new-password">
                      </ion-input>
                      <button
                        class="ui-eye-btn"
                        id="btn-eye-confirm"
                        type="button"
                        aria-label="Mostrar u ocultar confirmación">
                        <ion-icon name="eye-outline" id="icon-eye-confirm"></ion-icon>
                      </button>
                    </div>
                    <div class="ui-match" id="match-ok">
                      <ion-icon name="checkmark-outline"></ion-icon>
                      Las contraseñas coinciden.
                    </div>
                    <div class="ui-match" id="match-err">
                      <ion-icon name="close-circle-outline"></ion-icon>
                      Las contraseñas no coinciden.
                    </div>
                  </div>

                  <!-- Separador -->
                  <div class="ui-divider"></div>

                  <!-- Toggle: Cerrar sesión en otros dispositivos -->
                  <div class="ui-toggle-row">
                    <div class="ui-toggle-row__text">
                      <div class="ui-toggle-row__label">Cerrar sesión en otros dispositivos</div>
                      <div class="ui-toggle-row__desc">Recomendado. Tendrás que volver a iniciar sesión en MacBook Pro · Madrid e iPhone 16 Pro.</div>
                    </div>
                    <ion-toggle id="toggle-logout" checked></ion-toggle>
                  </div>

                  <!-- Footer de acciones -->
                  <div class="ui-card-foot">
                    <ion-button fill="outline" id="btn-cancel">Cancelar</ion-button>
                    <ion-button id="btn-submit" disabled>
                      <ion-icon slot="start" name="lock-closed-outline"></ion-icon>
                      Cambiar contraseña
                    </ion-button>
                  </div>

                </div>

              </ion-card-content>
            </ion-card>

            <!-- Pie de página -->
            <p class="ui-page-foot">
              ¿Quieres una capa extra de seguridad?
              <ion-text color="primary">
                <a href="#" style="text-decoration:none">Activa una llave física FIDO2</a>
              </ion-text>.
            </p>

          </div>
        `,
        setup(doc) {
          // ── Estado ──────────────────────────────────────────────────────────────
          const state = {
            current:  '',
            pwd:      '',
            confirm:  '',
            showCurrent: false,
            showNew:     false,
            showConfirm: false,
          };

          // ── Refs ─────────────────────────────────────────────────────────────────
          const inputCurrent  = doc.getElementById('pwd-current');
          const inputNew      = doc.getElementById('pwd-new');
          const inputConfirm  = doc.getElementById('pwd-confirm');

          const btnEyeCurrent  = doc.getElementById('btn-eye-current');
          const btnEyeNew      = doc.getElementById('btn-eye-new');
          const btnEyeConfirm  = doc.getElementById('btn-eye-confirm');

          const iconEyeCurrent  = doc.getElementById('icon-eye-current');
          const iconEyeNew      = doc.getElementById('icon-eye-new');
          const iconEyeConfirm  = doc.getElementById('icon-eye-confirm');

          const strengthBar   = doc.getElementById('strength-bar');
          const strengthLabel = doc.getElementById('strength-label');

          const reqLength = doc.getElementById('req-length');
          const reqCase   = doc.getElementById('req-case');
          const reqNumber = doc.getElementById('req-number');
          const reqSymbol = doc.getElementById('req-symbol');

          const iconReqLength = doc.getElementById('icon-req-length');
          const iconReqCase   = doc.getElementById('icon-req-case');
          const iconReqNumber = doc.getElementById('icon-req-number');
          const iconReqSymbol = doc.getElementById('icon-req-symbol');

          const matchOk  = doc.getElementById('match-ok');
          const matchErr = doc.getElementById('match-err');

          const btnSubmit = doc.getElementById('btn-submit');

          // ── Helpers ───────────────────────────────────────────────────────────────

          /** Actualiza un item del checklist de requisitos. */
          function setReq(li, icon, ok) {
            if (ok) {
              li.classList.add('ui-ok');
              icon.setAttribute('name', 'checkmark-circle-outline');
            } else {
              li.classList.remove('ui-ok');
              icon.setAttribute('name', 'ellipse-outline');
            }
          }

          /** Calcula fortaleza (0=vacío, 1=débil, 2=media, 3=fuerte). */
          function calcStrength(pwd) {
            if (!pwd) return 0;
            let s = 0;
            if (pwd.length >= 8)  s++;
            if (pwd.length >= 12) s++;
            if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) s++;
            if (/[0-9]/.test(pwd)) s++;
            if (/[^A-Za-z0-9]/.test(pwd)) s++;
            if (s <= 1) return 1;
            if (s <= 3) return 2;
            return 3;
          }

          function updateStrength(pwd) {
            if (!pwd) {
              strengthBar.style.width = '0%';
              strengthBar.className = 'ui-strength__bar';
              strengthLabel.textContent = '—';
              return;
            }
            const level = calcStrength(pwd);
            const pct   = Math.min(100, pwd.length * 8);
            strengthBar.style.width = pct + '%';
            if (level === 1) {
              strengthBar.className = 'ui-strength__bar ui-strength__bar--weak';
              strengthLabel.textContent = 'Débil';
            } else if (level === 2) {
              strengthBar.className = 'ui-strength__bar ui-strength__bar--medium';
              strengthLabel.textContent = 'Media';
            } else {
              strengthBar.className = 'ui-strength__bar ui-strength__bar--strong';
              strengthLabel.textContent = 'Fuerte';
            }
          }

          /** Decide si el botón "Cambiar contraseña" está habilitado. */
          function canSubmit() {
            const p = state.pwd;
            return (
              state.current.length >= 1 &&
              p.length >= 12 &&
              /[A-Z]/.test(p) &&
              /[a-z]/.test(p) &&
              /[0-9]/.test(p) &&
              /[^A-Za-z0-9]/.test(p) &&
              p === state.confirm
            );
          }

          /** Actualiza toda la UI derivada del estado. */
          function refresh() {
            const p = state.pwd;
            const c = state.confirm;

            // Checklist de requisitos.
            setReq(reqLength, iconReqLength, p.length >= 12);
            setReq(reqCase,   iconReqCase,   /[A-Z]/.test(p) && /[a-z]/.test(p));
            setReq(reqNumber, iconReqNumber, /[0-9]/.test(p));
            setReq(reqSymbol, iconReqSymbol, /[^A-Za-z0-9]/.test(p));

            // Barra de fortaleza.
            updateStrength(p);

            // Feedback de coincidencia.
            matchOk.className  = 'ui-match';
            matchErr.className = 'ui-match';
            if (c.length > 0) {
              if (c === p) {
                matchOk.classList.add('ui-match--ok');
              } else {
                matchErr.classList.add('ui-match--err');
              }
            }

            // Botón de envío.
            btnSubmit.disabled = !canSubmit();
          }

          // ── Wiring: inputs (ionInput) ────────────────────────────────────────────
          if (inputCurrent) {
            inputCurrent.addEventListener('ionInput', (e) => {
              state.current = (e.detail && e.detail.value != null) ? e.detail.value : inputCurrent.value || '';
              refresh();
            });
          }
          if (inputNew) {
            inputNew.addEventListener('ionInput', (e) => {
              state.pwd = (e.detail && e.detail.value != null) ? e.detail.value : inputNew.value || '';
              refresh();
            });
          }
          if (inputConfirm) {
            inputConfirm.addEventListener('ionInput', (e) => {
              state.confirm = (e.detail && e.detail.value != null) ? e.detail.value : inputConfirm.value || '';
              refresh();
            });
          }

          // ── Botones de ojo (mostrar/ocultar) ────────────────────────────────────
          function wireEye(btn, input, icon, key) {
            if (!btn) return;
            btn.addEventListener('click', () => {
              state[key] = !state[key];
              const shown = state[key];
              // ion-input: cambia el tipo via el atributo (Ionic lo refleja).
              if (input) input.type = shown ? 'text' : 'password';
              if (icon)  icon.setAttribute('name', shown ? 'eye-off-outline' : 'eye-outline');
            });
          }

          wireEye(btnEyeCurrent,  inputCurrent,  iconEyeCurrent,  'showCurrent');
          wireEye(btnEyeNew,      inputNew,       iconEyeNew,      'showNew');
          wireEye(btnEyeConfirm,  inputConfirm,   iconEyeConfirm,  'showConfirm');

          // ── Cancelar ────────────────────────────────────────────────────────────
          const btnCancel = doc.getElementById('btn-cancel');
          if (btnCancel) {
            btnCancel.addEventListener('click', () => {
              // En la vista real navegaría atrás; aquí mostramos un toast informativo.
              const toast = document.createElement('ion-toast');
              toast.message  = 'Cambio cancelado.';
              toast.duration = 2000;
              toast.color    = 'medium';
              toast.position = 'bottom';
              document.body.appendChild(toast);
              toast.present();
              toast.addEventListener('didDismiss', () => toast.remove());
            });
          }

          // ── Enviar ───────────────────────────────────────────────────────────────
          if (btnSubmit) {
            btnSubmit.addEventListener('click', () => {
              if (!canSubmit()) return;
              const toast = document.createElement('ion-toast');
              toast.message  = 'Contraseña actualizada correctamente.';
              toast.duration = 2500;
              toast.color    = 'success';
              toast.position = 'bottom';
              document.body.appendChild(toast);
              toast.present();
              toast.addEventListener('didDismiss', () => toast.remove());
            });
          }

          // ── Tabs de seguridad (decorativo en el showcase) ──────────────────────
          // ion-segment maneja la selección activa internamente.

          // Estado inicial.
          refresh();
        },
      });
    </script>
  </body>
</html>
