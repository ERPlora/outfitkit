<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Hub · Configuración</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* Geometría puntual de esta vista (sin colores de marca). */

      /* Tarjeta de ajuste: fila icono + texto + botón. */
      .ui-config-card {
        display: flex;
        align-items: flex-start;
        gap: 14px;
      }
      .ui-config-card__body {
        flex: 1 1 auto;
        min-width: 0;
      }
      .ui-config-card__title {
        margin: 0 0 4px;
        font-size: 1rem;
        font-weight: 700;
      }
      .ui-config-card__desc {
        margin: 0 0 14px;
        font-size: .875rem;
        color: var(--ion-color-medium);
        line-height: 1.45;
      }

      /* Tarjeta deshabilitada (Avanzado / Próximamente). */
      .ui-config-card--disabled {
        opacity: .55;
        pointer-events: none;
      }

      /* Enlace-tarjeta: elimina la decoración de enlace y hereda el color. */
      a.ui-config-link {
        display: block;
        color: inherit;
        text-decoration: none;
      }
      a.ui-config-link:focus-visible ion-card {
        outline: 2px solid var(--ion-color-primary);
        outline-offset: 2px;
      }

      /* Grid: 3 col. desktop → 2 col. tableta → 1 col. móvil. */
      .ui-settings-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      @media (max-width: 900px) {
        .ui-settings-grid { grid-template-columns: repeat(2, 1fr); }
      }
      @media (max-width: 560px) {
        .ui-settings-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      // Datos de cada tarjeta de configuración.
      // icon: nombre Ionicons; color: paleta ok-icon-tile.
      const CARDS = [
        {
          id: 'cuenta',
          icon: 'business-outline',
          color: 'brand',
          title: 'Cuenta y negocio',
          desc: 'Razón social, NIF, dirección, contacto y moneda.',
          cta: 'Configurar',
          href: '#cuenta',
        },
        {
          id: 'dispositivos',
          icon: 'phone-portrait-outline',
          color: 'warn',
          title: 'Dispositivos de confianza',
          desc: 'Gestiona tablets, móviles y TPV autorizados al Hub.',
          cta: 'Configurar',
          href: '#dispositivos',
        },
        {
          id: 'impresoras',
          icon: 'print-outline',
          color: 'info',
          title: 'Impresoras',
          desc: 'Tickets, cocina, etiquetas y A4 conectadas vía Bridge.',
          cta: 'Configurar',
          href: '#impresoras',
        },
        {
          id: 'impuestos',
          icon: 'document-text-outline',
          color: 'leaf',
          title: 'Impuestos',
          desc: 'Clases de IVA y tasas aplicables a tus productos.',
          cta: 'Configurar',
          href: '#impuestos',
        },
        {
          id: 'backup',
          icon: 'cloud-download-outline',
          color: 'danger',
          title: 'Backup & restauración',
          desc: 'Snapshots automáticos, manuales e historial de restauración.',
          cta: 'Configurar',
          href: '#backup',
        },
        {
          id: 'archivos',
          icon: 'folder-open-outline',
          color: 'neutral',
          title: 'Archivos del Hub',
          desc: 'Navegador de almacenamiento del tenant: facturas, exports, logs.',
          cta: 'Abrir',
          href: '#archivos',
        },
        {
          id: 'hardware',
          icon: 'hardware-chip-outline',
          color: 'brand',
          title: 'Hardware (Sistema)',
          desc: 'Bridge, cajón, scanner, balanza y mostrador cliente.',
          cta: 'Configurar',
          href: '#hardware',
        },
        {
          id: 'avanzado',
          icon: 'time-outline',
          color: 'neutral',
          title: 'Avanzado',
          desc: 'Logs, modo desarrollador y diagnóstico del Hub.',
          cta: 'Próximamente',
          href: null,
          disabled: true,
        },
      ];

      // Construye el HTML de una tarjeta individual.
      const cardInner = (c) => `
        <ion-card-content>
          <div class="ui-config-card${c.disabled ? ' ui-config-card--disabled' : ''}">
            <ok-icon-tile icon="${c.icon}" color="${c.color}" size="lg"></ok-icon-tile>
            <div class="ui-config-card__body">
              <h3 class="ui-config-card__title">${c.title}</h3>
              <p class="ui-config-card__desc">${c.desc}</p>
              <ion-button fill="clear" size="small"${c.disabled ? ' disabled' : ''}>
                ${c.cta}
                ${c.disabled ? '' : '<ion-icon slot="end" name="arrow-forward-outline"></ion-icon>'}
              </ion-button>
            </div>
          </div>
        </ion-card-content>
      `;

      const gridItems = CARDS.map((c) => {
        if (c.href && !c.disabled) {
          return `
            <a href="${c.href}" class="ui-config-link" tabindex="0">
              <ion-card button style="height:100%;margin:0">
                ${cardInner(c)}
              </ion-card>
            </a>`;
        }
        return `
          <ion-card style="height:100%;margin:0">
            ${cardInner(c)}
          </ion-card>`;
      }).join('');

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Configuración"
            description="Ajustes del Hub, dispositivos, fiscalidad y backup">
          </ok-page-header>

          <!-- Sub-navegación entre páginas de ajustes (refleja las pestañas de la referencia). -->
          <ion-segment scrollable value="hub-config" style="margin-bottom:20px;" id="settings-subnav">
            <ion-segment-button value="preferences">
              <ion-label>Preferencias</ion-label>
            </ion-segment-button>
            <ion-segment-button value="hub">
              <ion-label>Hub</ion-label>
            </ion-segment-button>
            <ion-segment-button value="hub-config">
              <ion-label>Config</ion-label>
            </ion-segment-button>
            <ion-segment-button value="compliance">
              <ion-label>Cumplimiento</ion-label>
            </ion-segment-button>
            <ion-segment-button value="devices">
              <ion-label>Dispositivos</ion-label>
            </ion-segment-button>
            <ion-segment-button value="printers">
              <ion-label>Impresoras</ion-label>
            </ion-segment-button>
            <ion-segment-button value="backup">
              <ion-label>Backup</ion-label>
            </ion-segment-button>
            <ion-segment-button value="files">
              <ion-label>Archivos</ion-label>
            </ion-segment-button>
            <ion-segment-button value="tax">
              <ion-label>Tax</ion-label>
            </ion-segment-button>
            <ion-segment-button value="help">
              <ion-label>Ayuda</ion-label>
            </ion-segment-button>
            <ion-segment-button value="tasks">
              <ion-label>Tareas</ion-label>
            </ion-segment-button>
          </ion-segment>

          <div class="ui-settings-grid" id="settings-grid">
            ${gridItems}
          </div>
        `,
        setup(doc) {
          // Accesibilidad: Enter/Space en las tarjetas-enlace activa la navegación.
          doc.querySelectorAll('a.ui-config-link').forEach((link) => {
            link.addEventListener('keydown', (e) => {
              if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                link.click();
              }
            });
          });

          // Sub-nav: navega a la página correspondiente al cambiar de pestaña.
          const PAGE_MAP = {
            preferences: 'settings-preferences.html',
            hub:         'settings-hub.html',
            compliance:  'settings-compliance.html',
            devices:     'settings-devices.html',
            printers:    'settings-printers.html',
            backup:      'settings-backup.html',
            files:       'settings-files.html',
            tax:         'settings-tax-classes.html',
            help:        'settings-help.html',
            tasks:       'settings-scheduled-tasks.html',
          };
          const subnav = doc.getElementById('settings-subnav');
          if (subnav) {
            subnav.addEventListener('ionChange', (e) => {
              const val = e.detail && e.detail.value;
              if (val && PAGE_MAP[val]) {
                window.location.href = PAGE_MAP[val];
              }
            });
          }
        },
      });
    </script>
  </body>
</html>
