<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Facturación · Acme Industries</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* Geometría puntual de esta vista (estructura, sin colores de marca). */

      /* Campos de formulario */
      .ui-form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 560px) {
        .ui-form-row { grid-template-columns: 1fr; }
      }

      /* Método de pago */
      .ui-payment-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
      }
      .ui-payment-info {
        display: flex;
        gap: 14px;
        align-items: center;
      }
      .ui-card-brand {
        width: 54px;
        height: 36px;
        border-radius: 6px;
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.05em;
        background: var(--ion-color-primary);
        color: var(--ion-color-primary-contrast);
        flex: 0 0 auto;
      }
      .ui-card-number {
        font-weight: 500;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.06em;
      }
      .ui-card-meta {
        font-size: 12px;
        color: var(--ion-color-medium);
        margin-top: 3px;
      }
      .ui-payment-actions {
        display: flex;
        gap: 8px;
      }

      /* Sección de título con acción */
      .ui-section-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }
      .ui-section-title {
        font-size: 1.05rem;
        font-weight: 700;
        margin: 0 0 2px;
      }
      .ui-section-sub {
        color: var(--ion-color-medium);
        font-size: .85rem;
        margin: 0;
      }

      /* Radio cards para régimen especial */
      .ui-radio-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      @media (max-width: 640px) {
        .ui-radio-grid { grid-template-columns: 1fr; }
      }
      .ui-radio-card {
        margin: 0;
        cursor: pointer;
      }
      .ui-radio-card__title { font-weight: 600; font-size: .9rem; }
      .ui-radio-card__desc { color: var(--ion-color-medium); font-size: .8rem; margin-top: 3px; }

      /* Toggle row */
      .ui-toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 0;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
      }
      .ui-toggle-row:first-of-type { border-top: 0; }
      .ui-toggle-label { font-weight: 600; font-size: .9rem; }
      .ui-toggle-desc { color: var(--ion-color-medium); font-size: .8rem; margin-top: 2px; }

      /* Label con asterisco requerido */
      .ui-label { font-weight: 600; font-size: .88rem; display: block; margin-bottom: 6px; }
      .ui-label--req::after { content: " *"; color: var(--ion-color-danger); }

      /* Hint bajo un campo */
      .ui-hint { font-size: .78rem; color: var(--ion-color-medium); margin-top: 4px; display: block; }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Facturación · Acme Industries"
            description="Datos fiscales y método de cobro · CIF B-87654321">
            <ion-button slot="actions" fill="outline">
              <ion-icon slot="start" name="close-outline"></ion-icon>
              Cancelar
            </ion-button>
            <ion-button slot="actions">
              <ion-icon slot="start" name="save-outline"></ion-icon>
              Guardar cambios
            </ion-button>
          </ok-page-header>

          <ok-inline-feedback
            class="pg-mb-4"
            tone="info"
            heading="Próxima factura: €890 con vencimiento el 15 may 2026">
            Cualquier cambio en estos datos se aplicará a las facturas generadas desde mañana.
          </ok-inline-feedback>

          <!-- Sección 1: Datos fiscales + Contacto de facturación (2 columnas) -->
          <div class="pg-grid pg-grid-2 pg-mb-4">

            <!-- Datos fiscales -->
            <ion-card>
              <ion-card-header>
                <ion-card-title>Datos fiscales</ion-card-title>
                <ion-card-subtitle>Aparecen en cada factura emitida</ion-card-subtitle>
              </ion-card-header>
              <ion-card-content>
                <div class="pg-stack">
                  <ion-input
                    fill="outline"
                    label="Razón social *"
                    label-placement="stacked"
                    value="Acme Industries SL">
                  </ion-input>

                  <div class="ui-form-row">
                    <ion-input
                      fill="outline"
                      label="CIF / NIF *"
                      label-placement="stacked"
                      value="B-87654321">
                    </ion-input>
                    <ion-input
                      fill="outline"
                      label="IBAN para SEPA"
                      label-placement="stacked"
                      value="ES76 0049 1500 0512 3456 7890">
                    </ion-input>
                  </div>

                  <ion-input
                    fill="outline"
                    label="Dirección fiscal *"
                    label-placement="stacked"
                    value="C/ Industria 24, nave 7">
                  </ion-input>

                  <div class="ui-form-row">
                    <ion-input
                      fill="outline"
                      label="Código postal"
                      label-placement="stacked"
                      value="08940">
                    </ion-input>
                    <ion-input
                      fill="outline"
                      label="Ciudad"
                      label-placement="stacked"
                      value="Cornellà de Llobregat">
                    </ion-input>
                  </div>

                  <div class="ui-form-row">
                    <ion-input
                      fill="outline"
                      label="Provincia"
                      label-placement="stacked"
                      value="Barcelona">
                    </ion-input>
                    <ion-select
                      fill="outline"
                      label="País *"
                      label-placement="stacked"
                      value="es"
                      interface="popover">
                      <ion-select-option value="es">España</ion-select-option>
                      <ion-select-option value="pt">Portugal</ion-select-option>
                      <ion-select-option value="fr">Francia</ion-select-option>
                      <ion-select-option value="ad">Andorra</ion-select-option>
                      <ion-select-option value="it">Italia</ion-select-option>
                      <ion-select-option value="de">Alemania</ion-select-option>
                    </ion-select>
                  </div>
                </div>
              </ion-card-content>
            </ion-card>

            <!-- Contacto de facturación -->
            <ion-card>
              <ion-card-header>
                <ion-card-title>Contacto de facturación</ion-card-title>
                <ion-card-subtitle>Persona que recibirá facturas y avisos de cobro</ion-card-subtitle>
              </ion-card-header>
              <ion-card-content>
                <div class="pg-stack">
                  <ion-input
                    fill="outline"
                    label="Nombre completo *"
                    label-placement="stacked"
                    value="Anna Calvet i Roca">
                  </ion-input>

                  <div>
                    <ion-input
                      fill="outline"
                      label="Email *"
                      label-placement="stacked"
                      type="email"
                      value="facturacion@acme.com">
                    </ion-input>
                    <small class="ui-hint">Recibirá las facturas en PDF y avisos de cobro fallidos.</small>
                  </div>

                  <ion-input
                    fill="outline"
                    label="Teléfono"
                    label-placement="stacked"
                    type="tel"
                    value="+34 933 21 04 87">
                  </ion-input>

                  <ion-select
                    fill="outline"
                    label="Idioma de la factura"
                    label-placement="stacked"
                    value="es"
                    interface="popover">
                    <ion-select-option value="es">Español (España)</ion-select-option>
                    <ion-select-option value="ca">Català</ion-select-option>
                    <ion-select-option value="en">English</ion-select-option>
                    <ion-select-option value="pt">Português</ion-select-option>
                    <ion-select-option value="fr">Français</ion-select-option>
                  </ion-select>

                  <div class="ui-toggle-row">
                    <div>
                      <div class="ui-toggle-label">Enviar copia a contabilidad</div>
                      <div class="ui-toggle-desc">contabilidad@acme.com recibirá copia automáticamente</div>
                    </div>
                    <ion-toggle id="toggle-contabilidad" checked></ion-toggle>
                  </div>
                </div>
              </ion-card-content>
            </ion-card>
          </div>

          <!-- Sección 2: Método de pago por defecto -->
          <div class="ui-section-head">
            <div>
              <p class="ui-section-title">Método de pago por defecto</p>
              <p class="ui-section-sub">Se usará para los cobros recurrentes</p>
            </div>
            <ion-button fill="outline" size="small">
              <ion-icon slot="start" name="add-outline"></ion-icon>
              Añadir método
            </ion-button>
          </div>

          <ion-card class="pg-mb-4">
            <ion-card-content>
              <div class="ui-payment-card">
                <div class="ui-payment-info">
                  <div class="ui-card-brand">VISA</div>
                  <div>
                    <div class="ui-card-number">•••• •••• •••• 4242</div>
                    <div class="ui-card-meta">
                      Vence 09/27 · Anna Calvet ·
                      <ok-status-pill tone="success" label="Predeterminada" size="sm"></ok-status-pill>
                    </div>
                  </div>
                </div>
                <div class="ui-payment-actions">
                  <ion-button fill="clear" size="small">
                    <ion-icon slot="start" name="time-outline"></ion-icon>
                    Ver historial
                  </ion-button>
                  <ion-button fill="outline" size="small">
                    <ion-icon slot="start" name="swap-horizontal-outline"></ion-icon>
                    Cambiar
                  </ion-button>
                </div>
              </div>
            </ion-card-content>
          </ion-card>

          <!-- Sección 3: Información fiscal extra -->
          <div class="ui-section-head">
            <div>
              <p class="ui-section-title">Información fiscal extra</p>
              <p class="ui-section-sub">Configura regímenes especiales si aplican</p>
            </div>
          </div>

          <ion-card>
            <ion-card-content>
              <div class="pg-stack">

                <ion-select
                  fill="outline"
                  label="Régimen de IVA"
                  label-placement="stacked"
                  value="general"
                  interface="popover">
                  <ion-select-option value="general">General — 21%</ion-select-option>
                  <ion-select-option value="reducido">Reducido — 10%</ion-select-option>
                  <ion-select-option value="superreducido">Superreducido — 4%</ion-select-option>
                  <ion-select-option value="exento">Exento</ion-select-option>
                  <ion-select-option value="rec_eq">Recargo de equivalencia</ion-select-option>
                </ion-select>

                <!-- Régimen especial: radio-cards en grid -->
                <div>
                  <label class="ui-label">Régimen especial</label>
                  <ion-radio-group id="regimen-group" value="general" class="ui-radio-grid">

                    <ion-card class="ui-radio-card">
                      <ion-card-content>
                        <ion-radio value="general" label-placement="end" justify="start">
                          <div>
                            <div class="ui-radio-card__title">Régimen general</div>
                            <div class="ui-radio-card__desc">El más común para PYMEs.</div>
                          </div>
                        </ion-radio>
                      </ion-card-content>
                    </ion-card>

                    <ion-card class="ui-radio-card">
                      <ion-card-content>
                        <ion-radio value="rec" label-placement="end" justify="start">
                          <div>
                            <div class="ui-radio-card__title">Recargo de equivalencia</div>
                            <div class="ui-radio-card__desc">Solo comercio minorista persona física.</div>
                          </div>
                        </ion-radio>
                      </ion-card-content>
                    </ion-card>

                    <ion-card class="ui-radio-card">
                      <ion-card-content>
                        <ion-radio value="rev" label-placement="end" justify="start">
                          <div>
                            <div class="ui-radio-card__title">Inversión sujeto pasivo</div>
                            <div class="ui-radio-card__desc">Operaciones intracomunitarias.</div>
                          </div>
                        </ion-radio>
                      </ion-card-content>
                    </ion-card>

                    <ion-card class="ui-radio-card">
                      <ion-card-content>
                        <ion-radio value="rec_ag" label-placement="end" justify="start">
                          <div>
                            <div class="ui-radio-card__title">Régimen agrario</div>
                            <div class="ui-radio-card__desc">Productores de origen agrícola.</div>
                          </div>
                        </ion-radio>
                      </ion-card-content>
                    </ion-card>

                  </ion-radio-group>
                </div>

                <div>
                  <ion-input
                    fill="outline"
                    label="Número EORI (opcional)"
                    label-placement="stacked"
                    value="ESB87654321"
                    placeholder="ej. ESB12345678">
                  </ion-input>
                  <small class="ui-hint">Necesario para importaciones/exportaciones fuera de la UE.</small>
                </div>

              </div>
            </ion-card-content>
          </ion-card>
        `,
        setup(doc) {
          // Toggle "Enviar copia a contabilidad" — estado inicial checkeado.
          const toggleContab = doc.getElementById('toggle-contabilidad');
          if (toggleContab) {
            toggleContab.addEventListener('ionChange', (e) => {
              // Reactivo: se puede usar para derivar el estado si se añade lógica.
              const checked = e.detail && e.detail.checked;
              // Aquí se podría habilitar/deshabilitar un campo de email de copia.
              void checked;
            });
          }

          // Régimen especial — radio-group.
          const regimenGroup = doc.getElementById('regimen-group');
          if (regimenGroup) {
            regimenGroup.addEventListener('ionChange', (e) => {
              // Se puede usar para mostrar/ocultar campos condicionales según el régimen.
              const val = e.detail && e.detail.value;
              void val;
            });
          }

          // Botón "Guardar cambios" en la cabecera (slot="actions") — feedback visual.
          const pageHeader = doc.querySelector('ok-page-header');
          if (pageHeader) {
            const saveBtn = pageHeader.querySelector('[slot="actions"]:last-child');
            if (saveBtn) {
              saveBtn.addEventListener('click', () => {
                const toast = document.createElement('ion-toast');
                toast.message = 'Datos de facturación guardados correctamente.';
                toast.duration = 2500;
                toast.position = 'bottom';
                toast.color = 'success';
                toast.icon = 'checkmark-circle-outline';
                document.body.appendChild(toast);
                toast.present();
                toast.addEventListener('didDismiss', () => toast.remove());
              });
            }
          }

          // Botón "Añadir método" — muestra un alert informativo.
          const addBtn = doc.querySelector('.ui-section-head ion-button');
          if (addBtn) {
            addBtn.addEventListener('click', async () => {
              const alert = document.createElement('ion-alert');
              alert.header = 'Añadir método de pago';
              alert.message = 'Serás redirigido al portal seguro de Stripe para añadir un nuevo método de pago.';
              alert.buttons = [
                { text: 'Cancelar', role: 'cancel' },
                { text: 'Continuar', role: 'confirm' },
              ];
              document.body.appendChild(alert);
              await alert.present();
              alert.addEventListener('didDismiss', () => alert.remove());
            });
          }
        },
      });
    </script>
  </body>
</html>
