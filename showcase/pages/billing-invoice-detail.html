<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Factura INV-2025-00001 · ERPlora Cloud</title>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <style>
      .invoice-page { max-width:62rem; margin:0 auto; }
      .invoice-card { margin:0 0 1rem; }
      .invoice-head { display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; padding-bottom:1.5rem; border-bottom:1px solid var(--ion-border-color); }
      .invoice-eyebrow { color:var(--ion-color-medium); font-size:.75rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; }
      .invoice-head h1 { margin:.2rem 0 0; font-size:1.5rem; }
      .invoice-meta { display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem; padding:1.5rem 0; border-bottom:1px solid var(--ion-border-color); }
      .invoice-meta p, .invoice-bill p { margin:.15rem 0; }
      .invoice-label { color:var(--ion-color-medium); font-size:.8rem; }
      .invoice-bill, .invoice-items { padding:1.5rem 0 0; }
      .invoice-items h2 { margin:0 0 .5rem; font-size:1rem; }
      .invoice-line { display:flex; justify-content:space-between; gap:1rem; padding:.75rem 0; border-bottom:1px solid var(--ion-border-color); }
      .invoice-line small { display:block; color:var(--ion-color-medium); margin-top:.2rem; }
      .invoice-totals { width:min(100%,24rem); margin:1.5rem 0 0 auto; }
      .invoice-total-row { display:flex; justify-content:space-between; gap:1rem; padding:.65rem 0; }
      .invoice-total-row.grand { border-top:2px solid var(--ion-border-color); font-size:1.15rem; }
      .invoice-payment-id { margin-top:1.5rem; padding-top:1rem; border-top:1px solid var(--ion-border-color); color:var(--ion-color-medium); font-size:.8rem; }
      .invoice-actions { margin-bottom:1rem; }
      .invoice-help { display:flex; align-items:flex-start; gap:.75rem; }
      @media (max-width:620px) { .invoice-meta { grid-template-columns:1fr; gap:.75rem; } }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      const invoice = {
        number:'INV-2025-00001', status:'Pagada', invoiceDate:'18 jul 2026', dueDate:'18 jul 2026',
        paymentDate:'18 jul 2026, 10:32', email:'test@example.com', customer:'Test User', country:'ES',
        taxId:'ESB12345678', subtotal:'99,00 €', tax:'20,79 €', total:'119,79 €', stripeId:'in_test_123',
        items:[{ description:'Premium Mod · Plan Pro', quantity:'1', unitPrice:'99,00 €', total:'99,00 €' }],
      };
      const items = invoice.items.map((item) => `
        <div class="invoice-line">
          <div><strong>${item.description}</strong><small>Cantidad: ${item.quantity} × ${item.unitPrice}</small></div>
          <strong>${item.total}</strong>
        </div>`).join('');

      defineSaasDashboardPage({
        active: '/dashboard/billing/',
        title: 'Factura INV-2025-00001',
        body: `
          <div class="invoice-page">
            <ion-card class="invoice-card">
              <ion-card-content>
                <div class="invoice-head">
                  <div><div class="invoice-eyebrow">Factura</div><h1>${invoice.number}</h1></div>
                  <ion-badge color="success">Pagada</ion-badge>
                </div>
                <div class="invoice-meta">
                  <div><p class="invoice-label">Fecha de factura</p><p><strong>${invoice.invoiceDate}</strong></p></div>
                  <div><p class="invoice-label">Fecha de vencimiento</p><p><strong>${invoice.dueDate}</strong></p></div>
                  <div><p class="invoice-label">Fecha de pago</p><p><strong>${invoice.paymentDate}</strong></p></div>
                </div>
                <div class="invoice-bill">
                  <p class="invoice-label">Facturar a</p>
                  <p><strong>${invoice.email}</strong></p><p>${invoice.customer}</p>
                  <p><iconify-icon icon="lucide:map-pin" width="15" height="15"></iconify-icon> ${invoice.country}</p>
                  <p><iconify-icon icon="lucide:credit-card" width="15" height="15"></iconify-icon> VAT ID: ${invoice.taxId}</p>
                </div>
                <div class="invoice-items"><h2>Conceptos</h2>${items}</div>
                <div class="invoice-totals">
                  <div class="invoice-total-row"><span class="invoice-label">Subtotal</span><strong>${invoice.subtotal}</strong></div>
                  <div class="invoice-total-row"><span class="invoice-label">IVA 21% (ES)</span><strong>${invoice.tax}</strong></div>
                  <div class="invoice-total-row grand"><strong>Total</strong><strong style="color:var(--ion-color-primary)">${invoice.total}</strong></div>
                </div>
                <div class="invoice-payment-id">Stripe Invoice: ${invoice.stripeId}</div>
              </ion-card-content>
            </ion-card>
            <div class="invoice-actions">
              <ion-button id="invoice-pdf" expand="block" size="small"><iconify-icon slot="start" icon="lucide:download" width="17" height="17"></iconify-icon>Descargar PDF</ion-button>
            </div>
            <ion-card>
              <ion-card-content class="invoice-help">
                <iconify-icon icon="lucide:circle-help" width="24" height="24"></iconify-icon>
                <div><strong>¿Necesitas ayuda?</strong><p>Si tienes preguntas sobre esta factura, contacta con info@erplora.com.</p></div>
              </ion-card-content>
            </ion-card>
          </div>`,
        footer: `
          <footer id="section-tabbar">
            <ion-segment value="invoices" aria-label="Navegación de facturación">
              <ion-segment-button value="invoices"><iconify-icon icon="lucide:file-text" width="20" height="20"></iconify-icon><ion-label>Facturas</ion-label></ion-segment-button>
              <ion-segment-button value="subscriptions"><iconify-icon icon="lucide:repeat" width="20" height="20"></iconify-icon><ion-label>Suscripciones</ion-label></ion-segment-button>
              <ion-segment-button value="purchases"><iconify-icon icon="lucide:shopping-bag" width="20" height="20"></iconify-icon><ion-label>Compras</ion-label></ion-segment-button>
            </ion-segment>
          </footer>`,
        setup(doc) {
          doc.getElementById('invoice-pdf')?.addEventListener('click', () => {
            const toast = doc.createElement('ion-toast');
            toast.message = 'Preparando INV-2025-00001.pdf…';
            toast.duration = 1600;
            doc.body.appendChild(toast);
            toast.present();
            toast.addEventListener('didDismiss', () => toast.remove());
          });
        },
      });
    </script>
  </body>
</html>
