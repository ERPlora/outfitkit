<!doctype html>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }

    <style>
      /* Geometría puntual de esta vista (estructura, sin colores de marca). */

      /* Layout principal: documento de factura + columna lateral */
      .inv-layout {
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 20px;
        align-items: flex-start;
      }
      @media (max-width: 1100px) {
        .inv-layout { grid-template-columns: 1fr; }
      }

      /* Columna derecha: pila de tarjetas */
      .inv-sidebar {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* Sección de tarjeta de metadata con título monocroma */
      .meta-section-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
        color: var(--ion-color-medium);
        margin: 0 0 10px;
      }

      /* Fila de metadato: clave / valor */
      .meta-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
        border-bottom: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
        font-size: 13px;
      }
      .meta-row:last-of-type { border-bottom: none; }
      .meta-row__key { color: var(--ion-color-medium); }
      .meta-row__val { font-variant-numeric: tabular-nums; }
      .meta-row__val--mono { font-family: var(--ion-font-family, monospace); font-size: 11.5px; }
      .meta-row__val--strong { font-weight: 700; font-size: 14px; }

      /* Documentos: botones a ancho completo */
      .doc-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        margin-bottom: 6px;
      }
      .doc-btn:last-child { margin-bottom: 0; }
      .doc-btn ion-button {
        width: 100%;
        --border-radius: 8px;
      }
      .doc-btn-size {
        margin-left: auto;
        font-size: 11px;
        color: var(--ion-color-medium);
        white-space: nowrap;
      }

      /* Cliente: fila de avatar + datos */
      .client-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      .client-name {
        font-weight: 600;
        font-size: 13.5px;
      }
      .client-cif {
        font-size: 11.5px;
        color: var(--ion-color-medium);
        font-family: var(--ion-font-family, monospace);
      }

      /* Acciones de riesgo */
      .action-btn-row {
        margin-bottom: 4px;
      }
      .action-btn-row:last-child { margin-bottom: 0; }
    </style>
  </head>
