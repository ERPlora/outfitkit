<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Hub · Login</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <link rel="stylesheet" href="../../dist/erplora.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>

    <style>
      /* Pantalla de auth del Hub: fondo centrado con gradiente sutil (sin sidebar Cloud). */
      .hub-auth-root {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px 16px;
        background:
          radial-gradient(ellipse 80% 60% at 70% 10%, color-mix(in srgb, var(--ion-color-primary) 12%, transparent) 0%, transparent 60%),
          radial-gradient(ellipse 70% 50% at 20% 90%, color-mix(in srgb, var(--ion-color-tertiary, var(--ion-color-primary)) 8%, transparent) 0%, transparent 60%),
          var(--ion-background-color);
      }
      .hub-auth-card {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* Cabecera de marca del hub (logo cuadrado + nombre + subtítulo). */
      .hub-brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }
      .hub-brand__logo {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: var(--ion-color-primary);
        color: var(--ion-color-primary-contrast);
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: -0.04em;
        box-shadow: 0 4px 16px rgba(var(--ion-color-primary-rgb, 56, 128, 255), .28);
      }
      .hub-brand__name {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .hub-brand__sub {
        font-size: 11px;
        color: var(--ion-color-medium);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      /* Tabs de modo (PIN / Email) — bloque a lo ancho. */
      .hub-mode-segment {
        width: 100%;
        margin-bottom: 20px;
      }

      /* Panel de empleados — rejilla de ion-card (solo geometría; el resto lo da Ionic). */
      .hub-employees {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
      }
      .hub-employees ion-card { margin: 0; }
      .hub-employee__name { margin: 8px 0 4px; font-size: 13px; font-weight: 600; }

      /* Separador de acción secundaria bajo la rejilla. */
      .hub-employees-foot {
        text-align: center;
        margin-top: 12px;
      }

      /* Marco del pinpad (centrado, columna). */
      .hub-pinpad-frame {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .hub-pinpad-name {
        font-size: 18px;
        font-weight: 600;
        margin: 0;
        text-align: center;
      }
      .hub-pinpad-hint {
        font-size: 14px;
        color: var(--ion-color-medium);
        margin: 0;
      }

      /* Mensajes de error/confirmación bajo los dots. */
      .hub-pin-msg {
        font-size: 13px;
        text-align: center;
        margin: 0;
        min-height: 20px;
      }
      .hub-pin-msg--error { color: var(--ion-color-danger); }
      .hub-pin-msg--confirm { color: var(--ion-color-primary); font-weight: 500; }

      /* Formulario Cloud — campos con gap. */
      .hub-cloud-fields {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .hub-trust-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-block: 4px;
      }

      /* Pie de la pantalla (versión). */
      .hub-foot {
        text-align: center;
        font-size: 11px;
        color: var(--ion-color-medium);
      }

      /* Modal de info sobre "Confiar en dispositivo". */
      .trust-info-content { font-size: 14px; line-height: 1.6; }
      .trust-info-content p { margin: 0 0 12px; color: var(--ion-text-color); }
      .trust-info-content p:last-child { margin: 0; font-size: 12px; color: var(--ion-color-medium); }

      /* Modo «bare»: ion-content no debe añadir padding adicional al fondo centrado. */
      ion-app { background: var(--ion-background-color); }
    </style>
  </head>
  <body>
    <script type="module">
      /* ── Datos de empleados ────────────────────────────────────────────────── */
      const EMPLOYEES = [
        { id: 1, name: 'Joan Castell',  initials: 'JC', role: 'Encargado' },
        { id: 2, name: 'Marta Soler',   initials: 'MS', role: 'Camarera'  },
        { id: 3, name: 'Carles Vila',   initials: 'CV', role: 'Cocina'    },
        { id: 4, name: 'Aina Roig',     initials: 'AR', role: 'Camarera'  },
      ];

      /* ── HTML de la pantalla (sin sidebar Cloud) ──────────────────────────── */
      const body = `
        <div class="hub-auth-root">
          <div class="hub-auth-card">

            <!-- Marca del hub -->
            <div class="hub-brand">
              <div class="hub-brand__logo">LR</div>
              <div class="hub-brand__name">Cafetería La Rambla</div>
              <div class="hub-brand__sub">Business Management System</div>
            </div>

            <!-- Tarjeta principal de login -->
            <ion-card>
              <ion-card-content>

                <!-- Tabs PIN / Email -->
                <ion-segment id="login-mode" value="cloud" class="hub-mode-segment">
                  <ion-segment-button value="local">
                    <ion-icon name="keypad-outline" slot="start"></ion-icon>
                    <ion-label>PIN</ion-label>
                  </ion-segment-button>
                  <ion-segment-button value="cloud">
                    <ion-icon name="mail-outline" slot="start"></ion-icon>
                    <ion-label>Email</ion-label>
                  </ion-segment-button>
                </ion-segment>

                <!-- Panel: selección de empleado (modo PIN, sin seleccionar) -->
                <div id="panel-employees">
                  <p style="text-align:center;font-size:14px;color:var(--ion-color-medium);margin:0 0 16px;">
                    Selecciona tu perfil
                  </p>
                  <div class="hub-employees" id="employee-grid">
                    <!-- generado por setup -->
                  </div>
                  <!-- Solo visible cuando el dispositivo está marcado como de confianza -->
                  <div class="hub-employees-foot" id="employees-foot" hidden>
                    <ion-button id="btn-use-cloud" fill="clear" size="small">
                      Usar otra cuenta
                    </ion-button>
                  </div>
                </div>

                <!-- Panel: entrada de PIN (modo PIN, empleado seleccionado) -->
                <div id="panel-pin" hidden>
                  <div class="hub-pinpad-frame">
                    <ok-avatar id="pin-avatar" size="lg" name="Joan Castell"></ok-avatar>
                    <h2 class="hub-pinpad-name" id="pin-name">Joan Castell</h2>
                    <p class="hub-pinpad-hint">Introduce tu PIN</p>

                    <!-- ok-pinpad: pantalla (4 círculos), teclado y tecla «cambiar usuario»
                         (flecha a la izquierda del 0, borrado a la derecha). Todo el PIN
                         lo gestiona el componente — sin dots a mano. -->
                    <ok-pinpad
                      id="main-pinpad"
                      dots
                      length="4"
                      secondary-icon="arrow-back-outline"
                      secondary-label="Cambiar usuario">
                    </ok-pinpad>
                    <p class="hub-pin-msg hub-pin-msg--error" id="pin-error" hidden>PIN incorrecto</p>
                  </div>
                </div>

                <!-- Panel: formulario Email / Cloud (modo cloud) -->
                <div id="panel-cloud">
                  <div class="hub-cloud-fields">
                    <ion-input
                      id="cloud-email"
                      type="email"
                      label="Email"
                      label-placement="stacked"
                      fill="outline"
                      placeholder="tu@email.com"
                      value="joan@larambla.es"
                      autocomplete="email"
                      required>
                    </ion-input>

                    <ion-input
                      id="cloud-password"
                      type="password"
                      label="Contraseña"
                      label-placement="stacked"
                      fill="outline"
                      placeholder="••••••••"
                      autocomplete="current-password"
                      required>
                        <ion-input-password-toggle slot="end"></ion-input-password-toggle>
                    </ion-input>

                    <div class="hub-trust-row">
                      <ion-checkbox id="trust-device" label-placement="end">
                        Confiar en este dispositivo
                      </ion-checkbox>
                      <ion-button id="btn-trust-info" fill="clear" size="small" aria-label="Más información">
                        <ion-icon slot="icon-only" name="information-circle-outline"></ion-icon>
                      </ion-button>
                    </div>

                    <ion-button id="btn-cloud-login" expand="block" size="large">
                      Iniciar sesión
                    </ion-button>
                  </div>
                </div>

              </ion-card-content>
            </ion-card>

            <!-- Pie de versión -->
            <p class="hub-foot">ERPlora Hub · v1.0</p>
          </div>
        </div>

        <!-- Modal: configurar PIN tras primer login -->
        <ion-modal id="modal-pin-setup">
          <div style="padding:24px 20px 40px;display:flex;flex-direction:column;align-items:center;gap:16px;">
            <ion-icon name="keypad-outline" style="font-size:40px;color:var(--ion-color-primary)"></ion-icon>
            <div style="text-align:center;">
              <h3 style="margin:0 0 4px;font-size:18px;font-weight:600;">Configura tu PIN</h3>
              <p style="margin:0;font-size:14px;color:var(--ion-color-medium);">Bienvenido, Joan Castell · Crea un PIN de 4 dígitos</p>
            </div>

            <ok-pinpad id="setup-pinpad" dots length="4"></ok-pinpad>
            <p class="hub-pin-msg hub-pin-msg--confirm" id="setup-confirm-msg" hidden>Confirma tu PIN</p>
            <p class="hub-pin-msg hub-pin-msg--error" id="setup-error-msg" hidden>Los PINs no coinciden</p>
          </div>
        </ion-modal>

        <!-- Modal: información sobre confianza de dispositivo -->
        <ion-popover id="modal-trust-info" trigger="btn-trust-info" trigger-action="click" side="top" alignment="center">
          <ion-content class="ion-padding">
            <h3>Confiar en este dispositivo</h3>
            <div class="trust-info-content">
              <p>Cuando marcas un dispositivo como de confianza, puedes iniciar sesión rápidamente con tu PIN — sin escribir email y contraseña cada vez.</p>
              <p>Si no es de confianza, siempre necesitarás email y contraseña para acceder a este Hub.</p>
              <p>Confía solo dispositivos que te pertenecen y controlas. No confíes ordenadores compartidos o públicos. La confianza expira tras 90 días sin actividad.</p>
            </div>
            <div style="margin-top:20px;">
              <ion-button id="btn-trust-entendido" expand="block">Entendido</ion-button>
            </div>
          </ion-content>
        </ion-popover>
      `;

      document.body.innerHTML = `<ion-app><ion-content>${body}</ion-content></ion-app>`;

      const setup = (doc) => {
          /* ── Estado interno ─────────────────────────────────────────────── */
          const state = {
            mode: 'cloud',          // 'local' | 'cloud'
            selectedEmployee: null, // objeto Employee o null
            pinValue: '',
            pinError: false,
            cloudLoading: false,
            deviceTrusted: false,   // true tras PIN setup o si dispositivo es de confianza
            // setup PIN (modal)
            setupPhase: 1,          // 1 = introducir, 2 = confirmar
            setupPin1: '',
            setupPinValue: '',
            setupPinError: false,
          };

          /* ── Referencias ──────────────────────────────────────────────── */
          const modeSegment    = doc.getElementById('login-mode');
          const panelEmployees = doc.getElementById('panel-employees');
          const panelPin       = doc.getElementById('panel-pin');
          const panelCloud     = doc.getElementById('panel-cloud');
          const employeeGrid   = doc.getElementById('employee-grid');
          const pinErrorEl     = doc.getElementById('pin-error');
          const pinAvatarEl    = doc.getElementById('pin-avatar');
          const pinNameEl      = doc.getElementById('pin-name');
          const mainPinpad     = doc.getElementById('main-pinpad');
          const btnUseCloud    = doc.getElementById('btn-use-cloud');
          const employeesFoot  = doc.getElementById('employees-foot');
          const btnCloudLogin  = doc.getElementById('btn-cloud-login');
          const btnTrustInfo   = doc.getElementById('btn-trust-info');
          const modalTrustInfo = doc.getElementById('modal-trust-info');
          const btnCloseTrust  = doc.getElementById('btn-close-trust-info');
          const btnTrustEntend = doc.getElementById('btn-trust-entendido');
          const modalPinSetup  = doc.getElementById('modal-pin-setup');
          const setupConfirmMsg= doc.getElementById('setup-confirm-msg');
          const setupErrorMsg  = doc.getElementById('setup-error-msg');
          const setupPinpad    = doc.getElementById('setup-pinpad');

          /* ── Breakpoints de ion-modal (propiedad array, no atributo string) ── */
          if (modalPinSetup) {
            modalPinSetup.breakpoints = [0, 0.85, 1];
            modalPinSetup.initialBreakpoint = 0.85;
          }
          // El popover de confianza se ancla al botón, igual que en LoginPage.vue.

          /* ── Helpers de panels ────────────────────────────────────────── */
          const showPanels = (mode, hasEmployee) => {
            panelEmployees.hidden = !(mode === 'local' && !hasEmployee);
            panelPin.hidden       = !(mode === 'local' &&  hasEmployee);
            panelCloud.hidden     = !(mode === 'cloud');
          };

          /* ── Rejilla de empleados (ion-card clicable) ─────────────────── */
          EMPLOYEES.forEach((emp) => {
            const card = doc.createElement('ion-card');
            card.setAttribute('button', '');
            card.innerHTML = `
              <ion-card-content class="ion-text-center">
                <ok-avatar name="${emp.name}" size="lg"></ok-avatar>
                <p class="hub-employee__name">${emp.name}</p>
                <ion-badge color="medium">${emp.role}</ion-badge>
              </ion-card-content>`;
            card.addEventListener('click', () => {
              state.selectedEmployee = emp;
              if (mainPinpad) { mainPinpad.value = ''; mainPinpad.error = false; }
              if (pinAvatarEl) pinAvatarEl.setAttribute('name', emp.name);
              if (pinNameEl)   pinNameEl.textContent = emp.name;
              if (pinErrorEl) pinErrorEl.hidden = true;
              showPanels(state.mode, true);
            });
            employeeGrid.appendChild(card);
          });

          /* ── Cambio de modo (segment) ─────────────────────────────────── */
          if (modeSegment) {
            modeSegment.addEventListener('ionChange', (e) => {
              state.mode = (e.detail && e.detail.value) || 'cloud';
              state.selectedEmployee = null;
              if (mainPinpad) { mainPinpad.value = ''; mainPinpad.error = false; }
              if (pinErrorEl) pinErrorEl.hidden = true;
              showPanels(state.mode, false);
            });
          }

          /* ── "Usar otra cuenta" (bajo rejilla de empleados) ──────────── */
          if (btnUseCloud) {
            btnUseCloud.addEventListener('click', () => {
              state.mode = 'cloud';
              if (modeSegment) modeSegment.value = 'cloud';
              state.selectedEmployee = null;
              showPanels('cloud', false);
            });
          }

          /* ── ok-pinpad principal (modo PIN) — el componente pinta los círculos ── */
          if (mainPinpad) {
            // Tecla secundaria (flecha atrás, a la izquierda del 0) → «cambiar usuario».
            mainPinpad.addEventListener('ok-secondary', () => {
              state.selectedEmployee = null;
              mainPinpad.value = '';
              mainPinpad.error = false;
              if (pinErrorEl) pinErrorEl.hidden = true;
              showPanels('local', false);
            });
            mainPinpad.addEventListener('ok-input', () => {
              mainPinpad.error = false;
              if (pinErrorEl) pinErrorEl.hidden = true;
            });
            mainPinpad.addEventListener('ok-complete', (e) => {
              // Simulación: PIN 1234 correcto; cualquier otro → error.
              const pin = (e.detail && e.detail.value) || '';
              if (pin === '1234') return; // en real: navegar al POS / abrir setup
              mainPinpad.error = true;
              if (pinErrorEl) pinErrorEl.hidden = false;
              setTimeout(() => {
                mainPinpad.value = '';
                mainPinpad.error = false;
                if (pinErrorEl) pinErrorEl.hidden = true;
              }, 900);
            });
          }

          /* ── Botón "Iniciar sesión" (Cloud) ──────────────────────────── */
          if (btnCloudLogin) {
            btnCloudLogin.addEventListener('click', () => {
              btnCloudLogin.disabled = true;
              btnCloudLogin.textContent = 'Entrando…';
              setTimeout(() => {
                btnCloudLogin.disabled = false;
                btnCloudLogin.textContent = 'Iniciar sesión';
                if (modalPinSetup) modalPinSetup.present();
              }, 1200);
            });
          }

          /* ── Modal: info sobre confiar en dispositivo ─────────────────── */
          if (btnTrustInfo)   btnTrustInfo.addEventListener('click', () => modalTrustInfo && modalTrustInfo.present());
          if (btnCloseTrust)  btnCloseTrust.addEventListener('click', () => modalTrustInfo && modalTrustInfo.dismiss());
          if (btnTrustEntend) btnTrustEntend.addEventListener('click', () => modalTrustInfo && modalTrustInfo.dismiss());

          /* ── Modal: configurar PIN (ok-pinpad del setup) ─────────────── */
          if (setupPinpad) {
            setupPinpad.addEventListener('ok-input', () => {
              setupPinpad.error = false;
              if (setupErrorMsg) setupErrorMsg.hidden = true;
            });
            setupPinpad.addEventListener('ok-complete', (e) => {
              const pin = (e.detail && e.detail.value) || '';
              if (state.setupPhase === 1) {
                // Fase 1: guardar primer PIN y pasar a confirmación.
                state.setupPin1 = pin;
                state.setupPhase = 2;
                setupPinpad.value = '';
                if (setupConfirmMsg) setupConfirmMsg.hidden = false;
              } else if (pin === state.setupPin1) {
                // Coinciden: cerrar y marcar dispositivo de confianza.
                if (modalPinSetup) modalPinSetup.dismiss();
                state.setupPhase = 1; state.setupPin1 = '';
                state.deviceTrusted = true;
                if (employeesFoot) employeesFoot.hidden = false;
                if (setupConfirmMsg) setupConfirmMsg.hidden = true;
              } else {
                // No coinciden: error y volver a fase 1.
                setupPinpad.error = true;
                if (setupErrorMsg) setupErrorMsg.hidden = false;
                setTimeout(() => {
                  state.setupPhase = 1; state.setupPin1 = '';
                  setupPinpad.value = '';
                  setupPinpad.error = false;
                  if (setupErrorMsg) setupErrorMsg.hidden = true;
                  if (setupConfirmMsg) setupConfirmMsg.hidden = true;
                }, 900);
              }
            });
          }

          /* ── Pantalla inicial → modo Cloud por defecto ─────────────────── */
          showPanels('cloud', false);
      };
      requestAnimationFrame(() => setup(document));
    </script>
  </body>
</html>
