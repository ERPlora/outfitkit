<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Usuarios del Hub - ERPlora Cloud</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <style>
      .stack { display:grid;gap:1rem; }
      .kpis { display:grid;grid-template-columns:repeat(2,minmax(0,14rem));gap:.75rem; }
      ok-data-table { min-height:18rem; }
      @media (max-width:520px) { .kpis { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <script type="module">
      import { html as h } from 'lit';
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      const USERS = [
        { id: 'u1', name: 'Demo Partner', email: 'demo@erplora.com', role: 'Propietario', tone: 'primary', added: '12 ene 2025' },
        { id: 'u2', name: 'Ana García', email: 'ana@erplora.com', role: 'Administrador', tone: 'warning', added: '18 feb 2025' },
        { id: 'u3', name: 'Carlos Ruiz', email: 'carlos@erplora.com', role: 'Activo', tone: 'success', added: '4 mar 2025' },
      ];
      const ACTIVITY = [
        { id: 'a1', email: 'demo@erplora.com', activity: 'Inicio de sesión', when: 'hace 2 minutos' },
        { id: 'a2', email: 'ana@erplora.com', activity: 'Cierre de sesión', when: 'hace 18 minutos' },
        { id: 'a3', email: 'carlos@erplora.com', activity: 'Inicio de sesión', when: 'hace 1 hora' },
      ];
      const badge = (row) => h`<ion-badge color=${row.tone}>${row.role}</ion-badge>`;
      const footer = `
        <footer id="section-tabbar"><ion-segment value="active" aria-label="Navegación de Hubs">
          <ion-segment-button value="active"><iconify-icon icon="lucide:check-circle" width="20" height="20"></iconify-icon><ion-label>Activo</ion-label></ion-segment-button>
          <ion-segment-button value="inactive"><iconify-icon icon="lucide:pause-circle" width="20" height="20"></iconify-icon><ion-label>Inactivo</ion-label></ion-segment-button>
          <ion-segment-button value="create"><iconify-icon icon="lucide:plus-circle" width="20" height="20"></iconify-icon><ion-label>Crear</ion-label></ion-segment-button>
          <ion-segment-button value="domain"><iconify-icon icon="lucide:globe" width="20" height="20"></iconify-icon><ion-label>Dominio</ion-label></ion-segment-button>
        </ion-segment></footer>`;

      defineSaasDashboardPage({
        active: '/dashboard/hubs/',
        title: 'Usuarios del Hub · Terminal principal',
        body: `
          <div class="stack">
            <div class="kpis">
              <ok-kpi label="Usuarios totales" value="3" icon="people-outline"></ok-kpi>
              <ok-kpi label="Usuarios activos" value="3" icon="person-circle-outline"></ok-kpi>
            </div>
            <ok-data-table id="hub-users-dt"></ok-data-table>
            <ok-data-table id="hub-activity-dt"></ok-data-table>
          </div>
        `,
        footer,
        setup(doc) {
          const users = doc.getElementById('hub-users-dt');
          users.title = 'Usuarios registrados';
          users.rowKey = 'id';
          users.rows = USERS;
          users.columns = [
            { key: 'name', header: 'Usuario', sortable: true, render: (row) => h`<span style="display:grid"><strong>${row.name}</strong><small>${row.email}</small></span>` },
            { key: 'role', header: 'Rol / Estado', render: badge },
            { key: 'added', header: 'Añadido', sortable: true },
          ];
          users.searchKeys = ['name', 'email', 'role'];
          users.searchPlaceholder = 'Buscar usuarios…';

          const activity = doc.getElementById('hub-activity-dt');
          activity.title = 'Actividad reciente';
          activity.rowKey = 'id';
          activity.rows = ACTIVITY;
          activity.columns = [
            { key: 'email', header: 'Usuario', sortable: true },
            { key: 'activity', header: 'Actividad' },
            { key: 'when', header: 'Cuándo' },
          ];
          activity.searchKeys = ['email', 'activity'];
          activity.searchPlaceholder = 'Buscar actividad…';
        },
      });
    </script>
  </body>
</html>
