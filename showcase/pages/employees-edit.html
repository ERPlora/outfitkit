<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERPlora Hub · Editar empleado</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <style>
      .employee-form { display: flex; flex-direction: column; gap: 14px; }
      .employee-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
      @media (max-width: 560px) { .employee-actions { flex-direction: column-reverse; } .employee-actions ion-button { margin: 0; } }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      defineHubPage({
        active: '/employees',
        title: 'Editar empleado',
        backHref: '/employees',
        body: `
          <ion-card class="ion-no-margin">
            <ion-card-content>
              <div class="employee-form">
                <ion-input id="employee-name" label="Nombre" label-placement="floating" fill="outline" value="María García"></ion-input>
                <ion-input id="employee-email" label="Email" label-placement="floating" fill="outline" type="email" value="maria@tienda.com"></ion-input>
                <ion-select id="employee-role" label="Rol" label-placement="floating" fill="outline" interface="popover" value="Encargado">
                  <ion-select-option value="Administrador">Administrador</ion-select-option>
                  <ion-select-option value="Encargado">Encargado</ion-select-option>
                  <ion-select-option value="Cajero">Cajero</ion-select-option>
                  <ion-select-option value="Almacén">Almacén</ion-select-option>
                </ion-select>
                <ion-toggle id="employee-active" checked label-placement="start" justify="space-between">Cuenta activa</ion-toggle>
              </div>
              <div class="employee-actions">
                <ion-button id="employee-cancel" fill="outline">Cancelar</ion-button>
                <ion-button id="employee-save">Guardar</ion-button>
              </div>
            </ion-card-content>
          </ion-card>
        `,
        setup(doc) {
          doc.getElementById('employee-cancel')?.addEventListener('click', () => window.history.back());
          doc.getElementById('employee-save')?.addEventListener('click', () => { window.location.hash = '#/p/employees-list'; });
        },
      });
    </script>
  </body>
</html>
