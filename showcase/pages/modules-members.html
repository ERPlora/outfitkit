<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Miembros del módulo · ERPlora Cloud</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_saas-developer.css" />
    <link rel="stylesheet" href="./_saas-developer-pages.css" />
  </head>
  <body>
    <script type="module">
      import { defineDeveloperPage } from './_saas-developer.js';

      defineDeveloperPage({
        activeTab: 'modules',
        title: 'Miembros de Inventario Avanzado',
        body: `
          <div class="developer-page developer-section-stack">
            <section class="developer-kpis" aria-label="Resumen de miembros">
              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:users" width="12" height="12"></iconify-icon>Total de miembros</div>
                <div class="developer-kpi-value">3</div>
                <div class="developer-kpi-sub">Incluye al creador</div>
              </div>
            </section>

            <ion-card>
              <ion-card-content>
                <h2 class="developer-card-title"><iconify-icon icon="lucide:shield-check" width="17" height="17" style="color:var(--ion-color-primary)"></iconify-icon> Creador</h2>
                <ion-list lines="none">
                  <ion-item>
                    <ion-avatar slot="start"><span style="display:grid;width:100%;height:100%;place-items:center;background:rgba(var(--ion-color-primary-rgb),.14);color:var(--ion-color-primary);font-weight:700">D</span></ion-avatar>
                    <ion-label><strong>Demo Partner</strong><p>demo@erplora.com</p></ion-label>
                    <ion-badge slot="end" color="success">Creador</ion-badge>
                  </ion-item>
                </ion-list>
              </ion-card-content>
            </ion-card>

            <ion-card>
              <ion-card-content>
                <h2 class="developer-card-title"><iconify-icon icon="lucide:users" width="17" height="17"></iconify-icon> Miembros del equipo</h2>
                <p class="developer-card-subtitle">Colaboradores que pueden trabajar en este módulo.</p>
                <ion-list id="members-list" lines="full">
                  <ion-item>
                    <ion-avatar slot="start"><span style="display:grid;width:100%;height:100%;place-items:center;background:rgba(var(--ion-text-color-rgb),.08);font-weight:700">A</span></ion-avatar>
                    <ion-label><strong>Ana Torres</strong><p>ana@ejemplo.com</p><small>Invitada por demo@erplora.com · hace 2 meses</small></ion-label>
                    <ion-select slot="end" aria-label="Rol de Ana" interface="popover" value="maintainer">
                      <ion-select-option value="maintainer">Mantenedor</ion-select-option>
                      <ion-select-option value="developer">Desarrollador</ion-select-option>
                      <ion-select-option value="viewer">Lector</ion-select-option>
                    </ion-select>
                    <ion-button slot="end" fill="clear" color="danger" aria-label="Eliminar a Ana"><iconify-icon slot="icon-only" icon="lucide:trash-2" width="14" height="14"></iconify-icon></ion-button>
                  </ion-item>
                  <ion-item>
                    <ion-avatar slot="start"><span style="display:grid;width:100%;height:100%;place-items:center;background:rgba(var(--ion-text-color-rgb),.08);font-weight:700">M</span></ion-avatar>
                    <ion-label><strong>Marcos León</strong><p>marcos@ejemplo.com</p><small>Invitado por Ana · hace 3 semanas</small></ion-label>
                    <ion-select slot="end" aria-label="Rol de Marcos" interface="popover" value="developer">
                      <ion-select-option value="maintainer">Mantenedor</ion-select-option>
                      <ion-select-option value="developer">Desarrollador</ion-select-option>
                      <ion-select-option value="viewer">Lector</ion-select-option>
                    </ion-select>
                    <ion-button slot="end" fill="clear" color="danger" aria-label="Eliminar a Marcos"><iconify-icon slot="icon-only" icon="lucide:trash-2" width="14" height="14"></iconify-icon></ion-button>
                  </ion-item>
                </ion-list>
              </ion-card-content>
            </ion-card>

            <ion-card>
              <ion-card-content>
                <h2 class="developer-card-title">Permisos por rol</h2>
                <ion-list lines="full">
                  <ion-item><iconify-icon slot="start" icon="lucide:shield" width="17" height="17" style="color:var(--ion-color-primary)"></iconify-icon><ion-label><strong>Propietario</strong><p>Control total: editar, publicar, gestionar miembros y eliminar.</p></ion-label></ion-item>
                  <ion-item><iconify-icon slot="start" icon="lucide:wrench" width="17" height="17"></iconify-icon><ion-label><strong>Mantenedor</strong><p>Puede editar, publicar y gestionar miembros.</p></ion-label></ion-item>
                  <ion-item><iconify-icon slot="start" icon="lucide:code" width="17" height="17" style="color:var(--ion-color-success)"></iconify-icon><ion-label><strong>Desarrollador</strong><p>Puede editar el código y subir nuevas versiones.</p></ion-label></ion-item>
                  <ion-item><iconify-icon slot="start" icon="lucide:eye" width="17" height="17"></iconify-icon><ion-label><strong>Lector</strong><p>Solo puede consultar estadísticas y detalles.</p></ion-label></ion-item>
                </ion-list>
              </ion-card-content>
            </ion-card>
          </div>`,
      });
    </script>
  </body>
</html>
