<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Invitar usuario - ERPlora Cloud</title>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/ok-inline-feedback.js"></script>
    <style>
      .form-card { max-width:42rem;margin-inline:auto; }
      .stack { display:grid;gap:1rem; }
      .hint { margin:-.5rem 0 0;color:var(--ion-color-medium);font-size:.8rem; }
      .actions { display:flex;justify-content:flex-end;gap:.5rem;flex-wrap:wrap; }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      defineSaasDashboardPage({
        active: '/dashboard/users/',
        title: 'Invitar usuario',
        body: `
          <ion-card class="form-card">
            <ion-card-content>
              <form id="invite-user-form" class="stack">
                <ion-input id="invite-email" label="Correo electrónico" label-placement="floating"
                           fill="outline" type="email" placeholder="usuario@ejemplo.com" required></ion-input>
                <ion-select id="invite-organization" label="Organización *" label-placement="floating"
                            fill="outline" interface="popover" value="demo">
                  <ion-select-option value="demo">ERPlora Demo</ion-select-option>
                  <ion-select-option value="central">Central Barcelona</ion-select-option>
                </ion-select>
                <ion-select id="invite-hub" label="Hub (opcional)" label-placement="floating"
                            fill="outline" interface="popover" value="">
                  <ion-select-option value="">Todos los hubs (nivel de organización)</ion-select-option>
                  <ion-select-option value="principal">Terminal principal</ion-select-option>
                  <ion-select-option value="tienda">Tienda Centro</ion-select-option>
                </ion-select>
                <p class="hint">Déjalo vacío para dar acceso a todos los hubs de la organización.</p>
                <ion-select id="invite-role" label="Rol" label-placement="floating"
                            fill="outline" interface="popover" value="member">
                  <ion-select-option value="member">Miembro · Acceso a hubs asignados</ion-select-option>
                  <ion-select-option value="admin">Administrador · Gestionar organización</ion-select-option>
                  <ion-select-option value="owner">Propietario · Control total</ion-select-option>
                </ion-select>
                <ok-inline-feedback tone="info">
                  Este usuario tendrá acceso a todos los hubs de la organización según su rol.
                </ok-inline-feedback>
                <div class="actions">
                  <ion-button type="button" fill="outline">
                    <iconify-icon slot="start" icon="lucide:arrow-left" width="14" height="14"></iconify-icon>
                    Cancelar
                  </ion-button>
                  <ion-button type="submit">
                    <iconify-icon slot="start" icon="lucide:send" width="14" height="14"></iconify-icon>
                    Enviar invitación
                  </ion-button>
                </div>
              </form>
            </ion-card-content>
          </ion-card>
        `,
        setup(doc) {
          doc.getElementById('invite-user-form')?.addEventListener('submit', (event) => event.preventDefault());
        },
      });
    </script>
  </body>
</html>
