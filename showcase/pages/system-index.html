<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERPlora Hub · Sistema</title>
    <script type="importmap">{ "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }</script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <style>
      .system-pane[hidden] { display: none; }
      .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
      .metric-grid ion-card { margin: 0; } .metric-grid ion-card-content { min-height: 158px; display: grid; place-items: center; text-align: center; }
      .system-table { display: block; min-height: 24rem; } .system-tabs { width: min(100%, 48rem); margin: 0 auto; }
      @media (max-width: 760px) { .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      defineHubPage({
        active: '/system',
        title: 'Sistema',
        body: `
          <section class="system-pane" data-pane="resources">
            <div class="metric-grid">
              <ion-card><ion-card-content><ok-gauge id="system-cpu" type="ring" label="CPU" value="48" unit="%"></ok-gauge></ion-card-content></ion-card>
              <ion-card><ion-card-content><ok-gauge id="system-memory" type="ring" label="Memoria" value="63" unit="%"></ok-gauge></ion-card-content></ion-card>
              <ion-card><ion-card-content><div><ion-icon name="cube-outline" style="font-size:2rem"></ion-icon><h2>148 MB</h2><ion-note>SQLite local</ion-note></div></ion-card-content></ion-card>
              <ion-card><ion-card-content><ok-gauge id="system-connections" type="ring" label="Conexiones" value="4" max="100"></ok-gauge></ion-card-content></ion-card>
            </div>
            <ion-card class="ion-no-margin"><ion-card-content>
              <div style="display:flex;align-items:center;justify-content:space-between;gap:12px"><div><h2 style="margin:0 0 6px">Conexión Bridge</h2><ion-note>Impresoras y periféricos de este equipo</ion-note></div><ok-status-pill tone="success" dot>Conectado</ok-status-pill></div>
            </ion-card-content></ion-card>
          </section>
          <section class="system-pane" data-pane="updates" hidden>
            <ion-card class="ion-no-margin"><ion-card-content style="display:grid;place-items:center;text-align:center;padding:48px 24px"><ion-icon name="checkmark-circle-outline" color="success" style="font-size:3rem"></ion-icon><h2>El Hub está actualizado</h2><ion-note>Versión 1.4.2 · comprobado ahora</ion-note><ion-button fill="outline"><ion-icon slot="start" name="refresh-outline"></ion-icon>Buscar actualizaciones</ion-button></ion-card-content></ion-card>
          </section>
          <section class="system-pane" data-pane="documents" hidden>
            <ion-card class="ion-no-margin"><ion-card-header><ion-card-title>Documentos</ion-card-title></ion-card-header><ion-card-content><ok-data-table id="system-documents" class="system-table"></ok-data-table></ion-card-content></ion-card>
          </section>
          <section class="system-pane" data-pane="backups" hidden>
            <ion-card class="ion-no-margin"><ion-card-header><ion-card-title>Copias automáticas</ion-card-title><ion-button size="small">Copia ahora</ion-button></ion-card-header><ion-card-content><ion-list><ion-item><ion-icon slot="start" name="server-outline"></ion-icon><ion-label><h2>Copia completa</h2><p>Hoy, 03:00 · 12,4 MB</p></ion-label><ion-button slot="end" fill="clear"><ion-icon slot="icon-only" name="download-outline"></ion-icon></ion-button></ion-item><ion-item lines="none"><ion-icon slot="start" name="server-outline"></ion-icon><ion-label><h2>Copia completa</h2><p>Ayer, 03:00 · 11,9 MB</p></ion-label><ion-button slot="end" fill="clear"><ion-icon slot="icon-only" name="download-outline"></ion-icon></ion-button></ion-item></ion-list></ion-card-content></ion-card>
          </section>
          <section class="system-pane" data-pane="logs" hidden>
            <ion-card class="ion-no-margin"><ion-card-header><ion-card-title>Registro de eventos</ion-card-title></ion-card-header><ion-card-content><ok-data-table id="system-logs" class="system-table"></ok-data-table></ion-card-content></ion-card>
          </section>
        `,
        footer: `<ion-footer class="ion-no-border"><ion-toolbar><ion-segment id="system-tabs" class="system-tabs" value="resources" scrollable>
          <ion-segment-button value="resources"><ion-icon name="pulse-outline"></ion-icon><ion-label>Recursos</ion-label></ion-segment-button>
          <ion-segment-button value="updates"><ion-icon name="refresh-outline"></ion-icon><ion-label>Actualizaciones</ion-label></ion-segment-button>
          <ion-segment-button value="documents"><ion-icon name="folder-outline"></ion-icon><ion-label>Documentos</ion-label></ion-segment-button>
          <ion-segment-button value="backups"><ion-icon name="cloud-upload-outline"></ion-icon><ion-label>Copias</ion-label></ion-segment-button>
          <ion-segment-button value="logs"><ion-icon name="document-text-outline"></ion-icon><ion-label>Registros</ion-label></ion-segment-button>
        </ion-segment></ion-toolbar></ion-footer>`,
        setup(doc) {
          const documents = doc.getElementById('system-documents');
          documents.columns = [{ key: 'name', header: 'Nombre' }, { key: 'kind', header: 'Tipo' }, { key: 'size', header: 'Tamaño', align: 'right' }];
          documents.rows = [{ name: 'factura-2026-0142.pdf', kind: 'PDF', size: '84 KB' }, { name: 'export-inventario.csv', kind: 'CSV', size: '320 KB' }];
          documents.searchable = true; documents.views = ['table', 'cards'];
          const logs = doc.getElementById('system-logs');
          logs.columns = [{ key: 'time', header: 'Hora' }, { key: 'level', header: 'Nivel' }, { key: 'event', header: 'Evento' }];
          logs.rows = [{ time: '08:42', level: 'INFO', event: 'Venta creada' }, { time: '07:55', level: 'AVISO', event: 'Bridge desconectado' }];
          logs.searchable = true;
          doc.getElementById('system-tabs')?.addEventListener('ionChange', (event) => {
            doc.querySelectorAll('.system-pane').forEach((pane) => { pane.hidden = pane.dataset.pane !== event.detail.value; });
          });
        },
      });
    </script>
  </body>
</html>
