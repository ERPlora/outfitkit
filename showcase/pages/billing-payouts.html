<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pagos · ERPlora Cloud</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_saas-developer.css" />
  </head>
  <body>
    <script type="module">
      import { html as h } from 'lit';
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      /* Datos demostrativos con el contrato actual de developer/payouts/views.py. */
      const PAYOUTS = [
        { id: 'payout-1', createdAt: '2026-07-15T09:10:00', amount: 124.10, earningsCount: 4, status: 'paid', paidAt: '2026-07-17', stripePayoutId: 'po_demo_0715' },
        { id: 'payout-2', createdAt: '2026-06-15T10:22:00', amount: 82.45, earningsCount: 2, status: 'paid', paidAt: '2026-06-18', stripePayoutId: 'po_demo_0615' },
        { id: 'payout-3', createdAt: '2026-05-15T08:36:00', amount: 65.70, earningsCount: 3, status: 'processing', paidAt: '', stripePayoutId: 'po_demo_0515' },
        { id: 'payout-4', createdAt: '2026-04-15T12:05:00', amount: 49.30, earningsCount: 1, status: 'failed', paidAt: '', stripePayoutId: 'po_demo_0415' },
      ];

      const STATUS = {
        paid: ['Pagado', 'success'],
        pending: ['Pendiente', 'warning'],
        processing: ['Procesando', 'medium'],
        failed: ['Fallido', 'danger'],
        canceled: ['Cancelado', 'medium'],
      };
      const money = new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' });
      const dateTime = new Intl.DateTimeFormat('es-ES', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
      const date = new Intl.DateTimeFormat('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });

      const statusCell = (row) => {
        const [label, tone] = STATUS[row.status] || [row.status, 'medium'];
        return h`<ion-badge style="--background:rgba(var(--ion-color-${tone}-rgb),.14);--color:var(--ion-color-${tone});--padding-top:5px;--padding-bottom:5px">${label}</ion-badge>`;
      };

      const footer = `
        <footer id="section-tabbar">
          <ion-segment value="payouts" aria-label="Secciones de desarrollador">
            <ion-segment-button value="overview"><iconify-icon icon="lucide:layout-grid" width="20" height="20"></iconify-icon><ion-label>Resumen</ion-label></ion-segment-button>
            <ion-segment-button value="earnings"><iconify-icon icon="lucide:wallet" width="20" height="20"></iconify-icon><ion-label>Ingresos</ion-label></ion-segment-button>
            <ion-segment-button value="payouts"><iconify-icon icon="lucide:banknote" width="20" height="20"></iconify-icon><ion-label>Pagos</ion-label></ion-segment-button>
            <ion-segment-button value="modules"><iconify-icon icon="lucide:box" width="20" height="20"></iconify-icon><ion-label>Mis módulos</ion-label></ion-segment-button>
            <ion-segment-button value="blueprints"><iconify-icon icon="lucide:layers" width="20" height="20"></iconify-icon><ion-label>Blueprints</ion-label></ion-segment-button>
            <ion-segment-button value="repositories"><iconify-icon icon="lucide:git-branch" width="20" height="20"></iconify-icon><ion-label>Repositorios</ion-label></ion-segment-button>
            <ion-segment-button value="apidocs"><iconify-icon icon="lucide:book-open" width="20" height="20"></iconify-icon><ion-label>API Docs</ion-label></ion-segment-button>
          </ion-segment>
        </footer>`;

      defineSaasDashboardPage({
        active: '/dashboard/developer/',
        title: 'Pagos',
        body: `
          <div class="developer-page">
            <div class="developer-alert warning" role="alert">
              <iconify-icon icon="simple-icons:stripe" width="18" height="18"></iconify-icon>
              <div class="developer-alert-body">
                <div class="developer-alert-title">Conecta Stripe para recibir pagos</div>
                <div class="developer-alert-text">Configura tu cuenta bancaria para retirar tus ingresos.</div>
              </div>
              <ion-button color="primary" size="small">Conectar</ion-button>
            </div>

            <section class="developer-kpis" style="--developer-kpi-columns:4;padding-top:20px" aria-label="Resumen de pagos">
              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:wallet" width="12" height="12"></iconify-icon>Saldo disponible</div>
                <div class="developer-kpi-value">41,65 €</div>
              </div>
              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:check-circle" width="12" height="12"></iconify-icon>Total pagado</div>
                <div class="developer-kpi-value">206,55 €</div>
              </div>
              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:info" width="12" height="12"></iconify-icon>Pago mínimo</div>
                <div class="developer-kpi-value">50,00 €</div>
              </div>
              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:credit-card" width="12" height="12"></iconify-icon>Estado de la cuenta</div>
                <div class="developer-kpi-value" style="font-size:1rem"><ion-badge color="medium">Sin configurar</ion-badge></div>
              </div>
            </section>

            <div class="developer-table-wrap">
              <div class="dash-fill">
                <ok-data-table id="payouts-dt" server-side fill>
                  <div slot="toolbar" class="okdt-filters">
                    <ion-select class="okdt-filter" data-okdt-param="status" interface="popover" aria-label="Estado" placeholder="Todos los estados">
                      <ion-select-option value="">Todos los estados</ion-select-option>
                      <ion-select-option value="pending">Pendiente</ion-select-option>
                      <ion-select-option value="processing">Procesando</ion-select-option>
                      <ion-select-option value="paid">Pagado</ion-select-option>
                      <ion-select-option value="failed">Fallido</ion-select-option>
                      <ion-select-option value="canceled">Cancelado</ion-select-option>
                    </ion-select>
                  </div>
                </ok-data-table>
              </div>
            </div>

            <ion-card class="developer-after-table">
              <ion-card-content>
                <h3 class="developer-info-title">Información sobre los pagos</h3>
                <ul class="developer-info-list">
                  <li>
                    <iconify-icon icon="lucide:banknote" width="18" height="18" style="color:var(--ion-color-primary)"></iconify-icon>
                    <span><strong>Pago mínimo</strong><small>50,00 €</small></span>
                  </li>
                  <li>
                    <iconify-icon icon="lucide:clock" width="18" height="18" style="color:var(--ion-color-primary)"></iconify-icon>
                    <span><strong>Tiempo de procesamiento</strong><small>3–5 días laborables</small></span>
                  </li>
                  <li>
                    <iconify-icon icon="lucide:credit-card" width="18" height="18" style="color:var(--ion-color-success)"></iconify-icon>
                    <span><strong>Método de pago</strong><small>Stripe Connect (transferencia bancaria directa)</small></span>
                  </li>
                </ul>
              </ion-card-content>
            </ion-card>
          </div>`,
        footer,
        setup(doc) {
          const table = doc.getElementById('payouts-dt');
          if (!table) return;

          table.rowKey = 'id';
          table.columns = [
            { key: 'createdAt', header: 'Fecha', width: '11rem', sortable: true, format: (row) => dateTime.format(new Date(row.createdAt)) },
            { key: 'amount', header: 'Importe', width: '9rem', align: 'right', sortable: true, format: (row) => money.format(row.amount) },
            { key: 'earningsCount', header: 'Ingresos', width: '9rem', format: (row) => `${row.earningsCount} ingresos` },
            { key: 'status', header: 'Estado', width: '9rem', render: statusCell },
            { key: 'paidAt', header: 'Pagado el', width: '10rem', sortable: true, format: (row) => row.paidAt ? date.format(new Date(`${row.paidAt}T00:00:00`)) : '—' },
          ];
          table.searchable = true;
          table.searchPlaceholder = 'Buscar pagos…';
          table.actions = [{ id: 'view', label: 'Ver detalles', icon: 'eye-outline' }];
          table.pageSize = 10;
          table.pageSizes = [10, 25, 50, 100];
          table.labels = {
            empty: 'Todavía no hay pagos',
            columns: 'Columnas',
            columnsVisible: 'Columnas visibles',
            rowsPerPage: 'Filas por página',
            perPageShort: '{n} / pág.',
            showing: 'Mostrando {from}–{to} de',
            recordSingular: 'pago',
            recordPlural: 'pagos',
            actions: 'Acciones',
          };

          const state = { query: '', sort: 'createdAt', dir: 'desc' };
          const refresh = () => {
            const query = state.query.trim().toLocaleLowerCase('es');
            const status = doc.querySelector('[data-okdt-param="status"]')?.value || '';
            let rows = PAYOUTS.filter((row) =>
              (!query || row.stripePayoutId.toLocaleLowerCase('es').includes(query)) &&
              (!status || row.status === status));
            rows = [...rows].sort((a, b) => String(a[state.sort] ?? '').localeCompare(String(b[state.sort] ?? ''), 'es') * (state.dir === 'asc' ? 1 : -1));
            table.rows = rows;
            table.total = rows.length;
            table.page = 0;
          };
          doc.querySelector('[data-okdt-param="status"]')?.addEventListener('ionChange', refresh);
          table.addEventListener('searchChange', (event) => { state.query = String(event.detail || ''); refresh(); });
          table.addEventListener('sortChange', (event) => { state.sort = event.detail.sort; state.dir = event.detail.dir; refresh(); });
          table.addEventListener('rowAction', (event) => console.info('/dashboard/developer/payouts/', event.detail.row.id));
          refresh();
        },
      });
    </script>
  </body>
</html>
