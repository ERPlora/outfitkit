      /* Geometría puntual de esta vista (estructura, sin colores de marca). */

      /* Cabecera de org: avatar grande + título/subtítulo en línea. */
      .org-header-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; flex: 1; min-width: 0; }
      .org-header-meta ok-avatar { flex: 0 0 auto; }
      .org-header-title { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
      .org-header-title h1 { margin: 0; font-size: 1.4rem; font-weight: 700; }
      .org-header-title .sub { color: var(--ion-color-medium); font-size: .85rem; }

      /* Tabs row: segment a ancho completo. */
      .tab-content-panel { display: none; }
      .tab-content-panel.active { display: block; }

      /* Grilla de info (key-value). */
      .info-grid {
        display: grid;
        grid-template-columns: minmax(110px, 140px) 1fr;
        gap: 10px 16px;
        font-size: .87rem;
      }
      .info-grid .lbl { color: var(--ion-color-medium); }
      .info-grid .val { font-weight: 500; }
      .info-grid a { color: var(--ion-color-primary); text-decoration: none; }

      /* Bloque de dirección. */
      .addr-block {
        padding: 12px;
        background: var(--ion-color-step-50, rgba(127,127,127,.05));
        border-radius: 10px;
        font-size: .82rem;
        line-height: 1.55;
      }
      .addr-block__head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
      .addr-block__name { font-weight: 600; font-size: .85rem; }
      .addr-block__body { color: var(--ion-color-medium); }

      /* Lista de miembros (overview). */
      .member-list-row {
        display: flex; align-items: center; gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
        cursor: pointer;
      }
      .member-list-row:last-child { border-bottom: 0; }
      .member-info { flex: 1 1 auto; min-width: 0; }
      .member-name { font-weight: 600; font-size: .9rem; display: flex; align-items: center; gap: 6px; }
      .member-desc { color: var(--ion-color-medium); font-size: .78rem; margin-top: 1px; }
      .member-time { color: var(--ion-color-medium); font-size: .78rem; white-space: nowrap; }

      /* Sección con cabecera (title + sub + botón). */
      .section-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
      .section-head__left {}
      .section-head__title { font-size: 1rem; font-weight: 700; margin: 0 0 2px; }
      .section-head__sub { color: var(--ion-color-medium); font-size: .82rem; }

      /* Toggle-row de settings. */
      .toggle-row {
        display: flex; align-items: center; gap: 12px;
        padding: 14px 0;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
      }
      .toggle-row:first-of-type { border-top: 0; padding-top: 0; }
      .toggle-row__text { flex: 1 1 auto; }
      .toggle-row__label { font-weight: 600; font-size: .9rem; margin-bottom: 2px; }
      .toggle-row__desc { color: var(--ion-color-medium); font-size: .8rem; }
    </style>

            hubsDt.searchable = true;
            hubsDt.searchKeys = ['name', 'sub', 'plan'];
            hubsDt.primaryAction = { label: 'Nuevo hub', icon: 'add-outline' };
            hubsDt.columns = [
              { key: 'name', header: 'Hub', width: 'minmax(10rem,1.5fr)',
                render: (r) => h`<strong>${r.name}</strong>` },
              { key: 'sub', header: 'Descripción', width: 'minmax(12rem,1.5fr)' },
              { key: 'plan', header: 'Plan', width: '8rem' },
              { key: 'stateLabel', header: 'Estado', width: '8rem',
                render: (r) => h`<ion-badge style="--background:color-mix(in srgb, var(--ion-color-${r.stateColor}) 15%, transparent);--color:var(--ion-color-${r.stateColor});--padding-top:4px;--padding-bottom:4px">${r.stateLabel}</ion-badge>` },
            ];
            hubsDt.actions = [
              { id: 'open',   icon: 'open-outline',  label: 'Abrir', color: 'primary' },
              { id: 'remove', icon: 'trash-outline', label: 'Eliminar', color: 'danger' },
            ];
            hubsDt.rows = HUBS.slice();
          }

          // ── ok-data-table: Facturas ───────────────────────────────────────
          const invoicesDt = doc.getElementById('invoices-dt');
          if (invoicesDt) {
            invoicesDt.title = 'Histórico de facturas';
            invoicesDt.rowKey = (r) => r.id;
            invoicesDt.views = ['table'];
            invoicesDt.searchable = false;
            invoicesDt.columns = [
              { key: 'id',     header: 'Factura', width: 'minmax(8rem,1fr)' },
              { key: 'date',   header: 'Fecha',   width: '9rem' },
              { key: 'amount', header: 'Importe', width: '7rem', align: 'right' },
              { key: 'label',  header: 'Estado',  width: '8rem',
                render: (r) => h`<ion-badge style="--background:color-mix(in srgb, var(--ion-color-${r.color}) 15%, transparent);--color:var(--ion-color-${r.color});--padding-top:4px;--padding-bottom:4px">${r.label}</ion-badge>` },
            ];
            invoicesDt.actions = [
              { id: 'download', icon: 'download-outline', label: 'Descargar' },
            ];
            invoicesDt.rows = INVOICES.slice();
          }

          // ── Tabs: ion-segment ────────────────────────────────────────────
          const PANELS = ['overview', 'members', 'hubs', 'billing', 'settings'];
          function showPanel(id) {
            PANELS.forEach((p) => {
              const el = doc.getElementById('panel-' + p);
              if (el) el.classList.toggle('active', p === id);
            });
          }

          const tabs = doc.getElementById('org-tabs');
          if (tabs) {
            tabs.addEventListener('ionChange', (e) => {
              const val = e.detail && e.detail.value;
              if (val) showPanel(val);
            });
          }

          // ── Toggles de Settings ──────────────────────────────────────────
          const t2fa = doc.getElementById('toggle-2fa');
          const tsso = doc.getElementById('toggle-sso');
          const taudit = doc.getElementById('toggle-audit');
          if (t2fa) t2fa.addEventListener('ionChange', () => { /* no-op mock */ });
          if (tsso) tsso.addEventListener('ionChange', () => { /* no-op mock */ });
          if (taudit) taudit.addEventListener('ionChange', () => { /* no-op mock */ });
        },
      });
    </script>
  </body>
</html>
