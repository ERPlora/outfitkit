<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Demo - Organización</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <style>
      .stack { display:grid;gap:1rem; }
      .kpis { display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:.75rem; }
      .two-columns { display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem; }
      .card-title { display:flex;align-items:center;justify-content:space-between;gap:.75rem; }
      .card-title h2 { margin:0;font-size:1rem; }
      .detail-row { padding:.65rem 0;border-bottom:1px solid var(--ion-color-step-150); }
      .detail-row:last-child { border-bottom:0; }
      .detail-row small { display:block;color:var(--ion-color-medium);text-transform:uppercase; }
      .danger-card { border:1px solid color-mix(in srgb,var(--ion-color-danger) 42%,transparent); }
      .danger-action { display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap; }
      .danger-action + .danger-action { margin-top:1rem;padding-top:1rem;border-top:1px solid var(--ion-color-step-150); }
      .danger-action h3,.danger-action p { margin:0; }
      .danger-action p { margin-top:.25rem;color:var(--ion-color-medium);font-size:.85rem; }
      ok-data-table { min-height:18rem; }
      @media (max-width:760px) { .kpis,.two-columns { grid-template-columns:1fr 1fr; } }
      @media (max-width:520px) { .kpis,.two-columns { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <script type="module">
      import { html as h } from 'lit';
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      const MEMBERS = [
        { id: 'member-1', email: 'demo@erplora.com', joined: '12 ene 2025', role: 'Propietario', tone: 'primary' },
        { id: 'member-2', email: 'admin@erplora.com', joined: '18 feb 2025', role: 'Administrador', tone: 'warning' },
        { id: 'member-3', email: 'equipo@erplora.com', joined: '6 mar 2025', role: 'Miembro', tone: 'medium' },
      ];
      const HUBS = [
        { id: 'hub-1', name: 'Terminal principal', slug: 'terminal-principal', status: 'Online', tone: 'success' },
        { id: 'hub-2', name: 'Tienda Centro', slug: 'tienda-centro', status: 'Offline', tone: 'medium' },
      ];

      const badge = (label, tone) => h`<ion-badge color=${tone}>${label}</ion-badge>`;

      defineSaasDashboardPage({
        active: '/dashboard/organizations/',
        title: 'ERPlora Demo',
        body: `
          <div class="stack">
            <div class="kpis">
              <ok-kpi label="Hubs" value="2" icon="server-outline"></ok-kpi>
              <ok-kpi label="Miembros" value="3" icon="people-outline"></ok-kpi>
              <ok-kpi label="Plan" value="Standard" icon="pricetag-outline"></ok-kpi>
              <ok-kpi label="Rol" value="Propietario" icon="key-outline"></ok-kpi>
            </div>

            <ion-card>
              <ion-card-content>
                <div class="card-title"><h2>Ajustes de la organización</h2></div>
                <form id="organization-settings-form">
                  <ion-input label="Nombre de la organización" label-placement="floating"
                             fill="outline" value="ERPlora Demo" required></ion-input>
                  <ion-button type="submit" size="small">
                    <iconify-icon slot="start" icon="lucide:save" width="15" height="15"></iconify-icon>
                    Guardar cambios
                  </ion-button>
                </form>
              </ion-card-content>
            </ion-card>

            <div class="two-columns">
              <ion-card>
                <ion-card-content>
                  <div class="card-title">
                    <h2>Información de facturación</h2>
                    <ion-button fill="clear" size="small" aria-label="Editar facturación">
                      <iconify-icon slot="icon-only" icon="lucide:pencil" width="16" height="16"></iconify-icon>
                    </ion-button>
                  </div>
                  <div class="detail-row"><small>Razón social</small><strong>ERPlora Demo S.L.</strong></div>
                  <div class="detail-row"><small>NIF / CIF / IVA</small><span>B12345678</span></div>
                  <div class="detail-row"><small>Correo de facturación</small><span>facturacion@erplora.com</span></div>
                </ion-card-content>
              </ion-card>
              <ion-card>
                <ion-card-content>
                  <div class="card-title">
                    <h2>Dirección de envío</h2>
                    <ion-button fill="clear" size="small" aria-label="Editar dirección">
                      <iconify-icon slot="icon-only" icon="lucide:pencil" width="16" height="16"></iconify-icon>
                    </ion-button>
                  </div>
                  <div class="detail-row"><small>Destinatario</small><strong>ERPlora Demo</strong></div>
                  <div class="detail-row"><small>Dirección</small><span>Carrer de Mallorca, 401 · 08013 Barcelona · ES</span></div>
                  <div class="detail-row"><small>Teléfono</small><span>+34 930 000 000</span></div>
                </ion-card-content>
              </ion-card>
            </div>

            <ion-card>
              <ion-card-content>
                <div class="card-title"><h2>Métodos de pago</h2></div>
                <p>Los métodos de pago se gestionan de forma segura con Stripe.</p>
                <ion-button size="small">
                  <iconify-icon slot="start" icon="lucide:external-link" width="15" height="15"></iconify-icon>
                  Gestionar pagos
                </ion-button>
              </ion-card-content>
            </ion-card>

            <ok-data-table id="organization-members"></ok-data-table>
            <ok-inline-feedback tone="info" heading="Base de datos compartida">
              Todos los Hubs de esta organización comparten la misma base de datos. Productos, clientes, inventario y otros datos son compartidos.
            </ok-inline-feedback>
            <ok-data-table id="organization-hubs"></ok-data-table>

            <ion-card class="danger-card">
              <ion-card-content>
                <h2 style="margin:0 0 1rem;color:var(--ion-color-danger);font-size:1rem">Zona de peligro</h2>
                <div class="danger-action">
                  <div><h3>Salir de la organización</h3><p>Perderás el acceso a todos los Hubs de esta organización.</p></div>
                  <ion-button fill="outline" color="danger" size="small">Salir de la organización</ion-button>
                </div>
                <div class="danger-action">
                  <div><h3>Eliminar organización</h3><p>Primero debes eliminar todos los Hubs de la organización.</p></div>
                  <ion-button fill="outline" color="danger" size="small" disabled>Eliminar organización</ion-button>
                </div>
              </ion-card-content>
            </ion-card>
          </div>
        `,
        setup(doc) {
          doc.getElementById('organization-settings-form')?.addEventListener('submit', (event) => event.preventDefault());

          const members = doc.getElementById('organization-members');
          members.title = 'Miembros';
          members.rowKey = 'id';
          members.rows = MEMBERS;
          members.columns = [
            { key: 'email', header: 'Miembro', sortable: true },
            { key: 'joined', header: 'Alta', sortable: true },
            { key: 'role', header: 'Rol', render: (row) => badge(row.role, row.tone) },
          ];
          members.searchKeys = ['email', 'role'];
          members.searchPlaceholder = 'Buscar miembros…';
          members.primaryAction = { label: 'Invitar', icon: 'person-add-outline' };
          members.actions = [
            { id: 'change-role', label: 'Cambiar rol', icon: 'swap-horizontal-outline' },
            { id: 'remove', label: 'Quitar', icon: 'person-remove-outline', color: 'danger' },
          ];

          const hubs = doc.getElementById('organization-hubs');
          hubs.title = 'Hubs';
          hubs.rowKey = 'id';
          hubs.rows = HUBS;
          hubs.columns = [
            { key: 'name', header: 'Hub', sortable: true },
            { key: 'slug', header: 'Slug' },
            { key: 'status', header: 'Estado', render: (row) => badge(row.status, row.tone) },
          ];
          hubs.searchKeys = ['name', 'slug'];
          hubs.searchPlaceholder = 'Buscar hubs…';
        },
      });
    </script>
  </body>
</html>
