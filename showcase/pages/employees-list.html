<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Hub · Empleados</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>

    <style>
      [hidden] { display: none !important; }

      .employees-fill,
      .employees-panel {
        height: 100%;
        min-height: 420px;
      }

      .employees-panel {
        box-sizing: border-box;
      }

      .users-placeholder {
        display: grid;
        place-items: center;
        padding: 48px 16px;
        text-align: center;
        opacity: 0.6;
      }

      ok-data-table[fill] {
        height: 100%;
      }

      .api-key-create-content {
        display: grid;
        gap: 20px;
      }

      .api-key-modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      // Datos actuales de EmployeesPage.vue. No se añaden registros propios del showcase.
      const EMPLOYEES = [
        { id: '1', name: 'Demo Admin', email: 'demo@erplora.com', role: 'Administrador', status: 'Activo', createdAt: '2025-01-12' },
        { id: '2', name: 'María López', email: 'maria@erplora.com', role: 'Encargado', status: 'Activo', createdAt: '2025-02-03' },
        { id: '3', name: 'Juan Pérez', email: 'juan@erplora.com', role: 'Cajero', status: 'Activo', createdAt: '2025-02-20' },
        { id: '4', name: 'Ana Ruiz', email: 'ana@erplora.com', role: 'Almacén', status: 'Inactivo', createdAt: '2025-03-15' },
        { id: '5', name: 'Luis Gómez', email: 'luis@erplora.com', role: 'Camarero', status: 'Activo', createdAt: '2025-04-09' },
        { id: '6', name: 'Sara Díaz', email: null, role: 'Cocina', status: 'Activo', createdAt: '2025-05-01' },
      ];

      const BASE_ROLES = [
        { id: 'admin', name: 'Administrador', scope: 'Sistema', members: 1, permissions: 48, createdAt: '2025-01-12' },
        { id: 'manager', name: 'Encargado', scope: 'Sistema', members: 2, permissions: 31, createdAt: '2025-01-12' },
        { id: 'cashier', name: 'Cajero', scope: 'Personalizado', members: 4, permissions: 9, createdAt: '2025-03-04' },
        { id: 'stock', name: 'Almacén', scope: 'Personalizado', members: 1, permissions: 12, createdAt: '2025-04-21' },
        { id: 'waiter', name: 'Camarero', scope: 'Personalizado', members: 6, permissions: 7, createdAt: '2025-05-18' },
        { id: 'kitchen', name: 'Cocina', scope: 'Personalizado', members: 3, permissions: 5, createdAt: '2025-02-09' },
        { id: 'host', name: 'Recepción', scope: 'Personalizado', members: 2, permissions: 6, createdAt: '2025-03-22' },
        { id: 'accountant', name: 'Contabilidad', scope: 'Sistema', members: 1, permissions: 22, createdAt: '2025-01-30' },
        { id: 'buyer', name: 'Compras', scope: 'Personalizado', members: 2, permissions: 14, createdAt: '2025-04-02' },
        { id: 'marketing', name: 'Marketing', scope: 'Personalizado', members: 1, permissions: 8, createdAt: '2025-05-05' },
        { id: 'support', name: 'Soporte', scope: 'Personalizado', members: 3, permissions: 11, createdAt: '2025-02-18' },
        { id: 'auditor', name: 'Auditor', scope: 'Sistema', members: 1, permissions: 19, createdAt: '2025-01-22' },
      ];

      const ROLES = Array.from({ length: 58 }, (_, index) => {
        const base = BASE_ROLES[index % BASE_ROLES.length];
        return index < BASE_ROLES.length
          ? { ...base }
          : {
              ...base,
              id: `${base.id}-${index}`,
              name: `${base.name} ${Math.floor(index / BASE_ROLES.length) + 1}`,
            };
      });

      const DT_LABELS_ES = {
        search: 'Buscar…',
        empty: 'Sin resultados',
        filters: 'Filtros',
        clear: 'Limpiar',
        apply: 'Aplicar',
        selected: '{n} seleccionados',
        importCsv: 'Importar CSV',
        exportCsv: 'Exportar CSV',
        add: 'Añadir',
        moreActions: 'Más acciones',
        rowsPerPage: 'Filas por página',
        perPageShort: '{n} / pág.',
        viewList: 'Vista lista',
        viewCards: 'Vista tarjetas',
        columnsVisible: 'Columnas visibles',
        columns: 'Columnas',
        actions: 'Acciones',
        close: 'Cerrar',
        newRecord: 'Nuevo',
        form: 'Formulario',
        filterPlaceholder: 'Filtrar…',
        from: 'Desde',
        to: 'Hasta',
        fromOf: '{label} desde',
        toOf: '{label} hasta',
        gte: '≥',
        lte: '≤',
        noValues: 'Sin valores',
        selectAll: 'Seleccionar todo',
        selectRow: 'Seleccionar fila',
        select: 'Seleccionar',
        showing: 'Mostrando {from}–{to} de',
        recordSingular: 'registro',
        recordPlural: 'registros',
      };

      const fmtDate = (iso) =>
        new Date(iso).toLocaleDateString('es-ES', {
          day: '2-digit',
          month: 'short',
          year: 'numeric',
        });

      function nameCell(row) {
        const wrap = document.createElement('span');
        wrap.style.cssText = 'display:flex;align-items:center;gap:.6rem';

        const avatar = document.createElement('span');
        avatar.textContent = String(row.name ?? '?').charAt(0).toUpperCase();
        avatar.style.cssText =
          'display:grid;place-items:center;width:2rem;height:2rem;border-radius:999px;' +
          'font-size:12px;font-weight:700;background:color-mix(in srgb,var(--ion-color-primary) 15%,transparent);' +
          'color:var(--ion-color-primary)';

        const name = document.createElement('span');
        name.textContent = String(row.name ?? '');
        name.style.fontWeight = '500';
        wrap.append(avatar, name);
        return wrap;
      }

      function badgeCell(text, tone) {
        const badge = document.createElement('span');
        badge.textContent = text;
        badge.style.cssText =
          'display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;' +
          `background:rgba(var(--ion-color-${tone}-rgb),.14);` +
          `color:var(--ion-color-${tone}-shade,var(--ion-color-${tone}))`;
        return badge;
      }

      function configureTable(table, { columns, rows, searchKeys, searchPlaceholder, csvName, primaryAction }) {
        table.columns = columns;
        table.rows = rows;
        table.searchKeys = searchKeys;
        table.searchPlaceholder = searchPlaceholder;
        table.actions = [
          { id: 'edit', label: 'Editar', icon: 'pencil' },
          { id: 'delete', label: 'Borrar', icon: 'trash', color: 'danger' },
        ];
        table.primaryAction = primaryAction;
        table.pageSize = 10;
        table.views = true;
        table.csv = true;
        table.csvName = csvName;
        table.columnPicker = true;
        table.labels = DT_LABELS_ES;
      }

      defineHubPage({
        active: 'employees',
        title: 'Empleados',
        body: `
          <div class="employees-fill">
            <ok-data-table id="staff-table" class="employees-panel" fill></ok-data-table>

            <div id="users-panel" class="employees-panel users-placeholder" hidden>
              El acceso de usuarios (PIN, cuentas) se gestionará aquí.
            </div>

            <ok-data-table id="roles-table" class="employees-panel" fill hidden></ok-data-table>

            <div id="api-keys-panel" class="employees-panel" hidden>
              <ok-data-table id="api-keys-table" fill></ok-data-table>
            </div>
          </div>

          <ion-modal id="api-key-create-modal">
            <ion-header class="ion-no-border">
              <ion-toolbar>
                <ion-title>Nueva API key</ion-title>
                <ion-buttons slot="end">
                  <ion-button class="api-key-modal-close" aria-label="Cancelar">
                    <ion-icon slot="icon-only" name="close-outline"></ion-icon>
                  </ion-button>
                </ion-buttons>
              </ion-toolbar>
            </ion-header>
            <ion-content class="ion-padding">
              <div class="api-key-create-content">
                <ion-list lines="none">
                  <ion-item>
                    <ion-input label="Nombre" label-placement="floating" placeholder="p. ej. Gestoría — facturas"></ion-input>
                  </ion-item>
                </ion-list>
                <ok-empty-state
                  icon="cube-outline"
                  heading="Ningún módulo expone API todavía"
                  message="Solo los módulos con operaciones de API pública pueden incluirse en una key. Ninguno de los instalados la expone aún."
                ></ok-empty-state>
              </div>
            </ion-content>
            <ion-footer class="ion-no-border">
              <ion-toolbar>
                <div class="api-key-modal-actions">
                  <ion-button class="api-key-modal-close" fill="outline">Cancelar</ion-button>
                  <ion-button disabled>Crear key</ion-button>
                </div>
              </ion-toolbar>
            </ion-footer>
          </ion-modal>
        `,
        footer: `
          <ion-footer class="ion-no-border employees-footer">
            <ion-toolbar>
              <ion-segment id="employees-tabs" value="staff">
                <ion-segment-button value="staff">
                  <ion-icon name="people-outline"></ion-icon>
                  <ion-label>Staff</ion-label>
                </ion-segment-button>
                <ion-segment-button value="users">
                  <ion-icon name="person-circle-outline"></ion-icon>
                  <ion-label>Usuarios</ion-label>
                </ion-segment-button>
                <ion-segment-button value="roles">
                  <ion-icon name="shield-checkmark-outline"></ion-icon>
                  <ion-label>Roles</ion-label>
                </ion-segment-button>
                <ion-segment-button value="apikeys">
                  <ion-icon name="keypad-outline"></ion-icon>
                  <ion-label>API keys</ion-label>
                </ion-segment-button>
              </ion-segment>
            </ion-toolbar>
          </ion-footer>
        `,
        setup(doc) {
          const staffTable = doc.getElementById('staff-table');
          const rolesTable = doc.getElementById('roles-table');
          const apiKeysTable = doc.getElementById('api-keys-table');
          const apiKeysModal = doc.getElementById('api-key-create-modal');

          configureTable(staffTable, {
            columns: [
              { key: 'name', header: 'Empleado', render: nameCell },
              { key: 'email', header: 'Email', format: (row) => String(row.email ?? '—') },
              { key: 'role', header: 'Rol', filterable: true, filterType: 'select' },
              {
                key: 'status',
                header: 'Estado',
                filterable: true,
                filterType: 'select',
                render: (row) => badgeCell(String(row.status), row.status === 'Activo' ? 'success' : 'medium'),
              },
              {
                key: 'createdAt',
                header: 'Alta',
                filterable: true,
                filterType: 'daterange',
                format: (row) => fmtDate(String(row.createdAt)),
              },
            ],
            rows: EMPLOYEES,
            searchKeys: ['name', 'email', 'role'],
            searchPlaceholder: 'Buscar empleado…',
            csvName: 'empleados',
            primaryAction: { label: 'Nuevo empleado', icon: 'add' },
          });

          configureTable(rolesTable, {
            columns: [
              { key: 'name', header: 'Rol' },
              {
                key: 'scope',
                header: 'Ámbito',
                filterable: true,
                filterType: 'select',
                render: (row) => badgeCell(String(row.scope), row.scope === 'Sistema' ? 'primary' : 'medium'),
              },
              { key: 'members', header: 'Miembros', align: 'center' },
              { key: 'permissions', header: 'Permisos', align: 'center' },
              {
                key: 'createdAt',
                header: 'Creado',
                filterable: true,
                filterType: 'daterange',
                format: (row) => fmtDate(String(row.createdAt)),
              },
            ],
            rows: ROLES,
            searchKeys: ['name', 'scope'],
            searchPlaceholder: 'Buscar rol…',
            csvName: 'roles',
            primaryAction: { label: 'Nuevo rol', icon: 'add' },
          });

          apiKeysTable.columns = [
            { key: 'name', header: 'Nombre' },
            { key: 'prefix', header: 'Token' },
            { key: 'scopeText', header: 'Permisos' },
            { key: 'status', header: 'Estado' },
            { key: 'createdText', header: 'Creada' },
            { key: 'lastUsedText', header: 'Último uso' },
            { key: '_actions', header: 'Acciones', align: 'right' },
          ];
          apiKeysTable.rows = [];
          apiKeysTable.searchKeys = ['name', 'prefix'];
          apiKeysTable.searchPlaceholder = 'Buscar API key…';
          apiKeysTable.emptyMessage =
            'Aún no hay API keys. Crea una para que un sistema externo pueda leer o escribir datos del Hub.';
          apiKeysTable.primaryAction = { label: 'Nueva API key', icon: 'add' };
          apiKeysTable.pageSize = 10;
          apiKeysTable.columnPicker = true;
          apiKeysTable.labels = DT_LABELS_ES;

          const panels = {
            staff: staffTable,
            users: doc.getElementById('users-panel'),
            roles: rolesTable,
            apikeys: doc.getElementById('api-keys-panel'),
          };

          doc.getElementById('employees-tabs')?.addEventListener('ionChange', (event) => {
            const selected = event.detail?.value ?? 'staff';
            for (const [name, panel] of Object.entries(panels)) {
              panel.hidden = name !== selected;
            }
          });

          staffTable.addEventListener('primaryAction', () => console.info('/employees/new'));
          rolesTable.addEventListener('primaryAction', () => console.info('roles.new'));
          apiKeysTable.addEventListener('primaryAction', () => apiKeysModal?.present());
          for (const button of doc.querySelectorAll('.api-key-modal-close')) {
            button.addEventListener('click', () => apiKeysModal?.dismiss());
          }

          const handleRowAction = (event) => {
            const { actionId, row } = event.detail ?? {};
            if (actionId === 'edit' && row?.id) console.info(`/employees/${row.id}`);
            else console.info(actionId, row?.id);
          };
          staffTable.addEventListener('rowAction', handleRowAction);
          rolesTable.addEventListener('rowAction', handleRowAction);
        },
      });
    </script>
  </body>
</html>
