  <head>

    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>

      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }

    <style>
      /* Geometría puntual de esta vista (estructura, sin colores de marca). */

      /* Tabs de sección internas */
      .pref-tabs {
        display: flex;
        gap: 0;
        flex-wrap: wrap;
        border-bottom: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        margin-bottom: 20px;
      }
      .pref-tab {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 10px 16px;
        font-size: .9rem;
        font-weight: 500;
        color: var(--ion-color-medium);
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        cursor: pointer;
        margin-bottom: -1px;
        transition: color .15s, border-color .15s;
      }
      .pref-tab:hover { color: var(--ion-color-primary); }
      .pref-tab.is-active {
        color: var(--ion-color-primary);
        border-bottom-color: var(--ion-color-primary);
        font-weight: 600;
      }
      .pref-tab ion-badge {
        --padding-top: 2px; --padding-bottom: 2px; --padding-start: 5px; --padding-end: 5px;
        font-size: .7rem;
      }

      /* Paneles de tab */
      .pref-panel { display: flex; flex-direction: column; gap: 20px; }
      .pref-panel[hidden] { display: none !important; }

      /* Secciones */
      .pref-section-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .pref-section-title { font-weight: 700; font-size: 1rem; margin: 0 0 2px; }
      .pref-section-sub { color: var(--ion-color-medium); font-size: .85rem; margin: 0; }

      /* Filas campo en cuadrícula dentro de una card */
      .pref-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
      @media (max-width: 640px) { .pref-fields { grid-template-columns: 1fr; } }
      .pref-field { display: flex; flex-direction: column; gap: 6px; }
      .pref-field--full { grid-column: 1 / -1; }
      .pref-label { font-weight: 600; font-size: .88rem; }
      .pref-hint { font-size: .78rem; color: var(--ion-color-medium); margin-top: 2px; }

      /* Muted span (usado en ion-segment-button) */
      .pref-radio-muted { color: var(--ion-color-medium); font-size: .8rem; }

      /* Toggle-rows */
      .pref-toggle-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 0;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
      }
      .pref-toggle-row:first-of-type { border-top: 0; padding-top: 0; }
      .pref-toggle-row__text { flex: 1 1 auto; }
      .pref-toggle-row__label { font-weight: 600; font-size: .9rem; display: block; }
      .pref-toggle-row__desc { color: var(--ion-color-medium); font-size: .8rem; margin-top: 2px; display: block; }

      /* ion-segment ajuste compacto para formularios */
      .pref-ion-seg { width: 100%; --border-radius: 8px; }

      /* Atajos de teclado */
      .pref-shortcut {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 13px 16px;
        border-bottom: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
      }
      .pref-shortcut:last-child { border-bottom: 0; }
      .pref-shortcut__name { font-weight: 600; font-size: .9rem; margin: 0 0 2px; }
      .pref-shortcut__desc { color: var(--ion-color-medium); font-size: .78rem; margin: 0; }
      .pref-keys { display: flex; gap: 4px; align-items: center; }
      .pref-key-sep { color: var(--ion-color-medium); font-size: .8rem; }

      /* Rango */
      .pref-range { width: 100%; accent-color: var(--ion-color-primary); margin-top: 4px; }

      /* Barra de guardado (sticky) */
      .pref-save-bar {
        position: sticky;
        bottom: 0;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 20px;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        background: color-mix(in srgb, var(--ion-background-color) 92%, transparent);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        z-index: 10;
        margin-top: 24px;
      }
      .pref-save-bar__msg {
        flex: 1 1 auto;
        font-size: .82rem;
        color: var(--ion-color-medium);
      }
      .pref-save-bar__dirty {
        color: var(--ion-color-warning);
        font-weight: 600;
        display: none;
      }
      .is-dirty .pref-save-bar__clean { display: none; }
      .is-dirty .pref-save-bar__dirty { display: inline; }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `

            heading="Preferencias"
            description="Personaliza idioma, formato, apariencia, notificaciones y atajos de teclado.">
          </ok-page-header>

              <ion-icon name="settings-outline" style="font-size:15px"></ion-icon>

            <button class="pref-tab" data-tab="notif" role="tab" aria-selected="false">
              <ion-icon name="notifications-outline" style="font-size:15px"></ion-icon>

            <button class="pref-tab" data-tab="a11y" role="tab" aria-selected="false">
              <ion-icon name="eye-outline" style="font-size:15px"></ion-icon>
              Accesibilidad

          </div>

          <!-- ══ PANEL: General ══════════════════════════════════════════ -->
          <div class="pref-panel" id="panel-general" role="tabpanel">

            <!-- Idioma y región -->
            <section>
              <div class="pref-section-head">
                <div>
                  <p class="pref-section-title">Idioma y región</p>
                  <p class="pref-section-sub">Afecta a fechas, números, moneda y mensajes del sistema.</p>

              </div>
              <ion-card>
                <ion-card-content>
                  <div class="pref-fields">
                    <div class="pref-field">
                      <span class="pref-label">Idioma de la interfaz</span>
                      <ion-select
                        fill="outline"
                        value="es-ES"
                        label-placement="stacked"
                        interface="popover">
                        <ion-select-option value="es-ES">Español (España)</ion-select-option>
                        <ion-select-option value="en">English</ion-select-option>
                        <ion-select-option value="ca">Català</ion-select-option>
                        <ion-select-option value="eu">Euskara</ion-select-option>
                        <ion-select-option value="gl">Galego</ion-select-option>
                        <ion-select-option value="pt">Português</ion-select-option>
                        <ion-select-option value="fr">Français</ion-select-option>
                        <ion-select-option value="de">Deutsch</ion-select-option>
                        <ion-select-option value="it">Italiano</ion-select-option>

                      <span class="pref-hint">Cambia inmediatamente tras guardar.</span>
                    </div>
                    <div class="pref-field">
                      <span class="pref-label">Zona horaria</span>

                      </ion-input>
                      <span class="pref-hint">Detectada automáticamente · 8 may 2026, 09:14</span>

                    <div class="pref-field">
                      <span class="pref-label">Formato de fecha</span>
                      <ion-radio-group id="date-fmt-group" value="DD/MM/YYYY">

                        <ion-radio value="MM/DD/YYYY" label-placement="end" justify="start">MM/DD/YYYY <span class="pref-radio-muted">· 05/08/2026</span></ion-radio>
                        <ion-radio value="YYYY-MM-DD" label-placement="end" justify="start">YYYY-MM-DD <span class="pref-radio-muted">· 2026-05-08</span></ion-radio>
                      </ion-radio-group>
                    </div>
                    <div class="pref-field">
                      <span class="pref-label">Formato de hora</span>
                      <ion-segment id="time-fmt-seg" value="24h" class="pref-ion-seg">
                        <ion-segment-button value="12h">12 h <span class="pref-radio-muted" style="margin-left:4px">9:14 AM</span></ion-segment-button>
                        <ion-segment-button value="24h">24 h <span class="pref-radio-muted" style="margin-left:4px">09:14</span></ion-segment-button>
                      </ion-segment>
                    </div>
                    <div class="pref-field">
                      <span class="pref-label">Primer día de la semana</span>

                      </ion-segment>
                    </div>
                  </div>
                </ion-card-content>
              </ion-card>
            </section>

            <!-- Apariencia -->
            <section>
              <div class="pref-section-head">
                <div>
                  <p class="pref-section-title">Apariencia</p>
                  <p class="pref-section-sub">Tema, paleta de marca y densidad visual.</p>

              </div>
              <ion-card>
                <ion-card-content>
                  <div style="display:flex;flex-direction:column;gap:18px;">
                    <div class="pref-field">
                      <span class="pref-label">Tema</span>
                      <ion-segment id="theme-seg" value="auto" class="pref-ion-seg">

                    <div>
                      <div class="pref-toggle-row">
                        <div class="pref-toggle-row__text">

                          <span class="pref-toggle-row__desc">Desactiva transiciones suaves y movimientos parallax.</span>
                        </div>
                        <ion-toggle id="tog-reduce-motion"></ion-toggle>
                      </div>
                      <div class="pref-toggle-row">
                        <div class="pref-toggle-row__text">
                          <span class="pref-toggle-row__label">Contraste alto</span>
                          <span class="pref-toggle-row__desc">Aumenta el contraste de texto y bordes (WCAG AAA).</span>
                        </div>
                        <ion-toggle id="tog-contrast"></ion-toggle>
                      </div>
                    </div>
                  </div>
                </ion-card-content>
              </ion-card>
            </section>

            <!-- Notificaciones -->
            <section>
              <div class="pref-section-head">

                  <p class="pref-section-sub">Cómo y cuándo te avisamos.</p>

              <ion-card>
                <ion-card-content>
                  <div style="display:flex;flex-direction:column;gap:16px;">
                    <div class="pref-field">
                      <span class="pref-label">Resumen por email</span>
                      <ion-segment id="email-freq-g" value="daily" class="pref-ion-seg" style="flex-wrap:wrap;">

                        <ion-segment-button value="monthly">Mensual</ion-segment-button>

                    </div>

                    </div>
                    <div class="pref-keys">
                      <ok-kbd>/</ok-kbd>
                    </div>
                  </div>
                  <div class="pref-shortcut">

                    <div class="pref-keys">

                    </div>
                    <div class="pref-keys">
                      <ok-kbd>?</ok-kbd>
                    </div>

            <section>
              <div class="pref-section-head">

                        <ion-select-option value="es-ES">Español (España)</ion-select-option>
                        <ion-select-option value="en">English</ion-select-option>
                        <ion-select-option value="ca">Català</ion-select-option>
                        <ion-select-option value="eu">Euskara</ion-select-option>
                        <ion-select-option value="gl">Galego</ion-select-option>
                        <ion-select-option value="pt">Português</ion-select-option>
                        <ion-select-option value="fr">Français</ion-select-option>
                        <ion-select-option value="de">Deutsch</ion-select-option>
                      </ion-select>
                    </div>
                    <div class="pref-field">
                      <span class="pref-label">Moneda</span>
                      <ion-select fill="outline" value="EUR" label-placement="stacked" interface="popover">
                        <ion-select-option value="EUR">EUR · Euro</ion-select-option>
                        <ion-select-option value="USD">USD · Dólar</ion-select-option>
                        <ion-select-option value="GBP">GBP · Libra</ion-select-option>
                      </ion-select>
                    </div>
                    <div class="pref-field">
                      <span class="pref-label">Formato de fecha</span>
                      <ion-radio-group id="date-fmt-group2" value="DD/MM/YYYY">
                        <ion-radio value="DD/MM/YYYY" label-placement="end" justify="start">DD/MM/YYYY</ion-radio>
                        <ion-radio value="MM/DD/YYYY" label-placement="end" justify="start">MM/DD/YYYY</ion-radio>
                        <ion-radio value="YYYY-MM-DD" label-placement="end" justify="start">YYYY-MM-DD</ion-radio>
                      </ion-radio-group>
                    </div>
                    <div class="pref-field">
                      <span class="pref-label">Primer día de la semana</span>
                      <ion-segment id="first-day-seg2" value="mon" class="pref-ion-seg">
                        <ion-segment-button value="mon">Lunes</ion-segment-button>
                        <ion-segment-button value="sun">Domingo</ion-segment-button>
                      </ion-segment>
                    </div>
                  </div>
                </ion-card-content>
              </ion-card>
            </section>

          </div>

          <!-- ══ PANEL: Accesibilidad ══════════════════════════════════ -->
          <div class="pref-panel" id="panel-a11y" hidden role="tabpanel">

            <section>
              <div class="pref-section-head">
                <div>
                  <p class="pref-section-title">Accesibilidad visual y motriz</p>
                  <p class="pref-section-sub">Ajustes para mejorar la usabilidad.</p>
                </div>
              </div>
              <ion-card>
                <ion-card-content>
                  <div class="pref-toggle-row" style="border-top:0;padding-top:0;">
                    <div class="pref-toggle-row__text">
                      <span class="pref-toggle-row__label">Contraste alto</span>
                      <span class="pref-toggle-row__desc">Aumenta el contraste de texto y bordes (WCAG AAA).</span>
                    </div>
                    <ion-toggle id="tog-a11y-contrast"></ion-toggle>
                  </div>
                  <div class="pref-toggle-row">
                    <div class="pref-toggle-row__text">
                      <span class="pref-toggle-row__label">Reducir animaciones</span>
                      <span class="pref-toggle-row__desc">Desactiva transiciones suaves.</span>
                    </div>
                    <ion-toggle id="tog-a11y-motion"></ion-toggle>
                  </div>
                  <div class="pref-toggle-row">
                    <div class="pref-toggle-row__text">
                      <span class="pref-toggle-row__label">Modo lector de pantalla</span>
                      <span class="pref-toggle-row__desc">Optimiza la app para NVDA / VoiceOver.</span>
                    </div>
                    <ion-toggle id="tog-screen-reader"></ion-toggle>
                  </div>
                  <div class="pref-toggle-row">
                    <div class="pref-toggle-row__text">
                      <span class="pref-toggle-row__label">Navegación por teclado</span>
                      <span class="pref-toggle-row__desc">Activa atajos completos y skip-links.</span>
                    </div>
                    <ion-toggle id="tog-keyboard-nav" checked></ion-toggle>
                  </div>
                  <div class="pref-toggle-row">
                    <div class="pref-toggle-row__text">
                      <span class="pref-toggle-row__label">Tipografía para dislexia</span>
                      <span class="pref-toggle-row__desc">Sustituye la fuente por OpenDyslexic.</span>
                    </div>
                    <ion-toggle id="tog-dyslexic"></ion-toggle>
                  </div>
                  <div class="pref-toggle-row">
                    <div class="pref-toggle-row__text">
                      <span class="pref-toggle-row__label">Indicadores de foco visibles</span>
                      <span class="pref-toggle-row__desc">Muestra anillos de foco también con ratón.</span>
                    </div>
                    <ion-toggle id="tog-focus-rings" checked></ion-toggle>
                  </div>
                </ion-card-content>
              </ion-card>
            </section>

          </div>

          <!-- Barra de guardado sticky -->
          <div class="pref-save-bar" id="save-bar">
            <span class="pref-save-bar__msg">
              <span class="pref-save-bar__clean">Sin cambios.</span>
              <span class="pref-save-bar__dirty">Cambios sin guardar · se descartarán al cerrar sesión.</span>
            </span>
            <ion-button fill="outline" size="small" id="btn-reset" disabled>Restablecer</ion-button>
            <ion-button size="small" id="btn-save" disabled>
              <ion-icon slot="start" name="save-outline"></ion-icon>
              Guardar cambios
            </ion-button>
          </div>
        `,
        setup(doc) {
          // ── Estado de la vista ──────────────────────────────────────────
          let dirty = false;

          // ── Gestión de tabs ─────────────────────────────────────────────
          const TABS = ['general', 'notif', 'appear', 'lang', 'a11y'];
          const tabBtns = doc.querySelectorAll('#pref-tabs .pref-tab');
          const panels = TABS.map((id) => doc.getElementById('panel-' + id));

          const showTab = (target) => {
            tabBtns.forEach((btn) => {
              const active = btn.dataset.tab === target;
              btn.classList.toggle('is-active', active);
              btn.setAttribute('aria-selected', String(active));
            });
            panels.forEach((panel, i) => {
              if (TABS[i] === target) {
                panel.removeAttribute('hidden');
              } else {
                panel.setAttribute('hidden', '');
              }
            });
          };

          tabBtns.forEach((btn) => {
            btn.addEventListener('click', () => showTab(btn.dataset.tab));
          });

          // ── Marcar dirty y actualizar barra ────────────────────────────
          const saveBar = doc.getElementById('save-bar');
          const btnReset = doc.getElementById('btn-reset');
          const btnSave = doc.getElementById('btn-save');

          const markDirty = () => {
            dirty = true;
            saveBar.classList.add('is-dirty');
            btnReset.removeAttribute('disabled');
            btnSave.removeAttribute('disabled');
          };

          const clearDirty = () => {
            dirty = false;
            saveBar.classList.remove('is-dirty');
            btnReset.setAttribute('disabled', '');
            btnSave.setAttribute('disabled', '');
          };

          // ── ion-segment y ion-radio-group: marcan dirty en ionChange ──
          const segIds = [
            'theme-seg', 'theme-seg2',
            'time-fmt-seg',
            'first-day-seg', 'first-day-seg2',
            'email-freq-g', 'email-freq-g2',
          ];
          segIds.forEach((id) => {
            const el = doc.getElementById(id);
            if (el) el.addEventListener('ionChange', markDirty);
          });

          // ── Radios de fecha (ion-radio-group) ───────────────────────────
          const radioGroupIds = ['date-fmt-group', 'date-fmt-group2'];
          radioGroupIds.forEach((id) => {
            const el = doc.getElementById(id);
            if (el) el.addEventListener('ionChange', markDirty);
          });

          // ── Rango tamaño texto ──────────────────────────────────────────
          const sizeRange = doc.getElementById('txt-size-range');
          const sizeVal = doc.getElementById('txt-size-val');
          if (sizeRange && sizeVal) {
            sizeRange.addEventListener('input', () => {
              sizeVal.textContent = sizeRange.value + ' px';
              markDirty();
            });
          }
          const sizeRange2 = doc.getElementById('txt-size-range2');
          const sizeVal2 = doc.getElementById('txt-size-val2');
          if (sizeRange2 && sizeVal2) {
            sizeRange2.addEventListener('input', () => {
              sizeVal2.textContent = sizeRange2.value + ' px';
              markDirty();
            });
          }

          // ── Toggles ─────────────────────────────────────────────────────
          const togIds = [
            'tog-reduce-motion', 'tog-contrast', 'tog-push', 'tog-sound',
            'tog-push2', 'tog-sound2', 'tog-motion2',
            'tog-a11y-contrast', 'tog-a11y-motion', 'tog-screen-reader',
            'tog-keyboard-nav', 'tog-dyslexic', 'tog-focus-rings',
          ];
          togIds.forEach((id) => {
            const el = doc.getElementById(id);
            if (el) el.addEventListener('ionChange', markDirty);
          });

          // (ion-radio-group events ya cableados arriba)

          // ── Selects ──────────────────────────────────────────────────────
          doc.querySelectorAll('ion-select').forEach((s) => {
            s.addEventListener('ionChange', markDirty);
          });

          // ── Inputs ───────────────────────────────────────────────────────
          doc.querySelectorAll('ion-input').forEach((inp) => {
            inp.addEventListener('ionInput', markDirty);
          });

          // ── Barra de guardado: acciones ──────────────────────────────────
          if (btnReset) {
            btnReset.addEventListener('click', () => {
              // Demo: simplemente limpia el estado dirty
              clearDirty();
            });
          }
          if (btnSave) {
            btnSave.addEventListener('click', () => {
              // Demo: simula guardar
              clearDirty();
            });
          }
        },
      });
    </script>
  </body>
</html>
