<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Hub · Eliminar rol</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* Fondo desenfocado simulando la pantalla detrás del modal */
      .ui-modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }

      /* Contenido detrás del modal (roles list simulada) */
      .ui-bg-content {
        position: fixed;
        inset: 0;
        filter: blur(3px) brightness(0.65);
        pointer-events: none;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* Diálogo de confirmación */
      .ui-confirm-dialog {
        position: relative;
        z-index: 101;
        width: 100%;
        max-width: 480px;
        margin: 16px;
      }

      /* Cabecera del modal */
      .ui-dialog-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 20px 12px;
        border-bottom: 1px solid var(--ion-border-color, rgba(127, 127, 127, 0.2));
      }
      .ui-dialog-title {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.05rem;
        font-weight: 700;
        margin: 0;
        color: var(--ion-color-danger);
      }

      /* Cuerpo del modal */
      .ui-dialog-body {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* Texto informativo */
      .ui-dialog-desc {
        margin: 0;
        font-size: 0.92rem;
        line-height: 1.55;
      }
      .ui-dialog-desc--muted {
        color: var(--ion-color-medium);
      }

      /* Campo de confirmación */
      .ui-confirm-label {
        display: block;
        font-size: 0.88rem;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .ui-confirm-hint {
        display: block;
        margin-top: 6px;
        font-size: 0.78rem;
        color: var(--ion-color-danger);
        min-height: 1.2em;
      }
      .ui-confirm-hint--hidden {
        visibility: hidden;
      }

      /* Pie del modal */
      .ui-dialog-footer {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        padding: 12px 20px 20px;
        border-top: 1px solid var(--ion-border-color, rgba(127, 127, 127, 0.2));
      }

      /* Texto con código inline */
      code.ui-code {
        font-family: monospace;
        font-size: 0.87em;
        background: var(--ion-color-step-100, rgba(127, 127, 127, 0.12));
        padding: 1px 5px;
        border-radius: 4px;
      }

      /* Estado de carga del botón */
      .ui-btn-spinner {
        display: none;
        --color: white;
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .ui-btn-loading .ui-btn-spinner { display: inline-block; }
      .ui-btn-loading .ui-btn-icon { display: none; }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <!-- Fondo simulado de la lista de roles (borroso detrás del modal) -->
          <div class="ui-bg-content" aria-hidden="true">
            <ok-page-header heading="Roles" description="4 roles · Cafetería La Rambla"></ok-page-header>
            <ok-data-table id="bg-dt" style="opacity:.6"></ok-data-table>
          </div>

          <!-- Capa de fondo oscuro + diálogo centrado -->
          <div class="ui-modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="del-title" aria-describedby="del-desc">
            <div class="ui-confirm-dialog">
              <ion-card style="margin:0;border-radius:12px;overflow:hidden">

                <!-- Cabecera -->
                <div class="ui-dialog-header">
                  <h3 class="ui-dialog-title" id="del-title">
                    <ion-icon name="trash-outline" style="font-size:1.2rem;flex-shrink:0"></ion-icon>
                    Eliminar rol
                  </h3>
                  <ion-button id="btn-close" fill="clear" size="small" color="medium" aria-label="Cerrar">
                    <ion-icon slot="icon-only" name="close-outline"></ion-icon>
                  </ion-button>
                </div>

                <!-- Cuerpo -->
                <div class="ui-dialog-body" id="del-desc">

                  <!-- Aviso: usuarios afectados -->
                  <ok-inline-feedback
                    tone="warning"
                    heading="3 usuarios tienen asignado el rol Manager">
                    Al eliminarlo, esos usuarios serán reasignados automáticamente al rol por defecto:
                    <strong>Cajero</strong>. Podrás revisarlos después en la lista de empleados.
                  </ok-inline-feedback>

                  <!-- Descripción -->
                  <p class="ui-dialog-desc">
                    Vas a eliminar el rol <strong>Manager</strong> creado el 12 abril 2026 por Joan Castell.
                  </p>
                  <p class="ui-dialog-desc ui-dialog-desc--muted">
                    Esta acción es permanente y no se puede deshacer.
                  </p>

                  <!-- Campo de confirmación -->
                  <div>
                    <label class="ui-confirm-label" for="confirm-input">
                      Para confirmar, escribe <code class="ui-code">eliminar manager</code>
                    </label>
                    <ion-input
                      id="confirm-input"
                      fill="outline"
                      placeholder="eliminar manager"
                      autocomplete="off"
                      clearInput="false">
                    </ion-input>
                    <span class="ui-confirm-hint ui-confirm-hint--hidden" id="confirm-hint">
                      El texto debe coincidir exactamente.
                    </span>
                  </div>

                </div>

                <!-- Pie con acciones -->
                <div class="ui-dialog-footer">
                  <ion-button id="btn-cancel" fill="outline" color="medium">Cancelar</ion-button>
                  <ion-button id="btn-delete" color="danger" disabled>
                    <ion-spinner name="crescent" class="ui-btn-spinner" id="delete-spinner"></ion-spinner>
                    <ion-icon slot="start" name="trash-outline" class="ui-btn-icon" id="delete-icon"></ion-icon>
                    <span id="delete-label">Eliminar definitivamente</span>
                  </ion-button>
                </div>

              </ion-card>
            </div>
          </div>
        `,
        setup(doc) {
          const CONFIRM_TEXT = 'eliminar manager';

          // Tabla de fondo (decorativa, datos simulados)
          const bgDt = doc.getElementById('bg-dt');
          if (bgDt) {
            bgDt.columns = [
              { key: 'name',   header: 'Rol' },
              { key: 'users',  header: 'Usuarios', align: 'right' },
              { key: 'level',  header: 'Nivel' },
            ];
            bgDt.rows = [
              { name: 'Administrador', users: 1, level: 'Alto' },
              { name: 'Manager',       users: 3, level: 'Medio' },
              { name: 'Cajero',        users: 8, level: 'Básico' },
              { name: 'Repartidor',    users: 4, level: 'Básico' },
            ];
          }

          // Referencias al diálogo
          const inputEl      = doc.getElementById('confirm-input');
          const hintEl       = doc.getElementById('confirm-hint');
          const btnDelete    = doc.getElementById('btn-delete');
          const btnCancel    = doc.getElementById('btn-cancel');
          const btnClose     = doc.getElementById('btn-close');
          const deleteLabel  = doc.getElementById('delete-label');
          const deleteIcon   = doc.getElementById('delete-icon');
          const deleteSpinner = doc.getElementById('delete-spinner');
          const backdrop     = doc.getElementById('modal-backdrop');

          let loading = false;

          // Validar el texto de confirmación al escribir
          const validateInput = (value) => {
            const trimmed = (value || '').trim().toLowerCase();
            const valid = trimmed === CONFIRM_TEXT;
            const hasText = trimmed.length > 0;

            // Mostrar/ocultar la pista de error
            if (hasText && !valid) {
              hintEl.classList.remove('ui-confirm-hint--hidden');
            } else {
              hintEl.classList.add('ui-confirm-hint--hidden');
            }

            // Habilitar/deshabilitar el botón de eliminar
            if (valid) {
              btnDelete.removeAttribute('disabled');
            } else {
              btnDelete.setAttribute('disabled', '');
            }
          };

          // ion-input emite ionInput cuando cambia el valor
          if (inputEl) {
            inputEl.addEventListener('ionInput', (e) => {
              const val = (e.detail && e.detail.value != null) ? e.detail.value : '';
              validateInput(val);
            });
          }

          // Cerrar el modal (simula navegación hacia atrás)
          const closeModal = () => {
            if (backdrop) {
              backdrop.style.opacity = '0';
              backdrop.style.transition = 'opacity 0.2s';
              setTimeout(() => { backdrop.style.display = 'none'; }, 200);
            }
          };

          if (btnCancel) btnCancel.addEventListener('click', closeModal);
          if (btnClose) btnClose.addEventListener('click', closeModal);

          // Acción de eliminar
          if (btnDelete) {
            btnDelete.addEventListener('click', () => {
              if (loading) return;
              loading = true;

              // Estado de carga visual
              btnDelete.setAttribute('disabled', '');
              if (deleteLabel) deleteLabel.textContent = 'Eliminando…';
              if (deleteIcon) deleteIcon.style.display = 'none';
              if (deleteSpinner) {
                deleteSpinner.style.display = 'inline-block';
              }

              // Simular latencia de red (1.8 s)
              setTimeout(() => {
                loading = false;
                closeModal();
              }, 1800);
            });
          }
        },
      });
    </script>
  </body>
</html>
