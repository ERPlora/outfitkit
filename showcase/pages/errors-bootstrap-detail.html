<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Error de arranque — Detalle</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      const TRACE = `Traceback (most recent call last):
  File "/opt/erplora/hub/bootstrap.py", line 142, in main
    sync_client.connect(timeout=30)
  File "/opt/erplora/hub/cloud_sync/client.py", line 87, in connect
    self._tls_handshake()
  File "/opt/erplora/hub/cloud_sync/client.py", line 121, in _tls_handshake
    sock.do_handshake()
  ssl.SSLError: [SSL: HANDSHAKE_TIMEOUT] timeout (_ssl.c:1129)

Configuration:
  hub_id:        hub-acme-prod-1
  bridge_url:    https://acme.erplora.cloud:443
  proxy:         (none)
  ca_bundle:     /etc/ssl/certs/ca-certificates.crt
  released:      v2.2.0 (sha 850419c · 2026-05-07)
  uptime_at_fail: 23m 14s
  trace_id:      4f2a-bootstrap-3b81-9c2e

Last 5 successful syncs:
  2026-05-08T13:42:00Z  ok  (rtt 142 ms)
  2026-05-08T12:42:00Z  ok  (rtt 158 ms)
  2026-05-08T11:42:00Z  ok  (rtt 134 ms)
  2026-05-08T10:42:00Z  ok  (rtt 199 ms)
  2026-05-08T09:42:00Z  ok  (rtt 121 ms)`;

      definePage({
        bare: true,
        body: `
          <ok-error-page
            id="err-bootstrap"
            mode="bootstrap"
            variant="danger"
            code="Bootstrap failure · technical detail"
            title="Detalle del error de arranque"
            message="Información completa del fallo en la inicialización del Hub. Comparte estos datos con soporte si el reintento automático no resuelve el problema."
            details-label="Stack trace completo"
            meta="trace · 4f2a-bootstrap-3b81-9c2e · build v2.2.0 · 2026-05-08 14:33 UTC">

            <!-- Acciones en slot -->
            <ion-button
              slot="actions"
              fill="outline"
              id="btn-copy-trace">
              <ion-icon slot="start" name="copy-outline"></ion-icon>
              Copiar trace
            </ion-button>

            <ion-button
              slot="actions"
              fill="outline"
              href="/errors/bootstrap.html">
              <ion-icon slot="start" name="arrow-back-outline"></ion-icon>
              Volver al diagnóstico
            </ion-button>

            <ion-button
              slot="actions"
              color="danger"
              id="btn-retry">
              <ion-icon slot="start" name="refresh-outline"></ion-icon>
              Reintentar ahora
            </ion-button>

          </ok-error-page>
        `,
        setup(doc) {
          const errPage = doc.getElementById('err-bootstrap');

          // Verificaciones de arranque (checklist de diagnóstico)
          if (errPage) {
            errPage.checks = [
              {
                name: 'Sistema de archivos · permisos OK',
                status: 'ok',
                time: '12 ms',
              },
              {
                name: 'Base de datos · 3.6 GB · íntegra',
                status: 'ok',
                time: '142 ms',
              },
              {
                name: 'Resolución DNS para acme.erplora.cloud',
                status: 'pending',
                time: '5.4 s',
              },
              {
                name: 'TLS handshake con cloud (timeout 30 s)',
                status: 'fail',
                time: 'timeout',
              },
            ];

            errPage.trace = TRACE;
          }

          // Copiar trace al portapapeles
          const btnCopy = doc.getElementById('btn-copy-trace');
          if (btnCopy) {
            btnCopy.addEventListener('click', () => {
              if (navigator.clipboard) {
                navigator.clipboard.writeText('4f2a-bootstrap-3b81-9c2e').then(() => {
                  const toast = document.createElement('ion-toast');
                  toast.message = 'Trace ID copiado al portapapeles';
                  toast.duration = 2000;
                  toast.position = 'bottom';
                  toast.color = 'medium';
                  document.body.appendChild(toast);
                  toast.present();
                  toast.addEventListener('didDismiss', () => toast.remove());
                });
              }
            });
          }

          // Reintentar: recarga la página
          const btnRetry = doc.getElementById('btn-retry');
          if (btnRetry) {
            btnRetry.addEventListener('click', () => {
              location.reload();
            });
          }
        },
      });
    </script>
  </body>
</html>
