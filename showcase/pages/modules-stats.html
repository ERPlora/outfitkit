                  <ion-button fill="outline" size="small"><iconify-icon slot="start" icon="lucide:edit-2" width="13" height="13"></iconify-icon>Editar</ion-button>

              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:cloud-check" width="12" height="12"></iconify-icon>Instalaciones activas</div>
                <div class="developer-kpi-value">117</div>
