<!doctype html>
<html lang="es" data-theme="erplora-light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Eliminar cuenta - ERPlora Cloud</title>

    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/ok-inline-feedback.js"></script>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      defineSaasDashboardPage({
        active: '/dashboard/settings/',
        title: 'Eliminar cuenta',
        body: `
          <div style="max-width:680px;margin:0 auto">
            <ok-inline-feedback tone="danger" heading="Aviso: esta acción es permanente">
              <p style="margin:.25rem 0">Al eliminar tu cuenta se borrarán de forma permanente:</p>
              <ul style="margin:.5rem 0 0;padding-left:1.25rem;line-height:1.6">
                <li>Tu perfil e información personal</li>
                <li>Todos tus hubs y sus datos</li>
                <li>Tu suscripción e información de facturación</li>
                <li>Todos los módulos y configuraciones</li>
                <li>Historial de pagos y facturas</li>
              </ul>
            </ok-inline-feedback>

            <ion-card style="margin-top:1rem">
              <ion-card-header>
                <ion-card-title>Confirmar eliminación de la cuenta</ion-card-title>
                <ion-card-subtitle>Para confirmar, introduce tu contraseña.</ion-card-subtitle>
              </ion-card-header>
              <ion-card-content>
                <form method="post" action="" style="display:grid;gap:1rem">
                  <input type="hidden" name="action" value="delete_account" />
                  <div>
                    <ion-input data-bind="password" type="password" name="password_ion"
                               label="Contraseña" label-placement="floating" fill="outline"
                               placeholder="Introduce tu contraseña" required autocomplete="current-password">
                      <ion-input-password-toggle slot="end"></ion-input-password-toggle>
                    </ion-input>
                    <input type="hidden" name="password" />
                  </div>
                  <ion-button type="submit" color="danger" expand="block">Eliminar mi cuenta</ion-button>
                </form>
              </ion-card-content>
            </ion-card>

            <ion-card>
              <ion-card-header><ion-card-title>¿Necesitas ayuda?</ion-card-title></ion-card-header>
              <ion-card-content>
                <p style="margin:0 0 1rem;color:var(--ion-color-medium);line-height:1.55">
                  Si tienes problemas con tu cuenta, nuestro equipo de soporte está aquí para ayudarte.
                </p>
                <ion-button href="mailto:info@erplora.com" fill="outline">Contactar con soporte</ion-button>
              </ion-card-content>
            </ion-card>
          </div>`,
        footer: `
          <footer id="section-tabbar">
            <ion-segment value="profile" aria-label="Navegación de cuenta">
              <ion-segment-button value="settings"><iconify-icon icon="lucide:settings" width="20" height="20"></iconify-icon><ion-label>Ajustes</ion-label></ion-segment-button>
              <ion-segment-button value="devices"><iconify-icon icon="lucide:smartphone" width="20" height="20"></iconify-icon><ion-label>Dispositivos</ion-label></ion-segment-button>
              <ion-segment-button value="sessions"><iconify-icon icon="lucide:shield-check" width="20" height="20"></iconify-icon><ion-label>Sesiones</ion-label></ion-segment-button>
              <ion-segment-button value="profile"><iconify-icon icon="lucide:user" width="20" height="20"></iconify-icon><ion-label>Perfil</ion-label></ion-segment-button>
            </ion-segment>
          </footer>`,
        setup(doc) {
          const inputs = doc.querySelectorAll('ion-input[data-bind]');
          for (const inp of inputs) {
            const name = inp.getAttribute('data-bind');
            const form = inp.closest('form');
            const hidden = form?.querySelector(`input[type="hidden"][name="${name}"]`);
            if (!form || !hidden) continue;
            const sync = () => { hidden.value = inp.value != null ? String(inp.value) : ''; };
            inp.addEventListener('ionInput', sync);
            inp.addEventListener('ionChange', sync);
            form.addEventListener('submit', sync);
          }
        },
      });
    </script>
  </body>
</html>
