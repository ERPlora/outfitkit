<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Hub · Archivos</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      defineHubPage({
        active: 'files',
        title: 'Archivos',
        body: `
          <ok-file-manager id="file-manager" searchable uploadable></ok-file-manager>
          <ion-toast id="files-toast" duration="2600" position="bottom"></ion-toast>
        `,
        setup(doc) {
          const fileManager = doc.getElementById('file-manager');
          const toast = doc.getElementById('files-toast');
          if (!fileManager || !toast) return;

          // FilesPage.vue degrada a vacío cuando el runtime no devuelve contenido. El showcase
          // conserva ese estado honesto: no inventa carpetas, archivos ni una cuota del tenant.
          let allFiles = [];
          let query = '';
          fileManager.folders = [];
          fileManager.files = [];
          fileManager.path = [];
          fileManager.quota = undefined;
          fileManager.selected = '';
          fileManager.labels = {
            upload: 'Subir archivo',
            import: 'Importar',
            search: 'Buscar archivos…',
            folders: 'Carpetas',
            space: 'Espacio',
            empty: 'Sin archivos',
            download: 'Descargar',
            delete: 'Eliminar',
            open: 'Abrir',
            newFolder: 'Nueva carpeta',
          };

          function showToast(message) {
            toast.message = message;
            toast.isOpen = true;
          }

          function applyState() {
            const normalized = query.trim().toLowerCase();
            fileManager.files = normalized
              ? allFiles.filter((file) => file.name.toLowerCase().includes(normalized))
              : allFiles;
          }

          function load(folder = '') {
            fileManager.loading = true;
            fileManager.folders = [];
            allFiles = [];
            fileManager.path = [];
            fileManager.quota = undefined;
            fileManager.selected = folder;
            query = '';
            fileManager.loading = false;
            applyState();
          }

          fileManager.addEventListener('ok-navigate', (event) => {
            load(event.detail?.id ?? '');
          });
          fileManager.addEventListener('ok-search', (event) => {
            query = event.detail?.query ?? '';
            applyState();
          });
          fileManager.addEventListener('ok-open', () => showToast('Sin archivos'));
          fileManager.addEventListener('ok-download', () => showToast('Sin archivos'));
          fileManager.addEventListener('ok-upload', () => showToast('Sin archivos'));
          fileManager.addEventListener('ok-delete', () => showToast('Sin archivos'));
          fileManager.addEventListener('ok-create-folder', () => {
            const name = window.prompt('Nueva carpeta');
            if (name) showToast('Sin archivos');
          });

          toast.addEventListener('didDismiss', () => {
            toast.isOpen = false;
          });

          load('');
        },
      });
    </script>
  </body>
</html>
