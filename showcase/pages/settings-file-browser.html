<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Hub · Archivos del Hub</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Archivos del Hub"
            description="Almacenamiento del tenant · 1,8 GB de 5 GB usados">
            <ion-button slot="actions" fill="outline" size="small">
              <ion-icon slot="start" name="cloud-upload-outline"></ion-icon>
              Importar
            </ion-button>
            <ion-button slot="actions" size="small">
              <ion-icon slot="start" name="add"></ion-icon>
              Subir archivo
            </ion-button>
          </ok-page-header>

          <ok-file-manager id="file-mgr" style="display:block"></ok-file-manager>
        `,
        setup(doc) {
          const fm = doc.getElementById('file-mgr');
          if (!fm) return;

          // Árbol de carpetas del tenant
          fm.folders = [
            {
              id: 'root',
              label: 'tenant-rambla',
              icon: 'folder-open-outline',
              expanded: true,
              children: [
                { id: 'invoices', label: 'facturas', icon: 'document-text-outline', count: 142 },
                { id: 'tickets',  label: 'tickets',  icon: 'receipt-outline',       count: 3412 },
                { id: 'exports',  label: 'exports',  icon: 'share-outline',         count: 28 },
                { id: 'logs',     label: 'logs',     icon: 'document-outline',      count: 7 },
                { id: 'media',    label: 'multimedia', icon: 'images-outline',      count: 86 },
                { id: 'backups',  label: 'backups',  icon: 'server-outline',        count: 14 },
              ],
            },
          ];

          // Medidor de espacio
          fm.quota = {
            usedLabel: '1,8 GB usados',
            totalLabel: '5 GB',
            fraction: 0.36,
          };

          // Carpeta activa inicial: facturas
          fm.selected = 'invoices';

          // Vista inicial: cuadrícula
          fm.view = 'grid';

          // Breadcrumb inicial
          fm.path = [
            { id: 'root',     label: 'tenant-rambla' },
            { id: 'invoices', label: 'facturas' },
          ];

          // Archivos de la carpeta "facturas"
          const FILES = {
            invoices: [
              { id: 'f1',  name: 'FAC-2026-00142.pdf', ext: 'pdf', sizeLabel: '218 KB',  modified: '2026-05-08 09:14' },
              { id: 'f2',  name: 'FAC-2026-00141.pdf', ext: 'pdf', sizeLabel: '204 KB',  modified: '2026-05-08 08:42' },
              { id: 'f3',  name: 'FAC-2026-00140.pdf', ext: 'pdf', sizeLabel: '196 KB',  modified: '2026-05-07 18:55' },
              { id: 'f4',  name: 'FAC-2026-00139.pdf', ext: 'pdf', sizeLabel: '182 KB',  modified: '2026-05-07 14:20' },
              { id: 'f5',  name: 'FAC-2026-00138.pdf', ext: 'pdf', sizeLabel: '211 KB',  modified: '2026-05-07 11:38' },
              { id: 'f6',  name: 'FAC-2026-00137.pdf', ext: 'pdf', sizeLabel: '198 KB',  modified: '2026-05-06 17:50' },
            ],
            tickets: [
              { id: 't1', name: 'TKT-2026-03412.pdf', ext: 'pdf', sizeLabel: '48 KB',  modified: '2026-05-08 09:01' },
              { id: 't2', name: 'TKT-2026-03411.pdf', ext: 'pdf', sizeLabel: '45 KB',  modified: '2026-05-08 08:55' },
              { id: 't3', name: 'TKT-2026-03410.pdf', ext: 'pdf', sizeLabel: '51 KB',  modified: '2026-05-08 08:33' },
            ],
            exports: [
              { id: 'e1', name: 'ventas-2026-04.csv', ext: 'csv', sizeLabel: '1,2 MB', modified: '2026-05-01 03:00' },
              { id: 'e2', name: 'ventas-2026-03.csv', ext: 'csv', sizeLabel: '1,1 MB', modified: '2026-04-01 03:00' },
              { id: 'e3', name: 'inventario-2026-04.xlsx', ext: 'xlsx', sizeLabel: '340 KB', modified: '2026-04-30 22:10' },
            ],
            logs: [
              { id: 'l1', name: 'hub-2026-05-08.log', ext: 'log', sizeLabel: '82 KB',  modified: '2026-05-08 09:14' },
              { id: 'l2', name: 'hub-2026-05-07.log', ext: 'log', sizeLabel: '74 KB',  modified: '2026-05-07 23:59' },
            ],
            media: [
              { id: 'm1', name: 'logo-rambla.png',  ext: 'png', sizeLabel: '84 KB',  modified: '2026-04-30 11:02' },
              { id: 'm2', name: 'portada-menu.jpg', ext: 'jpg', sizeLabel: '214 KB', modified: '2026-04-15 09:44' },
              { id: 'm3', name: 'carta-verano.pdf', ext: 'pdf', sizeLabel: '1,4 MB', modified: '2026-04-10 16:22' },
            ],
            backups: [
              { id: 'b1', name: 'backup-2026-05-08.tar.gz', ext: 'gz',  sizeLabel: '142 MB', modified: '2026-05-08 03:00' },
              { id: 'b2', name: 'backup-2026-05-07.tar.gz', ext: 'gz',  sizeLabel: '139 MB', modified: '2026-05-07 03:00' },
              { id: 'b3', name: 'backup-2026-05-06.tar.gz', ext: 'gz',  sizeLabel: '141 MB', modified: '2026-05-06 03:00' },
            ],
            root: [],
          };

          fm.files = FILES['invoices'];

          // Navegar entre carpetas al hacer clic en el árbol
          fm.addEventListener('ok-navigate', (e) => {
            const id = e.detail && e.detail.id;
            if (!id) return;
            fm.selected = id;
            fm.files = FILES[id] || [];

            // Actualizar breadcrumb
            if (id === 'root') {
              fm.path = [{ id: 'root', label: 'tenant-rambla' }];
            } else {
              const LABELS = {
                invoices: 'facturas',
                tickets:  'tickets',
                exports:  'exports',
                logs:     'logs',
                media:    'multimedia',
                backups:  'backups',
              };
              fm.path = [
                { id: 'root', label: 'tenant-rambla' },
                { id, label: LABELS[id] || id },
              ];
            }
          });

          // Acciones de archivos (demo: alertas simples vía ion-toast)
          const toast = (msg) => {
            const t = document.createElement('ion-toast');
            t.message = msg;
            t.duration = 2000;
            t.position = 'bottom';
            document.body.appendChild(t);
            t.present();
            t.addEventListener('didDismiss', () => t.remove());
          };

          fm.addEventListener('ok-open',     (e) => toast('Abriendo ' + (e.detail && e.detail.id)));
          fm.addEventListener('ok-download',  (e) => toast('Descargando ' + (e.detail && e.detail.id)));
          fm.addEventListener('ok-delete',    (e) => toast('Eliminando ' + (e.detail && e.detail.id)));
          fm.addEventListener('ok-upload',    (e) => toast('Subiendo ' + ((e.detail && e.detail.files && e.detail.files.length) || 0) + ' archivo(s)…'));
          fm.addEventListener('ok-create-folder', () => toast('Nueva carpeta…'));

          fm.searchable = true;
          fm.uploadable = true;
        },
      });
    </script>
  </body>
</html>
