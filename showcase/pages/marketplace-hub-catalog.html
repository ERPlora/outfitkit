    <style>
      /* Rejilla de tarjetas de módulo: auto-fill mínimo 260 px */
      .mp-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 12px;
        margin-bottom: 28px;
      }

      /* Tarjeta de módulo */
      .mp-card {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .mp-card ion-card-content {
        display: flex;
        flex-direction: column;
        gap: 10px;
        flex: 1;
        padding-top: 12px;
      }

      /* Cabecera de la tarjeta: icono + título + badge */
      .mp-head {
        display: flex;
        gap: 10px;
        align-items: flex-start;
      }
      .mp-icon {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: color-mix(in srgb, var(--ion-color-primary) 10%, transparent);
        color: var(--ion-color-primary);
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .mp-icon svg {
        width: 20px;
        height: 20px;
      }
      .mp-meta {
        flex: 1;
        min-width: 0;
      }
      .mp-name {
        font-weight: 700;
        font-size: 0.95rem;
        margin: 0;
        line-height: 1.3;
      }
      .mp-cat {
        font-size: 0.72rem;
        color: var(--ion-color-medium);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-top: 2px;
      }

      /* Descripción */
      .mp-desc {
        font-size: 0.85rem;
        color: var(--ion-color-medium);
        line-height: 1.5;
        margin: 0;
        flex: 1;
      }

      /* Pie: precio + acción */
      .mp-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: auto;
        padding-top: 8px;
        border-top: 1px solid color-mix(in srgb, var(--ion-text-color) 8%, transparent);
      }
      .mp-price {
        font-weight: 700;
        font-size: 0.9rem;
        font-variant-numeric: tabular-nums;
      }
      .mp-price--free {
        color: var(--ion-color-success);
      }
      .mp-price-unit {
        font-weight: 400;
        font-size: 0.75rem;
        color: var(--ion-color-medium);
      }

      /* Separador de sección */
      .mp-section-label {
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--ion-color-medium);
        margin: 24px 0 10px;
      }
      .mp-section-label:first-child {
        margin-top: 0;
      }

    </style>

      // ── Renderiza una tarjeta de módulo ───────────────────────────────────
      function renderCard(mod) {
        const statusBadge = mod.status === 'installed'
          ? `<ion-badge color="success">Instalado</ion-badge>`
          : mod.status === 'active'
          ? `<ion-badge color="success">Activo</ion-badge>`
          : mod.badge
          ? `<ion-badge color="${mod.badgeColor || 'primary'}">${mod.badge}</ion-badge>`
          : '';

        const priceHtml = mod.price
          ? `<span class="mp-price">${mod.price}<span class="mp-price-unit">${mod.priceUnit || ''}</span></span>`
          : `<span class="mp-price mp-price--free">Gratis</span>`;

        const btnLabel = mod.btnLabel || (mod.status ? 'Ver' : 'Instalar');
        const btnFill = mod.status ? 'outline' : 'solid';
        const btnIcon = mod.btnLabel === 'Comprar'
          ? 'card-outline'
          : mod.status
          ? 'eye-outline'
          : 'download-outline';

        return `
          <ion-card class="mp-card" style="margin:0;height:100%;display:flex;flex-direction:column">
            <ion-card-content>
              <div class="mp-head">
                <div class="mp-icon">${mod.icon}</div>
                <div class="mp-meta">
                  <p class="mp-name">${mod.name}</p>
                  <div class="mp-cat">${mod.cat}</div>
                </div>
                ${statusBadge}
              </div>
              <p class="mp-desc">${mod.desc}</p>
              <div class="mp-foot">
                ${priceHtml}
                <ion-button fill="${btnFill}" size="small" data-module="${mod.id}">
                  <ion-icon slot="start" name="${btnIcon}"></ion-icon>
                  ${btnLabel}
                </ion-button>
              </div>
            </ion-card-content>
          </ion-card>`;
      }

      // ── Secciones del catálogo ────────────────────────────────────────────
      function renderSections(sections) {
        return sections.map((sec) => `
          <p class="mp-section-label">${sec.section}</p>
          <div class="mp-grid">
            ${sec.modules.map(renderCard).join('')}
          </div>`).join('');
      }

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Catálogo de módulos"
            description="29 módulos disponibles · 13 gratuitos · 16 de pago">
          </ok-page-header>

          <ion-segment id="mp-tabs" value="all" style="margin-bottom:16px">
            <ion-segment-button value="mine">
              <ion-icon name="cube-outline"></ion-icon>
              <ion-label>Mis módulos</ion-label>
            </ion-segment-button>
            <ion-segment-button value="all">
              <ion-icon name="storefront-outline"></ion-icon>
              <ion-label>Catálogo</ion-label>
            </ion-segment-button>
            <ion-segment-button value="paid">
              <ion-icon name="wallet-outline"></ion-icon>
              <ion-label>Pago</ion-label>
            </ion-segment-button>
          </ion-segment>

          <div id="mp-catalog">
            ${renderSections(CATALOG)}
          </div>
        `,
        setup(doc) {
          // Wiring del segmento de pestañas
          const seg = doc.getElementById('mp-tabs');
          const catalog = doc.getElementById('mp-catalog');
          seg.addEventListener('ionChange', (e) => {
            const val = e.detail.value;
            const allSections = CATALOG;
            let filtered;
            if (val === 'mine') {
              filtered = allSections.map((s) => ({
                ...s,
                modules: s.modules.filter((m) => m.status === 'installed' || m.status === 'active'),
              })).filter((s) => s.modules.length > 0);
            } else if (val === 'paid') {
              filtered = allSections.map((s) => ({
                ...s,
                modules: s.modules.filter((m) => m.price),
              })).filter((s) => s.modules.length > 0);
            } else {
              filtered = allSections;
            }
            catalog.innerHTML = renderSections(filtered);
            wireModuleButtons(doc);
          });

          wireModuleButtons(doc);
        },
      });

      function wireModuleButtons(doc) {
        // Wiring de botones de módulo (toast de feedback)
        doc.querySelectorAll('[data-module]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const modId = btn.getAttribute('data-module');
            const text = btn.textContent.trim();
            const toast = document.createElement('ion-toast');
            toast.message = text === 'Ver'
              ? `Abriendo detalle de ${modId}…`
              : text === 'Comprar'
              ? `Iniciando compra de ${modId}…`
              : `Instalando módulo ${modId}…`;
            toast.duration = 2000;
            toast.position = 'bottom';
            toast.color = 'dark';
            document.body.appendChild(toast);
            toast.present();
            toast.addEventListener('didDismiss', () => toast.remove());
          });
        });
      }
    </script>
  </body>
</html>
