<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERPlora Hub · Categorías fiscales</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>

    <style>
      .taxes-page {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
      }

      .taxes-page > ok-data-table {
        flex: 1 1 auto;
        min-height: 0;
      }

      .taxes-form {
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
      }

      .taxes-form ion-button {
        align-self: flex-end;
      }

      @media (max-width: 520px) {
        .taxes-form ion-button {
          width: 100%;
          margin-inline: 0;
        }
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      // Copia auditable de las seis categorías de seed/install.sqlite.sql (ADR-0085).
      const CATEGORY_FIXTURE = [
        { "id": "taxcat-restaurant-food", "key": "restaurant.food", "name": "Restaurant — food", "description": "", "is_system": 1, "is_active": 1 },
        { "id": "taxcat-restaurant-drink", "key": "restaurant.drink", "name": "Restaurant — drink", "description": "", "is_system": 1, "is_active": 1 },
        { "id": "taxcat-restaurant-alcohol", "key": "restaurant.alcohol", "name": "Restaurant — alcohol", "description": "", "is_system": 1, "is_active": 1 },
        { "id": "taxcat-restaurant-delivery", "key": "restaurant.delivery", "name": "Restaurant — delivery", "description": "", "is_system": 1, "is_active": 1 },
        { "id": "taxcat-service-generic", "key": "service.generic", "name": "Service — generic", "description": "", "is_system": 1, "is_active": 1 },
        { "id": "taxcat-product-generic", "key": "product.generic", "name": "Product — generic", "description": "", "is_system": 1, "is_active": 1 }
      ];

      let categories = CATEGORY_FIXTURE.map((row) => ({ ...row }));
      const commandLog = [];
      const queryLog = [];

      function recordCommand(name, payload) {
        commandLog.push({ name, payload: { ...payload } });
        document.dispatchEvent(new CustomEvent('erplora:preview-command', { detail: { name, payload } }));
      }

      function recordQuery(name, params) {
        queryLog.push({ name, params: { ...params } });
      }

      defineHubPage({
        active: '/m/taxes/categories',
        title: 'Categorías fiscales',
        body: `
          <div class="taxes-page">
            <ok-data-table id="taxes-categories-table" fill>
              <form id="taxes-category-form" slot="create" class="taxes-form">
                <ion-input
                  id="tax-category-key"
                  fill="outline"
                  label="Clave"
                  label-placement="floating"
                  placeholder="restaurant.food"
                  pattern="^[a-z][a-z0-9_.]*$"
                  maxlength="80"
                  required
                ></ion-input>
                <ion-input
                  id="tax-category-name"
                  fill="outline"
                  label="Nombre"
                  label-placement="floating"
                  maxlength="255"
                  required
                ></ion-input>
                <ion-textarea
                  id="tax-category-description"
                  fill="outline"
                  label="Descripción"
                  label-placement="floating"
                  maxlength="1000"
                  auto-grow="true"
                ></ion-textarea>
                <ion-button id="tax-category-save" type="submit">Añadir</ion-button>
              </form>
            </ok-data-table>
          </div>
        `,
        setup(doc) {
          const table = doc.getElementById('taxes-categories-table');
          const form = doc.getElementById('taxes-category-form');
          const keyInput = doc.getElementById('tax-category-key');
          const nameInput = doc.getElementById('tax-category-name');
          const descriptionInput = doc.getElementById('tax-category-description');
          const saveButton = doc.getElementById('tax-category-save');
          const state = {
            page: 0,
            pageSize: 50,
            sort: 'name',
            dir: 'asc',
            search: '',
            filters: {},
          };

          table.columns = [
            { key: 'key', header: 'Clave', sortable: true, filterable: true, filterType: 'text' },
            { key: 'name', header: 'Nombre', sortable: true, filterable: true, filterType: 'text' },
            {
              key: 'description',
              header: 'Descripción',
              sortable: true,
              filterable: true,
              filterType: 'text',
              format: (row) => String(row.description || '—'),
            },
            {
              key: 'is_system',
              header: 'Origen',
              sortable: true,
              filterable: true,
              filterType: 'select',
              options: [
                { value: '1', label: 'Sistema' },
                { value: '0', label: 'Propia' },
              ],
              format: (row) => Number(row.is_system) ? '🔒 Sistema' : 'Propia',
            },
            {
              key: 'is_active',
              header: 'Activa',
              sortable: true,
              filterable: true,
              filterType: 'select',
              options: [
                { value: '1', label: 'Sí' },
                { value: '0', label: 'No' },
              ],
              format: (row) => Number(row.is_active) ? 'Sí' : 'No',
            },
          ];
          table.serverSide = true;
          table.fill = true;
          table.addable = true;
          table.views = true;
          table.cardTitle = (row) => String(row.name || row.key || '—');
          table.cardIcon = () => 'calculator-outline';
          table.searchable = true;
          table.searchPlaceholder = 'Buscar clave o nombre…';
          table.emptyMessage = 'Sin categorías fiscales.';
          table.pageSize = 50;
          table.sort = 'name';
          table.sortDir = 'asc';

          function queryPage() {
            recordQuery('taxes.categories.list', { ...state });
            const term = state.search.trim().toLocaleLowerCase('es');
            const filtered = categories
              .filter((row) => {
                if (term && !`${row.key} ${row.name} ${row.description}`.toLocaleLowerCase('es').includes(term)) return false;
                return Object.entries(state.filters).every(([key, value]) => {
                  if (value == null || value === '') return true;
                  if (key === 'name' || key === 'description') {
                    return String(row[key] || '').toLocaleLowerCase('es').includes(String(value).toLocaleLowerCase('es'));
                  }
                  return String(row[key] ?? '') === String(value);
                });
              })
              .sort((left, right) => {
                const result = String(left[state.sort] ?? '').localeCompare(String(right[state.sort] ?? ''), 'es', { numeric: true });
                return state.dir === 'desc' ? -result : result;
              });

            const start = state.page * state.pageSize;
            table.rows = filtered.slice(start, start + state.pageSize);
            table.total = filtered.length;
            table.page = state.page;
            table.pageSize = state.pageSize;
            table.sort = state.sort;
            table.sortDir = state.dir;
          }

          form.addEventListener('submit', (event) => {
            event.preventDefault();
            const key = String(keyInput.value || '').trim();
            const name = String(nameInput.value || '').trim();
            const description = String(descriptionInput.value || '').trim();
            if (!/^[a-z][a-z0-9_.]*$/.test(key) || !name || categories.some((row) => row.key === key)) return;

            saveButton.disabled = true;
            const payload = { key, name, description };
            recordCommand('taxes.categories.create', payload);
            categories = [...categories, {
              id: `preview-tax-category-${categories.length + 1}`,
              ...payload,
              is_system: 0,
              is_active: 1,
            }];
            keyInput.value = '';
            nameInput.value = '';
            descriptionInput.value = '';
            table.close();
            state.page = 0;
            queryPage();
            saveButton.disabled = false;
          });

          table.addEventListener('pageChange', (event) => { state.page = Number(event.detail) || 0; queryPage(); });
          table.addEventListener('pageSizeChange', (event) => {
            state.pageSize = Number(event.detail) || 50;
            state.page = 0;
            queryPage();
          });
          table.addEventListener('sortChange', (event) => {
            state.sort = event.detail.sort;
            state.dir = event.detail.dir;
            queryPage();
          });
          table.addEventListener('searchChange', (event) => {
            state.search = String(event.detail || '');
            state.page = 0;
            queryPage();
          });
          table.addEventListener('filterChange', (event) => {
            state.filters[event.detail.col] = event.detail.value;
            state.page = 0;
            queryPage();
          });

          queryPage();
        },
      });
    </script>
  </body>
</html>
