<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Hub · Centro de ayuda</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* ── Hero search ── */
      .ui-help-hero {
        text-align: center;
        padding: 32px 24px;
        border-radius: 14px;
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
        background: var(--ion-color-step-50, rgba(127,127,127,.04));
        margin-bottom: 24px;
      }
      .ui-help-hero h1 {
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        margin: 0 0 6px;
      }
      .ui-help-hero p {
        font-size: .875rem;
        color: var(--ion-color-medium);
        margin: 0 0 22px;
      }
      .ui-search-wrap {
        display: flex;
        align-items: center;
        max-width: 520px;
        margin: 0 auto;
        border: 1.5px solid var(--ion-border-color, rgba(127,127,127,.25));
        border-radius: 10px;
        background: var(--ion-background-color, #fff);
        overflow: hidden;
        padding: 0 14px;
        gap: 8px;
      }
      .ui-search-wrap ion-icon {
        font-size: 18px;
        color: var(--ion-color-medium);
        flex-shrink: 0;
      }
      .ui-search-wrap ion-input {
        flex: 1 1 auto;
        --border-width: 0;
        --box-shadow: none;
        --padding-start: 0;
        --padding-end: 0;
        --padding-top: 10px;
        --padding-bottom: 10px;
        --background: transparent;
      }
      .ui-search-kbd {
        font-size: .72rem;
        font-weight: 600;
        color: var(--ion-color-medium);
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.3));
        border-radius: 5px;
        padding: 2px 6px;
        flex-shrink: 0;
        font-family: monospace;
      }

      /* ── Sección título ── */
      .ui-section-title {
        font-size: 1.125rem;
        font-weight: 700;
        margin: 0 0 14px;
      }

      /* ── Tarjetas de categoría ── */
      .ui-cat-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        margin-bottom: 28px;
      }
      @media (max-width: 700px) {
        .ui-cat-grid { grid-template-columns: repeat(2, 1fr); }
      }
      @media (max-width: 440px) {
        .ui-cat-grid { grid-template-columns: 1fr; }
      }
      .ui-cat-card {
        margin: 0;
        cursor: pointer;
        transition: box-shadow .15s;
      }
      .ui-cat-card:hover {
        box-shadow: 0 4px 20px rgba(0,0,0,.10);
      }
      .ui-cat-card ion-card-content {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 16px;
      }
      .ui-cat-text h3 {
        font-size: .9375rem;
        font-weight: 700;
        margin: 0 0 4px;
      }
      .ui-cat-text p {
        font-size: .8125rem;
        color: var(--ion-color-medium);
        margin: 0;
        line-height: 1.4;
      }

      /* ── Acordeón de FAQ ── */
      .ui-faq {
        display: flex;
        flex-direction: column;
        gap: 0;
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 28px;
      }
      .ui-faq-item {
        border-bottom: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
      }
      .ui-faq-item:last-child { border-bottom: 0; }

      .ui-faq-trigger {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        padding: 16px 18px;
        background: none;
        border: none;
        cursor: pointer;
        text-align: left;
        color: var(--ion-text-color);
        font-size: .9375rem;
      }
      .ui-faq-trigger:hover {
        background: var(--ion-color-step-50, rgba(127,127,127,.04));
      }
      .ui-faq-icon {
        flex-shrink: 0;
      }
      .ui-faq-texts {
        flex: 1 1 auto;
        min-width: 0;
      }
      .ui-faq-title {
        font-weight: 600;
        display: block;
        font-size: .9375rem;
      }
      .ui-faq-sub {
        display: block;
        font-size: .78rem;
        color: var(--ion-color-medium);
        margin-top: 2px;
      }
      .ui-faq-caret {
        flex-shrink: 0;
        transition: transform .2s;
      }
      .ui-faq-caret ion-icon { font-size: 18px; color: var(--ion-color-medium); }
      .ui-faq-item[data-open] .ui-faq-caret {
        transform: rotate(180deg);
      }
      .ui-faq-panel {
        max-height: 0;
        overflow: hidden;
        transition: max-height .25s ease;
        font-size: .9rem;
        line-height: 1.6;
        color: var(--ion-text-color);
      }
      .ui-faq-item[data-open] .ui-faq-panel {
        max-height: 600px;
      }
      .ui-faq-panel-inner {
        padding: 0 18px 18px 62px;
      }
      .ui-faq-panel-inner ol {
        margin: 8px 0 0;
        padding-left: 20px;
        font-size: .8125rem;
        color: var(--ion-color-medium);
      }
      .ui-faq-panel-inner ol li { margin-bottom: 4px; }

      /* ── Dos columnas contacto + recursos ── */
      .ui-contact-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      @media (max-width: 640px) {
        .ui-contact-grid { grid-template-columns: 1fr; }
      }

      .ui-resource-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      /* ── Modal soporte ── */
      .ui-modal-foot {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        padding: 16px 20px 20px;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Centro de ayuda"
            description="Busca en la documentación, las FAQ y los tutoriales del Hub.">
          </ok-page-header>

          <!-- Hero search -->
          <div class="ui-help-hero">
            <h1>¿En qué podemos ayudarte?</h1>
            <p>Busca en la documentación, las FAQ y los tutoriales del Hub.</p>
            <div class="ui-search-wrap">
              <ion-icon name="search-outline"></ion-icon>
              <ion-input id="help-search" placeholder="Buscar en la ayuda…" inputmode="search"></ion-input>
              <span class="ui-search-kbd">⌘K</span>
            </div>
          </div>

          <!-- Categorías -->
          <h2 class="ui-section-title">Categorías</h2>
          <div class="ui-cat-grid">

            <ion-card class="ui-cat-card">
              <ion-card-content>
                <ok-icon-tile icon="rocket-outline" color="brand" size="lg"></ok-icon-tile>
                <div class="ui-cat-text">
                  <h3>Empezar</h3>
                  <p>Setup inicial, primer empleado, primer módulo.</p>
                </div>
              </ion-card-content>
            </ion-card>

            <ion-card class="ui-cat-card">
              <ion-card-content>
                <ok-icon-tile icon="card-outline" color="info" size="lg"></ok-icon-tile>
                <div class="ui-cat-text">
                  <h3>Facturación</h3>
                  <p>Suscripción, módulos de pago, métodos.</p>
                </div>
              </ion-card-content>
            </ion-card>

            <ion-card class="ui-cat-card">
              <ion-card-content>
                <ok-icon-tile icon="people-outline" color="leaf" size="lg"></ok-icon-tile>
                <div class="ui-cat-text">
                  <h3>Empleados y roles</h3>
                  <p>Cuentas, PIN, permisos por módulo.</p>
                </div>
              </ion-card-content>
            </ion-card>

            <ion-card class="ui-cat-card">
              <ion-card-content>
                <ok-icon-tile icon="receipt-outline" color="warn" size="lg"></ok-icon-tile>
                <div class="ui-cat-text">
                  <h3>POS y caja</h3>
                  <p>TPV, KDS, comandero, cierre de caja.</p>
                </div>
              </ion-card-content>
            </ion-card>

            <ion-card class="ui-cat-card">
              <ion-card-content>
                <ok-icon-tile icon="shield-checkmark-outline" color="danger" size="lg"></ok-icon-tile>
                <div class="ui-cat-text">
                  <h3>Cumplimiento</h3>
                  <p>Verifactu, AEAT, modelos fiscales.</p>
                </div>
              </ion-card-content>
            </ion-card>

            <ion-card class="ui-cat-card">
              <ion-card-content>
                <ok-icon-tile icon="print-outline" color="neutral" size="lg"></ok-icon-tile>
                <div class="ui-cat-text">
                  <h3>Bridge (hardware)</h3>
                  <p>Impresoras, cajón, escáner, balanzas.</p>
                </div>
              </ion-card-content>
            </ion-card>

          </div>

          <!-- Preguntas frecuentes -->
          <h2 class="ui-section-title">Preguntas frecuentes</h2>
          <div class="ui-faq" id="faq-list">

            <div class="ui-faq-item" data-open id="faq-1">
              <button class="ui-faq-trigger" aria-expanded="true" aria-controls="faq-1-panel">
                <ok-icon-tile icon="rocket-outline" color="neutral" class="ui-faq-icon"></ok-icon-tile>
                <span class="ui-faq-texts">
                  <span class="ui-faq-title">¿Cómo configuro mi primer empleado?</span>
                  <span class="ui-faq-sub">Crear cuenta, asignar PIN y rol</span>
                </span>
                <span class="ui-faq-caret"><ion-icon name="chevron-down-outline"></ion-icon></span>
              </button>
              <div class="ui-faq-panel" id="faq-1-panel" role="region">
                <div class="ui-faq-panel-inner">
                  Ve a <strong>Empleados → + Añadir empleado</strong>. Rellena nombre, email y un PIN de 4 cifras. Asigna un rol predefinido o crea uno custom desde la sección Roles.
                  <ol>
                    <li>Click en "+ Añadir empleado"</li>
                    <li>Rellena el formulario y elige rol</li>
                    <li>Comparte el PIN inicial; el empleado podrá cambiarlo después</li>
                  </ol>
                </div>
              </div>
            </div>

            <div class="ui-faq-item" id="faq-2">
              <button class="ui-faq-trigger" aria-expanded="false" aria-controls="faq-2-panel">
                <ok-icon-tile icon="card-outline" color="neutral" class="ui-faq-icon"></ok-icon-tile>
                <span class="ui-faq-texts">
                  <span class="ui-faq-title">¿Cómo cambio mi plan o método de pago?</span>
                  <span class="ui-faq-sub">Stripe Customer Portal</span>
                </span>
                <span class="ui-faq-caret"><ion-icon name="chevron-down-outline"></ion-icon></span>
              </button>
              <div class="ui-faq-panel" id="faq-2-panel" role="region">
                <div class="ui-faq-panel-inner">
                  Ve a <strong>Facturación → Cambiar plan</strong> o pulsa "Abrir portal Stripe" para gestionar tarjetas, dirección de facturación y cancelaciones.
                </div>
              </div>
            </div>

            <div class="ui-faq-item" id="faq-3">
              <button class="ui-faq-trigger" aria-expanded="false" aria-controls="faq-3-panel">
                <ok-icon-tile icon="cube-outline" color="neutral" class="ui-faq-icon"></ok-icon-tile>
                <span class="ui-faq-texts">
                  <span class="ui-faq-title">¿Cómo instalo un módulo del Marketplace?</span>
                  <span class="ui-faq-sub">Verifactu, e-commerce, RRHH…</span>
                </span>
                <span class="ui-faq-caret"><ion-icon name="chevron-down-outline"></ion-icon></span>
              </button>
              <div class="ui-faq-panel" id="faq-3-panel" role="region">
                <div class="ui-faq-panel-inner">
                  Ve a <strong>Módulos → Marketplace</strong>, busca el módulo, pulsa "Instalar". El Hub descargará el paquete, ejecutará migraciones y lo activará automáticamente.
                </div>
              </div>
            </div>

            <div class="ui-faq-item" id="faq-4">
              <button class="ui-faq-trigger" aria-expanded="false" aria-controls="faq-4-panel">
                <ok-icon-tile icon="shield-checkmark-outline" color="neutral" class="ui-faq-icon"></ok-icon-tile>
                <span class="ui-faq-texts">
                  <span class="ui-faq-title">¿Cómo activo Verifactu?</span>
                </span>
                <span class="ui-faq-caret"><ion-icon name="chevron-down-outline"></ion-icon></span>
              </button>
              <div class="ui-faq-panel" id="faq-4-panel" role="region">
                <div class="ui-faq-panel-inner">
                  Instala el módulo <strong>Verifactu ES</strong> desde el Marketplace, sube tu certificado digital FNMT en Cumplimiento → España y activa el toggle. Las facturas se enviarán automáticamente a la AEAT.
                </div>
              </div>
            </div>

            <div class="ui-faq-item" id="faq-5">
              <button class="ui-faq-trigger" aria-expanded="false" aria-controls="faq-5-panel">
                <ok-icon-tile icon="print-outline" color="neutral" class="ui-faq-icon"></ok-icon-tile>
                <span class="ui-faq-texts">
                  <span class="ui-faq-title">Mi impresora no responde, ¿qué hago?</span>
                </span>
                <span class="ui-faq-caret"><ion-icon name="chevron-down-outline"></ion-icon></span>
              </button>
              <div class="ui-faq-panel" id="faq-5-panel" role="region">
                <div class="ui-faq-panel-inner">
                  Verifica que ERPlora Bridge está conectado (Ajustes → Bridge). Reinicia la impresora, comprueba el cable y prueba imprimir desde Bridge → Test.
                </div>
              </div>
            </div>

            <div class="ui-faq-item" id="faq-6">
              <button class="ui-faq-trigger" aria-expanded="false" aria-controls="faq-6-panel">
                <ok-icon-tile icon="cloud-download-outline" color="neutral" class="ui-faq-icon"></ok-icon-tile>
                <span class="ui-faq-texts">
                  <span class="ui-faq-title">¿Cómo recupero un backup?</span>
                </span>
                <span class="ui-faq-caret"><ion-icon name="chevron-down-outline"></ion-icon></span>
              </button>
              <div class="ui-faq-panel" id="faq-6-panel" role="region">
                <div class="ui-faq-panel-inner">
                  Ve a <strong>Ajustes → Backup → Histórico</strong>, selecciona la fecha y pulsa "Restaurar". El proceso tarda 2–5 minutos y reinicia el Hub.
                </div>
              </div>
            </div>

          </div>

          <!-- Contacto + recursos -->
          <div class="ui-contact-grid">

            <ion-card>
              <ion-card-header>
                <ion-card-title>Recursos externos</ion-card-title>
              </ion-card-header>
              <ion-card-content>
                <div class="ui-resource-list">
                  <ion-button fill="outline" expand="block" href="https://docs.erplora.com" target="_blank">
                    <ion-icon slot="start" name="book-outline"></ion-icon>
                    Documentación oficial
                  </ion-button>
                  <ion-button fill="outline" expand="block" href="https://erplora.com/changelog" target="_blank">
                    <ion-icon slot="start" name="document-text-outline"></ion-icon>
                    Changelog
                  </ion-button>
                  <ion-button fill="outline" expand="block" href="https://github.com/ERPlora/hub" target="_blank">
                    <ion-icon slot="start" name="logo-github"></ion-icon>
                    Repositorio en GitHub
                  </ion-button>
                </div>
              </ion-card-content>
            </ion-card>

            <ion-card>
              <ion-card-header>
                <ion-card-title>¿No encuentras la respuesta?</ion-card-title>
              </ion-card-header>
              <ion-card-content>
                <p style="font-size:.875rem;color:var(--ion-color-medium);margin:0 0 16px;line-height:1.5">
                  Nuestro equipo de soporte responde en menos de 24 h en días laborables.
                </p>
                <ion-button id="btn-contact" expand="block">
                  <ion-icon slot="start" name="chatbubble-outline"></ion-icon>
                  Contactar soporte
                </ion-button>
              </ion-card-content>
            </ion-card>

          </div>

          <!-- Modal: contactar soporte -->
          <ion-modal id="modal-contact">
            <ion-header>
              <ion-toolbar>
                <ion-title>Contactar soporte</ion-title>
                <ion-buttons slot="end">
                  <ion-button id="btn-modal-close">
                    <ion-icon slot="icon-only" name="close-outline"></ion-icon>
                  </ion-button>
                </ion-buttons>
              </ion-toolbar>
            </ion-header>
            <ion-content class="ion-padding">
              <div style="display:flex;flex-direction:column;gap:18px">
                <ion-input
                  label="Asunto"
                  label-placement="stacked"
                  fill="outline"
                  placeholder="¿De qué se trata?"></ion-input>

                <ion-select
                  label="Categoría"
                  label-placement="stacked"
                  fill="outline"
                  value="general">
                  <ion-select-option value="general">Pregunta general</ion-select-option>
                  <ion-select-option value="bug">Error / bug</ion-select-option>
                  <ion-select-option value="billing">Facturación</ion-select-option>
                  <ion-select-option value="feature">Solicitud de funcionalidad</ion-select-option>
                </ion-select>

                <ion-textarea
                  label="Descripción"
                  label-placement="stacked"
                  fill="outline"
                  rows="5"
                  placeholder="Cuéntanos qué pasa…"></ion-textarea>
              </div>
            </ion-content>
            <div class="ui-modal-foot">
              <ion-button fill="outline" id="btn-modal-cancel">Cancelar</ion-button>
              <ion-button id="btn-modal-send">
                <ion-icon slot="start" name="paper-plane-outline"></ion-icon>
                Enviar
              </ion-button>
            </div>
          </ion-modal>
        `,

        setup(doc) {
          // ── Acordeón FAQ ────────────────────────────────────────────────────
          const faqItems = doc.querySelectorAll('.ui-faq-item');
          faqItems.forEach((item) => {
            const trigger = item.querySelector('.ui-faq-trigger');
            if (!trigger) return;
            trigger.addEventListener('click', () => {
              const isOpen = item.hasAttribute('data-open');
              if (isOpen) {
                item.removeAttribute('data-open');
                trigger.setAttribute('aria-expanded', 'false');
              } else {
                item.setAttribute('data-open', '');
                trigger.setAttribute('aria-expanded', 'true');
              }
            });
          });

          // ── Modal de soporte ─────────────────────────────────────────────────
          const modal = doc.getElementById('modal-contact');
          const btnContact = doc.getElementById('btn-contact');
          const btnClose = doc.getElementById('btn-modal-close');
          const btnCancel = doc.getElementById('btn-modal-cancel');
          const btnSend = doc.getElementById('btn-modal-send');

          const openModal = () => {
            if (modal) modal.present();
          };
          const closeModal = () => {
            if (modal) modal.dismiss();
          };

          if (btnContact) btnContact.addEventListener('click', openModal);
          if (btnClose) btnClose.addEventListener('click', closeModal);
          if (btnCancel) btnCancel.addEventListener('click', closeModal);
          if (btnSend) {
            btnSend.addEventListener('click', () => {
              closeModal();
              // Mostrar feedback de envío
              const toast = document.createElement('ion-toast');
              toast.message = 'Mensaje enviado. Te responderemos en menos de 24 h.';
              toast.duration = 3000;
              toast.position = 'bottom';
              toast.color = 'success';
              document.body.appendChild(toast);
              toast.present();
              toast.addEventListener('didDismiss', () => toast.remove());
            });
          }

          // ── Búsqueda (placeholder — filtrado visual de FAQs) ─────────────────
          const searchInput = doc.getElementById('help-search');
          if (searchInput) {
            searchInput.addEventListener('ionInput', (e) => {
              const q = (e.detail && e.detail.value ? e.detail.value : '').trim().toLowerCase();
              faqItems.forEach((item) => {
                const text = item.textContent.toLowerCase();
                item.style.display = (!q || text.includes(q)) ? '' : 'none';
              });
            });
          }
        },
      });
    </script>
  </body>
</html>
