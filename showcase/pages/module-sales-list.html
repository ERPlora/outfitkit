<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERPlora Hub · Ventas</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>

    <style>
      .sales-page {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
      }

      .sales-stats {
        display: flex;
        flex: 0 0 auto;
        flex-wrap: wrap;
        gap: 0.6rem;
        margin-bottom: 1rem;
      }

      .sale-stat {
        flex: 1;
        min-width: 8rem;
        padding: 0.7rem 0.9rem;
        border: 1px solid var(--ion-border-color, #e0ddd4);
        border-radius: 12px;
        background: var(--ion-card-background, var(--ion-background-color, #fff));
      }

      .sale-stat-label {
        color: var(--ion-color-medium, #747474);
        font-size: 0.75rem;
        text-transform: uppercase;
      }

      .sale-stat-value {
        margin-top: 0.15rem;
        font-size: 1.3rem;
        font-weight: 700;
      }

      .sales-page > ok-data-table {
        flex: 1 1 auto;
        min-height: 0;
      }

      .sale-document {
        max-width: 32rem;
        margin: 0 auto;
      }

      .sale-document-number {
        margin: 0 0 1rem;
        text-align: center;
        font: 700 1rem ui-monospace, monospace;
      }

      .sale-document-total {
        display: flex;
        justify-content: space-between;
        padding: 1rem 0;
        border-top: 2px solid var(--ion-border-color, #d9d6cf);
        font-size: 1.15rem;
      }

      @media (max-width: 600px) {
        .sales-stats {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .sale-stat {
          min-width: 0;
        }

        .sale-stat:last-child {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      // La venta canónica del visor real del módulo. Los importes del contrato están en céntimos.
      const SALE_PREVIEW_ROWS = [
        {
          "id": "s1",
          "sale_number": "TICKET-2026-000004",
          "status": "completed",
          "total": 360,
          "customer_name": "",
          "payment_method_name": "Efectivo",
          "created_at": "2026-07-16T19:00:30.884434990+00:00"
        }
      ];

      const money = new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' });
      const dateTime = new Intl.DateTimeFormat('es-ES', { dateStyle: 'short', timeStyle: 'short' });
      const formatMoney = (cents) => money.format((Number(cents) || 0) / 100);
      const formatDate = (value) => {
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? String(value ?? '—') : dateTime.format(date);
      };
      const statusLabel = (value) => value === 'completed'
        ? 'Completada'
        : value === 'voided' ? 'Anulada' : String(value || '—');

      defineHubPage({
        active: '/m/sales/sales',
        title: 'Ventas',
        body: `
          <div class="sales-page">
            <div class="sales-stats" aria-label="Resumen de ventas">
              <section class="sale-stat">
                <div class="sale-stat-label">Tickets</div>
                <div id="sales-stat-tickets" class="sale-stat-value">0</div>
              </section>
              <section class="sale-stat">
                <div class="sale-stat-label">Ingresos</div>
                <div id="sales-stat-revenue" class="sale-stat-value">0,00 €</div>
              </section>
              <section class="sale-stat">
                <div class="sale-stat-label">Ticket medio</div>
                <div id="sales-stat-average" class="sale-stat-value">0,00 €</div>
              </section>
            </div>

            <ok-data-table id="sales-table" fill></ok-data-table>
          </div>

          <ion-modal id="sale-document-modal">
            <ion-header class="ion-no-border">
              <ion-toolbar>
                <ion-title>Documento de venta</ion-title>
                <ion-buttons slot="end">
                  <ion-button id="sale-document-close" aria-label="Cerrar">
                    <ion-icon name="close" slot="icon-only"></ion-icon>
                  </ion-button>
                </ion-buttons>
              </ion-toolbar>
            </ion-header>
            <ion-content class="ion-padding">
              <article class="sale-document">
                <p id="sale-document-number" class="sale-document-number"></p>
                <ion-list lines="full">
                  <ion-item>
                    <ion-label>Fecha</ion-label>
                    <ion-note id="sale-document-date" slot="end"></ion-note>
                  </ion-item>
                  <ion-item>
                    <ion-label>Cliente</ion-label>
                    <ion-note id="sale-document-customer" slot="end"></ion-note>
                  </ion-item>
                  <ion-item>
                    <ion-label>Forma de pago</ion-label>
                    <ion-note id="sale-document-payment" slot="end"></ion-note>
                  </ion-item>
                  <ion-item>
                    <ion-label>Estado</ion-label>
                    <ion-note id="sale-document-status" slot="end"></ion-note>
                  </ion-item>
                </ion-list>
                <strong class="sale-document-total">
                  <span>TOTAL</span>
                  <span id="sale-document-total"></span>
                </strong>
              </article>
            </ion-content>
            <ion-footer class="ion-no-border">
              <ion-toolbar>
                <ion-button id="sale-document-print" expand="block">
                  <ion-icon name="print-outline" slot="start"></ion-icon>
                  Imprimir
                </ion-button>
              </ion-toolbar>
            </ion-footer>
          </ion-modal>
        `,
        setup(doc) {
          const rows = SALE_PREVIEW_ROWS.map((row) => ({ ...row }));
          const table = doc.getElementById('sales-table');
          const modal = doc.getElementById('sale-document-modal');

          let page = 0;
          let pageSize = 50;
          let sort = 'created_at';
          let sortDir = 'desc';
          let search = '';
          let filters = {};

          table.columns = [
            { key: 'sale_number', header: 'Número', sortable: true, filterable: true, filterType: 'text' },
            { key: 'customer_name', header: 'Cliente', sortable: true, filterable: true, filterType: 'text', format: (row) => row.customer_name || '—' },
            { key: 'payment_method_name', header: 'Pago', sortable: true, filterable: true, filterType: 'text', format: (row) => row.payment_method_name || '—' },
            { key: 'status', header: 'Estado', sortable: true, filterable: true, filterType: 'select', options: [
              { value: 'completed', label: 'Completada' },
              { value: 'voided', label: 'Anulada' },
            ], format: (row) => statusLabel(row.status) },
            { key: 'total', header: 'Total', align: 'right', sortable: true, filterable: true, filterType: 'range', format: (row) => formatMoney(row.total) },
          ];
          table.actions = [
            { id: 'document', label: 'Documento', icon: 'receipt-outline' },
          ];
          table.serverSide = true;
          table.fill = true;
          table.views = true;
          table.cardTitle = (row) => String(row.sale_number ?? '—');
          table.cardIcon = () => 'receipt-outline';
          table.searchable = true;
          table.searchPlaceholder = 'Buscar número o cliente…';
          table.pageSize = 50;
          table.sort = 'created_at';
          table.sortDir = 'desc';
          table.emptyMessage = 'Aún no hay ventas.';

          function updateStats() {
            const completed = rows.filter((row) => row.status === 'completed');
            const revenue = completed.reduce((sum, row) => sum + Number(row.total || 0), 0);
            doc.getElementById('sales-stat-tickets').textContent = String(completed.length);
            doc.getElementById('sales-stat-revenue').textContent = formatMoney(revenue);
            doc.getElementById('sales-stat-average').textContent = formatMoney(completed.length ? revenue / completed.length : 0);
          }

          function rangeMatch(value, range) {
            if (!range || typeof range !== 'object') return true;
            const from = range.from === '' || range.from == null ? null : Number(range.from);
            const to = range.to === '' || range.to == null ? null : Number(range.to);
            const number = Number(value);
            return (from == null || number >= from) && (to == null || number <= to);
          }

          function renderRows() {
            const term = search.trim().toLocaleLowerCase('es');
            const filtered = rows.filter((row) => {
              if (term && !`${row.sale_number} ${row.customer_name} ${row.payment_method_name}`.toLocaleLowerCase('es').includes(term)) return false;
              for (const [column, value] of Object.entries(filters)) {
                if (value == null || value === '') continue;
                if (column === 'total' && !rangeMatch(row.total, value)) return false;
                if (column === 'status' && row.status !== value) return false;
                if (column !== 'total' && column !== 'status' && !String(row[column] ?? '').toLocaleLowerCase('es').includes(String(value).toLocaleLowerCase('es'))) return false;
              }
              return true;
            });
            filtered.sort((left, right) => {
              const a = left[sort];
              const b = right[sort];
              const result = typeof a === 'number' && typeof b === 'number'
                ? a - b
                : String(a ?? '').localeCompare(String(b ?? ''), 'es');
              return sortDir === 'desc' ? -result : result;
            });
            table.total = filtered.length;
            table.rows = filtered.slice(page * pageSize, page * pageSize + pageSize);
            table.page = page;
            table.pageSize = pageSize;
            table.sort = sort;
            table.sortDir = sortDir;
          }

          function openDocument(row) {
            doc.getElementById('sale-document-number').textContent = row.sale_number;
            doc.getElementById('sale-document-date').textContent = formatDate(row.created_at);
            doc.getElementById('sale-document-customer').textContent = row.customer_name || '—';
            doc.getElementById('sale-document-payment').textContent = row.payment_method_name || '—';
            doc.getElementById('sale-document-status').textContent = statusLabel(row.status);
            doc.getElementById('sale-document-total').textContent = formatMoney(row.total);
            modal.present();
          }

          table.addEventListener('rowAction', (event) => {
            if (event.detail.actionId === 'document') openDocument(event.detail.row);
          });
          table.addEventListener('pageChange', (event) => {
            page = Number(event.detail) || 0;
            renderRows();
          });
          table.addEventListener('pageSizeChange', (event) => {
            pageSize = Number(event.detail) || 50;
            page = 0;
            renderRows();
          });
          table.addEventListener('sortChange', (event) => {
            sort = event.detail.sort;
            sortDir = event.detail.dir;
            renderRows();
          });
          table.addEventListener('searchChange', (event) => {
            search = String(event.detail ?? '');
            page = 0;
            renderRows();
          });
          table.addEventListener('filterChange', (event) => {
            filters = { ...filters, [event.detail.col]: event.detail.value };
            page = 0;
            renderRows();
          });

          doc.getElementById('sale-document-close').addEventListener('click', () => modal.dismiss());
          doc.getElementById('sale-document-print').addEventListener('click', () => window.print());

          updateStats();
          renderRows();
        },
      });
    </script>
  </body>
</html>
