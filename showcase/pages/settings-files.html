<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Hub · Archivos del Hub</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Archivos del Hub"
            description="2,4 GB de 10 GB · 1.247 archivos">
            <ion-button slot="actions" fill="outline" size="small">
              <ion-icon slot="start" name="folder-outline"></ion-icon>
              Nueva carpeta
            </ion-button>
            <ion-button slot="actions" size="small">
              <ion-icon slot="start" name="cloud-upload-outline"></ion-icon>
              Subir archivos
            </ion-button>
          </ok-page-header>

          <!-- Gestor de archivos -->
          <ok-file-manager
            id="fm"
            selected="products"
            view="grid"
            searchable
            uploadable>
          </ok-file-manager>
        `,
        setup(doc) {
          // ── ok-file-manager wiring ─────────────────────────────────────────
          const fm = doc.getElementById('fm');
          if (!fm) return;

          // Árbol de carpetas (replica el árbol del prototipo)
          fm.folders = [
            {
              id: 'media',
              label: 'media',
              icon: 'folder-open-outline',
              count: 974,
              children: [
                {
                  id: 'products',
                  label: 'products',
                  icon: 'folder-outline',
                  count: 812,
                },
                {
                  id: 'logos',
                  label: 'logos',
                  icon: 'folder-outline',
                  count: 4,
                },
                {
                  id: 'avatars',
                  label: 'avatars',
                  icon: 'folder-outline',
                  count: 12,
                },
              ],
            },
            {
              id: 'invoices',
              label: 'invoices',
              icon: 'folder-outline',
              count: 218,
            },
            {
              id: 'certificates',
              label: 'certificates',
              icon: 'folder-outline',
              count: 2,
            },
            {
              id: 'backups',
              label: 'backups',
              icon: 'folder-outline',
              count: 31,
            },
          ];

          // Breadcrumb inicial: / media / products
          fm.path = [
            { id: 'media', label: 'media' },
            { id: 'products', label: 'products' },
          ];

          // Medidor de espacio
          fm.quota = {
            usedLabel: '2,4 GB usados',
            totalLabel: '10 GB',
            fraction: 0.24,
          };

          // Archivos de la carpeta "products" (datos del prototipo)
          fm.files = [
            {
              id: 'f1',
              name: 'cafe-cortado.webp',
              ext: 'webp',
              kind: 'imagen',
              sizeLabel: '48 KB',
              modified: '02/05/26',
            },
            {
              id: 'f2',
              name: 'croissant-mantequilla.webp',
              ext: 'webp',
              kind: 'imagen',
              sizeLabel: '62 KB',
              modified: '02/05/26',
            },
            {
              id: 'f3',
              name: 'pan-integral.webp',
              ext: 'webp',
              kind: 'imagen',
              sizeLabel: '71 KB',
              modified: '01/05/26',
            },
            {
              id: 'f4',
              name: 'agua-mineral-50cl.webp',
              ext: 'webp',
              kind: 'imagen',
              sizeLabel: '38 KB',
              modified: '30/04/26',
            },
            {
              id: 'f5',
              name: 'vino-tinto-rioja.webp',
              ext: 'webp',
              kind: 'imagen',
              sizeLabel: '54 KB',
              modified: '30/04/26',
            },
            {
              id: 'f6',
              name: 'menu-verano-2026.pdf',
              ext: 'pdf',
              kind: 'documento',
              sizeLabel: '2,1 MB',
              modified: '28/04/26',
            },
            {
              id: 'f7',
              name: 'cerveza-artesana.webp',
              ext: 'webp',
              kind: 'imagen',
              sizeLabel: '49 KB',
              modified: '27/04/26',
            },
            {
              id: 'f8',
              name: 'smoothie-frutosrojos.webp',
              ext: 'webp',
              kind: 'imagen',
              sizeLabel: '66 KB',
              modified: '26/04/26',
            },
          ];

          // Navegación entre carpetas
          fm.addEventListener('ok-navigate', (e) => {
            const { id } = e.detail || {};
            fm.selected = id;
            // Reconstruir breadcrumb según carpeta
            if (id === 'media') {
              fm.path = [{ id: 'media', label: 'media' }];
              fm.files = [];
            } else if (id === 'products') {
              fm.path = [{ id: 'media', label: 'media' }, { id: 'products', label: 'products' }];
              // Mismos archivos ya asignados arriba — en demo estático los mantenemos
            } else if (id === 'logos') {
              fm.path = [{ id: 'media', label: 'media' }, { id: 'logos', label: 'logos' }];
              fm.files = [
                { id: 'l1', name: 'erplora-logo-horizontal.svg', ext: 'svg', sizeLabel: '4 KB', modified: '10/01/26' },
                { id: 'l2', name: 'erplora-logo-vertical.svg', ext: 'svg', sizeLabel: '4 KB', modified: '10/01/26' },
                { id: 'l3', name: 'cafeteria-la-rambla-logo.png', ext: 'png', sizeLabel: '12 KB', modified: '15/03/26' },
                { id: 'l4', name: 'cafeteria-la-rambla-dark.png', ext: 'png', sizeLabel: '11 KB', modified: '15/03/26' },
              ];
            } else if (id === 'avatars') {
              fm.path = [{ id: 'media', label: 'media' }, { id: 'avatars', label: 'avatars' }];
              fm.files = [
                { id: 'a1', name: 'joan-martinez.jpg', ext: 'jpg', sizeLabel: '22 KB', modified: '01/02/26' },
                { id: 'a2', name: 'marta-puig.jpg', ext: 'jpg', sizeLabel: '19 KB', modified: '01/02/26' },
              ];
            } else if (id === 'invoices') {
              fm.path = [{ id: 'invoices', label: 'invoices' }];
              fm.files = [
                { id: 'i1', name: 'factura-2026-04-001.pdf', ext: 'pdf', sizeLabel: '88 KB', modified: '30/04/26' },
                { id: 'i2', name: 'factura-2026-04-002.pdf', ext: 'pdf', sizeLabel: '91 KB', modified: '30/04/26' },
                { id: 'i3', name: 'factura-2026-03-218.pdf', ext: 'pdf', sizeLabel: '79 KB', modified: '31/03/26' },
              ];
            } else if (id === 'certificates') {
              fm.path = [{ id: 'certificates', label: 'certificates' }];
              fm.files = [
                { id: 'c1', name: 'ssl-wildcard-2026.pem', ext: 'pem', sizeLabel: '3 KB', modified: '01/01/26' },
                { id: 'c2', name: 'root-ca.crt', ext: 'crt', sizeLabel: '2 KB', modified: '01/01/26' },
              ];
            } else if (id === 'backups') {
              fm.path = [{ id: 'backups', label: 'backups' }];
              fm.files = [
                { id: 'b1', name: 'backup-2026-05-14.tar.gz', ext: 'gz', sizeLabel: '398 MB', modified: '14/05/26' },
                { id: 'b2', name: 'backup-2026-05-07.tar.gz', ext: 'gz', sizeLabel: '391 MB', modified: '07/05/26' },
                { id: 'b3', name: 'backup-2026-04-30.tar.gz', ext: 'gz', sizeLabel: '385 MB', modified: '30/04/26' },
              ];
            }
          });

          // Subir archivo (demo: solo alerta)
          fm.addEventListener('ok-upload', (e) => {
            const { files } = e.detail || {};
            const names = (files || []).map((f) => f.name).join(', ');
            const toast = document.createElement('ion-toast');
            toast.message = 'Subida iniciada: ' + (names || '—');
            toast.duration = 2500;
            toast.position = 'bottom';
            document.body.appendChild(toast);
            toast.present();
            toast.addEventListener('didDismiss', () => toast.remove());
          });

          // Nueva carpeta (demo)
          fm.addEventListener('ok-create-folder', () => {
            const alert = document.createElement('ion-alert');
            alert.header = 'Nueva carpeta';
            alert.inputs = [{ name: 'nombre', type: 'text', placeholder: 'nombre-carpeta' }];
            alert.buttons = ['Cancelar', 'Crear'];
            document.body.appendChild(alert);
            alert.present();
            alert.addEventListener('didDismiss', () => alert.remove());
          });

          // Abrir archivo (demo)
          fm.addEventListener('ok-open', (e) => {
            const file = fm.files.find((f) => f.id === (e.detail || {}).id);
            if (!file) return;
            const toast = document.createElement('ion-toast');
            toast.message = 'Abriendo: ' + file.name;
            toast.duration = 2000;
            toast.position = 'bottom';
            document.body.appendChild(toast);
            toast.present();
            toast.addEventListener('didDismiss', () => toast.remove());
          });

          // Eliminar archivo (demo)
          fm.addEventListener('ok-delete', (e) => {
            const id = (e.detail || {}).id;
            const file = fm.files.find((f) => f.id === id);
            if (!file) return;
            const alert = document.createElement('ion-alert');
            alert.header = 'Eliminar archivo';
            alert.message = '¿Eliminar "' + file.name + '"? Esta acción no se puede deshacer.';
            alert.buttons = [
              { text: 'Cancelar', role: 'cancel' },
              {
                text: 'Eliminar',
                role: 'destructive',
                handler: () => {
                  fm.files = fm.files.filter((f) => f.id !== id);
                },
              },
            ];
            document.body.appendChild(alert);
            alert.present();
            alert.addEventListener('didDismiss', () => alert.remove());
          });
        },
      });
    </script>
  </body>
</html>
