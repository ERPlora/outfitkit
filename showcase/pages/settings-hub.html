<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERPlora Hub · Ajustes</title>
    <script type="importmap">{ "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }</script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <style>.settings-pane[hidden]{display:none}.settings-form{display:flex;flex-direction:column;gap:14px}.settings-tabs{width:min(100%,52rem);margin:0 auto}</style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      defineHubPage({
        active: '/settings',
        title: 'Ajustes',
        body: `
          <section class="settings-pane" data-pane="hub"><ion-card class="ion-no-margin"><ion-card-content><ion-list lines="none">
            <ion-item><ion-icon slot="start" name="language-outline"></ion-icon><ion-label><h2>Idioma del sistema</h2><p>Idioma de este dispositivo</p></ion-label><ion-select slot="end" interface="popover" value="es"><ion-select-option value="es">Español</ion-select-option><ion-select-option value="en">English</ion-select-option></ion-select></ion-item>
            <ion-item><ion-icon slot="start" name="time-outline"></ion-icon><ion-label><h2>Zona horaria</h2></ion-label><ion-select slot="end" interface="popover" value="madrid"><ion-select-option value="madrid">Europe/Madrid</ion-select-option><ion-select-option value="canary">Atlantic/Canary</ion-select-option></ion-select></ion-item>
            <ion-item lines="none"><ion-label>Mostrar módulos en el menú</ion-label><ion-toggle slot="end" checked></ion-toggle></ion-item>
          </ion-list><ion-button expand="block">Guardar cambios</ion-button></ion-card-content></ion-card></section>
          <section class="settings-pane" data-pane="store" hidden><ion-card class="ion-no-margin"><ion-card-content><ion-list lines="none"><ion-item><ion-label><h2>Tipo de negocio</h2></ion-label><ion-select slot="end" value="retail"><ion-select-option value="retail">Comercio</ion-select-option><ion-select-option value="food">Hostelería</ion-select-option></ion-select></ion-item><ion-item lines="none"><ion-label><h2>País</h2></ion-label><ion-select slot="end" value="es"><ion-select-option value="es">España</ion-select-option><ion-select-option value="pt">Portugal</ion-select-option></ion-select></ion-item></ion-list></ion-card-content></ion-card></section>
          <section class="settings-pane" data-pane="tax" hidden><ion-card class="ion-no-margin"><ion-card-content><div class="settings-form"><ion-input label="NIF" label-placement="floating" fill="outline" value="B12345678"></ion-input><ion-input label="Razón social" label-placement="floating" fill="outline" value="Comercio Demo SL"></ion-input><ion-textarea label="Dirección fiscal" label-placement="floating" fill="outline" auto-grow></ion-textarea><ion-button>Guardar datos fiscales</ion-button></div></ion-card-content></ion-card></section>
          <section class="settings-pane" data-pane="tickets" hidden><ion-card class="ion-no-margin"><ion-card-content><ion-item button detail lines="none"><ion-icon slot="start" name="ticket-outline"></ion-icon><ion-label><h2>Plantilla de ticket</h2><p>Cabecera, pie y datos visibles</p></ion-label></ion-item></ion-card-content></ion-card></section>
          <section class="settings-pane" data-pane="permissions" hidden><ion-card class="ion-no-margin"><ion-card-header><ion-card-title>Permisos de módulos</ion-card-title></ion-card-header><ion-card-content><ion-list><ion-item><ion-label><h2>Ventas</h2><p>Permitir devoluciones</p></ion-label><ion-toggle slot="end" checked></ion-toggle></ion-item><ion-item lines="none"><ion-label><h2>Inventario</h2><p>Editar stock</p></ion-label><ion-toggle slot="end" checked></ion-toggle></ion-item></ion-list></ion-card-content></ion-card></section>
          <section class="settings-pane" data-pane="data" hidden><ion-card class="ion-no-margin"><ion-card-content><ion-segment value="import"><ion-segment-button value="import"><ion-label>Importar</ion-label></ion-segment-button><ion-segment-button value="export"><ion-label>Exportar</ion-label></ion-segment-button></ion-segment><ion-list><ion-item lines="none"><ion-icon slot="start" name="swap-vertical-outline"></ion-icon><ion-label><h2>Datos del Hub</h2><p>Crea o restaura una copia portable</p></ion-label><ion-button slot="end" fill="outline">Seleccionar archivo</ion-button></ion-item></ion-list></ion-card-content></ion-card></section>
        `,
        footer: `<ion-footer class="ion-no-border"><ion-toolbar><ion-segment id="settings-tabs" class="settings-tabs" value="hub" scrollable>
          <ion-segment-button value="hub"><ion-icon name="business-outline"></ion-icon><ion-label>Hub</ion-label></ion-segment-button>
          <ion-segment-button value="store"><ion-icon name="storefront-outline"></ion-icon><ion-label>Negocio</ion-label></ion-segment-button>
          <ion-segment-button value="tax"><ion-icon name="wallet-outline"></ion-icon><ion-label>Fiscal</ion-label></ion-segment-button>
          <ion-segment-button value="tickets"><ion-icon name="ticket-outline"></ion-icon><ion-label>Tickets</ion-label></ion-segment-button>
          <ion-segment-button value="permissions"><ion-icon name="shield-checkmark-outline"></ion-icon><ion-label>Permisos</ion-label></ion-segment-button>
          <ion-segment-button value="data"><ion-icon name="swap-vertical-outline"></ion-icon><ion-label>Datos</ion-label></ion-segment-button>
        </ion-segment></ion-toolbar></ion-footer>`,
        setup(doc) { doc.getElementById('settings-tabs')?.addEventListener('ionChange', (event) => { doc.querySelectorAll('.settings-pane').forEach((pane) => { pane.hidden = pane.dataset.pane !== event.detail.value; }); }); },
      });
    </script>
  </body>
</html>
