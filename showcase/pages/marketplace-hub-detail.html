<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Marketplace · VeriFactu</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* Geometría puntual de esta vista — sin colores de marca. */

      /* Hero del módulo */
      .mkt-hero {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-bottom: 20px;
      }
      .mkt-hero__top {
        display: flex;
        gap: 18px;
        align-items: flex-start;
        flex-wrap: wrap;
      }
      .mkt-hero__icon {
        width: 64px; height: 64px;
        border-radius: 16px;
        flex-shrink: 0;
        display: grid;
        place-items: center;
        background: color-mix(in srgb, var(--ion-color-primary) 12%, transparent);
        color: var(--ion-color-primary);
      }
      .mkt-hero__meta { flex: 1 1 200px; }
      .mkt-hero__title {
        margin: 0 0 4px;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .mkt-hero__sub {
        font-size: .9rem;
        color: var(--ion-color-medium);
        margin: 0 0 10px;
      }
      .mkt-hero__badges { display: flex; flex-wrap: wrap; gap: 6px; }
      .mkt-hero__price-block { text-align: right; flex-shrink: 0; }
      .mkt-hero__price {
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        font-variant-numeric: tabular-nums;
      }
      .mkt-hero__price-unit {
        font-size: .8rem;
        font-weight: 400;
        color: var(--ion-color-medium);
      }
      .mkt-hero__price-note {
        font-size: .75rem;
        color: var(--ion-color-medium);
        margin-top: 4px;
      }
      .mkt-hero__cta {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      /* Breadcrumb */
      .mkt-breadcrumb {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 14px;
        font-size: .83rem;
        color: var(--ion-color-medium);
      }
      .mkt-breadcrumb a {
        color: var(--ion-color-medium);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .mkt-breadcrumb a:hover { color: var(--ion-color-primary); }

      /* Layout principal: columna grande + sidebar */
      .mkt-layout {
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 20px;
        align-items: start;
      }
      @media (max-width: 860px) {
        .mkt-layout { grid-template-columns: 1fr; }
        .mkt-hero__price-block { text-align: left; }
      }

      /* Tabs de la columna principal */
      .mkt-tabs-panel { margin-top: 0; }
      .mkt-tab-content { display: none; }
      .mkt-tab-content.active { display: block; }

      /* Prose del README */
      .mkt-prose {
        font-size: .9rem;
        line-height: 1.65;
        color: var(--ion-text-color);
      }
      .mkt-prose h2 {
        font-size: 1.1rem;
        font-weight: 700;
        margin: 20px 0 8px;
        letter-spacing: -0.01em;
      }
      .mkt-prose h3 {
        font-size: .95rem;
        font-weight: 700;
        margin: 16px 0 6px;
      }
      .mkt-prose p { margin: 6px 0; }
      .mkt-prose ul { padding-left: 20px; margin: 6px 0; }
      .mkt-prose code {
        background: color-mix(in srgb, var(--ion-color-medium) 15%, transparent);
        padding: 1px 5px;
        border-radius: 4px;
        font-size: .82rem;
        font-family: var(--ion-font-family-mono, monospace);
      }

      /* Rating grande */
      .mkt-rating-big {
        display: flex;
        gap: 16px;
        align-items: center;
        margin-bottom: 18px;
      }
      .mkt-rating-big__num {
        font-size: 3rem;
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1;
      }
      .mkt-rating-big__count {
        font-size: .78rem;
        color: var(--ion-color-medium);
        margin-top: 4px;
      }

      /* Reseñas */
      .mkt-review {
        padding: 14px 0;
        border-bottom: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
      }
      .mkt-review:last-child { border-bottom: none; }
      .mkt-review__head {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
      }
      .mkt-review__meta { flex: 1 1 auto; }
      .mkt-review__author { font-size: .9rem; font-weight: 600; }
      .mkt-review__date {
        font-size: .75rem;
        color: var(--ion-color-medium);
        margin-left: auto;
      }
      .mkt-review__text {
        font-size: .85rem;
        line-height: 1.55;
        color: var(--ion-color-medium);
        margin: 0;
      }

      /* Lista de permisos */
      .mkt-perm-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
      .mkt-perm-list li {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        font-size: .88rem;
      }
      .mkt-perm-list ion-icon { flex-shrink: 0; margin-top: 2px; font-size: 1rem; color: var(--ion-color-success); }

      /* Sidebar cards */
      .mkt-sidebar-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        font-size: .85rem;
        border-bottom: 1px solid var(--ion-border-color, rgba(127,127,127,.1));
      }
      .mkt-sidebar-row:last-child { border-bottom: none; }
      .mkt-sidebar-row__label { color: var(--ion-color-medium); }
      .mkt-sidebar-row__val { font-weight: 600; }

      /* Desarrollador en sidebar */
      .mkt-dev-row { display: flex; align-items: center; gap: 10px; }
      .mkt-dev-meta { flex: 1 1 auto; }
      .mkt-dev-name { font-size: .9rem; font-weight: 600; }
      .mkt-dev-sub { font-size: .73rem; color: var(--ion-color-medium); }

      /* Deps (requiere) */
      .mkt-dep-link {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border-radius: 8px;
        background: color-mix(in srgb, var(--ion-color-medium) 10%, transparent);
        text-decoration: none;
        color: var(--ion-text-color);
        font-size: .85rem;
        font-weight: 600;
        transition: background 100ms;
      }
      .mkt-dep-link:hover { background: color-mix(in srgb, var(--ion-color-primary) 12%, transparent); }
      .mkt-dep-ver {
        margin-left: auto;
        font-size: .72rem;
        color: var(--ion-color-medium);
        font-weight: 400;
      }

      /* Soporte */
      .mkt-support-link {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: .87rem;
        color: var(--ion-color-primary);
        text-decoration: none;
        padding: 5px 0;
      }
      .mkt-support-link:hover { opacity: .8; }

      /* Pricing cards grid */
      .mkt-pricing-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }
      @media (max-width: 560px) {
        .mkt-pricing-grid { grid-template-columns: 1fr; }
      }

      .mkt-plan-price {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        font-variant-numeric: tabular-nums;
        margin: 0 0 4px;
      }
      .mkt-plan-price-unit {
        font-size: .83rem;
        font-weight: 400;
        color: var(--ion-color-medium);
      }
      .mkt-plan-features {
        list-style: none;
        padding: 0;
        margin: 14px 0 0;
        display: flex;
        flex-direction: column;
        gap: 7px;
        font-size: .85rem;
        color: var(--ion-color-medium);
      }
      .mkt-plan-features li { display: flex; align-items: center; gap: 8px; }
      .mkt-plan-features ion-icon { color: var(--ion-color-success); flex-shrink: 0; }

      /* Checkout modal */
      .mkt-modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.5);
        z-index: 9000;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .mkt-modal-overlay.open { display: flex; }
      .mkt-modal {
        background: var(--ion-background-color, #fff);
        border-radius: 16px;
        width: 100%;
        max-width: 620px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 24px 80px rgba(0,0,0,.25);
      }
      .mkt-modal__head {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 20px 22px 16px;
        border-bottom: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
      }
      .mkt-modal__title { font-size: 1.05rem; font-weight: 700; margin: 0; }
      .mkt-modal__sub { font-size: .8rem; color: var(--ion-color-medium); margin: 2px 0 0; }
      .mkt-modal__close {
        margin-left: auto;
        background: none;
        border: none;
        font-size: 1.4rem;
        line-height: 1;
        color: var(--ion-color-medium);
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
      }
      .mkt-modal__close:hover { background: color-mix(in srgb, var(--ion-color-medium) 15%, transparent); }
      .mkt-modal__body { padding: 20px 22px; }
      .mkt-modal__foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
        padding: 14px 22px 20px;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
      }
      .mkt-modal__secure {
        font-size: .75rem;
        color: var(--ion-color-medium);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .mkt-modal-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
      @media (max-width: 500px) { .mkt-modal-grid { grid-template-columns: 1fr; } }

      .mkt-checkout-label {
        font-size: .72rem;
        text-transform: uppercase;
        letter-spacing: .06em;
        color: var(--ion-color-medium);
        font-weight: 600;
        margin: 0 0 8px;
      }
      .mkt-checkout-summary {
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
        border-radius: 12px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .mkt-checkout-summary__top {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }
      .mkt-checkout-summary__icon {
        width: 40px; height: 40px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        background: color-mix(in srgb, var(--ion-color-primary) 12%, transparent);
        color: var(--ion-color-primary);
        flex-shrink: 0;
      }
      .mkt-checkout-summary__name { font-size: .9rem; font-weight: 600; }
      .mkt-checkout-summary__plan { font-size: .75rem; color: var(--ion-color-medium); }
      .mkt-checkout-divider {
        border: none;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.12));
        margin: 8px 0;
      }
      .mkt-checkout-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 0;
        font-size: .85rem;
      }
      .mkt-checkout-row__label { color: var(--ion-color-medium); }
      .mkt-checkout-row__val { font-weight: 600; }
      .mkt-checkout-row__val--free { color: var(--ion-color-success); }
      .mkt-checkout-row--total { padding-top: 8px; }
      .mkt-checkout-row--total .mkt-checkout-row__label { font-weight: 600; color: var(--ion-text-color); }
      .mkt-checkout-row--total .mkt-checkout-row__val { font-size: 1.1rem; }

      .mkt-field-label {
        display: block;
        font-size: .8rem;
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--ion-text-color);
      }
      .mkt-field { margin-bottom: 12px; }
      .mkt-field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .mkt-accept {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        font-size: .78rem;
        color: var(--ion-color-medium);
        margin-top: 8px;
      }
      .mkt-accept a { color: var(--ion-color-primary); text-decoration: none; }

      .mkt-modal-actions { display: flex; gap: 8px; align-items: center; }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <!-- Breadcrumb / volver -->
          <div class="mkt-breadcrumb">
            <a href="#">
              <ion-icon name="arrow-back-outline"></ion-icon>
              Marketplace
            </a>
            <ion-icon name="chevron-forward-outline" style="font-size:.7rem"></ion-icon>
            <span>verifactu</span>
          </div>

          <!-- Hero del módulo -->
          <ion-card class="pg-mb-4">
            <ion-card-content>
              <div class="mkt-hero">
                <div class="mkt-hero__top">
                  <!-- Icono del módulo -->
                  <div class="mkt-hero__icon">
                    <ion-icon name="shield-checkmark-outline" style="font-size:2rem"></ion-icon>
                  </div>

                  <!-- Título + badges -->
                  <div class="mkt-hero__meta">
                    <h1 class="mkt-hero__title">VeriFactu</h1>
                    <p class="mkt-hero__sub">Sistema verificable de facturación AEAT — obligatorio en España desde julio 2026</p>
                    <div class="mkt-hero__badges">
                      <ion-badge color="primary">Cumplimiento</ion-badge>
                      <ok-status-pill tone="info" dot label="Recomendado" size="sm"></ok-status-pill>
                      <ok-status-pill tone="neutral" label="v1.0.0" size="sm"></ok-status-pill>
                      <ok-status-pill tone="success" dot label="Verificado" size="sm"></ok-status-pill>
                    </div>
                  </div>

                  <!-- Precio -->
                  <div class="mkt-hero__price-block">
                    <div class="mkt-hero__price">€9,99<span class="mkt-hero__price-unit">/mes</span></div>
                    <div class="mkt-hero__price-note">15 días de prueba gratis</div>
                  </div>
                </div>

                <!-- CTAs -->
                <div class="mkt-hero__cta">
                  <ion-button id="btn-install">
                    <ion-icon slot="start" name="download-outline"></ion-icon>
                    Instalar y empezar prueba
                  </ion-button>
                  <ion-button fill="outline" id="btn-readme">
                    <ion-icon slot="start" name="document-text-outline"></ion-icon>
                    Ver README
                  </ion-button>
                  <ion-button fill="clear" size="small" id="btn-share" aria-label="Compartir">
                    <ion-icon slot="icon-only" name="share-social-outline"></ion-icon>
                  </ion-button>
                </div>
              </div>
            </ion-card-content>
          </ion-card>

          <!-- Layout columna principal + sidebar -->
          <div class="mkt-layout">

            <!-- Columna principal: tabs + contenido -->
            <div>
              <!-- Tabs -->
              <ion-segment id="mkt-tabs" value="overview" class="pg-mb-4">
                <ion-segment-button value="overview">
                  <ion-label>Resumen</ion-label>
                </ion-segment-button>
                <ion-segment-button value="pricing">
                  <ion-label>Precio</ion-label>
                </ion-segment-button>
                <ion-segment-button value="reviews">
                  <ion-label>
                    Reseñas
                    <ion-badge color="medium" style="margin-left:6px;vertical-align:middle">128</ion-badge>
                  </ion-label>
                </ion-segment-button>
                <ion-segment-button value="permissions">
                  <ion-label>Permisos</ion-label>
                </ion-segment-button>
              </ion-segment>

              <!-- Panel: Resumen / README -->
              <div id="panel-overview" class="mkt-tab-content active">
                <ion-card>
                  <ion-card-content>
                    <div class="mkt-prose">
                      <h2>Qué es VeriFactu</h2>
                      <p>VeriFactu es el sistema verificable de facturación de la <strong>Agencia Tributaria española</strong>. Desde julio de 2026 todas las facturas emitidas deben ser registradas, firmadas y enviadas a la AEAT en tiempo real o, alternativamente, almacenadas en un formato verificable.</p>

                      <h2>Funcionalidades</h2>
                      <ul>
                        <li>Emisión y registro inmediato vía SOAP a la AEAT (modo VERIFACTU).</li>
                        <li>Modo no-VERIFACTU con almacenamiento local, encadenamiento y firma XAdES.</li>
                        <li>QR obligatorio en todas las facturas (PDF y ticket POS).</li>
                        <li>Reintentos automáticos y cola de reenvíos en caso de fallo de red.</li>
                        <li>Conciliación de respuestas AEAT con tu libro de facturación.</li>
                        <li>Envío automático de anulaciones y facturas rectificativas.</li>
                      </ul>

                      <h2>Cómo funciona</h2>
                      <p>Cuando emites una factura desde el módulo <code>billing</code>, VeriFactu se engancha mediante un hook y procesa el documento antes de devolver el PDF. El módulo añade el QR, calcula la huella encadenada y envía el XML firmado a la AEAT en background.</p>

                      <h3>Modos de funcionamiento</h3>
                      <ul>
                        <li><strong>VERIFACTU (recomendado)</strong> — envío en tiempo real. La AEAT recibe cada factura emitida.</li>
                        <li><strong>NO-VERIFACTU</strong> — almacenamiento local con encadenamiento y firma. Solo si la AEAT te lo requiere.</li>
                      </ul>

                      <h2>Compatibilidad</h2>
                      <p>Compatible con los módulos <code>billing</code>, <code>pos</code>, <code>sales</code>, <code>fiscal_es</code> y <code>gestoria_es</code>. Requiere certificado digital instalado en el Hub.</p>
                    </div>
                  </ion-card-content>
                </ion-card>
              </div>

              <!-- Panel: Precio -->
              <div id="panel-pricing" class="mkt-tab-content">
                <div class="mkt-pricing-grid">
                  <!-- Plan mensual -->
                  <ion-card>
                    <ion-card-header>
                      <ion-card-title>Plan mensual</ion-card-title>
                      <ion-card-subtitle>Suscripción flexible, sin permanencia</ion-card-subtitle>
                    </ion-card-header>
                    <ion-card-content>
                      <p class="mkt-plan-price">€9,99<span class="mkt-plan-price-unit">/mes</span></p>
                      <ul class="mkt-plan-features">
                        <li><ion-icon name="checkmark-circle-outline"></ion-icon>Facturas ilimitadas</li>
                        <li><ion-icon name="checkmark-circle-outline"></ion-icon>Envío en tiempo real a AEAT</li>
                        <li><ion-icon name="checkmark-circle-outline"></ion-icon>QR obligatorio incluido</li>
                        <li><ion-icon name="checkmark-circle-outline"></ion-icon>Soporte por email</li>
                        <li><ion-icon name="checkmark-circle-outline"></ion-icon>15 días de prueba gratis</li>
                      </ul>
                      <ion-button expand="block" class="pg-mt-2" id="btn-checkout-monthly">Empezar prueba</ion-button>
                    </ion-card-content>
                  </ion-card>

                  <!-- Plan anual -->
                  <ion-card>
                    <ion-card-header>
                      <ion-card-title>
                        Plan anual
                        <ion-badge color="success" style="margin-left:8px;vertical-align:middle">−17%</ion-badge>
                      </ion-card-title>
                      <ion-card-subtitle>Pago único anual con descuento</ion-card-subtitle>
                    </ion-card-header>
                    <ion-card-content>
                      <p class="mkt-plan-price">€99<span class="mkt-plan-price-unit">/año</span></p>
                      <p style="font-size:.78rem;color:var(--ion-color-medium);margin-top:2px;">equivalente a €8,25/mes</p>
                      <ul class="mkt-plan-features">
                        <li><ion-icon name="checkmark-circle-outline"></ion-icon>Todo el plan mensual</li>
                        <li><ion-icon name="checkmark-circle-outline"></ion-icon>Soporte prioritario</li>
                        <li><ion-icon name="checkmark-circle-outline"></ion-icon>Acceso anticipado a actualizaciones</li>
                        <li><ion-icon name="checkmark-circle-outline"></ion-icon>Reseteo de cadena gratuito</li>
                      </ul>
                      <ion-button expand="block" class="pg-mt-2" id="btn-checkout-annual">Suscribir anual</ion-button>
                    </ion-card-content>
                  </ion-card>
                </div>
              </div>

              <!-- Panel: Reseñas -->
              <div id="panel-reviews" class="mkt-tab-content">
                <ion-card>
                  <ion-card-content>
                    <!-- Puntuación global -->
                    <div class="mkt-rating-big">
                      <div class="mkt-rating-big__num">4,7</div>
                      <div>
                        <ok-rating id="rating-global" readonly value="4.7" max="5"></ok-rating>
                        <div class="mkt-rating-big__count">128 reseñas</div>
                      </div>
                    </div>

                    <!-- Reseña 1 -->
                    <article class="mkt-review">
                      <div class="mkt-review__head">
                        <ok-avatar name="Marina Ribó" size="sm" tone="primary"></ok-avatar>
                        <div class="mkt-review__meta">
                          <div class="mkt-review__author">Marina Ribó</div>
                          <ok-rating readonly value="5" max="5" style="--ok-rating-size:0.85rem"></ok-rating>
                        </div>
                        <span class="mkt-review__date">hace 3 días</span>
                      </div>
                      <p class="mkt-review__text">Funciona perfecto. Configurar el certificado costó 10 min y desde entonces todas mis facturas van a la AEAT sin tocar nada. La cola de reintentos me salvó cuando se cayó internet.</p>
                    </article>

                    <!-- Reseña 2 -->
                    <article class="mkt-review">
                      <div class="mkt-review__head">
                        <ok-avatar name="Joaquín Gómez" size="sm" tone="auto"></ok-avatar>
                        <div class="mkt-review__meta">
                          <div class="mkt-review__author">Joaquín Gómez</div>

                        label-placement="stacked"
                        fill="outline"

                        value="ioan@erplora.com">

                        label="Número de tarjeta"
                        label-placement="stacked"

                        placeholder="1234 5678 9012 3456">

                          label="Caducidad"

        `,
        setup(doc) {
          // ── Tabs ──
          const segment = doc.getElementById('mkt-tabs');
          const panels = {
            overview: doc.getElementById('panel-overview'),
            pricing: doc.getElementById('panel-pricing'),
            reviews: doc.getElementById('panel-reviews'),
            permissions: doc.getElementById('panel-permissions'),
          };

          function showTab(id) {
            Object.keys(panels).forEach((key) => {
              const panel = panels[key];
              if (!panel) return;
              if (key === id) {
                panel.classList.add('active');
              } else {
                panel.classList.remove('active');
              }
            });
          }

          if (segment) {
            segment.addEventListener('ionChange', (e) => {
              const val = e.detail && e.detail.value;
              if (val) showTab(val);
            });
          }

          // ── ok-rating: valor en punto flotante (prop numérica) ──
          const ratingGlobal = doc.getElementById('rating-global');
          if (ratingGlobal) {
            ratingGlobal.value = 4.7;
          }

          // ── Checkout modal ──
          const overlay = doc.getElementById('checkout-overlay');

          function openCheckout() {
            if (overlay) overlay.classList.add('open');
          }
          function closeCheckout() {
            if (overlay) overlay.classList.remove('open');
          }

          // Abrir desde botones CTA
          const btnInstall = doc.getElementById('btn-install');
          if (btnInstall) btnInstall.addEventListener('click', openCheckout);

          const btnCheckoutMonthly = doc.getElementById('btn-checkout-monthly');
          if (btnCheckoutMonthly) btnCheckoutMonthly.addEventListener('click', openCheckout);

          const btnCheckoutAnnual = doc.getElementById('btn-checkout-annual');
          if (btnCheckoutAnnual) btnCheckoutAnnual.addEventListener('click', openCheckout);

          // Cerrar modal
          const checkoutClose = doc.getElementById('checkout-close');
          if (checkoutClose) checkoutClose.addEventListener('click', closeCheckout);

          const checkoutCancel = doc.getElementById('checkout-cancel');
          if (checkoutCancel) checkoutCancel.addEventListener('click', closeCheckout);

          // Cerrar al hacer clic en el backdrop (fuera del modal)
          if (overlay) {
            overlay.addEventListener('click', (e) => {
              if (e.target === overlay) closeCheckout();
            });
          }

          // Cerrar con Escape
          doc.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeCheckout();
          });

          // Compartir (share API si disponible)
          const btnShare = doc.getElementById('btn-share');
          if (btnShare) {
            btnShare.addEventListener('click', () => {
              if (navigator.share) {
                navigator.share({ title: 'VeriFactu — ERPlora Marketplace', url: window.location.href });
              }
            });
          }
        },
      });
    </script>
