defineSaasDashboardPage({active: '/dashboard/help/',title:'Informar de un problema',body:`<p>Cuéntanos qué ha ocurrido. Te responderemos por email.</p><ion-card class="ion-no-margin"><ion-card-header><ion-card-title>Tu informe</ion-card-title></ion-card-header><ion-card-content><div class="support-form"><ok-inline-feedback id="support-feedback" tone="danger" hidden>Completa el asunto y la descripción.</ok-inline-feedback><ion-input id="support-subject" label="Asunto" label-placement="floating" fill="outline" maxlength="160"></ion-input><ion-textarea id="support-description" label="¿Qué ha ocurrido?" label-placement="floating" fill="outline" rows="6"></ion-textarea><ion-note>Incluiremos los datos básicos de tu cuenta y del Hub para ayudarte antes.</ion-note><div class="support-actions"><ion-button fill="outline" href="#/p/settings-help">Cancelar</ion-button><ion-button id="support-send"><ion-icon slot="start" name="send-outline"></ion-icon>Enviar informe</ion-button></div></div></ion-card-content></ion-card>`,setup(doc){doc.getElementById('support-send').addEventListener('click',()=>{const subject=doc.getElementById('support-subject').value;const description=doc.getElementById('support-description').value;const feedback=doc.getElementById('support-feedback');if(!subject||!description){feedback.hidden=false;return}feedback.hidden=true;const toast=doc.createElement('ion-toast');toast.message='Informe enviado';toast.duration=1800;toast.color='success';doc.body.append(toast);toast.present()})}});
