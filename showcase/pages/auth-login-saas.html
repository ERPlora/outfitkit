<!doctype html>
<html lang="en" data-theme="erplora-light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sign In - ERPlora Cloud</title>

    <!-- Igual que base.html: Ionic registra los primitivos sin cargar resets globales. -->
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="./_saas-auth.css" />
  </head>
  <body>
    <div id="app-root">
      <!-- account/_auth_header.html -->
      <ion-header class="ion-no-border auth-header">
        <ion-toolbar class="auth-toolbar">
          <ion-buttons slot="start">
            <ion-button href="https://erplora.com/" fill="clear" shape="round" class="auth-back"
                        aria-label="Back to home">
              <iconify-icon icon="lucide:arrow-left" slot="icon-only" width="22" height="22"></iconify-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <!-- Estado inicial `auth` de two_factor/core/login.html. -->
      <div class="login-shell">
        <div class="auth-card">
          <div class="flex flex-col items-center gap-3">
            <a href="https://erplora.com/" class="erp-logo lg" aria-label="ERPlora Cloud">
              <i class="erp-nw"></i><i class="erp-n"></i><i class="erp-ne"></i>
              <i class="erp-w"></i><i class="erp-hub"></i><i class="erp-e"></i>
              <i class="erp-sw"></i><i class="erp-s"></i><i class="erp-se"></i>
            </a>
            <div>
              <h1 class="biz-name">ERPlora Cloud</h1>
              <div class="biz-sub">Global panel</div>
            </div>
          </div>

          <ion-card class="glass">
            <ion-card-content class="ion-padding">
              <form method="post" action="">
                <!-- Equivalente estático del management form del wizard. -->
                <input type="hidden" name="login_view-current_step" value="auth" />

                <div class="field">
                  <ion-input data-bind="auth-username" type="email" name="auth-username_ion"
                             label="Email" label-placement="floating" fill="outline"
                             placeholder="you@example.com" autocomplete="username" required></ion-input>
                  <input type="hidden" name="auth-username" value="" />
                </div>

                <div class="field">
                  <ion-input data-bind="auth-password" type="password" name="auth-password_ion"
                             label="Password" label-placement="floating" fill="outline"
                             placeholder="••••••••••" autocomplete="current-password" required>
                    <ion-input-password-toggle slot="end"></ion-input-password-toggle>
                  </ion-input>
                  <input type="hidden" name="auth-password" value="" />
                </div>

                <div class="row-between">
                  <label class="inline-flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="auth-remember" id="id_auth-remember" />
                    <span>Remember me</span>
                  </label>
                  <a href="https://erplora.com/accounts/password/reset/">Forgot your password?</a>
                </div>

                <ion-button type="submit" color="primary" size="large" expand="block"
                            style="margin-top: 1.25rem;">Sign in</ion-button>
              </form>
            </ion-card-content>
          </ion-card>

          <p class="foot">
            Don't have an account?
            <a href="https://erplora.com/accounts/signup/">Sign up</a>
          </p>
        </div>
      </div>
    </div>

    <!-- account/_auth_scripts.html: bridge necesario para el POST nativo. -->
    <script>
      (function () {
        var inputs = document.querySelectorAll('ion-input[data-bind]');
        for (var i = 0; i < inputs.length; i++) {
          (function (inp) {
            var name = inp.getAttribute('data-bind');
            var form = inp.closest('form');
            if (!form) return;
            var hid = form.querySelector('input[type="hidden"][name="' + name + '"]');
            if (!hid) return;
            var sync = function () {
              var v = inp.value;
              if ((v == null || v === '') && inp.shadowRoot) {
                var native = inp.shadowRoot.querySelector('input');
                if (native && native.value) v = native.value;
              }
              hid.value = v != null ? v : '';
            };
            inp.addEventListener('ionInput', sync);
            inp.addEventListener('ionChange', sync);
            form.addEventListener('submit', sync);
            sync();
          })(inputs[i]);
        }
      })();
    </script>
  </body>
</html>
