<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Hub · Perfil del negocio</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* Geometría puntual de esta vista (estructura, sin colores de marca). */
      .pf-section-title {
        margin: 0 0 4px;
        font-size: 1.05rem;
        font-weight: 700;
      }
      .pf-section-desc {
        margin: 0 0 18px;
        color: var(--ion-color-medium);
        font-size: .88rem;
      }

      /* Separador visual entre secciones */
      .pf-divider {
        border: 0;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
        margin: 4px 0 20px;
      }

      /* Fila de 2 campos */
      .pf-row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      /* Fila de 3 campos */
      .pf-row-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 14px;
      }
      @media (max-width: 640px) {
        .pf-row-2,
        .pf-row-3 { grid-template-columns: 1fr; }
      }

      /* Aviso de campo requerido */
      .pf-req::after { content: " *"; color: var(--ion-color-danger); }

      /* Fila de toggle (tipo de venta) */
      .pf-toggle-row {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        padding: 12px 0;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
      }
      .pf-toggle-row:first-of-type { border-top: 0; }
      .pf-toggle-row__text { flex: 1 1 auto; }
      .pf-toggle-row__label { font-weight: 600; font-size: .9rem; }
      .pf-toggle-row__desc  { color: var(--ion-color-medium); font-size: .8rem; margin-top: 2px; }

      /* Preview del avatar de la empresa */
      .pf-logo-preview {
        width: 80px;
        height: 80px;
        border-radius: 14px;
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        display: grid;
        place-items: center;
        font-size: 26px;
        font-weight: 700;
        flex: 0 0 auto;
        background: var(--ion-color-step-100, rgba(127,127,127,.08));
      }
      .pf-logo-wrap {
        display: flex;
        align-items: flex-start;
        gap: 16px;
      }
      .pf-logo-wrap ok-dropzone {
        flex: 1 1 auto;
      }

      /* Footer de acciones del formulario */
      .pf-foot {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        padding-top: 16px;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
      }
      @media (max-width: 560px) {
        .pf-foot { flex-direction: column; }
        .pf-foot ion-button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Perfil del negocio"
            description="Datos fiscales, contacto y preferencias regionales">
            <ion-button slot="actions" fill="outline" size="small">Volver</ion-button>
          </ok-page-header>

          <!-- ── DATOS FISCALES ─────────────────────────────────────────────── -->
          <ion-card class="pg-mb-4">
            <ion-card-content>
              <h2 class="pf-section-title">Datos fiscales</h2>
              <p class="pf-section-desc">Aparecen en facturas, tickets y verifactu (AEAT).</p>

              <div class="pf-row-2 pg-mb-4">
                <ion-input
                  fill="outline"
                  label="Razón social"
                  label-placement="stacked"
                  value="Cafetería La Rambla SL"
                  required>
                </ion-input>
                <ion-input
                  fill="outline"
                  label="CIF / NIF"
                  label-placement="stacked"
                  value="ES B12345678"
                  required>
                </ion-input>
              </div>

              <div class="pf-row-2">
                <ion-select
                  fill="outline"
                  label="Régimen fiscal"
                  label-placement="stacked"
                  value="general">
                  <ion-select-option value="general">General</ion-select-option>
                  <ion-select-option value="recargo">Recargo de equivalencia</ion-select-option>
                  <ion-select-option value="exento">Exento</ion-select-option>
                  <ion-select-option value="modulos">Módulos</ion-select-option>
                </ion-select>
                <div>
                  <ion-input
                    fill="outline"
                    label="Sub-región"
                    label-placement="stacked"
                    value="ES-CT"
                    maxlength="10"
                    placeholder="ej. ES-CT">
                  </ion-input>
                  <small class="pf-section-desc" style="margin-top:4px;display:block">Déjalo en blanco si aplica todo el país.</small>
                </div>
              </div>
            </ion-card-content>
          </ion-card>

          <!-- ── DIRECCIÓN ──────────────────────────────────────────────────── -->
          <ion-card class="pg-mb-4">
            <ion-card-content>
              <h2 class="pf-section-title">Dirección</h2>
              <p class="pf-section-desc">Domicilio fiscal y de operación principal.</p>

              <ion-input
                fill="outline"
                label="Calle y número"
                label-placement="stacked"
                value="Calle Major 12"
                required
                style="margin-bottom:14px">
              </ion-input>

              <div class="pf-row-3 pg-mb-4">
                <ion-input
                  fill="outline"
                  label="Código postal"
                  label-placement="stacked"
                  value="08001"
                  required>
                </ion-input>
                <ion-input
                  fill="outline"
                  label="Ciudad"
                  label-placement="stacked"
                  value="Barcelona"
                  required>
                </ion-input>
                <ion-input
                  fill="outline"
                  label="Provincia"
                  label-placement="stacked"
                  value="Barcelona">
                </ion-input>
              </div>

              <ion-select
                fill="outline"
                label="País"
                label-placement="stacked"
                value="ES"
                required>
                <ion-select-option value="ES">España</ion-select-option>
                <ion-select-option value="PT">Portugal</ion-select-option>
                <ion-select-option value="FR">Francia</ion-select-option>
                <ion-select-option value="IT">Italia</ion-select-option>
              </ion-select>
            </ion-card-content>
          </ion-card>

          <!-- ── CONTACTO ───────────────────────────────────────────────────── -->
          <ion-card class="pg-mb-4">
            <ion-card-content>
              <h2 class="pf-section-title">Contacto</h2>
              <p class="pf-section-desc">Cómo se pondrán en contacto tus clientes y proveedores.</p>

              <div class="pf-row-2 pg-mb-4">
                <ion-input
                  fill="outline"
                  label="Email de contacto"
                  label-placement="stacked"
                  type="email"
                  value="hola@larambla.es"
                  required>
                </ion-input>
                <ion-input
                  fill="outline"
                  label="Teléfono"
                  label-placement="stacked"
                  type="tel"
                  value="+34 933 456 789">
                </ion-input>
              </div>

              <div class="pf-row-2">
                <ion-input
                  fill="outline"
                  label="Web"
                  label-placement="stacked"
                  type="url"
                  value="https://larambla.es">
                </ion-input>
                <ion-select
                  fill="outline"
                  label="Idioma de la interfaz"
                  label-placement="stacked"
                  value="es">
                  <ion-select-option value="es">Español (es)</ion-select-option>
                  <ion-select-option value="ca">Català (ca)</ion-select-option>
                  <ion-select-option value="en">English (en)</ion-select-option>
                </ion-select>
              </div>
            </ion-card-content>
          </ion-card>

          <!-- ── IDENTIDAD VISUAL ───────────────────────────────────────────── -->
          <ion-card class="pg-mb-4">
            <ion-card-content>
              <h2 class="pf-section-title">Identidad visual</h2>
              <p class="pf-section-desc">Logo que aparece en tickets, facturas y la cabecera del Hub.</p>

              <div class="pf-logo-wrap">
                <div class="pf-logo-preview">CR</div>
                <ok-dropzone
                  id="logo-dropzone"
                  accept="image/png,image/jpeg,image/svg+xml"
                  hint="PNG, JPG o SVG · máximo 2 MB · cuadrado recomendado 512×512">
                </ok-dropzone>
              </div>
            </ion-card-content>
          </ion-card>

          <!-- ── MONEDA Y FORMATO ───────────────────────────────────────────── -->
          <ion-card class="pg-mb-4">
            <ion-card-content>
              <h2 class="pf-section-title">Moneda y formato</h2>
              <p class="pf-section-desc">Cómo se muestran los precios en POS y facturas.</p>

              <div class="pf-row-3">
                <ion-select
                  fill="outline"
                  label="Moneda"
                  label-placement="stacked"
                  value="EUR">
                  <ion-select-option value="EUR">EUR — Euro</ion-select-option>
                  <ion-select-option value="USD">USD — Dólar</ion-select-option>
                  <ion-select-option value="GBP">GBP — Libra</ion-select-option>
                </ion-select>
                <ion-select
                  fill="outline"
                  label="Zona horaria"
                  label-placement="stacked"
                  value="europe-madrid">
                  <ion-select-option value="europe-madrid">Europe/Madrid (UTC+1)</ion-select-option>
                  <ion-select-option value="europe-lisbon">Europe/Lisbon</ion-select-option>
                  <ion-select-option value="utc">UTC</ion-select-option>
                </ion-select>
                <ion-select
                  fill="outline"
                  label="Formato fecha"
                  label-placement="stacked"
                  value="dmy">
                  <ion-select-option value="dmy">DD/MM/YYYY</ion-select-option>
                  <ion-select-option value="ymd">YYYY-MM-DD</ion-select-option>
                  <ion-select-option value="mdy">MM/DD/YYYY</ion-select-option>
                </ion-select>
              </div>
            </ion-card-content>
          </ion-card>

          <!-- ── TIPO DE VENTA ──────────────────────────────────────────────── -->
          <ion-card class="pg-mb-4">
            <ion-card-content>
              <h2 class="pf-section-title">Tipo de venta</h2>

              <div class="pf-toggle-row">
                <div class="pf-toggle-row__text">
                  <div class="pf-toggle-row__label">Vendo a empresas (B2B)</div>
                  <div class="pf-toggle-row__desc">Emites facturas a otras empresas o profesionales.</div>
                </div>
                <ion-toggle id="toggle-b2b" checked></ion-toggle>
              </div>

              <div class="pf-toggle-row">
                <div class="pf-toggle-row__text">
                  <div class="pf-toggle-row__label">Vendo a consumidores (B2C)</div>
                  <div class="pf-toggle-row__desc">Tickets a cliente final en POS.</div>
                </div>
                <ion-toggle id="toggle-b2c" checked></ion-toggle>
              </div>
            </ion-card-content>
          </ion-card>

          <!-- ── ACCIONES ───────────────────────────────────────────────────── -->
          <div class="pf-foot">
            <ion-button fill="outline" id="btn-cancel">
              <ion-icon slot="start" name="close-outline"></ion-icon>
              Cancelar
            </ion-button>
            <ion-button id="btn-save">
              <ion-icon slot="start" name="save-outline"></ion-icon>
              Guardar perfil
            </ion-button>
          </div>
        `,
        setup(doc) {
          // ok-dropzone: etiquetas en español + feedback al seleccionar fichero
          const dropzone = doc.getElementById('logo-dropzone');
          if (dropzone) {
            dropzone.labels = {
              title: 'Arrastra el logo aquí o {browse}',
              browse: 'selecciónalo',
              errorType: '"{name}" no es un tipo de archivo admitido.',
              errorSize: '"{name}" supera el tamaño máximo ({size}).',
              removeLabel: 'Quitar {name}',
            };
            dropzone.addEventListener('ok-change', (e) => {
              const files = (e.detail && e.detail.files) || [];
              if (files.length) {
                const toast = document.createElement('ion-toast');
                toast.message = `Logo seleccionado: ${files[0].name}`;
                toast.duration = 2500;
                toast.color = 'success';
                toast.position = 'bottom';
                document.body.appendChild(toast);
                toast.present();
                toast.addEventListener('didDismiss', () => toast.remove());
              }
            });
          }

          // Botón Cancelar — volver atrás
          const cancelBtn = doc.getElementById('btn-cancel');
          if (cancelBtn) {
            cancelBtn.addEventListener('click', () => {
              if (history.length > 1) history.back();
            });
          }

          // Botón Guardar — feedback toast
          const saveBtn = doc.getElementById('btn-save');
          if (saveBtn) {
            saveBtn.addEventListener('click', () => {
              const toast = document.createElement('ion-toast');
              toast.message = 'Perfil guardado correctamente.';
              toast.duration = 2500;
              toast.color = 'success';
              toast.position = 'bottom';
              document.body.appendChild(toast);
              toast.present();
              toast.addEventListener('didDismiss', () => toast.remove());
            });
          }
        },
      });
    </script>
  </body>
</html>
