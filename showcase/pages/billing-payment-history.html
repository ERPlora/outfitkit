<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Historial de compras · ERPlora Cloud</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <style>
      .payments-page { display:flex; flex-direction:column; min-height:100%; gap:1rem; }
      .payments-table-wrap { flex:1 1 auto; min-height:26rem; }
      .payments-table-wrap ok-data-table { height:100%; }
      .payments-filter { width:min(100%,13rem); }
      .payments-security { display:flex; align-items:flex-start; gap:.75rem; padding:.85rem 1rem; border:1px solid var(--ion-border-color); border-radius:12px; color:var(--ion-color-medium); font-size:.85rem; }
      .payments-security strong { color:var(--ion-text-color); }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      const PURCHASES = [
        { id:'purchase-1', module:'Premium Mod', purchasedAt:'2026-07-18T10:30:00Z', paymentId:'pi_test123', amount:29.00, status:'completed' },
        { id:'purchase-2', module:'WhatsApp Inbox', purchasedAt:'2026-07-12T08:15:00Z', paymentId:'pi_3_long_reference_for_demo_456', amount:19.00, status:'pending' },
        { id:'purchase-3', module:'Reporting Pro', purchasedAt:'2026-06-28T16:40:00Z', paymentId:'pi_failed_789', amount:39.00, status:'failed' },
        { id:'purchase-4', module:'Premium Mod', purchasedAt:'2026-05-20T12:00:00Z', paymentId:'pi_refunded_246', amount:29.00, status:'refunded' },
      ];
      const STATUS = {
        completed:['Completado','success'], pending:['Pendiente','warning'],
        failed:['Fallido','danger'], refunded:['Reembolsado','tertiary'],
      };
      const money = new Intl.NumberFormat('es-ES', { style:'currency', currency:'EUR' });
      const date = new Intl.DateTimeFormat('es-ES', { dateStyle:'medium', timeStyle:'short' });

      function moduleCell(row) {
        const wrap = document.createElement('span');
        wrap.style.cssText = 'display:flex;align-items:center;gap:.6rem';
        const avatar = document.createElement('ion-avatar');
        avatar.style.cssText = 'display:grid;place-items:center;width:32px;height:32px;background:color-mix(in srgb,var(--ion-color-primary) 14%,transparent);color:var(--ion-color-primary);font-size:11px;font-weight:700';
        const initials = document.createElement('span');
        initials.textContent = row.module.split(' ').map((part) => part[0]).join('').slice(0, 2);
        avatar.append(initials);
        const name = document.createElement('strong');
        name.textContent = row.module;
        wrap.append(avatar, name);
        return wrap;
      }

      function statusCell(row) {
        const badge = document.createElement('ion-badge');
        const [label, color] = STATUS[row.status] ?? [row.status, 'medium'];
        badge.textContent = label;
        badge.color = color;
        return badge;
      }

      defineSaasDashboardPage({
        active: '/dashboard/payments/',
        title: 'Historial de compras',
        body: `
          <div class="payments-page">
            <div class="payments-table-wrap">
              <ok-data-table id="payments-dt" server-side fill>
                <ion-select id="payments-status" class="payments-filter" slot="toolbar" interface="popover" aria-label="Estado" value="">
                  <ion-select-option value="">Todos los estados</ion-select-option>
                  <ion-select-option value="completed">Completado</ion-select-option>
                  <ion-select-option value="pending">Pendiente</ion-select-option>
                  <ion-select-option value="failed">Fallido</ion-select-option>
                  <ion-select-option value="refunded">Reembolsado</ion-select-option>
                </ion-select>
              </ok-data-table>
            </div>
            <div class="payments-security">
              <iconify-icon icon="lucide:shield-check" width="18" height="18" style="color:var(--ion-color-primary)"></iconify-icon>
              <div><strong>Pagos seguros.</strong> Todos los pagos se procesan con Stripe. Nunca guardamos los datos de tu tarjeta.</div>
            </div>
          </div>`,
        footer: `
          <footer id="section-tabbar">
            <ion-segment value="purchases" aria-label="Navegación de facturación">
              <ion-segment-button value="invoices"><iconify-icon icon="lucide:file-text" width="20" height="20"></iconify-icon><ion-label>Facturas</ion-label></ion-segment-button>
              <ion-segment-button value="subscriptions"><iconify-icon icon="lucide:repeat" width="20" height="20"></iconify-icon><ion-label>Suscripciones</ion-label></ion-segment-button>
              <ion-segment-button value="purchases"><iconify-icon icon="lucide:shopping-bag" width="20" height="20"></iconify-icon><ion-label>Compras</ion-label></ion-segment-button>
            </ion-segment>
          </footer>`,
        setup(doc) {
          const table = doc.getElementById('payments-dt');
          const statusFilter = doc.getElementById('payments-status');
          const state = { page:0, pageSize:20, search:'', status:'' };
          table.serverSide = true;
          table.fill = true;
          table.columns = [
            { key:'module', header: 'Módulo', sortable:true, render:moduleCell },
            { key:'purchasedAt', header: 'Fecha', sortable:true, format:(row) => date.format(new Date(row.purchasedAt)) },
            { key:'paymentId', header: 'ID de pago', format:(row) => row.paymentId.length > 24 ? `${row.paymentId.slice(0, 24)}…` : row.paymentId },
            { key:'amount', header: 'Importe', align:'right', sortable:true, format:(row) => money.format(row.amount) },
            { key:'status', header: 'Estado', render:statusCell },
          ];
          table.searchable = true;
          table.searchPlaceholder = 'Buscar compras…';
          table.views = true;
          table.cardTitle = (row) => row.module;
          table.cardIcon = () => 'wallet-outline';
          table.pageSize = 20;
          table.pageSizes = [20, 50];
          table.labels = { empty:'Todavía no hay compras', showing:'Mostrando {from}–{to} de', recordSingular:'compra', recordPlural:'compras' };

          function refresh() {
            const term = state.search.trim().toLocaleLowerCase('es');
            const rows = PURCHASES.filter((row) =>
              (!term || [row.module, row.paymentId].some((value) => value.toLocaleLowerCase('es').includes(term))) &&
              (!state.status || row.status === state.status));
            const start = state.page * state.pageSize;
            table.rows = rows.slice(start, start + state.pageSize);
            table.total = rows.length;
            table.page = state.page;
          }
          table.addEventListener('searchChange', (event) => { state.search = String(event.detail ?? ''); state.page = 0; refresh(); });
          table.addEventListener('pageChange', (event) => { state.page = Number(event.detail) || 0; refresh(); });
          table.addEventListener('pageSizeChange', (event) => { state.pageSize = Number(event.detail) || 20; state.page = 0; refresh(); });
          statusFilter.addEventListener('ionChange', (event) => { state.status = String(event.detail?.value ?? ''); state.page = 0; refresh(); });
          refresh();
        },
      });
    </script>
  </body>
</html>
