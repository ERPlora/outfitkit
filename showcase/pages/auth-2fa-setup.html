<!doctype html>
<html lang="es" data-theme="erplora-light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Configurar autenticación en dos pasos - ERPlora Cloud</title>

    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      defineSaasDashboardPage({
        active: '/dashboard/settings/',
        title: 'Configurar autenticación en dos pasos',
        body: `
          <div style="max-width:600px;margin:0 auto">
            <ion-card>
              <ion-card-header>
                <ion-card-title style="display:flex;align-items:center;gap:.6rem">
                  <iconify-icon icon="lucide:shield-check" width="22" height="22"></iconify-icon>
                  Configurar autenticación en dos pasos
                </ion-card-title>
                <ion-card-subtitle>Mejora la seguridad de tu cuenta con 2FA</ion-card-subtitle>
              </ion-card-header>

              <ion-card-content>
                <form method="post" action="">
                  <input type="hidden" name="setup_view-current_step" value="welcome" />

                  <div style="padding:1.25rem 0;text-align:center">
                    <iconify-icon icon="lucide:lock-keyhole" width="56" height="56"
                                  style="color:var(--ion-color-primary)"></iconify-icon>
                    <h2 style="margin:1rem 0 .5rem">Protege tu cuenta</h2>
                    <p style="margin:0;color:var(--ion-color-medium);line-height:1.6">
                      La autenticación en dos pasos añade una capa extra de seguridad al pedir un
                      código de tu aplicación autenticadora además de la contraseña.
                    </p>
                  </div>

                  <ion-list inset="true" lines="full" style="margin:0 0 1.25rem">
                    <ion-list-header><ion-label>Necesitarás</ion-label></ion-list-header>
                    <ion-item>
                      <iconify-icon slot="start" icon="lucide:smartphone" width="20" height="20"></iconify-icon>
                      <ion-label>Una aplicación de autenticación en tu móvil</ion-label>
                    </ion-item>
                    <ion-item>
                      <iconify-icon slot="start" icon="lucide:key-round" width="20" height="20"></iconify-icon>
                      <ion-label>Google Authenticator, Authy u otra similar</ion-label>
                    </ion-item>
                  </ion-list>

                  <ion-button type="submit" color="primary" size="large" expand="block">Empezar</ion-button>
                  <ion-button type="button" fill="clear" color="medium" expand="block">Cancelar</ion-button>
                </form>
              </ion-card-content>
            </ion-card>
          </div>`,
      });
    </script>
  </body>
</html>
