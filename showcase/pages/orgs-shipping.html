<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Direcciones de envío</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* Geometría puntual del formulario «Añadir dirección» (estructura, sin colores de marca). */
      .ui-form-title { margin: 0 0 4px; font-size: 1.05rem; font-weight: 700; }
      .ui-form-sub   { margin: 0 0 18px; color: var(--ion-color-medium); font-size: .88rem; }
      .ui-form-head  {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 18px;
      }

      .ui-fields  { display: flex; flex-direction: column; gap: 16px; }
      .ui-row-2   { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .ui-row-3   { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
      @media (max-width: 640px) {
        .ui-row-2, .ui-row-3 { grid-template-columns: 1fr; }
      }

      /* Fila toggle de «marcar como predeterminada». */
      .ui-toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 0;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.18));
      }
      .ui-toggle-label { font-weight: 600; font-size: .9rem; }
      .ui-toggle-desc  { color: var(--ion-color-medium); font-size: .8rem; margin-top: 2px; }

      /* Pie del formulario. */
      .ui-form-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.18));
      }
      .ui-form-footer-end { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';
      import { html as h } from 'lit';

      const ADDRESSES = [
        { code: 'ALM-01',  label: 'Almacén central · Cornellà', tipo: 'almacen', tipoLabel: 'Almacén',
          address: 'C/ Industria 24, nave 7, Polígono Almeda', cp: '08940', city: 'Cornellà de Llobregat', province: 'Barcelona',
          note: 'Recepción L-V 7:00–19:00 · Tel +34 933 21 04 87', modified: 'Hace 6 días',  status: 'principal' },
        { code: 'OFI-MAD', label: 'Oficina Madrid',             tipo: 'oficina', tipoLabel: 'Oficina',
          address: 'Paseo de la Castellana 89, 4ª planta',    cp: '28046', city: 'Madrid',                 province: 'Madrid',
          note: 'Recepción L-V 9:00–18:00 · Tel +34 914 32 88 12', modified: 'Hace 2 sem',   status: 'oficina' },
        { code: 'FAB-PRT', label: 'Fábrica El Prat',            tipo: 'fabrica', tipoLabel: 'Fábrica',
          address: 'Polígono Mas Blau, c/ Selva 18',          cp: '08820', city: 'El Prat de Llobregat',  province: 'Barcelona',
          note: 'Recepción L-V 6:00–22:00 · Muelles 1-4',         modified: 'Hace 1 mes',    status: 'fabrica' },
        { code: 'ALM-MNR', label: 'Almacén secundario · Manresa', tipo: 'almacen', tipoLabel: 'Almacén',
          address: 'Carretera de Vic, km 42, Polígono Bufalvent', cp: '08243', city: 'Manresa',            province: 'Barcelona',
          note: 'Solo cita previa · Tel +34 938 75 21 09',         modified: '18 abr 2026',   status: 'almacen' },
      ];

      // Tipo de dirección → color de badge.
      const TIPO_COLOR = { principal: 'success', oficina: 'primary', fabrica: 'warning', almacen: 'medium' };

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Direcciones de envío"
            description="4 direcciones configuradas en Acme Industries">
            <ion-button slot="actions" id="btn-nueva">
              <ion-icon slot="start" name="add"></ion-icon>
              Nueva dirección
            </ion-button>
          </ok-page-header>

          <ok-data-table id="addr-dt" style="display:block"></ok-data-table>

          <!-- Panel: formulario «Añadir nueva dirección» (oculto por defecto) -->
          <ion-card id="form-panel" style="margin-top:16px" hidden>
            <ion-card-content>
              <div class="ui-form-head">
                <div>
                  <h3 class="ui-form-title">Añadir nueva dirección</h3>
                  <p class="ui-form-sub">Estará disponible para todos los hubs de Acme Industries</p>
                </div>
                <ion-button id="btn-cerrar" fill="clear" size="small" aria-label="Cerrar">
                  <ion-icon slot="icon-only" name="close-outline"></ion-icon>
                </ion-button>
              </div>

              <div class="ui-fields">

                <!-- Etiqueta + Tipo -->
                <div class="ui-row-2">
                  <ion-input
                    label="Etiqueta"
                    label-placement="stacked"
                    fill="outline"
                    placeholder="ej. Almacén Tarragona">
                  </ion-input>
                  <ion-select
                    label="Tipo"
                    label-placement="stacked"
                    fill="outline"
                    value="almacen">
                    <ion-select-option value="almacen">Almacén</ion-select-option>
                    <ion-select-option value="oficina">Oficina</ion-select-option>
                    <ion-select-option value="fabrica">Fábrica</ion-select-option>
                    <ion-select-option value="tienda">Tienda</ion-select-option>
                    <ion-select-option value="otro">Otro</ion-select-option>
                  </ion-select>
                </div>

                <!-- País -->
                <ion-select
                  label="País *"
                  label-placement="stacked"
                  fill="outline"
                  value="es">
                  <ion-select-option value="es">España</ion-select-option>
                  <ion-select-option value="pt">Portugal</ion-select-option>
                  <ion-select-option value="fr">Francia</ion-select-option>
                  <ion-select-option value="ad">Andorra</ion-select-option>
                  <ion-select-option value="it">Italia</ion-select-option>
                  <ion-select-option value="de">Alemania</ion-select-option>
                  <ion-select-option value="be">Bélgica</ion-select-option>
                </ion-select>

                <!-- Calle y número -->
                <ion-input
                  label="Calle y número *"
                  label-placement="stacked"
                  fill="outline"
                  placeholder="ej. Avda. del Mar 12">
                </ion-input>

                <!-- CP / Ciudad / Provincia -->
                <div class="ui-row-3">
                  <ion-input
                    label="Código postal"
                    label-placement="stacked"
                    fill="outline"
                    placeholder="08800">
                  </ion-input>
                  <ion-input
                    label="Ciudad"
                    label-placement="stacked"
                    fill="outline"
                    placeholder="Vilanova i la Geltrú">
                  </ion-input>
                  <ion-input
                    label="Provincia"
                    label-placement="stacked"
                    fill="outline"
                    placeholder="Barcelona">
                  </ion-input>
                </div>

                <!-- Toggle: marcar como predeterminada -->
                <div class="ui-toggle-row">
                  <div>
                    <div class="ui-toggle-label">Marcar como predeterminada</div>
                    <div class="ui-toggle-desc">Reemplazará la dirección Principal actual</div>
                  </div>
                  <ion-toggle></ion-toggle>
                </div>

              </div>

              <!-- Pie del formulario -->
              <div class="ui-form-footer">
                <ion-button id="btn-cancelar" fill="outline">Cancelar</ion-button>
                <div class="ui-form-footer-end">
                  <ion-button>
                    <ion-icon slot="start" name="save-outline"></ion-icon>
                    Guardar dirección
                  </ion-button>
                </div>
              </div>

            </ion-card-content>
          </ion-card>
        `,
        setup(doc) {
          // ── ok-data-table ──────────────────────────────────────────────────────
          const dt = doc.getElementById('addr-dt');
          dt.rowKey = (r) => r.code;
          dt.columns = [
            { key: 'label', header: 'Dirección', width: 'minmax(12rem,1.5fr)', render: (r) => h`
                <div>
                  <span style="font-weight:600">${r.label}</span>
                  <span style="display:block;font-size:11px;font-family:monospace;color:var(--ion-color-medium)">${r.code}</span>
                </div>` },
            { key: 'tipoLabel', header: 'Tipo', width: '8rem', render: (r) => {
                const c = TIPO_COLOR[r.status] ?? 'medium';
                return h`<ion-badge style="--background:color-mix(in srgb, var(--ion-color-${c}) 15%, transparent);--color:var(--ion-color-${c});--padding-top:5px;--padding-bottom:5px">${r.tipoLabel}</ion-badge>`;
              } },
            { key: 'address', header: 'Dirección postal', width: 'minmax(12rem,1.5fr)', render: (r) => h`
                <div style="font-size:13px">
                  ${r.address}<br/>${r.cp} ${r.city} · ${r.province}
                </div>` },
            { key: 'note', header: 'Notas', width: 'minmax(10rem,1fr)', render: (r) => h`
                <span style="font-size:12px;color:var(--ion-color-medium)">${r.note}</span>` },
            { key: 'modified', header: 'Modificado', width: '9rem', render: (r) => h`
                <span style="font-size:12px;color:var(--ion-color-medium)">${r.modified}</span>` },
          ];
          dt.actions = [
            { id: 'map',    icon: 'location-outline', label: 'Ver en mapa' },
            { id: 'edit',   icon: 'create-outline',   label: 'Editar' },
            { id: 'delete', icon: 'trash-outline',     label: 'Eliminar', color: 'danger' },
          ];
          dt.rows = ADDRESSES;

          dt.addEventListener('rowAction', (e) => {
            const { actionId, row } = e.detail || {};
            if (actionId === 'delete') {
              const alert = document.createElement('ion-alert');
              alert.header  = 'Eliminar dirección';
              alert.message = `¿Eliminar «${row.label}»? Esta acción no se puede deshacer.`;
              alert.buttons = [
                { text: 'Cancelar', role: 'cancel' },
                { text: 'Eliminar', role: 'destructive' },
              ];
              document.body.appendChild(alert);
              alert.present();
              alert.addEventListener('didDismiss', () => alert.remove());
            }
          });

          // ── Mostrar/ocultar el formulario ──────────────────────────────────────
          const formPanel = doc.getElementById('form-panel');
          const btnNueva  = doc.getElementById('btn-nueva');
          const btnCerrar = doc.getElementById('btn-cerrar');
          const btnCancel = doc.getElementById('btn-cancelar');

          const showForm = () => { if (formPanel) formPanel.hidden = false; };
          const hideForm = () => { if (formPanel) formPanel.hidden = true; };

          if (btnNueva)  btnNueva.addEventListener('click', showForm);
          if (btnCerrar) btnCerrar.addEventListener('click', hideForm);
          if (btnCancel) btnCancel.addEventListener('click', hideForm);
        },
      });
    </script>
  </body>
</html>
