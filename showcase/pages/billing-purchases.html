<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Compras · ERPlora Cloud</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
  </head>
  <body>
    <script type="module">
      import { html as h } from 'lit';
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      /* Valores de muestra; el esquema procede de purchases_page en billing/views.py. */
      const PURCHASES = [
        { id: 'purchase-1', module: 'Inventario', hub: 'Hub Central', status: 'completed', amount: 79.00, purchasedAt: '2026-07-12' },
        { id: 'purchase-2', module: 'Punto de venta', hub: 'Hub Central', status: 'pending', amount: 45.00, purchasedAt: '2026-07-08' },
        { id: 'purchase-3', module: 'Contabilidad', hub: 'Hub Norte', status: 'failed', amount: 59.00, purchasedAt: '2026-06-22' },
        { id: 'purchase-4', module: 'Recursos humanos', hub: 'Hub Norte', status: 'refunded', amount: 39.00, purchasedAt: '2026-06-10' },
      ];

      const STATUS = {
        completed: ['Completada', 'success'],
        pending: ['Pendiente', 'warning'],
        failed: ['Fallida', 'danger'],
        refunded: ['Reembolsada', 'tertiary'],
      };

      const money = new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' });
      const date = new Intl.DateTimeFormat('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });

      const moduleCell = (row) => h`
        <span style="display:flex;align-items:center;gap:.6rem;min-width:0">
          <ion-avatar style="display:grid;place-items:center;flex:none;width:2rem;height:2rem;color:var(--ion-color-primary);font-size:12px;font-weight:700;background:rgba(var(--ion-color-primary-rgb),.14)">
            <span style="display:grid;width:100%;height:100%;place-items:center">${row.module.charAt(0)}</span>
          </ion-avatar>
          <strong style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${row.module}</strong>
        </span>`;

      const statusCell = (row) => {
        const [label, tone] = STATUS[row.status] || [row.status, 'medium'];
        return h`<ion-badge style="--background:rgba(var(--ion-color-${tone}-rgb),.14);--color:var(--ion-color-${tone});--padding-start:10px;--padding-end:10px;--padding-top:4px;--padding-bottom:4px">${label}</ion-badge>`;
      };

      defineSaasDashboardPage({
        active: '/dashboard/billing/',
        title: 'Compras',
        body: `
          <div class="dash-fill">
            <ok-data-table id="purchases-dt" server-side fill>
              <div slot="toolbar" class="okdt-filters">
                <ion-select class="okdt-filter" data-okdt-param="hub" interface="popover"
                            aria-label="Hub" placeholder="Todos los hubs">
                  <ion-select-option value="">Todos los hubs</ion-select-option>
                  <ion-select-option value="Hub Central">Hub Central</ion-select-option>
                  <ion-select-option value="Hub Norte">Hub Norte</ion-select-option>
                </ion-select>
                <ion-select class="okdt-filter" data-okdt-param="payment_status" interface="popover"
                            aria-label="Estado" placeholder="Todos los estados">
                  <ion-select-option value="">Todos los estados</ion-select-option>
                  <ion-select-option value="completed">Completada</ion-select-option>
                  <ion-select-option value="pending">Pendiente</ion-select-option>
                  <ion-select-option value="failed">Fallida</ion-select-option>
                  <ion-select-option value="refunded">Reembolsada</ion-select-option>
                </ion-select>
              </div>
            </ok-data-table>
          </div>`,
        footer: `
          <footer id="section-tabbar">
            <ion-segment value="purchases" aria-label="Navegación de facturación">
              <ion-segment-button value="invoices">
                <iconify-icon icon="lucide:file-text" width="20" height="20"></iconify-icon>
                <ion-label>Facturas</ion-label>
              </ion-segment-button>
              <ion-segment-button value="subscriptions">
                <iconify-icon icon="lucide:repeat" width="20" height="20"></iconify-icon>
                <ion-label>Suscripciones</ion-label>
              </ion-segment-button>
              <ion-segment-button value="purchases">
                <iconify-icon icon="lucide:shopping-bag" width="20" height="20"></iconify-icon>
                <ion-label>Compras</ion-label>
              </ion-segment-button>
            </ion-segment>
          </footer>`,
        setup(doc) {
          const table = doc.getElementById('purchases-dt');
          if (!table) return;

          table.rowKey = 'id';
          table.columns = [
            { key: 'module', header: 'Módulo', width: 'minmax(13rem,1.35fr)', sortable: false, render: moduleCell },
            { key: 'hub', header: 'Hub', width: 'minmax(10rem,1fr)', sortable: false },
            { key: 'status', header: 'Estado', width: '10rem', sortable: false, render: statusCell },
            { key: 'amount', header: 'Importe', width: '9rem', align: 'right', sortable: true, format: (row) => money.format(row.amount) },
            { key: 'purchasedAt', header: 'Fecha', width: '10rem', sortable: true, format: (row) => date.format(new Date(`${row.purchasedAt}T00:00:00`)) },
          ];
          table.rows = PURCHASES;
          table.total = PURCHASES.length;
          table.searchable = true;
          table.searchPlaceholder = 'Buscar compras…';
          table.actions = [{ id: 'view', label: 'Ver', icon: 'eye-outline' }];
          table.views = true;
          table.pageSize = 10;
          table.pageSizes = [10, 25, 50];
          table.labels = {
            empty: 'Todavía no hay compras',
            columns: 'Columnas',
            columnsVisible: 'Columnas visibles',
            rowsPerPage: 'Filas por página',
            perPageShort: '{n} / pág.',
            showing: 'Mostrando {from}–{to} de',
            recordSingular: 'compra',
            recordPlural: 'compras',
            actions: 'Acciones',
          };

          const state = { query: '', sort: '', dir: 'asc' };
          const valueOf = (name) => doc.querySelector(`[data-okdt-param="${name}"]`)?.value || '';
          const refresh = () => {
            const needle = state.query.trim().toLocaleLowerCase('es');
            const hub = valueOf('hub');
            const status = valueOf('payment_status');
            let rows = PURCHASES.filter((row) =>
              (!needle || [row.module, row.hub].some((value) => value.toLocaleLowerCase('es').includes(needle))) &&
              (!hub || row.hub === hub) && (!status || row.status === status));
            if (state.sort) rows = [...rows].sort((a, b) => (a[state.sort] > b[state.sort] ? 1 : -1) * (state.dir === 'asc' ? 1 : -1));
            table.rows = rows;
            table.total = rows.length;
            table.page = 0;
          };
          doc.querySelectorAll('[data-okdt-param]').forEach((control) => control.addEventListener('ionChange', refresh));
          table.addEventListener('searchChange', (event) => { state.query = String(event.detail || ''); refresh(); });
          table.addEventListener('sortChange', (event) => { state.sort = event.detail.sort; state.dir = event.detail.dir; refresh(); });
          table.addEventListener('rowAction', (event) => {
            const toast = doc.createElement('ion-toast');
            toast.message = `Abriendo ${event.detail.row.module}`;
            toast.duration = 1400;
            doc.body.appendChild(toast);
            toast.present();
            toast.addEventListener('didDismiss', () => toast.remove());
          });

          doc.querySelector('ion-segment')?.addEventListener('ionChange', (event) => {
            const targets = { invoices: 'billing-invoices', subscriptions: 'billing-subscriptions' };
            if (targets[event.detail.value]) window.parent.location.hash = `#/p/${targets[event.detail.value]}`;
          });
        },
      });
    </script>
  </body>
</html>
