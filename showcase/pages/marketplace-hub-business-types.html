    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }

    <style>
      /* Cuadrícula auto-fill para las tarjetas de tipo de negocio. */
      .bt-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 14px;
      }

      /* Tarjeta de tipo de negocio. */
      .bt-card {
        display: flex;
        flex-direction: column;
        gap: 12px;
        cursor: pointer;
        transition: transform .15s ease;
      }
      .bt-card:hover { transform: translateY(-2px); }
      .bt-card ion-card-content { display: flex; flex-direction: column; gap: 12px; flex: 1; }

      /* Cabecera de la tarjeta: icono + nombre + sector. */
      .bt-head {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .bt-icon {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        background: var(--ion-color-step-50, rgba(127,127,127,.07));
        color: var(--ion-color-medium);
        display: grid;
        place-items: center;
        flex: 0 0 auto;
      }
      .bt-icon ion-icon { font-size: 22px; }
      .bt-name { font-weight: 700; font-size: 1rem; margin: 0; }
      .bt-sector {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: .04em;
        color: var(--ion-color-medium);
        margin-top: 2px;
      }

      /* Chips de módulos. */
      .bt-mods { display: flex; flex-wrap: wrap; gap: 4px; }
      .bt-mods ion-chip { margin: 0; font-size: 11px; height: 22px; --padding-top: 2px; --padding-bottom: 2px; }

      /* Pie de tarjeta. */
      .bt-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding-top: 10px;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
        font-size: 12px;
        margin-top: auto;
      }

      /* Encabezado de sección sectorial. */
      .sector-head {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 12px;
      }
      .sector-head h2 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
      }
      .sector-count {
        font-size: 12px;
        color: var(--ion-color-medium);
        font-weight: 400;
      }

      /* Espacio entre secciones. */
      .pg-section { margin-bottom: 28px; }
    </style>
  </head>

                    <ion-chip outline>employees</ion-chip>

        setup(doc) {
          // Buscador: filtra tarjetas por nombre (data-name) en todas las secciones.
          const searchbar = doc.getElementById('bt-search');
          if (!searchbar) return;

          searchbar.addEventListener('ionInput', (e) => {
            const q = ((e.detail && e.detail.value) || '').toLowerCase().trim();
            doc.querySelectorAll('.bt-card').forEach((card) => {
              const name = (card.getAttribute('data-name') || '').toLowerCase();
              const sector = (card.getAttribute('data-sector') || '').toLowerCase();
              const visible = !q || name.includes(q) || sector.includes(q);
              card.style.display = visible ? '' : 'none';
            });
            // Ocultar encabezado de sección si no quedan tarjetas visibles en ella.
            doc.querySelectorAll('[data-sector]').forEach((section) => {
              const grid = section.querySelector('.bt-grid');
              if (!grid) return;
              const anyVisible = Array.from(grid.querySelectorAll('.bt-card'))
                .some((c) => c.style.display !== 'none');
              section.style.display = anyVisible ? '' : 'none';
            });
          });
        },
      });
