<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERPlora Hub · Pantalla de cocina</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>

    <style>
      .kitchen-display-page { display: flex; flex-direction: column; gap: 0.75rem; min-height: 100%; }
      .kitchen-display-toolbar { display: flex; justify-content: flex-end; }
      .kitchen-settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(15rem, 1fr)); }
      .kitchen-settings-numbers { display: grid; grid-template-columns: repeat(auto-fit, minmax(11rem, 1fr)); gap: 0.75rem; padding: 0 1rem 1rem; }
      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      // No hay seed de actividad: estas filas de preview respetan exactamente logs_list.sql.
      const LOG_FIXTURE = [
        { "id": "log-1", "order_id": "order-1042", "action": "received", "station_id": "st1", "notes": "Mesa 4 · ronda 1", "created_at": "2026-07-18T20:12:00Z" },
        { "id": "log-2", "order_id": "order-1041", "action": "bumped", "station_id": "st1", "notes": "Lista para servir", "created_at": "2026-07-18T20:09:00Z" },
        { "id": "log-3", "order_id": "order-1040", "action": "served", "station_id": "st2", "notes": "Barra", "created_at": "2026-07-18T20:04:00Z" }
      ];

      const DEFAULT_SETTINGS = {
        auto_accept_orders: false,
        show_timer: true,
        warning_time_minutes: 15,
        critical_time_minutes: 30,
        items_per_page: 12,
        auto_refresh_seconds: 3,
        sound_enabled: true,
        sound_on_new_order: true,
        sound_on_rush: true,
        auto_bump_enabled: false,
        auto_bump_delay_seconds: 5,
        color_coding_enabled: true,
        auto_print_tickets: true,
        use_rounds: true,
        auto_fire_on_round: false,
        default_order_type: 'dine_in',
      };

      const BOOL_FIELDS = [
        ['auto_accept_orders', 'Auto-aceptar comandas'],
        ['show_timer', 'Mostrar temporizador'],
        ['sound_enabled', 'Sonido'],
        ['sound_on_new_order', 'Sonido al recibir comanda'],
        ['sound_on_rush', 'Sonido en prioridad rush'],
        ['auto_bump_enabled', 'Auto-bump'],
        ['color_coding_enabled', 'Colores por tiempo'],
        ['auto_print_tickets', 'Imprimir tickets automáticamente'],
        ['use_rounds', 'Usar rondas'],
        ['auto_fire_on_round', 'Lanzar al cerrar ronda'],
      ];
      const NUMBER_FIELDS = [
        ['warning_time_minutes', 'Aviso (min)', 1, 120],
        ['critical_time_minutes', 'Crítico (min)', 1, 120],
        ['items_per_page', 'Comandas por página', 4, 50],
        ['auto_refresh_seconds', 'Refresco (s)', 3, 120],
        ['auto_bump_delay_seconds', 'Auto-bump (s)', 1, 300],
      ];

      let logs = LOG_FIXTURE.map((row) => ({ ...row }));
      let settings = { ...DEFAULT_SETTINGS };
      const state = { page: 0, pageSize: 50, sort: 'created_at', dir: 'desc', search: '', filters: {} };

      function recordQuery(name, params = {}) {
        document.dispatchEvent(new CustomEvent('erplora:preview-query', { detail: { name, params } }));
      }

      function recordCommand(name, payload) {
        document.dispatchEvent(new CustomEvent('erplora:preview-command', { detail: { name, payload } }));
      }

      function badge(text, color) {
        const element = document.createElement('ion-badge');
        element.textContent = text;
        element.color = color;
        return element;
      }

      defineHubPage({
        active: '/m/kitchen/display',
        title: 'Pantalla',
        body: `
          <div class="kitchen-display-page">
            <div class="kitchen-display-toolbar">
              <ion-button id="kitchen-settings-toggle" size="small" fill="outline">
                <ion-icon slot="start" name="settings-outline"></ion-icon>
                Ajustes
              </ion-button>
            </div>

            <ion-card id="kitchen-settings-panel" hidden>
              <ion-card-header><ion-card-title>Ajustes de cocina</ion-card-title></ion-card-header>
              <ion-card-content>
                <ion-list class="kitchen-settings-grid" lines="none">
                  ${BOOL_FIELDS.map(([key, label]) => `
                    <ion-item>
                      <ion-toggle id="kitchen-setting-${key.replaceAll('_', '-')}">${label}</ion-toggle>
                    </ion-item>
                  `).join('')}
                </ion-list>
                <div class="kitchen-settings-numbers">
                  ${NUMBER_FIELDS.map(([key, label, min, max]) => `
                    <ion-input id="kitchen-setting-${key.replaceAll('_', '-')}" type="number" fill="outline" label="${label}" label-placement="floating" min="${min}" max="${max}"></ion-input>
                  `).join('')}
                  <ion-select id="kitchen-setting-default-order-type" fill="outline" label="Tipo por defecto" label-placement="floating">
                    <ion-select-option value="dine_in">En sala</ion-select-option>
                    <ion-select-option value="takeaway">Para llevar</ion-select-option>
                    <ion-select-option value="delivery">A domicilio</ion-select-option>
                  </ion-select>
                </div>
                <ion-button id="kitchen-settings-save" size="small">Guardar ajustes</ion-button>
              </ion-card-content>
            </ion-card>

            <ok-data-table id="kitchen-display-table"></ok-data-table>
          </div>
          <ion-toast id="kitchen-display-toast" duration="1800" position="bottom"></ion-toast>
        `,
        setup(doc) {
          const table = doc.getElementById('kitchen-display-table');
          const panel = doc.getElementById('kitchen-settings-panel');
          const toggle = doc.getElementById('kitchen-settings-toggle');
          const save = doc.getElementById('kitchen-settings-save');
          const toast = doc.getElementById('kitchen-display-toast');

          table.columns = [
            {
              key: 'action', header: 'Acción', sortable: true, filterable: true, filterType: 'select',
              options: [
                { value: 'received', label: 'Recibida' },
                { value: 'started', label: 'Lanzada' },
                { value: 'bumped', label: 'Lista' },
                { value: 'served', label: 'Servida' },
                { value: 'recalled', label: 'Recuperada' },
                { value: 'cancelled', label: 'Cancelada' },
              ],
              render: (row) => badge({ received: 'Recibida', started: 'Lanzada', bumped: 'Lista', served: 'Servida', recalled: 'Recuperada', cancelled: 'Cancelada' }[row.action] || row.action, row.action === 'cancelled' ? 'danger' : row.action === 'served' ? 'success' : 'primary'),
            },
            { key: 'order_id', header: 'Comanda', sortable: true, filterable: true, filterType: 'text' },
            { key: 'notes', header: 'Notas', sortable: true, filterable: true, filterType: 'text' },
            { key: 'created_at', header: 'Cuándo', sortable: true, filterable: true, filterType: 'daterange', format: (row) => new Date(row.created_at).toLocaleString('es-ES') },
          ];
          table.serverSide = true;
          table.views = true;
          table.cardTitle = (row) => `#${String(row.order_id || '—')}`;
          table.cardIcon = () => 'restaurant-outline';
          table.searchable = true;
          table.searchPlaceholder = 'Buscar acción, comanda o notas…';
          table.emptyMessage = 'Sin actividad reciente en cocina.';
          table.pageSize = 50;
          table.sort = 'created_at';
          table.sortDir = 'desc';

          function queryPage() {
            recordQuery('kitchen.logs.list', { ...state });
            const term = state.search.trim().toLocaleLowerCase('es');
            const filtered = logs
              .filter((row) => {
                if (term && !`${row.action} ${row.order_id} ${row.notes}`.toLocaleLowerCase('es').includes(term)) return false;
                return Object.entries(state.filters).every(([key, value]) => {
                  if (value == null || value === '') return true;
                  if (typeof value === 'object') return true;
                  return key === 'action' ? String(row[key]) === String(value) : String(row[key] || '').toLocaleLowerCase('es').includes(String(value).toLocaleLowerCase('es'));
                });
              })
              .sort((left, right) => {
                const result = String(left[state.sort] || '').localeCompare(String(right[state.sort] || ''), 'es', { numeric: true });
                return state.dir === 'desc' ? -result : result;
              });
            const start = state.page * state.pageSize;
            table.rows = filtered.slice(start, start + state.pageSize);
            table.total = filtered.length;
            table.page = state.page;
            table.pageSize = state.pageSize;
            table.sort = state.sort;
            table.sortDir = state.dir;
          }

          function hydrateSettings() {
            for (const [key] of BOOL_FIELDS) doc.getElementById(`kitchen-setting-${key.replaceAll('_', '-')}`).checked = Boolean(settings[key]);
            for (const [key] of NUMBER_FIELDS) doc.getElementById(`kitchen-setting-${key.replaceAll('_', '-')}`).value = settings[key];
            doc.getElementById('kitchen-setting-default-order-type').value = settings.default_order_type;
          }

          toggle.addEventListener('click', () => {
            panel.hidden = !panel.hidden;
            toggle.textContent = panel.hidden ? 'Ajustes' : 'Cerrar ajustes';
            if (!panel.hidden) {
              recordQuery('kitchen.settings.get', {});
              hydrateSettings();
            }
          });

          save.addEventListener('click', () => {
            for (const [key] of BOOL_FIELDS) settings[key] = Boolean(doc.getElementById(`kitchen-setting-${key.replaceAll('_', '-')}`).checked);
            for (const [key, , min, max] of NUMBER_FIELDS) {
              const value = Number(doc.getElementById(`kitchen-setting-${key.replaceAll('_', '-')}`).value);
              settings[key] = Math.max(min, Math.min(max, value || min));
            }
            settings.default_order_type = String(doc.getElementById('kitchen-setting-default-order-type').value || 'dine_in');
            recordCommand('kitchen.settings.update', { ...settings });
            toast.message = 'Ajustes guardados.';
            toast.color = 'success';
            toast.isOpen = true;
          });
          toast.addEventListener('didDismiss', () => { toast.isOpen = false; });

          table.addEventListener('pageChange', (event) => { state.page = Number(event.detail) || 0; queryPage(); });
          table.addEventListener('pageSizeChange', (event) => { state.pageSize = Number(event.detail) || 50; state.page = 0; queryPage(); });
          table.addEventListener('sortChange', (event) => { state.sort = event.detail.sort; state.dir = event.detail.dir; queryPage(); });
          table.addEventListener('searchChange', (event) => { state.search = String(event.detail || ''); state.page = 0; queryPage(); });
          table.addEventListener('filterChange', (event) => { state.filters[event.detail.col] = event.detail.value; state.page = 0; queryPage(); });

          hydrateSettings();
          queryPage();
        },
      });
    </script>
  </body>
</html>
