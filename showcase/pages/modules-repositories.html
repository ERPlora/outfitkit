<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Repositorios · ERPlora Cloud</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_saas-developer.css" />
    <link rel="stylesheet" href="./_saas-developer-pages.css" />
  </head>
  <body>
    <script type="module">
      import { html as h } from 'lit';
      import { defineDeveloperPage } from './_saas-developer.js';

      const REPOSITORIES = [
        { id: 'repo-1', name: 'Inventario Avanzado', repoUrl: 'github.com/erplora-modules/inventory', branch: 'main', lastSynced: '18 jul 2026 · 18:42', moduleCount: 1, provider: 'github', active: 'true', status: 'Activo' },
        { id: 'repo-2', name: 'Reservas Online', repoUrl: 'gitlab.com/demo/reservations', branch: 'stable', lastSynced: '17 jul 2026 · 09:18', moduleCount: 1, provider: 'gitlab', active: 'true', status: 'Activo' },
        { id: 'repo-3', name: 'Informes fiscales', repoUrl: 'bitbucket.org/demo/tax-reports', branch: 'main', lastSynced: '12 jul 2026 · 16:04', moduleCount: 2, provider: 'bitbucket', active: 'false', status: 'Inactivo' },
      ];

      const repositoryCell = (row) => h`
        <span style="display:flex;align-items:center;gap:.65rem;min-width:0">
          <span style="display:grid;place-items:center;flex:none;width:2.1rem;height:2.1rem;border-radius:9px;color:var(--ion-color-primary);background:rgba(var(--ion-color-primary-rgb),.12)">
            <iconify-icon icon="lucide:git-branch" width="16" height="16"></iconify-icon>
          </span>
          <span style="display:grid;min-width:0">
            <strong>${row.name}</strong>
            <small style="overflow:hidden;color:var(--ion-color-medium);text-overflow:ellipsis;white-space:nowrap">${row.repoUrl}</small>
          </span>
        </span>`;

      const statusCell = (row) => h`<ion-badge color=${row.active === 'true' ? 'success' : 'medium'}>${row.status}</ion-badge>`;

      defineDeveloperPage({
        activeTab: 'repositories',
        title: 'Repositorios',
        body: `
          <div class="developer-page">
            <ok-inline-feedback tone="warning" icon="lock-closed" heading="GitHub App no instalada">
              <p>Instala la aplicación de ERPlora y autoriza tus repositorios para importar proyectos privados.</p>
              <ion-button fill="outline" size="small"><iconify-icon slot="start" icon="lucide:github" width="14" height="14"></iconify-icon>Instalar GitHub App</ion-button>
              <small>Los repositorios públicos funcionan sin instalarla.</small>
            </ok-inline-feedback>

            <div class="developer-table-wrap ion-margin-top">
              <div class="dash-fill">
                <ok-data-table id="repositories-dt" server-side fill>
                  <div slot="toolbar" class="okdt-filters">
                    <ion-select class="okdt-filter" data-okdt-param="provider" interface="popover" aria-label="Proveedor" placeholder="Todos los proveedores">
                      <ion-select-option value="">Todos los proveedores</ion-select-option>
                      <ion-select-option value="github">GitHub</ion-select-option>
                      <ion-select-option value="gitlab">GitLab</ion-select-option>
                      <ion-select-option value="bitbucket">Bitbucket</ion-select-option>
                    </ion-select>
                    <ion-select class="okdt-filter" data-okdt-param="is_active" interface="popover" aria-label="Estado" placeholder="Todos los estados">
                      <ion-select-option value="">Todos los estados</ion-select-option>
                      <ion-select-option value="true">Activo</ion-select-option>
                      <ion-select-option value="false">Inactivo</ion-select-option>
                    </ion-select>
                  </div>
                </ok-data-table>
              </div>
            </div>

            <ion-card class="developer-after-table">
              <ion-card-content>
                <h2 class="developer-card-title">Cómo funciona el gestor de módulos</h2>
                <div class="developer-step"><div class="developer-step-number">1</div><div><strong>Conecta el repositorio</strong><small>Vincula el módulo con un repositorio de GitHub, GitLab o Bitbucket.</small></div></div>
                <div class="developer-step"><div class="developer-step-number">2</div><div><strong>Configura el webhook</strong><small>Añade la URL del webhook en los ajustes del repositorio.</small></div></div>
                <div class="developer-step"><div class="developer-step-number">3</div><div><strong>Envía cambios</strong><small>Cada push actualiza automáticamente el módulo.</small></div></div>
              </ion-card-content>
            </ion-card>
          </div>`,
        setup(doc) {
          const table = doc.getElementById('repositories-dt');
          if (!table) return;

          table.rowKey = 'id';
          table.columns = [
            { key: 'name', header: 'Repositorio', width: 'minmax(16rem,1.5fr)', sortable: true, render: repositoryCell },
            { key: 'branch', header: 'Rama', width: '8rem' },
            { key: 'lastSynced', header: 'Última sincronización', width: '12rem', sortable: true },
            { key: 'moduleCount', header: 'Módulos', width: '8rem', align: 'right' },
            { key: 'status', header: 'Estado', width: '8rem', render: statusCell },
          ];
          table.searchable = true;
          table.searchPlaceholder = 'Buscar repositorios…';
          table.actions = [{ id: 'view', label: 'Ver', icon: 'eye-outline' }];
          table.primaryAction = { label: 'Importar desde Git', icon: 'add' };
          table.pageSize = 10;
          table.pageSizes = [10, 25, 50];
          table.labels = {
            empty: 'No hay repositorios',
            columns: 'Columnas',
            columnsVisible: 'Columnas visibles',
            rowsPerPage: 'Filas por página',
            perPageShort: '{n} / pág.',
            showing: 'Mostrando {from}–{to} de',
            recordSingular: 'repositorio',
            recordPlural: 'repositorios',
            actions: 'Acciones',
          };

          const state = { query: '', sort: 'name', dir: 'asc' };
          const valueOf = (name) => doc.querySelector(`[data-okdt-param="${name}"]`)?.value || '';
          const refresh = () => {
            const query = state.query.trim().toLocaleLowerCase('es');
            const provider = valueOf('provider');
            const active = valueOf('is_active');
            let rows = REPOSITORIES.filter((row) =>
              (!query || [row.name, row.repoUrl, row.branch].some((value) => value.toLocaleLowerCase('es').includes(query))) &&
              (!provider || row.provider === provider) && (!active || row.active === active));
            rows = [...rows].sort((a, b) => String(a[state.sort] ?? '').localeCompare(String(b[state.sort] ?? ''), 'es') * (state.dir === 'asc' ? 1 : -1));
            table.rows = rows;
            table.total = rows.length;
            table.page = 0;
          };
          doc.querySelectorAll('[data-okdt-param]').forEach((control) => control.addEventListener('ionChange', refresh));
          table.addEventListener('searchChange', (event) => { state.query = String(event.detail || ''); refresh(); });
          table.addEventListener('sortChange', (event) => { state.sort = event.detail.sort; state.dir = event.detail.dir; refresh(); });
          table.addEventListener('rowAction', (event) => console.info(event.detail.actionId, event.detail.row.id));
          table.addEventListener('primaryAction', () => console.info('/dashboard/developer/repos/add/'));
          refresh();
        },
      });
    </script>
  </body>
</html>
