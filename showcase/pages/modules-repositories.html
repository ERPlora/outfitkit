<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Repositorios</title>

    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <!-- Estilos puntuales de esta vista: solo lo que ion-*/ok-* no proveen -->
    <style>
      .cfg-toggle-row {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 12px 0;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
      }
      .cfg-toggle-row:first-of-type { border-top: 0; padding-top: 0; }
      .cfg-toggle-row__text { flex: 1 1 auto; }
      .cfg-toggle-row__title { font-weight: 600; font-size: .9rem; }
      .cfg-toggle-row__desc { font-size: .8rem; color: var(--ion-color-medium); margin-top: 2px; }

      .cfg-footer {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        padding-top: 14px;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
        font-size: .78rem;
        color: var(--ion-color-medium);
      }
      .cfg-footer ion-button { margin-left: auto; }
      .status-ok { color: var(--ion-color-success-shade); }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';
      import { html as h } from 'lit';

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Repositorios"
            description="8 repos conectados desde GitHub · Webhooks en tiempo real">
            <div slot="actions" style="display:flex;gap:8px;flex-wrap:wrap">
              <ion-button fill="outline" id="btn-sync-all">
                <ion-icon slot="start" name="refresh-outline"></ion-icon>
                Sincronizar todo
              </ion-button>
              <ion-button id="btn-connect-repo">
                <ion-icon slot="start" name="logo-github"></ion-icon>
                + Conectar repo
              </ion-button>
            </div>
          </ok-page-header>

          <!-- Listado de repositorios — ok-data-table obligatorio para CRUDs con columnas y acciones por fila -->
          <ok-data-table id="repos-dt" class="pg-mb-4" style="display:block"></ok-data-table>

          <!-- Configuración global -->
          <ion-card>
            <ion-card-header>
              <div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap">
                <div style="flex:1 1 auto">
                  <ion-card-title>Configuración global</ion-card-title>
                  <ion-card-subtitle style="margin-top:4px">
                    Credenciales y comportamiento por defecto al conectar nuevos repositorios
                  </ion-card-subtitle>
                </div>
                <ion-button size="small" fill="outline" id="btn-test-conn">
                  <ion-icon slot="start" name="wifi-outline"></ion-icon>
                  Test connection
                </ion-button>
              </div>
            </ion-card-header>
            <ion-card-content>
              <div class="pg-cols">

                <!-- Izquierda: credenciales -->
                <div class="pg-stack">
                  <div>
                    <ion-input
                      id="pat-input"
                      label="GitHub Personal Access Token (PAT)"
                      label-placement="stacked"
                      type="password"
                      value="ghp_AbCdE1234567890XyZqRsTuVw9876543210"
                      fill="outline"
                      helper-text="Scopes requeridos: repo, admin:repo_hook">
                        <ion-input-password-toggle slot="end"></ion-input-password-toggle>
                    </ion-input>
                  </div>
                  <ion-select
                    label="Branch por defecto"
                    label-placement="stacked"
                    value="main"
                    fill="outline"
                    interface="popover">
                    <ion-select-option value="main">main</ion-select-option>
                    <ion-select-option value="master">master</ion-select-option>
                    <ion-select-option value="develop">develop</ion-select-option>
                    <ion-select-option value="release">release/*</ion-select-option>
                  </ion-select>
                </div>

                <!-- Derecha: toggles de comportamiento -->
                <div>
                  <div class="cfg-toggle-row">
                    <div class="cfg-toggle-row__text">
                      <div class="cfg-toggle-row__title">Auto-sync on push</div>
                      <div class="cfg-toggle-row__desc">Sincronizar automáticamente cuando llegue un webhook push</div>
                    </div>
                    <ion-toggle checked></ion-toggle>
                  </div>
                  <div class="cfg-toggle-row">
                    <div class="cfg-toggle-row__text">
                      <div class="cfg-toggle-row__title">Bloquear sync en errores de tests</div>
                      <div class="cfg-toggle-row__desc">No promover commits con CI rojo</div>
                    </div>
                    <ion-toggle checked></ion-toggle>
                  </div>
                  <div class="cfg-toggle-row">
                    <div class="cfg-toggle-row__text">
                      <div class="cfg-toggle-row__title">Notificar a Slack</div>
                      <div class="cfg-toggle-row__desc">Canal #devops-deploys</div>
                    </div>
                    <ion-toggle></ion-toggle>
                  </div>
                </div>

              </div>

              <div class="cfg-footer">
                <span>Última prueba: 8 may 2026 · 09:14 — <span class="status-ok">200 OK</span></span>
                <ion-button size="small">Guardar cambios</ion-button>
              </div>
            </ion-card-content>
          </ion-card>
        `,
        setup(doc) {
          // ── GitHub icon SVG (inline, CSP-safe) ──
          const GH_SVG = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="color:var(--ion-color-medium);flex:0 0 15px"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5 3.3 9.3 7.9 10.8.6.1.8-.2.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.6-1.3-1.6-1-.7.1-.7.1-.7 1.1.1 1.7 1.2 1.7 1.2 1 1.7 2.7 1.2 3.4.9.1-.7.4-1.2.7-1.5-2.5-.3-5.2-1.3-5.2-5.7 0-1.3.4-2.3 1.2-3.1-.1-.3-.5-1.5.1-3 0 0 1-.3 3.2 1.2a11.4 11.4 0 0 1 5.8 0c2.2-1.5 3.2-1.2 3.2-1.2.6 1.6.2 2.7.1 3 .8.8 1.2 1.9 1.2 3.1 0 4.4-2.7 5.4-5.2 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6C20.2 21.3 23.5 17 23.5 12 23.5 5.7 18.3.5 12 .5z"/></svg>`;

          // ── Helpers de renderizado ──
          const statusColor = (estado) => {
            if (estado === 'Sincronizado') return 'success';
            if (estado === 'Sync en curso') return 'primary';
            if (estado === 'Error') return 'danger';
            return 'medium';
          };
          const webhookColor = (wh) => {
            if (wh === 'activo') return 'success';
            if (wh === 'caducado' || wh === 'inactivo') return 'danger';
            return 'medium';
          };

          const badge = (color, text) =>
            h`<ion-badge style="--background:color-mix(in srgb,var(--ion-color-${color}) 15%,transparent);--color:var(--ion-color-${color});--padding-top:5px;--padding-bottom:5px">
                <span style="width:7px;height:7px;border-radius:50%;background:var(--ion-color-${color});display:inline-block;margin-right:4px;vertical-align:middle"></span>
                ${text}
              </ion-badge>`;

          const chipNeutral = (text) =>
            h`<span style="display:inline-block;padding:2px 8px;border-radius:999px;font-size:11.5px;font-weight:500;background:color-mix(in srgb,var(--ion-color-medium) 15%,transparent);color:var(--ion-color-medium-shade)">${text}</span>`;

          const chipPrimary = (text) =>
            h`<span style="display:inline-block;padding:2px 8px;border-radius:999px;font-size:11.5px;font-weight:500;background:color-mix(in srgb,var(--ion-color-primary) 15%,transparent);color:var(--ion-color-primary-shade)">${text}</span>`;

          // ── ok-data-table ──
          const dt = doc.getElementById('repos-dt');

          dt.title = 'Repositorios conectados';
          dt.rowKey = (r) => r.id;
          dt.views = ['table'];
          dt.viewMode = 'table';
          dt.searchable = true;
          dt.searchKeys = ['name', 'module'];
          dt.labels = {
            search: 'Filtrar por nombre…',
            empty: 'No hay repositorios que coincidan',
            selected: '{n} seleccionados',
            exportCsv: 'Exportar CSV',
            add: 'Conectar repo',
          };

          dt.columns = [
            {
              key: 'name',
              header: 'Repositorio',
              width: 'minmax(14rem,2fr)',
              render: (r) => h`<div style="display:inline-flex;align-items:center;gap:6px">
                  <span .innerHTML=${GH_SVG}></span>
                  <span style="font-weight:600">${r.name}</span>
                </div>`,
            },
            {
              key: 'branch',
              header: 'Branch',
              width: '9rem',
              render: (r) => chipNeutral(r.branch),
            },
            {
              key: 'module',
              header: 'Módulo asociado',
              width: '10rem',
              render: (r) => chipPrimary(r.module),
            },
            {
              key: 'sync',
              header: 'Última sync',
              width: '9rem',
              render: (r) =>
                h`<span style="color:${r.error ? 'var(--ion-color-danger)' : 'var(--ion-color-medium)'}">${r.sync}</span>`,
            },
            {
              key: 'webhook',
              header: 'Webhook',
              width: '8rem',
              render: (r) => badge(webhookColor(r.webhook), r.webhook),
            },
            {
              key: 'commits',
              header: 'Commits 7 d',
              width: '7rem',
              align: 'right',
            },
            {
              key: 'estado',
              header: 'Estado',
              width: '10rem',
              render: (r) => badge(statusColor(r.estado), r.estado),
            },
          ];

          // Acción por fila: menú contextual
          dt.actions = [
            { id: 'menu', icon: 'ellipsis-horizontal', label: 'Más acciones' },
          ];

          dt.rows = [
            { id: 'r1', name: 'acme/erplora-pos-pro',               branch: 'main',        module: 'pos-pro',        sync: 'hace 11 min', webhook: 'activo',   commits: 42, estado: 'Sincronizado',  error: null },
            { id: 'r2', name: 'bodegas-casadejus/inventario-vinos',  branch: 'main',        module: 'inventario-wine',sync: 'hace 1 h',    webhook: 'activo',   commits: 17, estado: 'Sync en curso', error: null },
            { id: 'r3', name: 'mariola-tienda/repostería-pos',       branch: 'develop',     module: 'bakery-pos',     sync: 'hace 3 d',    webhook: 'caducado', commits: 0,  estado: 'Error',         error: { title: 'HTTP 401: Bad credentials', desc: 'PAT sin permisos repo:webhook. Renueva el token en Configuración global.' } },
            { id: 'r4', name: 'acme/erplora-warehouse',              branch: 'main',        module: 'wms-core',       sync: 'hace 38 min', webhook: 'activo',   commits: 28, estado: 'Sincronizado',  error: null },
            { id: 'r5', name: 'ferreteria-puig/erp-modulo-clientes', branch: 'main',        module: 'crm-light',      sync: 'hace 2 h',    webhook: 'activo',   commits: 9,  estado: 'Sincronizado',  error: null },
            { id: 'r6', name: 'logistica-peninsular/dispatch-board',  branch: 'release/2.4', module: 'dispatch',       sync: 'hace 5 d',    webhook: 'inactivo', commits: 3,  estado: 'Error',         error: { title: 'Webhook delivery failed', desc: 'Último intento: 502 Bad Gateway. Reintentar o regenerar webhook.' } },
            { id: 'r7', name: 'acme/erplora-reports',                branch: 'main',        module: 'reporting',      sync: 'hace 18 h',   webhook: 'pausado',  commits: 5,  estado: 'Pausado',       error: null },
            { id: 'r8', name: 'vinos-roca/etiquetas-ai',             branch: 'main',        module: 'label-vision',   sync: 'hace 6 h',    webhook: 'activo',   commits: 21, estado: 'Sincronizado',  error: null },
          ];

          // ── Menú por fila → ion-action-sheet con iconos (criterio C) ──
          dt.addEventListener('rowAction', (e) => {
            const { actionId, row } = e.detail || {};
            if (actionId !== 'menu') return;

            const buttons = [];
            if (row.estado === 'Pausado') {
              buttons.push({ text: 'Reanudar sync', icon: 'play-outline' });
              buttons.push({ text: 'Ver en GitHub', icon: 'logo-github' });
            } else if (row.error) {
              buttons.push({ text: 'Forzar sync', icon: 'refresh-outline' });
              buttons.push({ text: 'Renovar webhook', icon: 'refresh-circle-outline' });
            } else if (row.estado === 'Sync en curso') {
              buttons.push({ text: 'Forzar sync', icon: 'refresh-outline' });
              buttons.push({ text: 'Ver en GitHub', icon: 'logo-github' });
            } else {
              buttons.push({ text: 'Forzar sync', icon: 'refresh-outline' });
              buttons.push({ text: 'Ver en GitHub', icon: 'logo-github' });
              buttons.push({ text: 'Editar webhook', icon: 'pencil-outline' });
            }
            buttons.push({ text: 'Desconectar', role: 'destructive', icon: 'trash-outline' });
            buttons.push({ text: 'Cancelar', role: 'cancel' });

            const s = doc.createElement('ion-action-sheet');
            s.header = row.name;
            s.buttons = buttons;
            doc.body.appendChild(s);
            s.present();
            s.addEventListener('didDismiss', () => s.remove());
          });
        },
      });
    </script>
  </body>
</html>
