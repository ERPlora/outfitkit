<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Conectar repositorio</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* Geometría puntual de esta vista (estructura, sin colores de marca). */

      /* Bloque del wizard */
      .ui-wizard {
        display: flex;
        flex-direction: column;
        gap: 24px;
        margin-bottom: 80px;
      }

      /* Cuerpo de la tarjeta del wizard */
      .ui-wizard-body {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* Títulos del wizard */
      .ui-wizard-title {
        margin: 0 0 4px;
        font-size: 1.1rem;
        font-weight: 700;
      }
      .ui-wizard-sub {
        margin: 0;
        color: var(--ion-color-medium);
        font-size: 0.875rem;
        line-height: 1.5;
      }

      /* Tarjeta de la cuenta GitHub */
      .ui-gh-card {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      .ui-gh-info { flex: 1 1 auto; min-width: 0; }
      .ui-gh-name { font-weight: 600; font-size: 0.9375rem; }
      .ui-gh-meta { font-size: 0.8125rem; color: var(--ion-color-medium); margin-top: 2px; }
      .ui-gh-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      /* Lista de repositorios */
      .ui-repo-list {
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        border-radius: 10px;
        overflow: hidden;
        background: var(--ion-color-step-50, rgba(127,127,127,.03));
      }
      .ui-repo-item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
      }
      .ui-repo-item:last-child { border-bottom: 0; }
      .ui-repo-icon {
        flex: 0 0 18px;
        padding-top: 2px;
        color: var(--ion-color-medium);
      }
      .ui-repo-body { flex: 1 1 auto; min-width: 0; }
      .ui-repo-title {
        font-size: 0.875rem;
        font-weight: 600;
        line-height: 1.3;
        margin-bottom: 2px;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .ui-repo-desc {
        font-size: 0.8rem;
        color: var(--ion-color-medium);
        line-height: 1.4;
        margin-bottom: 4px;
      }
      .ui-repo-meta {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 0.75rem;
        color: var(--ion-color-medium);
      }
      .ui-repo-lang {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .ui-lang-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex: 0 0 9px;
      }
      .ui-repo-aside {
        flex: 0 0 auto;
        padding-top: 2px;
      }

      /* Paginación */
      .ui-pager-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.8125rem;
        color: var(--ion-color-medium);
        margin-top: 4px;
      }

      /* Footer del wizard */
      .ui-wizard-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        padding-top: 16px;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
      }
      .ui-wizard-foot-meta {
        font-size: 0.8125rem;
        color: var(--ion-color-medium);
      }
      .ui-wizard-foot-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      @media (max-width: 600px) {
        .ui-gh-card { flex-direction: column; align-items: flex-start; }
        .ui-wizard-foot { flex-direction: column; align-items: flex-start; }
        .ui-wizard-foot-actions { width: 100%; }
        .ui-wizard-foot-actions ion-button { flex: 1; }
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Conectar repositorio GitHub"
            description="Importa un módulo desde un repositorio existente para activarlo en tus hubs">
          </ok-page-header>

          <div class="ui-wizard">

            <!-- STEPPER: 4 pasos, paso 2 activo -->
            <ok-stepper id="wizard-stepper" current="1"></ok-stepper>

            <!-- CUERPO DEL WIZARD -->
            <ion-card>
              <ion-card-content>
                <div class="ui-wizard-body">

                  <div>
                    <h2 class="ui-wizard-title">Selecciona un repositorio de tu cuenta GitHub</h2>
                    <p class="ui-wizard-sub">
                      Solo se listan repos que contienen un
                      <code style="font-size:.85em;background:var(--ion-color-step-100,rgba(0,0,0,.06));padding:1px 5px;border-radius:4px">erplora.module.json</code>
                      en la raíz.
                    </p>
                  </div>

                  <!-- Tarjeta de cuenta GitHub -->
                  <ion-card style="margin:0">
                    <ion-card-content>
                      <div class="ui-gh-card">
                        <ok-avatar name="acme-dev" size="lg" style="--ok-avatar-bg:var(--ion-color-dark,#1f2024);--ok-avatar-color:var(--ion-color-light,#f0f1f3)">
                          <ion-icon name="logo-github" style="font-size:22px" aria-hidden="true"></ion-icon>
                        </ok-avatar>
                        <div class="ui-gh-info">
                          <div class="ui-gh-name">@acme-dev</div>
                          <div class="ui-gh-meta">Conectado desde 12 mar 2026 · 47 repos accesibles</div>
                        </div>
                        <div class="ui-gh-actions">
                          <ok-status-pill tone="success" dot label="OAuth válido" size="sm"></ok-status-pill>
                          <ion-button fill="outline" size="small">
                            <ion-icon slot="start" name="refresh-outline"></ion-icon>
                            Reautorizar
                          </ion-button>
                        </div>
                      </div>
                    </ion-card-content>
                  </ion-card>

                  <!-- Búsqueda de repos -->
                  <ion-input
                    id="repo-search"
                    fill="outline"
                    label="Filtrar repositorios"
                    label-placement="floating"
                    placeholder="Filtrar por nombre o descripción…"
                    clear-input>
                    <ion-icon name="search-outline" slot="start"></ion-icon>
                  </ion-input>

                  <!-- Lista de repos -->
                  <div class="ui-repo-list" id="repo-list">
                    <!-- Los ítems se inyectan por JS en setup -->
                  </div>

                  <!-- Paginación -->
                  <div class="ui-pager-row">
                    <span>Mostrando 12 de 47 repos</span>
                    <ok-pagination
                      id="repo-pager"
                      page="1"
                      total="47"
                      page-size="12"
                      variant="compact">
                    </ok-pagination>
                  </div>

                </div>

                <!-- Footer del wizard -->
                <div class="ui-wizard-foot" style="margin-top:20px">
                  <span class="ui-wizard-foot-meta" id="foot-meta">PASO 2 / 4 — ningún repo seleccionado</span>
                  <div class="ui-wizard-foot-actions">
                    <ion-button fill="ghost">
                      <ion-icon slot="start" name="arrow-back-outline"></ion-icon>
                      Atrás
                    </ion-button>
                    <ion-button id="btn-continuar" disabled>
                      Continuar
                      <ion-icon slot="end" name="arrow-forward-outline"></ion-icon>
                    </ion-button>
                  </div>
                </div>

              </ion-card-content>
            </ion-card>

          </div>
        `,
        setup(doc) {
          // ── Datos de los repositorios ──────────────────────────────────────────
          const REPOS = [
            {
              id: 'erplora-pos-tablet',
              owner: 'acme-dev',
              name: 'erplora-pos-tablet',
              visibility: 'privado',
              description: 'POS optimizado para tablet Android · checkout offline-first · sync en background.',
              lang: 'TypeScript', langColor: '#3178c6',
              stars: 12, since: 'hace 3 h',
              connected: false,
            },
            {
              id: 'erplora-warehouse-mobile',
              owner: 'acme-dev',
              name: 'erplora-warehouse-mobile',
              visibility: 'privado',
              description: 'App handheld para almacén · escaneo de barcode · gestión de albaranes.',
              lang: 'TypeScript', langColor: '#3178c6',
              stars: 8, since: 'hace 1 d',
              connected: true,
            },
            {
              id: 'erplora-public-docs',
              owner: 'acme-dev',
              name: 'erplora-public-docs',
              visibility: 'público',
              description: 'Documentación abierta del módulo POS · Astro + MDX.',
              lang: 'JavaScript', langColor: '#f1e05a',
              stars: 142, since: 'hace 6 h',
              connected: false,
            },
            {
              id: 'erplora-financiero',
              owner: 'acme-dev',
              name: 'erplora-financiero',
              visibility: 'privado',
              description: 'Módulo de tesorería · conciliación bancaria · informes IRPF.',
              lang: 'Python', langColor: '#3572A5',
              stars: 4, since: 'hace 2 h',
              connected: false,
            },
            {
              id: 'erplora-loyalty-cards',
              owner: 'acme-dev',
              name: 'erplora-loyalty-cards',
              visibility: 'público',
              description: 'Sistema de tarjetas de fidelización · NFC · puntos por compra.',
              lang: 'TypeScript', langColor: '#3178c6',
              stars: 38, since: 'hace 4 d',
              connected: false,
            },
            {
              id: 'erplora-rrhh-portal',
              owner: 'acme-dev',
              name: 'erplora-rrhh-portal',
              visibility: 'privado',
              description: 'Portal del empleado · vacaciones · nóminas · fichaje.',
              lang: 'TypeScript', langColor: '#3178c6',
              stars: 6, since: 'hace 12 h',
              connected: false,
            },
            {
              id: 'inventario-vinos',
              owner: 'bodegas-casadejus',
              name: 'inventario-vinos',
              visibility: 'privado',
              description: 'Trazabilidad de barricas · DO Ribera del Duero · catas y notas.',
              lang: 'TypeScript', langColor: '#3178c6',
              stars: 2, since: 'hace 1 h',
              connected: true,
            },
            {
              id: 'erplora-restaurant-kds',
              owner: 'acme-dev',
              name: 'erplora-restaurant-kds',
              visibility: 'privado',
              description: 'Kitchen Display System · ticket routing por estación.',
              lang: 'TypeScript', langColor: '#3178c6',
              stars: 17, since: 'hace 9 h',
              connected: false,
            },
            {
              id: 'erplora-marketplace-sdk',
              owner: 'acme-dev',
              name: 'erplora-marketplace-sdk',
              visibility: 'público',
              description: 'SDK para publicar módulos en el marketplace de ERPlora · CLI incluida.',
              lang: 'TypeScript', langColor: '#3178c6',
              stars: 287, since: 'hace 2 d',
              connected: false,
            },
            {
              id: 'etiquetas-ai',
              owner: 'vinos-roca',
              name: 'etiquetas-ai',
              visibility: 'privado',
              description: 'Reconocimiento de etiquetas con visión por IA · Tensorflow Lite.',
              lang: 'Python', langColor: '#3572A5',
              stars: 11, since: 'hace 6 h',
              connected: true,
            },
            {
              id: 'erplora-stock-alerts',
              owner: 'acme-dev',
              name: 'erplora-stock-alerts',
              visibility: 'privado',
              description: 'Reglas de reorden y notificaciones de stock mínimo.',
              lang: 'TypeScript', langColor: '#3178c6',
              stars: 3, since: 'hace 5 h',
              connected: false,
            },
            {
              id: 'erplora-data-pipelines',
              owner: 'acme-dev',
              name: 'erplora-data-pipelines',
              visibility: 'público',
              description: 'ETLs y dashboards para BI · DuckDB + Metabase.',
              lang: 'Python', langColor: '#3572A5',
              stars: 64, since: 'hace 1 d',
              connected: false,
            },
          ];

          // Estado: repo seleccionado
          let selected = '';

          // ── Stepper ────────────────────────────────────────────────────────────
          const stepper = doc.getElementById('wizard-stepper');
          if (stepper) {
            stepper.steps = [
              { label: 'Autorizar GitHub', description: 'OAuth completado' },
              { label: 'Seleccionar repo', description: 'Elige el repositorio' },
              { label: 'Detectar metadata', description: 'manifest.json + tests' },
              { label: 'Confirmar', description: 'Asignar a módulo' },
            ];
            stepper.labels = { stepCount: 'Paso {n} de {total}' };
            stepper.current = 1; // paso 2 activo (0-based)
          }

          // ── Helpers de icono de repo ────────────────────────────────────────
          const lockSvg = `<ion-icon name="lock-closed-outline" aria-hidden="true" style="font-size:16px"></ion-icon>`;
          const globeSvg = `<ion-icon name="globe-outline" aria-hidden="true" style="font-size:16px"></ion-icon>`;

          // ── Renderizar lista de repos ──────────────────────────────────────
          const repoList = doc.getElementById('repo-list');

          const updateFooter = () => {
            const meta = doc.getElementById('foot-meta');
            const btn = doc.getElementById('btn-continuar');
            if (meta) {
              meta.textContent = 'PASO 2 / 4 — ' + (selected ? selected : 'ningún repo seleccionado');
            }
            if (btn) {
              if (selected) {
                btn.removeAttribute('disabled');
              } else {
                btn.setAttribute('disabled', '');
              }
            }
          };

          const renderRepos = (repos) => {
            if (!repoList) return;
            repoList.innerHTML = '';
            repos.forEach((r) => {
              const item = document.createElement('div');
              item.className = 'ui-repo-item';
              item.setAttribute('data-repo-id', r.id);

              const visColor = r.visibility === 'público' ? 'success' : 'medium';
              const isSelected = selected === r.id;

              item.innerHTML = `
                <span class="ui-repo-icon">${r.visibility === 'privado' ? lockSvg : globeSvg}</span>
                <div class="ui-repo-body">
                  <div class="ui-repo-title">
                    <span>${r.owner}/${r.name}</span>
                    <ion-badge color="${visColor}" style="font-size:.68rem">${r.visibility}</ion-badge>
                    ${isSelected ? '<ion-badge color="primary" style="font-size:.68rem">seleccionado</ion-badge>' : ''}
                  </div>
                  <div class="ui-repo-desc">${r.description}</div>
                  <div class="ui-repo-meta">
                    <span class="ui-repo-lang">
                      <span class="ui-lang-dot" style="background:${r.langColor}"></span>
                      ${r.lang}
                    </span>
                    <span>★ ${r.stars}</span>
                    <span>Último commit · ${r.since}</span>
                  </div>
                </div>
                <div class="ui-repo-aside">
                  ${r.connected
                    ? `<ion-button fill="outline" size="small" disabled color="medium"><ion-icon slot="start" name="checkmark-outline"></ion-icon>Ya conectado</ion-button>`
                    : `<ion-button fill="${isSelected ? 'solid' : 'outline'}" size="small" color="primary" class="ui-btn-conectar" data-repo-id="${r.id}"><ion-icon slot="start" name="git-branch-outline"></ion-icon>Conectar</ion-button>`
                  }
                </div>
              `;
              repoList.appendChild(item);
            });

            // Listeners en botones "Conectar"
            repoList.querySelectorAll('.ui-btn-conectar').forEach((btn) => {
              btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-repo-id');
                selected = selected === id ? '' : id;
                renderRepos(getFilteredRepos());
                updateFooter();
              });
            });
          };

          let filterText = '';
          const getFilteredRepos = () => {
            if (!filterText) return REPOS;
            const q = filterText.toLowerCase();
            return REPOS.filter(
              (r) =>
                r.name.toLowerCase().includes(q) ||
                r.description.toLowerCase().includes(q) ||
                r.owner.toLowerCase().includes(q)
            );
          };

          renderRepos(REPOS);
          updateFooter();

          // ── Búsqueda ────────────────────────────────────────────────────
          const searchInput = doc.getElementById('repo-search');
          if (searchInput) {
            searchInput.addEventListener('ionInput', (e) => {
              filterText = (e.detail && e.detail.value) || '';
              renderRepos(getFilteredRepos());
            });
          }

          // ── Paginador (presentacional — muestra páginas 1 de 4 aprox.) ──
          const pager = doc.getElementById('repo-pager');
          if (pager) {
            pager.page = 1;
            pager.total = 47;
            pager.pageSize = 12;
          }
        },
      });
    </script>
  </body>
</html>
