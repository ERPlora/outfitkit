<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Añadir desde Git · ERPlora Cloud</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_saas-developer.css" />
    <link rel="stylesheet" href="./_saas-developer-pages.css" />
  </head>
  <body>
    <script type="module">
      import { defineDeveloperPage } from './_saas-developer.js';

      defineDeveloperPage({
        activeTab: 'repositories',
        title: 'Añadir módulo desde Git',
        body: `
          <div class="developer-page developer-section-stack">
            <div class="developer-grid">
              <ion-card>
                <ion-card-content>
                  <div class="developer-summary">
                    <div class="developer-summary-icon" style="color:var(--ion-color-success);background:rgba(var(--ion-color-success-rgb),.12)"><iconify-icon icon="lucide:globe" width="23" height="23"></iconify-icon></div>
                    <div class="developer-summary-body">
                      <h2 class="developer-card-title">Repositorios públicos</h2>
                      <p>Importa módulos directamente desde cualquier repositorio Git público.</p>
                      <strong>Requisitos</strong>
                      <ul class="developer-field-help"><li><code>module.json</code> válido en el directorio raíz.</li><li>Campos obligatorios: <code>id</code>, <code>name</code> y <code>version</code>.</li></ul>
                    </div>
                  </div>
                </ion-card-content>
              </ion-card>

              <ion-card style="border:2px solid var(--ion-color-primary)">
                <ion-card-content>
                  <div class="developer-summary">
                    <div class="developer-summary-icon"><iconify-icon icon="lucide:lock" width="23" height="23"></iconify-icon></div>
                    <div class="developer-summary-body">
                      <h2 class="developer-card-title">Repositorios privados</h2>
                      <p>Instala nuestra aplicación de GitHub para importar repositorios privados de forma segura.</p>
                      <ion-button size="small"><iconify-icon slot="start" icon="lucide:github" width="14" height="14"></iconify-icon>Instalar GitHub App<iconify-icon slot="end" icon="lucide:external-link" width="12" height="12"></iconify-icon></ion-button>
                      <p class="developer-field-help">Después podrás usar el mismo formulario para repositorios privados.</p>
                    </div>
                  </div>
                </ion-card-content>
              </ion-card>
            </div>

            <ion-card id="import-form-card">
              <ion-card-content>
                <h2 class="developer-card-title">Detalles del repositorio</h2>
                <p class="developer-card-subtitle">Indica el origen y la clasificación del módulo.</p>
                <form class="developer-fields">
                  <div class="developer-fields two-col">
                    <div>
                      <ion-input type="url" label="URL del repositorio *" label-placement="stacked" fill="outline" placeholder="https://github.com/usuario/nombre-modulo" required></ion-input>
                      <p class="developer-field-help">Compatible con repositorios de GitHub, GitLab y Bitbucket.</p>
                    </div>
                    <ion-input type="text" label="Rama" label-placement="stacked" fill="outline" value="main" placeholder="main"></ion-input>
                  </div>

                  <ion-select label="Sector" label-placement="stacked" fill="outline" interface="popover" multiple placeholder="Selecciona sectores">
                    <ion-select-option value="retail">Comercio</ion-select-option>
                    <ion-select-option value="hospitality">Hostelería</ion-select-option>
                    <ion-select-option value="services">Servicios</ion-select-option>
                  </ion-select>

                  <ion-select label="Unidad funcional" label-placement="stacked" fill="outline" interface="popover" multiple placeholder="Selecciona unidades funcionales">
                    <ion-select-option value="operations">Operaciones</ion-select-option>
                    <ion-select-option value="finance">Finanzas</ion-select-option>
                    <ion-select-option value="compliance">Cumplimiento</ion-select-option>
                  </ion-select>

                  <div class="developer-fields two-col">
                    <ion-select id="module-type-select" label="Tipo de módulo" label-placement="stacked" fill="outline" interface="popover" value="free">
                      <ion-select-option value="free">Gratis</ion-select-option>
                      <ion-select-option value="one_time">Pago único</ion-select-option>
                      <ion-select-option value="subscription">Suscripción mensual</ion-select-option>
                    </ion-select>
                    <div data-price-field="one_time" hidden>
                      <ion-input type="number" label="Precio (EUR)" label-placement="stacked" fill="outline" min="0" step="0.01" placeholder="9,99"></ion-input>
                      <p class="developer-field-help">Recibes el 85% del precio de venta.</p>
                    </div>
                    <div data-price-field="subscription" hidden>
                      <ion-input type="number" label="Precio mensual (EUR)" label-placement="stacked" fill="outline" min="0" step="0.01" placeholder="4,99"></ion-input>
                      <p class="developer-field-help">Recibes el 85% del precio mensual.</p>
                    </div>
                  </div>

                  <div>
                    <h3 class="developer-card-title">Ejemplo de module.json</h3>
                    <pre class="developer-code"><code>{
  "id": "mi-modulo",
  "name": "Mi módulo",
  "version": "1.0.0",
  "depends_on": [],
  "navigation": [
    { "id": "dashboard", "label": "Dashboard", "component": "mi-modulo-dashboard" }
  ]
}</code></pre>
                  </div>

                  <ion-button type="submit" expand="block"><iconify-icon slot="start" icon="lucide:cloud-download" width="15" height="15"></iconify-icon>Importar módulo</ion-button>
                </form>
              </ion-card-content>
            </ion-card>
          </div>`,
        setup(doc) {
          const type = doc.getElementById('module-type-select');
          const syncPrice = () => {
            const current = type?.value || 'free';
            doc.querySelectorAll('[data-price-field]').forEach((field) => {
              field.hidden = field.getAttribute('data-price-field') !== current;
            });
          };
          type?.addEventListener('ionChange', syncPrice);
          syncPrice();
        },
      });
    </script>
  </body>
</html>
