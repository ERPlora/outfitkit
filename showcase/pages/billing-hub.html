<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Hub · Facturación</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>

    <style>
      [hidden] { display: none !important; }

      .billing-fill,
      .billing-panel {
        height: 100%;
        min-height: 420px;
      }

      .subscriptions-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .subscriptions-panel[hidden] {
        display: none;
      }

      .subscriptions-panel ok-data-table {
        flex: 1;
        min-height: 0;
      }

      .plan-cta {
        flex: none;
        margin: 0;
      }

      .plan-cta-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      .plan-cta-content p {
        margin: 0;
        font-size: 13px;
        opacity: 0.75;
      }

      .payments-panel {
        display: grid;
        place-items: center;
        padding: 64px 16px;
        text-align: center;
        opacity: 0.6;
      }

      ok-data-table[fill] {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      // BillingPage no tiene datos inventados de fallback: ambas peticiones degradan a [].
      // El showcase conserva el contrato y el estado vacío real hasta conectarlo al Cloud.
      const INVOICES = [];
      const SUBSCRIPTIONS = [];

      const DT_LABELS_ES = {
        search: 'Buscar…',
        empty: 'Sin resultados',
        filters: 'Filtros',
        clear: 'Limpiar',
        apply: 'Aplicar',
        moreActions: 'Más acciones',
        rowsPerPage: 'Filas por página',
        perPageShort: '{n} / pág.',
        viewList: 'Vista lista',
        viewCards: 'Vista tarjetas',
        columnsVisible: 'Columnas visibles',
        columns: 'Columnas',
        actions: 'Acciones',
        close: 'Cerrar',
        filterPlaceholder: 'Filtrar…',
        noValues: 'Sin valores',
        showing: 'Mostrando {from}–{to} de',
        recordSingular: 'registro',
        recordPlural: 'registros',
      };

      const STATUS_LABEL = {
        draft: 'Borrador',
        open: 'Abierta',
        paid: 'Pagada',
        void: 'Anulada',
        uncollectible: 'Incobrable',
      };

      const STATUS_COLOR = {
        draft: 'medium',
        open: 'warning',
        paid: 'success',
        void: 'medium',
        uncollectible: 'danger',
      };

      function fmtDate(iso) {
        if (!iso) return '—';
        return new Date(iso).toLocaleDateString('es-ES', {
          day: '2-digit',
          month: 'short',
          year: 'numeric',
        });
      }

      function fmtMoney(amount, currency = 'EUR') {
        return new Intl.NumberFormat('es-ES', { style: 'currency', currency }).format(Number(amount));
      }

      function statusCell(status) {
        const tone = STATUS_COLOR[status] ?? 'medium';
        const badge = document.createElement('span');
        badge.textContent = STATUS_LABEL[status] ?? String(status);
        badge.style.cssText =
          'display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;' +
          `background:rgba(var(--ion-color-${tone}-rgb),.14);` +
          `color:var(--ion-color-${tone}-shade,var(--ion-color-${tone}))`;
        return badge;
      }

      function moneyCell(row) {
        const value = document.createElement('span');
        value.style.fontWeight = '600';
        value.textContent = fmtMoney(row.total, row.currency || 'EUR');
        return value;
      }

      function configureBaseTable(table, empty) {
        table.views = ['table', 'cards'];
        table.pageSize = 10;
        table.columnPicker = true;
        table.labels = { ...DT_LABELS_ES, empty };
      }

      defineHubPage({
        active: 'billing',
        title: 'Facturación',
        body: `
          <div class="billing-fill">
            <div id="invoices-panel" class="billing-panel">
              <ok-data-table id="invoices-table" fill></ok-data-table>
            </div>

            <div id="subscriptions-panel" class="billing-panel subscriptions-panel" hidden>
              <ion-card class="plan-cta">
                <ion-card-content class="plan-cta-content">
                  <p>Los cambios y mejoras de plan se gestionan desde tu cuenta de ERPlora (se abre en el navegador).</p>
                  <ion-button id="manage-plan" size="small" fill="outline">
                    <ion-icon slot="start" name="open-outline"></ion-icon>
                    Actualizar plan
                  </ion-button>
                </ion-card-content>
              </ion-card>
              <ok-data-table id="subscriptions-table" fill></ok-data-table>
            </div>

            <div id="payments-panel" class="billing-panel payments-panel" hidden>
              <p>La gestión del método de pago se realiza desde el portal de facturación.</p>
            </div>
          </div>

          <ion-toast id="billing-toast" duration="2500" position="bottom"></ion-toast>
        `,
        footer: `
          <ion-footer class="ion-no-border billing-footer">
            <ion-toolbar>
              <ion-segment id="billing-tabs" value="invoices">
                <ion-segment-button value="invoices">
                  <ion-icon name="receipt-outline"></ion-icon>
                  <ion-label>Facturas</ion-label>
                </ion-segment-button>
                <ion-segment-button value="subscriptions">
                  <ion-icon name="refresh-outline"></ion-icon>
                  <ion-label>Suscripciones</ion-label>
                </ion-segment-button>
                <ion-segment-button value="payments">
                  <ion-icon name="card-outline"></ion-icon>
                  <ion-label>Pagos</ion-label>
                </ion-segment-button>
              </ion-segment>
            </ion-toolbar>
          </ion-footer>
        `,
        setup(doc) {
          const invoicesTable = doc.getElementById('invoices-table');
          const subscriptionsTable = doc.getElementById('subscriptions-table');
          const tabs = doc.getElementById('billing-tabs');
          const toast = doc.getElementById('billing-toast');
          const panels = {
            invoices: doc.getElementById('invoices-panel'),
            subscriptions: doc.getElementById('subscriptions-panel'),
            payments: doc.getElementById('payments-panel'),
          };

          configureBaseTable(invoicesTable, 'No hay facturas');
          invoicesTable.searchKeys = ['number'];
          invoicesTable.columns = [
            { key: 'number', header: 'Factura' },
            { key: 'issueDate', header: 'Fecha', format: (row) => fmtDate(String(row.issueDate ?? '')) },
            { key: 'dueDate', header: 'Vencimiento', format: (row) => fmtDate(String(row.dueDate ?? '')) },
            { key: 'total', header: 'Importe', align: 'right', render: moneyCell },
            { key: 'status', header: 'Estado', filterable: true, filterType: 'select', render: (row) => statusCell(row.status) },
          ];
          invoicesTable.actions = [
            { id: 'download', label: 'Descargar', icon: 'download-outline' },
          ];
          invoicesTable.rows = INVOICES;

          configureBaseTable(subscriptionsTable, 'No hay suscripciones activas');
          subscriptionsTable.searchKeys = ['planName'];
          subscriptionsTable.columns = [
            { key: 'planName', header: 'Suscripción' },
            { key: 'planPrice', header: 'Precio', align: 'right', format: (row) => `${fmtMoney(row.planPrice, 'EUR')}/${String(row.billingCycle || 'mes')}` },
            { key: 'currentPeriodEnd', header: 'Renueva', format: (row) => fmtDate(String(row.currentPeriodEnd ?? '')) },
            { key: 'status', header: 'Estado', filterable: true, filterType: 'select', render: (row) => statusCell(row.status) },
          ];
          subscriptionsTable.rows = SUBSCRIPTIONS;

          // Mismo fallback responsive de BillingPage: tarjetas en móvil, tabla en escritorio.
          const initialView = window.matchMedia('(max-width: 768px)').matches ? 'cards' : 'table';
          invoicesTable.viewMode = initialView;
          subscriptionsTable.viewMode = initialView;

          function showToast(message) {
            toast.message = message;
            toast.isOpen = true;
          }

          function showTab(value) {
            Object.entries(panels).forEach(([key, panel]) => {
              panel.hidden = key !== value;
            });
          }

          tabs.addEventListener('ionChange', (event) => {
            const value = event.detail?.value;
            if (value === 'invoices' || value === 'subscriptions' || value === 'payments') showTab(value);
          });

          invoicesTable.addEventListener('rowAction', (event) => {
            const { actionId, row } = event.detail || {};
            if (actionId === 'download' && row) showToast(`Descargando factura ${row.number}…`);
          });
          doc.getElementById('manage-plan').addEventListener('click', () => {
            showToast('La página de planes se abre en el navegador.');
          });
          toast.addEventListener('didDismiss', () => { toast.isOpen = false; });

          showTab('invoices');
        },
      });
    </script>
  </body>
</html>
