<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ingresos · ERPlora Cloud</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_saas-developer.css" />
  </head>
  <body>
    <script type="module">
      import { html as h } from 'lit';
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      /* Datos demostrativos con el contrato actual de developer/earnings/views.py. */
      const EARNINGS = [
        { id: 'earning-1', moduleId: 'inventory', module: 'Inventario', createdAt: '2026-07-16T10:24:00', gross: 49, commission: 7.35, net: 41.65, status: 'paid' },
        { id: 'earning-2', moduleId: 'accounting', module: 'Contabilidad', createdAt: '2026-07-14T16:05:00', gross: 19, commission: 2.85, net: 16.15, status: 'pending' },
        { id: 'earning-3', moduleId: 'hr', module: 'Recursos humanos', createdAt: '2026-07-11T09:38:00', gross: 29, commission: 4.35, net: 24.65, status: 'processing' },
        { id: 'earning-4', moduleId: 'inventory', module: 'Inventario', createdAt: '2026-07-08T13:46:00', gross: 49, commission: 7.35, net: 41.65, status: 'paid' },
        { id: 'earning-5', moduleId: 'accounting', module: 'Contabilidad', createdAt: '2026-07-04T11:12:00', gross: 19, commission: 2.85, net: 16.15, status: 'failed' },
      ];

      const STATUS = {
        paid: ['Pagado', 'success'],
        pending: ['Pendiente', 'warning'],
        processing: ['Procesando', 'medium'],
        failed: ['Fallido', 'danger'],
      };
      const money = new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' });
      const date = new Intl.DateTimeFormat('es-ES', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

      const moduleCell = (row) => h`
        <span style="display:flex;align-items:center;gap:.65rem;min-width:0">
          <ion-avatar style="display:grid;place-items:center;flex:none;width:2.1rem;height:2.1rem;color:var(--ion-color-primary);font-size:12px;font-weight:750;background:rgba(var(--ion-color-primary-rgb),.14)">
            <span style="display:grid;width:100%;height:100%;place-items:center">${row.module.charAt(0)}</span>
          </ion-avatar>
          <strong style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${row.module}</strong>
        </span>`;

      const statusCell = (row) => {
        const [label, tone] = STATUS[row.status] || [row.status, 'medium'];
        return h`<ion-badge style="--background:rgba(var(--ion-color-${tone}-rgb),.14);--color:var(--ion-color-${tone});--padding-top:5px;--padding-bottom:5px">${label}</ion-badge>`;
      };

      const footer = `
        <footer id="section-tabbar">
          <ion-segment value="earnings" aria-label="Secciones de desarrollador">
            <ion-segment-button value="overview"><iconify-icon icon="lucide:layout-grid" width="20" height="20"></iconify-icon><ion-label>Resumen</ion-label></ion-segment-button>
            <ion-segment-button value="earnings"><iconify-icon icon="lucide:wallet" width="20" height="20"></iconify-icon><ion-label>Ingresos</ion-label></ion-segment-button>
            <ion-segment-button value="payouts"><iconify-icon icon="lucide:banknote" width="20" height="20"></iconify-icon><ion-label>Pagos</ion-label></ion-segment-button>
            <ion-segment-button value="modules"><iconify-icon icon="lucide:box" width="20" height="20"></iconify-icon><ion-label>Mis módulos</ion-label></ion-segment-button>
            <ion-segment-button value="blueprints"><iconify-icon icon="lucide:layers" width="20" height="20"></iconify-icon><ion-label>Blueprints</ion-label></ion-segment-button>
            <ion-segment-button value="repositories"><iconify-icon icon="lucide:git-branch" width="20" height="20"></iconify-icon><ion-label>Repositorios</ion-label></ion-segment-button>
            <ion-segment-button value="apidocs"><iconify-icon icon="lucide:book-open" width="20" height="20"></iconify-icon><ion-label>API Docs</ion-label></ion-segment-button>
          </ion-segment>
        </footer>`;

      defineSaasDashboardPage({
        active: '/dashboard/developer/',
        title: 'Ingresos',
        body: `
          <div class="developer-page">
            <section class="developer-kpis" style="--developer-kpi-columns:4" aria-label="Resumen de ingresos">
              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:wallet" width="12" height="12"></iconify-icon>Neto total</div>
                <div class="developer-kpi-value">140,25 €</div>
                <div class="developer-kpi-sub">Tus ingresos</div>
              </div>
              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:clock" width="12" height="12"></iconify-icon>Pendiente</div>
                <div class="developer-kpi-value">16,15 €</div>
                <div class="developer-kpi-sub">A la espera del pago</div>
              </div>
              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:trending-up" width="12" height="12"></iconify-icon>Ingresos brutos</div>
                <div class="developer-kpi-value">165,00 €</div>
                <div class="developer-kpi-sub">Antes de la comisión</div>
              </div>
              <div class="developer-kpi alert">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:tag" width="12" height="12"></iconify-icon>Comisión (15%)</div>
                <div class="developer-kpi-value">24,75 €</div>
                <div class="developer-kpi-sub">Comisión de plataforma</div>
              </div>
            </section>

            <div class="developer-table-wrap">
              <div class="dash-fill">
                <ok-data-table id="earnings-dt" server-side fill>
                  <div slot="toolbar" class="okdt-filters">
                    <ion-select class="okdt-filter" data-okdt-param="status" interface="popover" aria-label="Estado" placeholder="Todos los estados">
                      <ion-select-option value="">Todos los estados</ion-select-option>
                      <ion-select-option value="pending">Pendiente</ion-select-option>
                      <ion-select-option value="processing">Procesando</ion-select-option>
                      <ion-select-option value="paid">Pagado</ion-select-option>
                      <ion-select-option value="failed">Fallido</ion-select-option>
                    </ion-select>
                    <ion-select class="okdt-filter" data-okdt-param="module" interface="popover" aria-label="Módulo" placeholder="Todos los módulos">
                      <ion-select-option value="">Todos los módulos</ion-select-option>
                      <ion-select-option value="inventory">Inventario</ion-select-option>
                      <ion-select-option value="accounting">Contabilidad</ion-select-option>
                      <ion-select-option value="hr">Recursos humanos</ion-select-option>
                    </ion-select>
                  </div>
                </ok-data-table>
              </div>
            </div>

            <div class="developer-alert developer-after-table" role="note">
              <iconify-icon icon="lucide:info" width="18" height="18" style="color:var(--ion-color-primary)"></iconify-icon>
              <div class="developer-alert-body">
                <div class="developer-alert-title">Cómo funcionan las comisiones</div>
                <div class="developer-alert-text">ERPlora aplica una comisión del 15% a todas las ventas de módulos. Recibes el 85% del precio de venta. Por ejemplo, de una venta de 100 €, recibes 85 €.</div>
              </div>
            </div>
          </div>`,
        footer,
        setup(doc) {
          const table = doc.getElementById('earnings-dt');
          if (!table) return;

          table.rowKey = 'id';
          table.columns = [
            { key: 'module', header: 'Módulo', width: 'minmax(13rem,1.35fr)', sortable: true, render: moduleCell },
            { key: 'createdAt', header: 'Fecha', width: '11rem', sortable: true, format: (row) => date.format(new Date(row.createdAt)) },
            { key: 'gross', header: 'Bruto', width: '8rem', align: 'right', sortable: true, format: (row) => money.format(row.gross) },
            { key: 'commission', header: 'Comisión', width: '9rem', align: 'right', format: (row) => `−${money.format(row.commission)}` },
            { key: 'net', header: 'Neto', width: '8rem', align: 'right', sortable: true, format: (row) => money.format(row.net) },
            { key: 'status', header: 'Estado', width: '9rem', render: statusCell },
          ];
          table.searchable = true;
          table.searchPlaceholder = 'Buscar por módulo…';
          table.actions = [{ id: 'view', label: 'Ver', icon: 'eye-outline' }];
          table.pageSize = 10;
          table.pageSizes = [10, 25, 50, 100];
          table.labels = {
            empty: 'Todavía no hay ingresos',
            columns: 'Columnas',
            columnsVisible: 'Columnas visibles',
            rowsPerPage: 'Filas por página',
            perPageShort: '{n} / pág.',
            showing: 'Mostrando {from}–{to} de',
            recordSingular: 'ingreso',
            recordPlural: 'ingresos',
            actions: 'Acciones',
          };

          const state = { query: '', sort: 'createdAt', dir: 'desc' };
          const valueOf = (name) => doc.querySelector(`[data-okdt-param="${name}"]`)?.value || '';
          const refresh = () => {
            const query = state.query.trim().toLocaleLowerCase('es');
            const status = valueOf('status');
            const moduleId = valueOf('module');
            let rows = EARNINGS.filter((row) =>
              (!query || row.module.toLocaleLowerCase('es').includes(query)) &&
              (!status || row.status === status) && (!moduleId || row.moduleId === moduleId));
            rows = [...rows].sort((a, b) => String(a[state.sort] ?? '').localeCompare(String(b[state.sort] ?? ''), 'es') * (state.dir === 'asc' ? 1 : -1));
            table.rows = rows;
            table.total = rows.length;
            table.page = 0;
          };
          doc.querySelectorAll('[data-okdt-param]').forEach((control) => control.addEventListener('ionChange', refresh));
          table.addEventListener('searchChange', (event) => { state.query = String(event.detail || ''); refresh(); });
          table.addEventListener('sortChange', (event) => { state.sort = event.detail.sort; state.dir = event.detail.dir; refresh(); });
          table.addEventListener('rowAction', (event) => console.info('/dashboard/developer/earnings/', event.detail.row.id));
          refresh();
        },
      });
    </script>
  </body>
</html>
