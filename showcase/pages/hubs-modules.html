<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Módulos del Terminal - ERPlora Cloud</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
  </head>
  <body>
    <script type="module">
      import { html as h } from 'lit';
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      const MODULES = [
        { id: 'inventory', name: 'Inventario', moduleId: 'inventory', version: '1.8.0', active: true, status: 'Activo', installed: '12 ene 2025' },
        { id: 'invoice', name: 'Facturación', moduleId: 'invoice', version: '2.4.1', active: true, status: 'Activo', installed: '12 ene 2025' },
        { id: 'reservations', name: 'Reservas', moduleId: 'reservations', version: '1.2.0', active: false, status: 'Inactivo', installed: '18 feb 2025' },
      ];
      const footer = `
        <footer id="section-tabbar"><ion-segment value="active" aria-label="Navegación de Hubs">
          <ion-segment-button value="active"><iconify-icon icon="lucide:check-circle" width="20" height="20"></iconify-icon><ion-label>Activo</ion-label></ion-segment-button>
          <ion-segment-button value="inactive"><iconify-icon icon="lucide:pause-circle" width="20" height="20"></iconify-icon><ion-label>Inactivo</ion-label></ion-segment-button>
          <ion-segment-button value="create"><iconify-icon icon="lucide:plus-circle" width="20" height="20"></iconify-icon><ion-label>Crear</ion-label></ion-segment-button>
          <ion-segment-button value="domain"><iconify-icon icon="lucide:globe" width="20" height="20"></iconify-icon><ion-label>Dominio</ion-label></ion-segment-button>
        </ion-segment></footer>`;

      defineSaasDashboardPage({
        active: '/dashboard/hubs/',
        title: 'Módulos del Terminal · Terminal principal',
        body: `
          <div style="display:grid;gap:1rem">
            <ok-inline-feedback tone="warning" heading="Gestión de módulos">
              Los módulos instalados en este Terminal solo se pueden gestionar desde su interfaz local. Aquí se muestran únicamente como información.
            </ok-inline-feedback>
            <div class="dash-fill">
              <ok-data-table id="hub-modules-dt" server-side fill>
                <ion-select id="hub-modules-status" class="okdt-filter" slot="toolbar" interface="popover" value="" aria-label="Estado">
                  <ion-select-option value="">Todos los estados</ion-select-option>
                  <ion-select-option value="true">Activo</ion-select-option>
                  <ion-select-option value="false">Inactivo</ion-select-option>
                </ion-select>
              </ok-data-table>
            </div>
          </div>
        `,
        footer,
        setup(doc) {
          const table = doc.getElementById('hub-modules-dt');
          const filter = doc.getElementById('hub-modules-status');
          table.rowKey = 'id';
          table.columns = [
            { key: 'name', header: 'Módulo', sortable: false },
            { key: 'moduleId', header: 'ID' },
            { key: 'version', header: 'Versión' },
            { key: 'status', header: 'Estado', render: (row) => h`<ion-badge color=${row.active ? 'success' : 'medium'}>${row.status}</ion-badge>` },
            { key: 'installed', header: 'Instalado', sortable: true },
          ];
          table.rows = MODULES;
          table.searchKeys = ['name', 'moduleId', 'version'];
          table.searchPlaceholder = 'Buscar módulos…';
          table.pageSize = 10;
          table.pageSizes = [10, 25, 50];
          filter?.addEventListener('ionChange', () => {
            table.rows = filter.value === '' ? MODULES : MODULES.filter((item) => String(item.active) === filter.value);
          });
        },
      });
    </script>
  </body>
</html>
