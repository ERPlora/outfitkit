<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERPlora Hub · Registros VeriFactu</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <style>
      .verifactu-table-page { display:flex; flex-direction:column; height:100%; min-height:0; }
      .verifactu-table-page > ok-data-table { flex:1 1 auto; min-height:0; }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      // El módulo no instala datos demo: estas filas respetan exactamente el SELECT y sus dominios.
      const RECORD_FIXTURE = [
        { "id": "vf-0004", "sequence_number": 4, "invoice_number": "TICKET-2026-000004", "invoice_date": "2026-07-18", "record_type": "alta", "invoice_type": "F2", "issuer_nif": "B27593136", "issuer_name": "ERPLORA CLOUD SL", "base_amount": "24.55", "tax_amount": "2.45", "total_amount": "27.00", "status": "accepted", "transmission_timestamp": "2026-07-18T13:12:05", "retry_count": 0, "aeat_csv": "VF20260718A04", "generation_timestamp": "2026-07-18T13:12:02" },
        { "id": "vf-0003", "sequence_number": 3, "invoice_number": "RECT-2026-000001", "invoice_date": "2026-07-18", "record_type": "alta", "invoice_type": "R1", "issuer_nif": "B27593136", "issuer_name": "ERPLORA CLOUD SL", "base_amount": "-18.18", "tax_amount": "-1.82", "total_amount": "-20.00", "status": "accepted", "transmission_timestamp": "2026-07-18T11:05:10", "retry_count": 0, "aeat_csv": "VF20260718A03", "generation_timestamp": "2026-07-18T11:05:07" },
        { "id": "vf-0002", "sequence_number": 2, "invoice_number": "TICKET-2026-000002", "invoice_date": "2026-07-18", "record_type": "alta", "invoice_type": "F2", "issuer_nif": "B27593136", "issuer_name": "ERPLORA CLOUD SL", "base_amount": "42.73", "tax_amount": "4.27", "total_amount": "47.00", "status": "retry", "transmission_timestamp": null, "retry_count": 1, "aeat_csv": "", "generation_timestamp": "2026-07-18T09:41:20" },
        { "id": "vf-0001", "sequence_number": 1, "invoice_number": "FACT-2026-000001", "invoice_date": "2026-07-17", "record_type": "alta", "invoice_type": "F1", "issuer_nif": "B27593136", "issuer_name": "ERPLORA CLOUD SL", "base_amount": "100.00", "tax_amount": "21.00", "total_amount": "121.00", "status": "rejected", "transmission_timestamp": "2026-07-17T18:30:41", "retry_count": 2, "aeat_csv": "", "generation_timestamp": "2026-07-17T18:30:35" }
      ];

      defineHubPage({
        active: '/m/verifactu/records',
        title: 'Registros',
        body: `<div class="verifactu-table-page"><ok-data-table id="verifactu-records-table" fill></ok-data-table></div>`,
        setup(doc) {
          const table = doc.getElementById('verifactu-records-table');
          const rows = RECORD_FIXTURE.map((row) => ({ ...row }));
          const state = { page:0, pageSize:50, sort:'id', dir:'asc', search:'', filters:{} };
          const STATUS_LABELS = { pending:'Pendiente', transmitted:'Transmitido', accepted:'Aceptado', rejected:'Rechazado', error:'Error', retry:'Reintento' };

          table.columns = [
            { key: 'sequence_number', header: 'Seq', align: 'right', sortable: true, filterable: true, filterType: 'text' },
            { key: 'invoice_number', header: 'Factura', sortable: true, filterable: true, filterType: 'text' },
            { key: 'invoice_date', header: 'Fecha', sortable: true, filterable: true, filterType: 'daterange' },
            {
              key: 'record_type', header: 'Tipo', sortable: true, filterable: true, filterType: 'select',
              options: [{ value: 'alta', label: 'Alta' }, { value: 'anulacion', label: 'Anulación' }],
              format: (row) => row.record_type === 'anulacion' ? 'Anulación' : 'Alta',
            },
            { key: 'invoice_type', header: 'F.', sortable: true, filterable: true, filterType: 'text' },
            { key: 'issuer_name', header: 'Emisor', sortable: true, filterable: true, filterType: 'text' },
            { key: 'total_amount', header: 'Total', align: 'right', sortable: true, filterable: true, filterType: 'range', format: (row) => `${Number(row.total_amount).toLocaleString('es-ES', { minimumFractionDigits:2 })} €` },
            {
              key: 'status', header: 'Estado', sortable: true, filterable: true, filterType: 'select',
              options: [
                { value: 'pending', label: 'Pendiente' }, { value: 'transmitted', label: 'Transmitido' },
                { value: 'accepted', label: 'Aceptado' }, { value: 'rejected', label: 'Rechazado' },
                { value: 'error', label: 'Error' }, { value: 'retry', label: 'Reintento' },
              ],
              format: (row) => STATUS_LABELS[row.status] || row.status,
            },
          ];
          table.serverSide = true;
          table.fill = true;
          table.views = true;
          table.cardTitle = (row) => String(row.invoice_number || '—');
          table.cardIcon = () => 'document-text-outline';
          table.searchable = true;
          table.searchPlaceholder = 'Buscar factura, emisor o NIF…';
          table.emptyMessage = 'Sin registros VeriFactu.';
          table.pageSize = 50;
          table.sort = 'id';
          table.sortDir = 'asc';

          const matchesRange = (candidate, value) => {
            if (!value || typeof value !== 'object') return true;
            const n = Number(candidate);
            return (value.from == null || value.from === '' || n >= Number(value.from))
              && (value.to == null || value.to === '' || n <= Number(value.to));
          };
          const matchesDate = (candidate, value) => !value || typeof value !== 'object'
            || ((!value.from || String(candidate) >= value.from) && (!value.to || String(candidate) <= value.to));

          function queryPage() {
            doc.dispatchEvent(new CustomEvent('erplora:preview-query', { detail:{ name:'verifactu.records.list', params:{ ...state } } }));
            const term = state.search.trim().toLocaleLowerCase('es');
            const filtered = rows.filter((row) => {
              if (term && !`${row.sequence_number} ${row.invoice_number} ${row.issuer_nif} ${row.issuer_name}`.toLocaleLowerCase('es').includes(term)) return false;
              return Object.entries(state.filters).every(([key, value]) => {
                if (value == null || value === '') return true;
                if (key === 'total_amount') return matchesRange(row[key], value);
                if (key === 'invoice_date') return matchesDate(row[key], value);
                if (key === 'record_type' || key === 'status') return row[key] === value;
                return String(row[key] ?? '').toLocaleLowerCase('es').includes(String(value).toLocaleLowerCase('es'));
              });
            }).sort((a, b) => {
              const left = a[state.sort]; const right = b[state.sort];
              const result = typeof left === 'number' && typeof right === 'number' ? left - right : String(left ?? '').localeCompare(String(right ?? ''), 'es', { numeric:true });
              return state.dir === 'desc' ? -result : result;
            });
            const start = state.page * state.pageSize;
            table.rows = filtered.slice(start, start + state.pageSize);
            table.total = filtered.length; table.page = state.page; table.pageSize = state.pageSize;
            table.sort = state.sort; table.sortDir = state.dir;
          }
          table.addEventListener('pageChange', (event) => { state.page = Number(event.detail) || 0; queryPage(); });
          table.addEventListener('pageSizeChange', (event) => { state.pageSize = Number(event.detail) || 50; state.page = 0; queryPage(); });
          table.addEventListener('sortChange', (event) => { state.sort = event.detail.sort; state.dir = event.detail.dir; state.page = 0; queryPage(); });
          table.addEventListener('searchChange', (event) => { state.search = String(event.detail || ''); state.page = 0; queryPage(); });
          table.addEventListener('filterChange', (event) => { state.filters[event.detail.col] = event.detail.value; state.page = 0; queryPage(); });
          queryPage();
        },
      });
    </script>
  </body>
</html>
