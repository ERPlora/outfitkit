<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resumen general · ERPlora Cloud</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <style>
      .dashboard-stack { display:grid; gap:1.25rem; }
      .section-heading { margin:0 0 .65rem; font-size:.78rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--ion-color-medium); }
      .dashboard-kpis { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:.75rem; }
      .dashboard-kpi { margin:0; }
      .dashboard-kpi ion-card-content { display:grid; gap:.35rem; }
      .dashboard-kpi-icon { display:grid; place-items:center; width:30px; height:30px; border-radius:9px; color:var(--ion-color-primary); background:color-mix(in srgb,var(--ion-color-primary) 13%,transparent); }
      .dashboard-kpi-label { color:var(--ion-color-medium); font-size:.78rem; }
      .dashboard-kpi-value { font-size:1.55rem; font-weight:700; }
      .applications-grid { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:.65rem; }
      .application-card { margin:0; cursor:pointer; }
      .application-card ion-card-content { display:grid; justify-items:start; gap:.55rem; min-height:92px; }
      .application-card iconify-icon { color:var(--ion-color-primary); }
      .dashboard-lower { display:grid; grid-template-columns:minmax(0,1.4fr) minmax(16rem,1fr); gap:1rem; }
      .dashboard-lower ion-card { margin:0; }
      .card-heading { display:flex; align-items:center; justify-content:space-between; gap:.75rem; padding:1rem 1rem 0; }
      .card-heading h2 { margin:0; font-size:.95rem; }
      .hub-price { text-align:right; }
      .hub-price small, .activity-copy small { display:block; color:var(--ion-color-medium); }
      .activity-dot { width:8px; height:8px; margin-top:.35rem; border-radius:50%; background:var(--ion-color-primary); }
      @media (max-width:980px) { .dashboard-kpis { grid-template-columns:repeat(2,1fr); } .applications-grid { grid-template-columns:repeat(3,1fr); } }
      @media (max-width:680px) { .dashboard-lower { grid-template-columns:1fr; } .applications-grid { grid-template-columns:repeat(2,1fr); } }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      const stats = [
        { label:'Hubs activos', value:'3', icon:'lucide:server' },
        { label:'Módulos activos', value:'7', icon:'lucide:boxes' },
        { label:'Gasto mensual', value:'469,50 €', icon:'lucide:credit-card' },
        { label:'Facturas', value:'12', icon:'lucide:file-text' },
      ];
      const applications = [
        { name:'Hubs', icon:'lucide:server' },
        { name:'Facturación', icon:'lucide:file-text' },
        { name:'Marketplace', icon:'lucide:store' },
        { name:'Usuarios', icon:'lucide:users' },
        { name:'Ajustes', icon:'lucide:settings' },
        { name:'Más', icon:'lucide:plus' },
      ];
      const hubs = [
        { name:'Hub Central', plan:'Business · active', price:'340,50 €', next:'28 jul' },
        { name:'Hub Norte', plan:'Starter · trialing', price:'99,00 €', next:'02 ago' },
        { name:'Tienda Demo', plan:'Starter · active', price:'30,00 €', next:'12 ago' },
      ];
      const activities = [
        { title:'Factura INV-2025-00001', detail:'119,79 € · Pagada', color:'success' },
        { title:'Hub Central actualizado', detail:'hace 2 horas', color:'primary' },
        { title:'WhatsApp Inbox añadido', detail:'hace 1 día', color:'tertiary' },
      ];

      const kpis = stats.map((stat) => `
        <ion-card class="dashboard-kpi">
          <ion-card-content>
            <span class="dashboard-kpi-icon"><iconify-icon icon="${stat.icon}" width="17" height="17"></iconify-icon></span>
            <span class="dashboard-kpi-label">${stat.label}</span>
            <strong class="dashboard-kpi-value">${stat.value}</strong>
          </ion-card-content>
        </ion-card>`).join('');
      const apps = applications.map((app) => `
        <ion-card class="application-card" button>
          <ion-card-content>
            <iconify-icon icon="${app.icon}" width="22" height="22"></iconify-icon>
            <strong>${app.name}</strong>
          </ion-card-content>
        </ion-card>`).join('');
      const hubItems = hubs.map((hub) => `
        <ion-item>
          <ion-icon name="business-outline" slot="start" color="primary"></ion-icon>
          <ion-label><strong>${hub.name}</strong><p>${hub.plan}</p></ion-label>
          <span class="hub-price"><strong>${hub.price}</strong><small>${hub.next}</small></span>
        </ion-item>`).join('');
      const activityItems = activities.map((activity) => `
        <ion-item>
          <span class="activity-dot" slot="start" style="background:var(--ion-color-${activity.color})"></span>
          <ion-label class="activity-copy"><strong>${activity.title}</strong><small>${activity.detail}</small></ion-label>
        </ion-item>`).join('');

      defineSaasDashboardPage({
        active: '/dashboard/',
        title: 'Resumen general',
        body: `
          <div id="overview-page" class="dashboard-stack">
            <ok-inline-feedback tone="warning" heading="Acción pendiente">
              <p>Revisa la configuración fiscal de tu organización antes de emitir la próxima factura.</p>
              <ion-button size="small" fill="clear">Revisar</ion-button>
            </ok-inline-feedback>
            <section id="section-stats">
              <h2 class="section-heading">Indicadores de hoy</h2>
              <div class="dashboard-kpis">${kpis}</div>
            </section>
            <section id="section-modules">
              <h2 class="section-heading">Aplicaciones</h2>
              <div class="applications-grid">${apps}</div>
            </section>
            <section class="dashboard-lower">
              <ion-card id="card-hubs-status">
                <div class="card-heading"><h2>Tus hubs</h2><ion-button fill="clear" size="small">Ver todos</ion-button></div>
                <ion-list>${hubItems}</ion-list>
              </ion-card>
              <ion-card id="card-recent-activity">
                <div class="card-heading"><h2>Actividad reciente</h2></div>
                <ion-list>${activityItems}</ion-list>
              </ion-card>
            </section>
          </div>`,
        footer: `
          <footer id="section-tabbar">
            <ion-segment value="overview" aria-label="Navegación del resumen">
              <ion-segment-button value="overview"><iconify-icon icon="lucide:layout-grid" width="20" height="20"></iconify-icon><ion-label>Resumen</ion-label></ion-segment-button>
              <ion-segment-button value="users"><iconify-icon icon="lucide:users" width="20" height="20"></iconify-icon><ion-label>Usuarios</ion-label></ion-segment-button>
            </ion-segment>
          </footer>`,
      });
    </script>
  </body>
</html>
