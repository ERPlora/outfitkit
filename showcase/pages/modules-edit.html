<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Editar módulo</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }

    <link rel="stylesheet" href="../../dist/theme.example.css" />

    <style>
      /* Geometría puntual de esta vista (estructura, sin colores de marca). */

      /* Cabecera de módulo: badge de estado + meta info. */
      .mod-meta {
        display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
        font-size: .85rem;
        color: var(--ion-color-medium);
        margin-top: 4px;
      }
      .mod-meta code { font-size: .82rem; }

      /* Tabs de la página (ion-segment como barra de navegación de secciones). */
      .page-tabs {
        width: 100%;
        margin-bottom: 16px;
      }

      /* Columnas del tab General: 2/3 + 1/3. */
      .tab-general-cols {
        display: grid;
        grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }
      @media (max-width: 900px) {
        .tab-general-cols { grid-template-columns: 1fr; }
      }

      /* Panel de tab ocultable. */
      .tab-panel { display: contents; }
      .tab-panel[hidden] { display: none !important; }

      /* Campos del formulario. */
      .form-stack { display: flex; flex-direction: column; gap: 16px; }

      /* Fila de dos campos en línea. */
      .form-row {
        display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      }
      @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

      /* Grupo input con prefijo/sufijo (slug). */
      .input-group {
        display: flex; align-items: stretch;
        border: 1.5px solid var(--ion-border-color, rgba(127,127,127,.3));
        border-radius: 8px; overflow: hidden;
        background: var(--ion-item-background, var(--ion-background-color));
      }
      .input-group__addon {
        display: flex; align-items: center; padding: 0 10px;
        background: var(--ion-color-step-50, rgba(127,127,127,.07));
        border-right: 1px solid var(--ion-border-color, rgba(127,127,127,.3));
        font-size: .85rem; color: var(--ion-color-medium);
        white-space: nowrap;
      }
      .input-group__addon--btn {
        border-right: 0;
        border-left: 1px solid var(--ion-border-color, rgba(127,127,127,.3));
        cursor: pointer; background: var(--ion-color-step-50, rgba(127,127,127,.07));
      }
      .input-group__addon--btn ion-icon { font-size: 15px; }
      .input-group ion-input { flex: 1 1 auto; --padding-start: 10px; --padding-end: 0; }

      /* Portada del módulo. */
      .cover-box {
        aspect-ratio: 16 / 9; max-width: 480px;
        border-radius: 10px; overflow: hidden; position: relative;
        background: linear-gradient(135deg, hsl(16deg 45% 33%) 0%, hsl(16deg 80% 55%) 100%);
        display: flex; align-items: center; justify-content: center;
      }
      .cover-box__label {
        color: #fff; font-weight: 700; font-size: 18px; letter-spacing: .04em;
      }
      .cover-box__actions {
        position: absolute; top: 8px; right: 8px; display: flex; gap: 6px;
      }

      /* Tipos de negocio: checkboxes en rejilla. */
      .check-group {
        display: flex; flex-wrap: wrap; gap: 8px 16px;
      }
      .check-item {
        display: flex; align-items: center; gap: 6px; font-size: .9rem;
      }

      /* Toggle rows (soporte oficial / certificado). */
      .toggle-row {
        display: flex; align-items: flex-start; justify-content: space-between;
        gap: 12px; padding: 8px 0;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.15));
      }
      .toggle-row:first-of-type { border-top: 0; padding-top: 0; }
      .toggle-row__text { flex: 1 1 auto; font-size: .9rem; }
      .toggle-row__sub { color: var(--ion-color-medium); font-size: .78rem; margin-top: 2px; }

      /* Sidebar: resumen con filas key-value. */
      .summary-rows { display: flex; flex-direction: column; gap: 10px; font-size: .875rem; }
      .summary-row { display: flex; justify-content: space-between; align-items: center; }
      .summary-row__label { color: var(--ion-color-medium); }
      .summary-row__val { font-weight: 600; }
      .summary-row a { color: var(--ion-color-primary); text-decoration: none; }

      /* Card de acciones rápidas: botones apilados. */
      .quick-actions { display: flex; flex-direction: column; gap: 8px; }
      .quick-actions hr {
        border: 0; border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        margin: 4px 0;
      }

      /* Footer sticky de acciones. */
      .save-bar {
        display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        padding: 12px 0; margin-top: 16px;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
      }
      .save-bar__meta {
        flex: 1 1 auto; font-size: .78rem; color: var(--ion-color-medium);
        white-space: nowrap;
      }
      @media (max-width: 600px) {
        .save-bar { flex-direction: column; align-items: stretch; }
        .save-bar__meta { text-align: center; }
      }

      /* Config: toggle rows reutilizables. */
      .config-rows { display: flex; flex-direction: column; gap: 4px; }
    </style>
  </head>

        `,

        setup(doc) {
          // ── Tabs ──────────────────────────────────────────────────────────
          const tabs = doc.getElementById('mod-tabs');
          const panels = {
            general:  doc.getElementById('tab-general'),
            versions: doc.getElementById('tab-versions'),
            stats:    doc.getElementById('tab-stats'),
            reviews:  doc.getElementById('tab-reviews'),
            config:   doc.getElementById('tab-config'),
          };

          const showTab = (val) => {
            Object.entries(panels).forEach(([key, el]) => {
              if (!el) return;
              if (key === val) {
                el.removeAttribute('hidden');
              } else {
                el.setAttribute('hidden', '');
              }
            });
          };

          if (tabs) {
            tabs.addEventListener('ionChange', (e) => {
              showTab((e.detail && e.detail.value) || 'general');
            });
          }

          // ── Categorías secundarias (ok-tag-input) ─────────────────────────
          const catTags = doc.getElementById('cat-tags');
          if (catTags) {
            catTags.value = ['Caja', 'Tickets', 'Verifactu'];
            catTags.suggestions = ['Facturación', 'TPV', 'Hostelería', 'Retail'];
          }

          // ── Tags del módulo (ok-tag-input) ────────────────────────────────
          const modTags = doc.getElementById('mod-tags');
          if (modTags) {
            modTags.value = ['tpv', 'caja', 'verifactu', 'ticketbai', 'esc-pos'];
            modTags.suggestions = ['pos', 'hostelería', 'retail', 'impresora'];
          }

          // ── Copiar slug ───────────────────────────────────────────────────
          const copyBtn = doc.getElementById('copy-slug');
          if (copyBtn) {
            copyBtn.addEventListener('click', () => {
              navigator.clipboard && navigator.clipboard.writeText('@ioanb/pos-pro');
            });
          }

          // ── Rich text de descripción larga ───────────────────────────────
          const richText = doc.getElementById('mod-richtext');
          if (richText) {
            richText.value = '<h2>Características principales</h2>'
              + '<p>POS Caja Registradora Pro es un módulo completo de punto de venta diseñado para retail y hostelería en España. Incluye gestión de turnos, control de cajón, impresión térmica ESC/POS y facturación electrónica conforme a <strong>TicketBAI</strong> y <strong>Verifactu</strong> (RD 1007/2023).</p>'
              + '<h3>Hardware compatible</h3>'
              + '<ul><li>Impresoras Epson TM-T20III · TM-T88VII · TM-m30II</li><li>Cajones portamonedas RJ11 / RJ12 (24 V)</li><li>Lectores de código USB-HID y Bluetooth</li><li>Pantalla cliente secundaria (módulo opcional)</li></ul>'
              + '<h3>Integraciones</h3>'
              + '<p>Conexión nativa con <em>Contabilidad Plus PGC07</em>, <em>Inventario multitienda</em> y la pasarela <em>Stripe Avanzada</em> del mismo autor.</p>';
          }

          // ── ok-data-table de versiones (tab Versiones) ───────────────────
          const versDt = doc.getElementById('versions-dt');
          if (versDt) {
            versDt.title = 'Todas las versiones';
            versDt.searchable = true;
            versDt.searchKeys = ['version', 'changelog'];
            versDt.primaryAction = { label: 'Nueva versión', icon: 'add' };
            versDt.columns = [
              {
                key: 'version', header: 'Versión', width: 'minmax(8rem,1fr)',
                render: (r) => r.active
                  ? h`<span><strong>${r.version}</strong> <ion-badge style="--background:color-mix(in srgb, var(--ion-color-success) 15%, transparent);--color:var(--ion-color-success);--padding-top:3px;--padding-bottom:3px">Activa</ion-badge></span>`
                  : h`<strong>${r.version}</strong>`,
              },
              { key: 'date', header: 'Fecha', width: '9rem' },
              { key: 'changelog', header: 'Changelog', width: 'minmax(14rem,2fr)' },
              {
                key: 'status', header: 'Estado', width: '9rem',
                render: (r) => h`<ok-status-pill tone="${r.active ? 'success' : 'neutral'}" label="${r.active ? 'Publicado' : 'Archivada'}"></ok-status-pill>`,
              },
              { key: 'downloads', header: 'Descargas', width: '8rem', align: 'right' },
            ];
            versDt.rowActions = [
              {
                label: 'Promote', icon: 'arrow-up-outline',
                hidden: (r) => r.active,
              },
              { label: 'Más opciones', icon: 'ellipsis-vertical-outline' },
            ];
            versDt.rows = [
              { version: 'v3.2.1', date: '02 may 2026', changelog: 'Fix: error parseo XML Verifactu lote > 100 tickets', downloads: 412, active: true },
              { version: 'v3.2.0', date: '18 abr 2026', changelog: 'Feature: pantalla cliente secundaria · soporte Epson TM-m30II', downloads: 798, active: false },
              { version: 'v3.1.4', date: '05 abr 2026', changelog: 'Fix: timeouts cajón monedas RJ11 firmware > 1.4', downloads: 312, active: false },
              { version: 'v3.1.0', date: '10 mar 2026', changelog: 'Feature: turnos múltiples · arqueo automático · export CSV', downloads: 489, active: false },
              { version: 'v3.0.0', date: '22 ene 2026', changelog: 'Major: rediseño UI · breaking changes API tickets', downloads: 173, active: false },
            ];
          }

          // ── Sparkline de descargas (tab Estadísticas) ─────────────────────
          const spark = doc.getElementById('downloads-spark');
          if (spark) {
            spark.values = [18, 24, 30, 28, 35, 40, 38, 45, 42, 50, 48, 55,
                            60, 58, 65, 62, 70, 68, 72, 75, 73, 78, 80, 82,
                            79, 85, 88, 84, 90, 87];
          }

          // ── Versiones (resumen embebido en tab General) ───────────────────
          const versSummaryDt = doc.getElementById('vers-summary-dt');
          if (versSummaryDt) {
            versSummaryDt.searchable = false;
            versSummaryDt.columns = [
              {
                key: 'version', header: 'Versión', width: 'minmax(7rem,1fr)',
                render: (r) => r.active
                  ? h`<span><strong>${r.version}</strong> <ion-badge style="--background:color-mix(in srgb, var(--ion-color-success) 15%, transparent);--color:var(--ion-color-success);--padding-top:3px;--padding-bottom:3px">Activa</ion-badge></span>`
                  : h`<strong>${r.version}</strong>`,
              },
              { key: 'date', header: 'Fecha', width: '9rem' },
              { key: 'changelog', header: 'Changelog', width: 'minmax(12rem,2fr)' },
              {
                key: 'status', header: 'Estado', width: '8rem',
                render: (r) => h`<ok-status-pill tone="${r.active ? 'success' : 'neutral'}" label="${r.active ? 'Publicado' : 'Archivada'}"></ok-status-pill>`,
              },
            ];
            versSummaryDt.rowActions = [
              { label: 'Promote', icon: 'arrow-up-outline', hidden: (r) => r.active },
              { label: 'Más opciones', icon: 'ellipsis-vertical-outline' },
            ];
            versSummaryDt.rows = [
              { version: 'v3.2.1', date: '02 may 2026', changelog: 'Fix: error parseo XML Verifactu lote > 100 tickets', active: true },
              { version: 'v3.2.0', date: '18 abr 2026', changelog: 'Feature: pantalla cliente secundaria · soporte Epson TM-m30II', active: false },
              { version: 'v3.1.4', date: '05 abr 2026', changelog: 'Fix: timeouts cajón monedas RJ11 firmware > 1.4', active: false },
              { version: 'v3.1.0', date: '10 mar 2026', changelog: 'Feature: turnos múltiples · arqueo automático · export CSV', active: false },
              { version: 'v3.0.0', date: '22 ene 2026', changelog: 'Major: rediseño UI · breaking changes API tickets', active: false },
            ];
          }

          // ── Reseñas (ok-data-table) ───────────────────────────────────────
          const reviewsDt = doc.getElementById('reviews-dt');
          if (reviewsDt) {
            reviewsDt.title = 'Reseñas (124) · Promedio 4.8 ★';
            reviewsDt.searchable = true;
            reviewsDt.searchKeys = ['author', 'body'];
            reviewsDt.columns = [
              { key: 'author', header: 'Usuario', width: 'minmax(10rem,1.2fr)' },
              {
                key: 'stars', header: 'Valoración', width: '9rem',
                render: (r) => h`<span style="color:var(--ion-color-warning);letter-spacing:1px">${'★'.repeat(r.stars)}${'☆'.repeat(5 - r.stars)}</span>`,
              },
              { key: 'body', header: 'Comentario', width: 'minmax(14rem,2fr)' },
              { key: 'date', header: 'Fecha', width: '9rem' },
            ];
            reviewsDt.rowActions = [
              { label: 'Responder', icon: 'chatbubble-outline' },
              { label: 'Ocultar', icon: 'eye-off-outline' },
            ];
            reviewsDt.rows = [
              { author: 'María R. · Bar Tapas Cornellà', stars: 5, body: 'Lo mejor que he probado para hostelería. Verifactu funciona a la primera.', date: '08 may 2026' },
              { author: 'Jordi S. · Tienda Modas', stars: 5, body: 'Soporte oficial responde rápido. Recomendado.', date: '02 may 2026' },
              { author: 'Anna C. · Restaurante Mas', stars: 4, body: 'Muy completo, falta integración con TPV externos NCR.', date: '24 abr 2026' },
              { author: 'Pere G. · Auditoría', stars: 3, body: 'Funciona bien pero la curva de aprendizaje es alta.', date: '15 abr 2026' },
            ];
          }
        },
      });
    </script>
  </body>
