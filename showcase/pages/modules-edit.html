<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Editar módulo · ERPlora Cloud</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_saas-developer.css" />
    <link rel="stylesheet" href="./_saas-developer-pages.css" />
  </head>
  <body>
    <script type="module">
      import { defineDeveloperPage } from './_saas-developer.js';

      defineDeveloperPage({
        activeTab: 'modules',
        title: 'Inventario Avanzado',
        body: `
          <form class="developer-page developer-section-stack">
            <ion-card>
              <ion-card-content>
                <div class="developer-summary">
                  <div class="developer-summary-icon"><iconify-icon icon="lucide:box" width="28" height="28"></iconify-icon></div>
                  <div class="developer-summary-body">
                    <h2>Inventario Avanzado</h2>
                    <p><ion-badge color="success">Publicado</ion-badge> &nbsp; <code>v1.8.0</code></p>
                  </div>
                  <div class="developer-summary-actions">
                    <ion-button fill="outline" size="small"><iconify-icon slot="start" icon="lucide:cloud-off" width="13" height="13"></iconify-icon>Despublicar</ion-button>
                    <ion-button fill="outline" size="small"><iconify-icon slot="start" icon="lucide:refresh-cw" width="13" height="13"></iconify-icon>Sincronizar desde Git</ion-button>
                    <ion-button fill="outline" size="small"><iconify-icon slot="start" icon="lucide:bar-chart-3" width="13" height="13"></iconify-icon>Estadísticas</ion-button>
                  </div>
                </div>
              </ion-card-content>
            </ion-card>

            <ion-card>
              <ion-card-content>
                <h2 class="developer-card-title">Taxonomía</h2>
                <p class="developer-card-subtitle">Elige una subcategoría principal y los tipos de negocio para los que sirve el módulo.</p>
                <div class="developer-fields two-col">
                  <div>
                    <ion-select label="Categoría *" label-placement="stacked" fill="outline" interface="popover" value="COMM">
                      <ion-select-option value="COMM">COM · Comercial</ion-select-option>
                      <ion-select-option value="FIN">FIN · Finanzas</ion-select-option>
                      <ion-select-option value="OPER">OPER · Operaciones</ion-select-option>
                    </ion-select>
                    <p class="developer-field-help">Agrupa subcategorías bajo una unidad macro.</p>
                  </div>
                  <div>
                    <ion-select label="Subcategoría principal *" label-placement="stacked" fill="outline" interface="popover" value="inventory">
                      <ion-select-option value="inventory">COMM · Inventario</ion-select-option>
                      <ion-select-option value="catalog">COMM · Catálogo</ion-select-option>
                    </ion-select>
                    <p class="developer-field-help">Clasificación principal usada por los clientes para encontrar el módulo.</p>
                  </div>
                  <div>
                    <ion-select label="Subcategorías secundarias" label-placement="stacked" fill="outline" interface="popover" multiple value='["catalog"]'>
                      <ion-select-option value="catalog">COMM · Catálogo</ion-select-option>
                      <ion-select-option value="purchase">OPER · Compras</ion-select-option>
                    </ion-select>
                    <p class="developer-field-help">Etiquetas cruzadas opcionales.</p>
                  </div>
                  <div>
                    <ion-select label="Tipos de negocio *" label-placement="stacked" fill="outline" interface="popover" multiple value='["retail","restaurant"]'>
                      <ion-select-option value="retail">Comercio minorista</ion-select-option>
                      <ion-select-option value="restaurant">Restaurantes</ion-select-option>
                      <ion-select-option value="services">Servicios profesionales</ion-select-option>
                    </ion-select>
                    <p class="developer-field-help">Al menos uno es obligatorio.</p>
                  </div>
                </div>
              </ion-card-content>
            </ion-card>

            <div class="developer-grid">
              <ion-card>
                <ion-card-content>
                  <h2 class="developer-card-title">Clasificación</h2>
                  <p class="developer-card-subtitle">Sectores, unidades funcionales y países de destino.</p>
                  <span class="developer-field-label">Sector</span>
                  <div class="developer-chip-row">
                    <ion-chip color="primary"><ion-label>Comercio</ion-label></ion-chip>
                    <ion-chip><ion-label>Hostelería</ion-label></ion-chip>
                    <ion-chip><ion-label>Servicios</ion-label></ion-chip>
                  </div>
                  <span class="developer-field-label ion-margin-top">Unidad funcional</span>
                  <div class="developer-chip-row">
                    <ion-chip color="primary"><ion-label>Operaciones</ion-label></ion-chip>
                    <ion-chip><ion-label>Finanzas</ion-label></ion-chip>
                    <ion-chip><ion-label>Cumplimiento</ion-label></ion-chip>
                  </div>
                  <span class="developer-field-label ion-margin-top">Países</span>
                  <p class="developer-field-help">Opcional. Déjalo vacío si el módulo es universal.</p>
                  <div class="developer-chip-row ion-margin-top">
                    <ion-chip color="primary"><ion-label>España</ion-label></ion-chip>
                    <ion-chip><ion-label>Portugal</ion-label></ion-chip>
                    <ion-chip><ion-label>Francia</ion-label></ion-chip>
                  </div>
                </ion-card-content>
              </ion-card>

              <ion-card>
                <ion-card-content>
                  <h2 class="developer-card-title">Precios</h2>
                  <p class="developer-card-subtitle">El precio está declarado en module.json y se aplica en cada sincronización; no se puede editar aquí.</p>
                  <div class="developer-data-row"><span>Plan</span><ion-badge color="warning">Premium</ion-badge></div>
                  <div class="developer-data-row"><span>Tipo de módulo</span><strong>Suscripción</strong></div>
                  <div class="developer-data-row"><span>Planes</span><strong>Pro — 19,00 €/mes</strong></div>
                  <p class="developer-field-help">ERPlora aplica una comisión del 15%. Recibes el 85% del precio de venta.</p>
                </ion-card-content>
              </ion-card>
            </div>

            <div class="developer-actions">
              <ion-button type="submit"><iconify-icon slot="start" icon="lucide:save" width="14" height="14"></iconify-icon>Guardar cambios</ion-button>
              <ion-button type="button" fill="outline">Cancelar</ion-button>
            </div>

            <ion-card color="light">
              <ion-card-content>
                <div class="developer-summary">
                  <div class="developer-summary-body">
                    <h2 class="developer-card-title" style="color:var(--ion-color-danger)">Eliminar este módulo</h2>
                    <p>El módulo y todos sus datos se eliminarán de forma permanente.</p>
                  </div>
                  <ion-button type="button" color="danger" fill="outline" size="small"><iconify-icon slot="start" icon="lucide:trash-2" width="13" height="13"></iconify-icon>Eliminar</ion-button>
                </div>
              </ion-card-content>
            </ion-card>
          </form>`,
      });
    </script>
  </body>
</html>
