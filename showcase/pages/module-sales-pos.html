<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERPlora Hub · Vender</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>

    <style>
      .pos-canvas,
      .pos-body,
      .pos-catalog,
      .pos-cart {
        min-height: 0;
      }

      .pos-canvas {
        height: calc(100vh - 92px);
        min-height: 34rem;
        overflow: hidden;
        border: 1px solid var(--ion-border-color, rgba(var(--ion-text-color-rgb), 0.12));
        border-radius: 16px;
        background: var(--ion-background-color);
      }

      .pos-body {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 23rem;
        height: 100%;
      }

      .pos-catalog {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        padding: 0.8rem;
        overflow: hidden;
      }

      .pos-category-bar {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .pos-category-strip {
        display: flex;
        flex: 1;
        gap: 0.55rem;
        min-width: 0;
        padding: 0.15rem;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .pos-category-strip::-webkit-scrollbar {
        display: none;
      }

      .pos-category {
        flex: 0 0 9.5rem;
        min-height: 4.4rem;
        padding: 0.65rem;
        overflow: hidden;
        color: white;
        text-align: start;
        cursor: pointer;
        border: 2px solid transparent;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--ion-color-primary), var(--ion-color-primary-shade));
      }

      .pos-category[aria-pressed='true'] {
        border-color: var(--ion-color-warning);
      }

      .pos-category strong,
      .pos-category small {
        display: block;
      }

      .pos-category small {
        margin-top: 0.2rem;
        opacity: 0.82;
      }

      #pos-product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(9rem, 1fr));
        gap: 0.7rem;
        overflow: auto;
        align-content: start;
      }

      ion-card.pos-product {
        margin: 0;
        overflow: hidden;
        cursor: pointer;
        border: 1px solid var(--ion-border-color, rgba(var(--ion-text-color-rgb), 0.12));
        border-radius: 14px;
        box-shadow: none;
      }

      .pos-product-thumb {
        display: grid;
        height: 5.6rem;
        color: rgba(255, 255, 255, 0.88);
        font-size: 1.35rem;
        font-weight: 800;
        place-items: center;
      }

      .pos-product-meta {
        padding: 0.55rem 0.65rem 0.7rem;
      }

      .pos-product-name {
        min-height: 2.2em;
        font-size: 0.9rem;
        font-weight: 650;
        line-height: 1.1;
      }

      .pos-product-price,
      .pos-search-price {
        margin-top: 0.25rem;
        color: var(--ion-color-primary);
        font-weight: 800;
      }

      .pos-cart {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-left: 1px solid var(--ion-border-color, rgba(var(--ion-text-color-rgb), 0.12));
        background: var(--ion-card-background, var(--ion-background-color));
      }

      .pos-cart ion-toolbar,
      .pos-cart ion-content {
        --background: var(--ion-card-background, var(--ion-background-color));
      }

      .pos-cart ion-content {
        flex: 1;
      }

      #pos-cart-lines {
        padding: 0;
        background: transparent;
      }

      .pos-line-end {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 0.35rem;
      }

      .pos-line-total {
        font-weight: 750;
      }

      .pos-empty {
        padding: 3rem 1rem;
        color: var(--ion-color-medium);
        text-align: center;
      }

      .pos-cart-foot {
        padding: 0.75rem;
        border-top: 1px solid var(--ion-border-color, rgba(var(--ion-text-color-rgb), 0.12));
      }

      .pos-total {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 0.55rem;
        color: var(--ion-color-medium);
      }

      .pos-total strong {
        color: var(--ion-text-color);
        font-size: 1.7rem;
      }

      #pos-payment-methods {
        margin-bottom: 0.55rem;
      }

      .pos-foot-actions {
        display: flex;
        gap: 0.45rem;
      }

      .pos-foot-actions #pos-charge {
        flex: 1;
      }

      .pos-search-list {
        background: transparent;
      }

      .pos-modal-content {
        max-width: 32rem;
        margin: 0 auto;
      }

      .pos-charge-total {
        margin: 1rem 0 1.25rem;
        font-size: 2.4rem;
        font-weight: 800;
        text-align: center;
      }

      .pos-cart-fab {
        display: none;
        position: absolute;
        right: 1rem;
        bottom: 1rem;
        z-index: 20;
      }

      #pos-close-cart {
        display: none;
      }

      @media (max-width: 820px) {
        .pos-canvas {
          height: calc(100vh - 88px);
          min-height: 30rem;
        }

        .pos-body {
          grid-template-columns: minmax(0, 1fr);
        }

        .pos-cart {
          position: absolute;
          inset: 0 0 0 auto;
          z-index: 15;
          width: min(92%, 26rem);
          border-left: 0;
          box-shadow: -8px 0 32px rgba(0, 0, 0, 0.32);
          transform: translateX(105%);
          transition: transform 0.2s ease;
        }

        .pos-cart[data-open] {
          transform: translateX(0);
        }

        .pos-cart-fab {
          display: block;
        }

        #pos-close-cart {
          display: inline-flex;
        }
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      // Fixtures oficiales de modules/sales/fixtures/. El preview no inventa catálogo ni pagos.
      const PRODUCT_FIXTURE = [
        {"id":"p1","name":"Café solo","sku":"CAF-01","price":1.30,"is_active":1},
        {"id":"p2","name":"Café con leche","sku":"CAF-02","price":1.60,"is_active":1},
        {"id":"p3","name":"Cappuccino","sku":"CAF-03","price":2.20,"is_active":1},
        {"id":"p4","name":"Agua mineral","sku":"BEB-01","price":1.20,"is_active":1},
        {"id":"p5","name":"Refresco cola","sku":"BEB-02","price":2.00,"is_active":1},
        {"id":"p6","name":"Zumo de naranja","sku":"BEB-03","price":2.50,"is_active":1},
        {"id":"p7","name":"Bocadillo de jamón","sku":"COM-01","price":4.50,"is_active":1},
        {"id":"p8","name":"Ensalada César","sku":"COM-02","price":7.90,"is_active":1},
        {"id":"p9","name":"Tarta de queso","sku":"POS-01","price":3.80,"is_active":1},
        {"id":"p10","name":"Brownie","sku":"POS-02","price":3.20,"is_active":1},
        {"id":"p11","name":"Patatas bravas","sku":"SNA-01","price":2.80,"is_active":1},
        {"id":"p12","name":"Copa vino tinto","sku":"VIN-01","price":2.90,"is_active":1},
        {"id":"p13","name":"Caña cerveza","sku":"CER-01","price":1.80,"is_active":1},
        {"id":"p14","name":"Croissant","sku":"DES-01","price":1.50,"is_active":1},
        {"id":"p15","name":"Tostada con tomate","sku":"DES-02","price":2.40,"is_active":1}
      ];

      const CATEGORY_FIXTURE = [
        {"id":"c1","name":"Cafés"},
        {"id":"c2","name":"Bebidas"},
        {"id":"c3","name":"Comidas"},
        {"id":"c4","name":"Postres"},
        {"id":"c5","name":"Snacks"},
        {"id":"c6","name":"Vinos"},
        {"id":"c7","name":"Cervezas"},
        {"id":"c8","name":"Desayunos"}
      ];

      const PRODUCT_CATEGORY_FIXTURE = [
        {"product_id":"p1","category_id":"c1"},
        {"product_id":"p2","category_id":"c1"},
        {"product_id":"p3","category_id":"c1"},
        {"product_id":"p4","category_id":"c2"},
        {"product_id":"p5","category_id":"c2"},
        {"product_id":"p6","category_id":"c2"},
        {"product_id":"p7","category_id":"c3"},
        {"product_id":"p8","category_id":"c3"},
        {"product_id":"p9","category_id":"c4"},
        {"product_id":"p10","category_id":"c4"},
        {"product_id":"p11","category_id":"c5"},
        {"product_id":"p12","category_id":"c6"},
        {"product_id":"p13","category_id":"c7"},
        {"product_id":"p14","category_id":"c8"},
        {"product_id":"p15","category_id":"c8"}
      ];

      const PAYMENT_METHOD_FIXTURE = [
        {"id":"pm1","name":"Efectivo"},
        {"id":"pm2","name":"Tarjeta"},
        {"id":"pm3","name":"Bizum"}
      ];

      const SETTINGS_FIXTURE = [
        {"currency":"€","enable_parked_tickets":1,"default_document_format":"ticket"}
      ];

      const PARKED_TICKET_FIXTURE = [
        {"id":"t1","ticket_number":"P-143205","created_at":"2026-06-14T14:32:05","cart_data":"{\"lines\":[]}"},
        {"id":"t2","ticket_number":"P-150812","created_at":"2026-06-14T15:08:12","cart_data":"{\"lines\":[]}"}
      ];

      // Los fixtures históricos expresan euros, mientras el contrato POS vigente trabaja en céntimos.
      const products = PRODUCT_FIXTURE.map((row) => ({
        ...row,
        price: Math.round(Number(row.price) * 100),
      }));
      const settings = SETTINGS_FIXTURE[0];
      const productCategories = new Map(
        PRODUCT_CATEGORY_FIXTURE.map((row) => [row.product_id, row.category_id]),
      );
      const currency = new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' });
      const formatMoney = (cents) => currency.format((Number(cents) || 0) / 100);
      const initials = (name) => String(name).split(/\s+/).slice(0, 2).map((part) => part[0] || '').join('').toUpperCase();
      const gradient = (name) => {
        let hue = 0;
        for (const char of String(name)) hue = (hue * 31 + char.charCodeAt(0)) % 360;
        return `linear-gradient(135deg, hsl(${hue} 42% 38%), hsl(${(hue + 38) % 360} 44% 26%))`;
      };

      defineHubPage({
        active: '/m/sales/pos',
        title: 'Vender',
        body: `
          <main class="pos-canvas">
            <div class="pos-body">
              <section class="pos-catalog" aria-label="Catálogo de venta">
                <div class="pos-category-bar">
                  <div id="pos-categories" class="pos-category-strip"></div>
                  <ok-spotlight-search
                    id="pos-search"
                    placeholder="Buscar producto…"
                    trigger-icon="search-outline"
                    trigger-label="Buscar producto"
                  >
                    <ion-list id="pos-search-results" class="pos-search-list" lines="none"></ion-list>
                  </ok-spotlight-search>
                </div>
                <div id="pos-product-grid"></div>
              </section>

              <aside class="pos-cart">
                <ion-header class="ion-no-border">
                  <ion-toolbar>
                    <ion-buttons slot="start">
                      <ion-button id="pos-close-cart" aria-label="Cerrar carrito">
                        <ion-icon name="chevron-forward-outline" slot="icon-only"></ion-icon>
                      </ion-button>
                    </ion-buttons>
                    <ion-title>Venta</ion-title>
                    <ion-buttons slot="end">
                      <ion-button id="pos-parked-trigger" aria-label="Tickets aparcados">
                        <ion-icon name="file-tray-stacked-outline" slot="icon-only"></ion-icon>
                      </ion-button>
                      <ion-button id="pos-fullscreen" aria-label="Pantalla completa">
                        <ion-icon name="expand-outline" slot="icon-only"></ion-icon>
                      </ion-button>
                    </ion-buttons>
                  </ion-toolbar>
                </ion-header>

                <ion-content>
                  <ion-list id="pos-cart-lines" lines="full"></ion-list>
                </ion-content>

                <ion-footer class="ion-no-border">
                  <div class="pos-cart-foot">
                    <div class="pos-total"><span>Total</span><strong id="pos-total">0,00 €</strong></div>
                    <ion-segment id="pos-payment-methods"></ion-segment>
                    <div class="pos-foot-actions">
                      <ion-button id="pos-fire-order" fill="outline" aria-label="Enviar a cocina">
                        <ion-icon name="restaurant-outline" slot="icon-only"></ion-icon>
                      </ion-button>
                      <ion-button id="pos-prebill" fill="outline" aria-label="Imprimir cuenta">
                        <ion-icon name="print-outline" slot="icon-only"></ion-icon>
                      </ion-button>
                      <ion-button id="pos-charge" aria-label="Cobrar">
                        <ion-icon name="cash-outline" slot="start"></ion-icon>
                        Cobrar
                      </ion-button>
                    </div>
                  </div>
                </ion-footer>
              </aside>

              <ion-fab class="pos-cart-fab" vertical="bottom" horizontal="end">
                <ion-fab-button id="pos-open-cart" aria-label="Abrir carrito">
                  <ion-icon name="cart-outline"></ion-icon>
                </ion-fab-button>
              </ion-fab>
            </div>
          </main>

          <ion-popover id="pos-parked-popover" trigger="pos-parked-trigger" trigger-action="click">
            <ion-content class="ion-padding">
              <ion-button id="pos-park-current" expand="block" fill="outline">Aparcar venta actual</ion-button>
              <ion-list id="pos-parked-list" lines="full"></ion-list>
            </ion-content>
          </ion-popover>

          <ion-modal id="pos-charge-modal">
            <ion-header class="ion-no-border">
              <ion-toolbar>
                <ion-title>Cobrar</ion-title>
                <ion-buttons slot="end">
                  <ion-button id="pos-charge-close" aria-label="Cerrar">
                    <ion-icon name="close-outline" slot="icon-only"></ion-icon>
                  </ion-button>
                </ion-buttons>
              </ion-toolbar>
            </ion-header>
            <ion-content class="ion-padding">
              <div class="pos-modal-content">
                <div id="pos-charge-total" class="pos-charge-total">0,00 €</div>
                <ion-input id="pos-tendered" type="number" inputmode="decimal" fill="outline"
                  label="Entregado" label-placement="floating"></ion-input>
                <ion-item lines="none">
                  <ion-icon name="print-outline" slot="start"></ion-icon>
                  <ion-label>Imprimir tiquet</ion-label>
                  <ion-toggle id="pos-print-receipt" slot="end" checked></ion-toggle>
                </ion-item>
                <ion-button id="pos-charge-confirm" expand="block">Confirmar cobro</ion-button>
              </div>
            </ion-content>
          </ion-modal>

          <ion-modal id="pos-prebill-modal">
            <ion-header class="ion-no-border">
              <ion-toolbar>
                <ion-title>Cuenta previa</ion-title>
                <ion-buttons slot="end">
                  <ion-button id="pos-prebill-close" aria-label="Cerrar">
                    <ion-icon name="close-outline" slot="icon-only"></ion-icon>
                  </ion-button>
                </ion-buttons>
              </ion-toolbar>
            </ion-header>
            <ion-content class="ion-padding">
              <ok-receipt id="pos-prebill-receipt"></ok-receipt>
            </ion-content>
          </ion-modal>

          <ion-toast id="pos-toast" duration="1800" position="bottom"></ion-toast>
        `,
        setup(doc) {
          const categoryStrip = doc.getElementById('pos-categories');
          const productGrid = doc.getElementById('pos-product-grid');
          const cartElement = doc.querySelector('.pos-cart');
          const cartList = doc.getElementById('pos-cart-lines');
          const totalElement = doc.getElementById('pos-total');
          const paymentSegment = doc.getElementById('pos-payment-methods');
          const search = doc.getElementById('pos-search');
          const searchResults = doc.getElementById('pos-search-results');
          const parkedList = doc.getElementById('pos-parked-list');
          const parkedPopover = doc.getElementById('pos-parked-popover');
          const chargeModal = doc.getElementById('pos-charge-modal');
          const prebillModal = doc.getElementById('pos-prebill-modal');
          const receipt = doc.getElementById('pos-prebill-receipt');
          const toast = doc.getElementById('pos-toast');

          let activeCategory = '';
          let searchTerm = '';
          let cart = [];
          let parkedTickets = PARKED_TICKET_FIXTURE.map((row) => ({ ...row }));
          let paymentMethodId = PAYMENT_METHOD_FIXTURE[0]?.id ?? '';

          const total = () => cart.reduce((sum, line) => sum + line.price * line.qty, 0);
          const showToast = (message) => {
            toast.message = message;
            toast.isOpen = true;
          };
          const emitCommand = (name, payload) => {
            doc.dispatchEvent(new CustomEvent('erp-demo-command', { detail: { name, payload } }));
          };

          function renderCategories() {
            const categories = [{ id: '', name: 'Todos' }, ...CATEGORY_FIXTURE];
            categoryStrip.innerHTML = '';
            for (const category of categories) {
              const count = category.id
                ? products.filter((product) => productCategories.get(product.id) === category.id).length
                : products.length;
              const button = doc.createElement('button');
              button.className = 'pos-category';
              button.type = 'button';
              button.setAttribute('aria-pressed', String(activeCategory === category.id));
              button.style.background = gradient(category.name);
              button.innerHTML = `<strong>${category.name}</strong><small>${count} productos</small>`;
              button.addEventListener('click', () => {
                activeCategory = category.id;
                renderCategories();
                renderProducts();
              });
              categoryStrip.appendChild(button);
            }
          }

          function visibleProducts() {
            if (!activeCategory) return products;
            return products.filter((product) => productCategories.get(product.id) === activeCategory);
          }

          function renderProducts() {
            productGrid.innerHTML = visibleProducts().map((product) => `
              <ion-card button class="pos-product" data-product-id="${product.id}">
                <div class="pos-product-thumb" style="background:${gradient(product.name)}">${initials(product.name)}</div>
                <div class="pos-product-meta">
                  <div class="pos-product-name">${product.name}</div>
                  <div class="pos-product-price">${formatMoney(product.price)}</div>
                </div>
              </ion-card>
            `).join('');
            for (const card of productGrid.querySelectorAll('[data-product-id]')) {
              card.addEventListener('click', () => addProduct(card.dataset.productId));
            }
          }

          function addProduct(productId) {
            const product = products.find((row) => row.id === productId);
            if (!product) return;
            const line = cart.find((row) => row.id === product.id);
            if (line) line.qty += 1;
            else cart.push({ ...product, qty: 1 });
            renderCart();
          }

          function renderCart() {
            if (!cart.length) {
              cartList.innerHTML = '<div class="pos-empty">Toca un producto para empezar.</div>';
            } else {
              cartList.innerHTML = cart.map((line) => `
                <ion-item>
                  <ion-label><h3>${line.name}</h3><p>${formatMoney(line.price)}</p></ion-label>
                  <div slot="end" class="pos-line-end">
                    <span class="pos-line-total">${formatMoney(line.price * line.qty)}</span>
                    <ok-qty-stepper data-line-id="${line.id}"></ok-qty-stepper>
                  </div>
                </ion-item>
              `).join('');
              for (const stepper of cartList.querySelectorAll('ok-qty-stepper')) {
                const line = cart.find((row) => row.id === stepper.dataset.lineId);
                stepper.value = line?.qty ?? 0;
                stepper.min = 0;
                stepper.step = 1;
                stepper.labels = { decrement: 'Restar', increment: 'Sumar' };
                stepper.addEventListener('ok-change', (event) => {
                  const value = Number(event.detail.value) || 0;
                  cart = value > 0
                    ? cart.map((row) => row.id === stepper.dataset.lineId ? { ...row, qty: value } : row)
                    : cart.filter((row) => row.id !== stepper.dataset.lineId);
                  renderCart();
                });
              }
            }
            totalElement.textContent = formatMoney(total());
            doc.getElementById('pos-charge').disabled = !cart.length;
            doc.getElementById('pos-prebill').disabled = !cart.length;
            doc.getElementById('pos-fire-order').disabled = !cart.length;
            doc.getElementById('pos-park-current').disabled = !cart.length;
          }

          function renderPayments() {
            paymentSegment.innerHTML = PAYMENT_METHOD_FIXTURE.map((method) => {
              const icon = method.name === 'Efectivo'
                ? 'cash-outline'
                : method.name === 'Tarjeta' ? 'card-outline' : 'phone-portrait-outline';
              return `<ion-segment-button value="${method.id}" aria-label="${method.name}"><ion-icon name="${icon}"></ion-icon></ion-segment-button>`;
            }).join('');
            paymentSegment.value = paymentMethodId;
          }

          function renderParkedTickets() {
            parkedList.innerHTML = parkedTickets.length
              ? parkedTickets.map((ticket) => `
                  <ion-item button detail="false" data-ticket-id="${ticket.id}">
                    <ion-label><h3>${ticket.ticket_number}</h3><p>${ticket.created_at.replace('T', ' ').slice(0, 16)}</p></ion-label>
                    <ion-button slot="end" size="small">Recuperar</ion-button>
                  </ion-item>
                `).join('')
              : '<ion-item lines="none"><ion-label color="medium">No hay tickets aparcados.</ion-label></ion-item>';
            for (const item of parkedList.querySelectorAll('[data-ticket-id]')) {
              item.addEventListener('click', () => retrieveParkedTicket(item.dataset.ticketId));
            }
          }

          function parkCurrentCart() {
            if (!cart.length) return;
            const now = new Date();
            const time = now.toTimeString().slice(0, 8).replaceAll(':', '');
            parkedTickets.unshift({
              id: `local-${Date.now()}`,
              ticket_number: `P-${time}`,
              created_at: now.toISOString(),
              cart_data: JSON.stringify({ lines: cart }),
            });
            cart = [];
            emitCommand('sales.park_ticket', { ticket_number: parkedTickets[0].ticket_number });
            renderParkedTickets();
            renderCart();
            parkedPopover.dismiss();
            showToast('Venta aparcada');
          }

          function retrieveParkedTicket(ticketId) {
            if (cart.length) {
              showToast('Vacía o aparca la venta actual primero');
              return;
            }
            const ticket = parkedTickets.find((row) => row.id === ticketId);
            if (!ticket) return;
            try {
              const parsed = JSON.parse(ticket.cart_data || '{}');
              cart = Array.isArray(parsed.lines) ? parsed.lines : [];
            } catch {
              cart = [];
            }
            parkedTickets = parkedTickets.filter((row) => row.id !== ticketId);
            emitCommand('sales.retrieve_ticket', { ticket_id: ticketId });
            renderParkedTickets();
            renderCart();
            parkedPopover.dismiss();
            showToast(`Ticket ${ticket.ticket_number} recuperado`);
          }

          function buildPrebillData() {
            const selectedMethod = PAYMENT_METHOD_FIXTURE.find((method) => method.id === paymentMethodId);
            return {
              business: { name: 'ERPlora Demo', address: 'Cuenta previa · no fiscal' },
              number: 'BORRADOR',
              datetime: new Date().toLocaleString('es-ES'),
              lines: cart.map((line) => ({
                name: line.name,
                qty: line.qty,
                unit_price: line.price / 100,
                total: line.price * line.qty / 100,
              })),
              total: total() / 100,
              payment: { method: selectedMethod?.name ?? 'Efectivo' },
              currency: settings.currency || '€',
              footer: 'Cuenta previa · Documento no fiscal',
            };
          }

          function openCharge() {
            if (!cart.length) return;
            doc.getElementById('pos-charge-total').textContent = formatMoney(total());
            doc.getElementById('pos-charge-confirm').textContent = `Cobrar ${formatMoney(total())}`;
            chargeModal.isOpen = true;
          }

          function confirmCharge() {
            if (!cart.length) return;
            const selectedMethod = PAYMENT_METHOD_FIXTURE.find((method) => method.id === paymentMethodId);
            emitCommand('sales.complete_sale', {
              channel: 'pos',
              payment_method_id: paymentMethodId,
              payment_method_name: selectedMethod?.name ?? 'Efectivo',
              items: cart.map((line) => ({ product_id: line.id, product_name: line.name, price: line.price, quantity: line.qty })),
            });
            cart = [];
            chargeModal.dismiss();
            renderCart();
            showToast('Venta completada');
          }

          search.addEventListener('ok-input', (event) => {
            searchTerm = String(event.detail.value || '').trim().toLocaleLowerCase('es');
            const found = searchTerm
              ? products.filter((product) => `${product.name} ${product.sku}`.toLocaleLowerCase('es').includes(searchTerm))
              : [];
            searchResults.innerHTML = found.map((product) => `
              <ion-item button detail="false" data-search-product-id="${product.id}">
                <ion-label><h3>${product.name}</h3><p>${product.sku}</p></ion-label>
                <span slot="end" class="pos-search-price">${formatMoney(product.price)}</span>
              </ion-item>
            `).join('');
            for (const item of searchResults.querySelectorAll('[data-search-product-id]')) {
              item.addEventListener('click', () => {
                addProduct(item.dataset.searchProductId);
                search.close();
              });
            }
          });

          paymentSegment.addEventListener('ionChange', (event) => {
            paymentMethodId = String(event.detail.value || paymentMethodId);
          });
          doc.getElementById('pos-park-current').addEventListener('click', parkCurrentCart);
          doc.getElementById('pos-fire-order').addEventListener('click', () => {
            if (!cart.length) return;
            emitCommand('sales.order.fire', { items: cart.map((line) => ({ product_id: line.id, quantity: line.qty })) });
            showToast('Comanda enviada a cocina');
          });
          doc.getElementById('pos-prebill').addEventListener('click', () => {
            if (!cart.length) return;
            receipt.receipt = buildPrebillData();
            prebillModal.isOpen = true;
          });
          doc.getElementById('pos-prebill-close').addEventListener('click', () => prebillModal.dismiss());
          doc.getElementById('pos-charge').addEventListener('click', openCharge);
          doc.getElementById('pos-charge-close').addEventListener('click', () => chargeModal.dismiss());
          doc.getElementById('pos-charge-confirm').addEventListener('click', confirmCharge);
          chargeModal.addEventListener('ionModalDidDismiss', () => {
            doc.getElementById('pos-tendered').value = '';
          });
          doc.getElementById('pos-open-cart').addEventListener('click', () => cartElement.setAttribute('data-open', ''));
          doc.getElementById('pos-close-cart').addEventListener('click', () => cartElement.removeAttribute('data-open'));
          doc.getElementById('pos-fullscreen').addEventListener('click', async () => {
            try {
              if (doc.fullscreenElement) await doc.exitFullscreen();
              else await doc.querySelector('.pos-canvas').requestFullscreen();
            } catch { /* El navegador puede rechazar pantalla completa. */ }
          });

          renderCategories();
          renderProducts();
          renderPayments();
          renderParkedTickets();
          renderCart();
        },
      });
    </script>
  </body>
</html>
