<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERPlora Hub · Horarios</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>

    <style>
      .schedules-page { display:flex; flex-direction:column; height:100%; min-height:0; gap:.75rem; }
      .schedules-scope { flex:0 0 auto; max-width:28rem; }
      .schedules-page > ok-data-table { flex:1 1 auto; min-height:0; }
      .schedule-form { display:flex; flex-direction:column; gap:.7rem; }
      .schedule-week { display:flex; flex-direction:column; gap:.55rem; }
      .schedule-day { border:1px solid var(--ion-color-light-shade, #d7d8da); border-radius:12px; padding:.65rem; }
      .schedule-day > ion-checkbox { margin-bottom:.5rem; }
      .schedule-day-fields { display:grid; grid-template-columns:1fr 1fr; gap:.45rem; }
      .schedule-day-fields .schedule-break { grid-column:1 / -1; margin:.1rem 0 0; color:var(--ion-color-medium); font-size:.82rem; }
      .schedule-form > ion-button { align-self:flex-end; }
      .schedule-error { color:var(--ion-color-danger); font-weight:600; margin:0; }
      @media (max-width:480px) {
        .schedules-scope { max-width:none; }
        .schedule-day-fields { grid-template-columns:1fr; }
        .schedule-day-fields .schedule-break { grid-column:auto; }
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      // Fixtures canónicas de erp-staff-schedules.test.ts.
      const MEMBER_FIXTURE = [
        {
          "id": "m1",
          "full_name": "Ana Ruiz",
          "status": "active"
        },
        {
          "id": "m2",
          "full_name": "Luis Gil",
          "status": "active"
        }
      ];

      const SCHEDULE_FIXTURE = [
        {
          "id": "h1",
          "staff_id": "m1",
          "name": "Horario habitual",
          "is_default": 1,
          "effective_from": null,
          "effective_until": null,
          "is_active": 1
        }
      ];

      const LABELS = {
        search:'Buscar…', empty:'Este miembro aún no tiene horarios.', filters:'Filtros', clear:'Limpiar',
        apply:'Aplicar', add:'Añadir', moreActions:'Más acciones', rowsPerPage:'Filas por página',
        perPageShort:'{n} / pág.', viewList:'Vista lista', viewCards:'Vista tarjetas',
        columnsVisible:'Columnas visibles', columns:'Columnas', actions:'Acciones', close:'Cerrar',
        filterPlaceholder:'Filtrar…', noValues:'Sin valores', showing:'Mostrando {from}–{to} de',
        recordSingular:'horario', recordPlural:'horarios',
      };

      const DAY_DEFAULTS = [
        { day:0, label:'Lunes', working:true, start:'09:00', end:'18:00', breakStart:'', breakEnd:'' },
        { day:1, label:'Martes', working:true, start:'09:00', end:'18:00', breakStart:'', breakEnd:'' },
        { day:2, label:'Miércoles', working:true, start:'09:00', end:'18:00', breakStart:'', breakEnd:'' },
        { day:3, label:'Jueves', working:true, start:'09:00', end:'18:00', breakStart:'', breakEnd:'' },
        { day:4, label:'Viernes', working:true, start:'09:00', end:'18:00', breakStart:'', breakEnd:'' },
        { day:5, label:'Sábado', working:false, start:'09:00', end:'18:00', breakStart:'', breakEnd:'' },
        { day:6, label:'Domingo', working:false, start:'09:00', end:'18:00', breakStart:'', breakEnd:'' },
      ];

      let schedules = SCHEDULE_FIXTURE.map((schedule) => ({ ...schedule }));
      let selectedMember = MEMBER_FIXTURE[0].id;
      let week = DAY_DEFAULTS.map((day) => ({ ...day }));
      const state = { page:0, pageSize:50, sort:'is_default', dir:'desc' };

      defineHubPage({
        active: '/m/staff/schedules',
        title: 'Horarios',
        body: `
          <div class="schedules-page">
            <div class="schedules-scope">
              <ion-select id="schedule-member" fill="outline" label="Miembro" label-placement="floating">
                <ion-select-option value="m1">Ana Ruiz</ion-select-option>
                <ion-select-option value="m2">Luis Gil</ion-select-option>
              </ion-select>
            </div>
            <ok-data-table id="schedules-table" fill>
              <form id="schedule-form" slot="create" class="schedule-form">
                <ion-input id="schedule-name" fill="outline" label="Horario" label-placement="floating" placeholder="Nombre del horario"></ion-input>
                <ion-input id="schedule-from" fill="outline" type="date" label="Vigente desde" label-placement="floating"></ion-input>
                <ion-input id="schedule-until" fill="outline" type="date" label="Vigente hasta" label-placement="floating"></ion-input>
                <ion-checkbox id="schedule-default" label-placement="end" checked>Por defecto</ion-checkbox>
                <div class="schedule-week">
                  <div class="schedule-day" data-day="0">
                    <ion-checkbox class="day-working" label-placement="end" checked><span>Lunes</span></ion-checkbox>
                    <div class="schedule-day-fields">
                      <ion-input class="day-start" fill="outline" type="time" label="Inicio" label-placement="floating" value="09:00"></ion-input>
                      <ion-input class="day-end" fill="outline" type="time" label="Fin" label-placement="floating" value="18:00"></ion-input>
                      <span class="schedule-break">Descanso opcional</span>
                      <ion-input class="day-break-start" fill="outline" type="time" label="Inicio descanso" label-placement="floating"></ion-input>
                      <ion-input class="day-break-end" fill="outline" type="time" label="Fin descanso" label-placement="floating"></ion-input>
                    </div>
                  </div>
                  <div class="schedule-day" data-day="1">
                    <ion-checkbox class="day-working" label-placement="end" checked><span>Martes</span></ion-checkbox>
                    <div class="schedule-day-fields">
                      <ion-input class="day-start" fill="outline" type="time" label="Inicio" label-placement="floating" value="09:00"></ion-input>
                      <ion-input class="day-end" fill="outline" type="time" label="Fin" label-placement="floating" value="18:00"></ion-input>
                      <span class="schedule-break">Descanso opcional</span>
                      <ion-input class="day-break-start" fill="outline" type="time" label="Inicio descanso" label-placement="floating"></ion-input>
                      <ion-input class="day-break-end" fill="outline" type="time" label="Fin descanso" label-placement="floating"></ion-input>
                    </div>
                  </div>
                  <div class="schedule-day" data-day="2">
                    <ion-checkbox class="day-working" label-placement="end" checked><span>Miércoles</span></ion-checkbox>
                    <div class="schedule-day-fields">
                      <ion-input class="day-start" fill="outline" type="time" label="Inicio" label-placement="floating" value="09:00"></ion-input>
                      <ion-input class="day-end" fill="outline" type="time" label="Fin" label-placement="floating" value="18:00"></ion-input>
                      <span class="schedule-break">Descanso opcional</span>
                      <ion-input class="day-break-start" fill="outline" type="time" label="Inicio descanso" label-placement="floating"></ion-input>
                      <ion-input class="day-break-end" fill="outline" type="time" label="Fin descanso" label-placement="floating"></ion-input>
                    </div>
                  </div>
                  <div class="schedule-day" data-day="3">
                    <ion-checkbox class="day-working" label-placement="end" checked><span>Jueves</span></ion-checkbox>
                    <div class="schedule-day-fields">
                      <ion-input class="day-start" fill="outline" type="time" label="Inicio" label-placement="floating" value="09:00"></ion-input>
                      <ion-input class="day-end" fill="outline" type="time" label="Fin" label-placement="floating" value="18:00"></ion-input>
                      <span class="schedule-break">Descanso opcional</span>
                      <ion-input class="day-break-start" fill="outline" type="time" label="Inicio descanso" label-placement="floating"></ion-input>
                      <ion-input class="day-break-end" fill="outline" type="time" label="Fin descanso" label-placement="floating"></ion-input>
                    </div>
                  </div>
                  <div class="schedule-day" data-day="4">
                    <ion-checkbox class="day-working" label-placement="end" checked><span>Viernes</span></ion-checkbox>
                    <div class="schedule-day-fields">
                      <ion-input class="day-start" fill="outline" type="time" label="Inicio" label-placement="floating" value="09:00"></ion-input>
                      <ion-input class="day-end" fill="outline" type="time" label="Fin" label-placement="floating" value="18:00"></ion-input>
                      <span class="schedule-break">Descanso opcional</span>
                      <ion-input class="day-break-start" fill="outline" type="time" label="Inicio descanso" label-placement="floating"></ion-input>
                      <ion-input class="day-break-end" fill="outline" type="time" label="Fin descanso" label-placement="floating"></ion-input>
                    </div>
                  </div>
                  <div class="schedule-day" data-day="5">
                    <ion-checkbox class="day-working" label-placement="end"><span>Sábado</span></ion-checkbox>
                    <div class="schedule-day-fields" hidden>
                      <ion-input class="day-start" fill="outline" type="time" label="Inicio" label-placement="floating" value="09:00"></ion-input>
                      <ion-input class="day-end" fill="outline" type="time" label="Fin" label-placement="floating" value="18:00"></ion-input>
                      <span class="schedule-break">Descanso opcional</span>
                      <ion-input class="day-break-start" fill="outline" type="time" label="Inicio descanso" label-placement="floating"></ion-input>
                      <ion-input class="day-break-end" fill="outline" type="time" label="Fin descanso" label-placement="floating"></ion-input>
                    </div>
                  </div>
                  <div class="schedule-day" data-day="6">
                    <ion-checkbox class="day-working" label-placement="end"><span>Domingo</span></ion-checkbox>
                    <div class="schedule-day-fields" hidden>
                      <ion-input class="day-start" fill="outline" type="time" label="Inicio" label-placement="floating" value="09:00"></ion-input>
                      <ion-input class="day-end" fill="outline" type="time" label="Fin" label-placement="floating" value="18:00"></ion-input>
                      <span class="schedule-break">Descanso opcional</span>
                      <ion-input class="day-break-start" fill="outline" type="time" label="Inicio descanso" label-placement="floating"></ion-input>
                      <ion-input class="day-break-end" fill="outline" type="time" label="Fin descanso" label-placement="floating"></ion-input>
                    </div>
                  </div>
                </div>
                <p id="schedule-error" class="schedule-error" hidden></p>
                <ion-button type="submit" size="small">Crear horario</ion-button>
              </form>
            </ok-data-table>
          </div>
          <ion-toast id="schedule-toast" duration="2200" position="bottom"></ion-toast>
        `,
        setup(doc) {
          const memberSelect = doc.getElementById('schedule-member');
          const table = doc.getElementById('schedules-table');
          const form = doc.getElementById('schedule-form');
          const nameInput = doc.getElementById('schedule-name');
          const fromInput = doc.getElementById('schedule-from');
          const untilInput = doc.getElementById('schedule-until');
          const defaultInput = doc.getElementById('schedule-default');
          const error = doc.getElementById('schedule-error');
          const toast = doc.getElementById('schedule-toast');

          memberSelect.value = selectedMember;
          table.fill = true;
          table.addable = true;
          table.views = true;
          table.cardTitle = (row) => String(row.name ?? '—');
          table.cardIcon = () => 'calendar-number-outline';
          table.searchable = false;
          table.pageSize = 50;
          table.sort = 'is_default';
          table.sortDir = 'desc';
          table.labels = LABELS;
          table.columns = [
            { key: 'name', header: 'Horario', sortable:true },
            { key: 'is_default', header: 'Por defecto', sortable:true, format:(row) => Number(row.is_default) ? 'Sí' : '—' },
            { key: 'effective_from', header: 'Desde', sortable:true, format:(row) => row.effective_from || '—' },
            { key: 'effective_until', header: 'Hasta', sortable:true, format:(row) => row.effective_until || '—' },
            { key: 'is_active', header: 'Activo', sortable:true, format:(row) => Number(row.is_active) ? 'Sí' : 'No' },
          ];

          function emitQuery(queryName, payload) {
            doc.dispatchEvent(new CustomEvent('erplora:demo-query', {
              detail:{ queryName, payload }, bubbles:true,
            }));
          }

          function emitCommand(commandName, payload) {
            doc.dispatchEvent(new CustomEvent('erplora:demo-command', {
              detail:{ commandName, payload }, bubbles:true,
            }));
          }

          function queryPage() {
            let filtered = schedules.filter((schedule) => schedule.staff_id === selectedMember);
            filtered.sort((left, right) => {
              const a = left[state.sort] ?? '';
              const b = right[state.sort] ?? '';
              const result = String(a).localeCompare(String(b), 'es', { numeric:true });
              return state.dir === 'desc' ? -result : result;
            });
            const start = state.page * state.pageSize;
            table.page = state.page;
            table.pageSize = state.pageSize;
            table.sort = state.sort;
            table.sortDir = state.dir;
            table.total = filtered.length;
            table.rows = filtered.slice(start, start + state.pageSize);
          }

          function syncWeekFromForm() {
            week = [...form.querySelectorAll('.schedule-day')].map((row) => ({
              day:Number(row.dataset.day),
              label:row.querySelector('span')?.textContent ?? '',
              working:Boolean(row.querySelector('.day-working')?.checked),
              start:String(row.querySelector('.day-start')?.value ?? ''),
              end:String(row.querySelector('.day-end')?.value ?? ''),
              breakStart:String(row.querySelector('.day-break-start')?.value ?? ''),
              breakEnd:String(row.querySelector('.day-break-end')?.value ?? ''),
            }));
          }

          function validateWeek() {
            const active = week.filter((day) => day.working);
            if (!active.length) return 'Marca al menos un día de trabajo';
            for (const day of active) {
              if (!day.start || !day.end) return `${day.label}: indica hora de inicio y fin`;
              if (day.start >= day.end) return `${day.label}: la hora de inicio debe ser anterior a la de fin`;
              const hasBreakStart = Boolean(day.breakStart);
              const hasBreakEnd = Boolean(day.breakEnd);
              if (hasBreakStart !== hasBreakEnd) return `${day.label}: el descanso necesita inicio y fin (o ninguno)`;
              if (hasBreakStart && !(day.start <= day.breakStart && day.breakStart < day.breakEnd && day.breakEnd <= day.end)) {
                return `${day.label}: el descanso debe caer dentro del intervalo de trabajo`;
              }
            }
            return '';
          }

          form.querySelectorAll('.schedule-day').forEach((row) => {
            const checkbox = row.querySelector('.day-working');
            const fields = row.querySelector('.schedule-day-fields');
            checkbox.addEventListener('ionChange', (event) => {
              fields.hidden = !event.detail.checked;
            });
          });

          memberSelect.addEventListener('ionChange', (event) => {
            selectedMember = String(event.detail.value ?? '');
            state.page = 0;
            emitQuery('staff.schedules.list_for_member', { staff_id:selectedMember });
            queryPage();
          });
          table.addEventListener('pageChange', (event) => { state.page = Number(event.detail) || 0; queryPage(); });
          table.addEventListener('pageSizeChange', (event) => {
            state.pageSize = Number(event.detail) || 50; state.page = 0; queryPage();
          });
          table.addEventListener('sortChange', (event) => {
            state.sort = event.detail?.sort || 'is_default';
            state.dir = event.detail?.dir === 'asc' ? 'asc' : 'desc';
            queryPage();
          });

          form.addEventListener('submit', (event) => {
            event.preventDefault();
            syncWeekFromForm();
            const validationError = validateWeek();
            if (validationError) {
              error.textContent = validationError;
              error.hidden = false;
              return;
            }
            error.hidden = true;
            const payload = {
              staff_id:selectedMember,
              name:String(nameInput.value ?? '').trim() || 'Horario habitual',
              is_default:defaultInput.checked ? 1 : 0,
              effective_from:fromInput.value || null,
              effective_until:untilInput.value || null,
              working_hours:week.filter((day) => day.working).map((day) => ({
                day_of_week:day.day,
                start_time: day.start,
                end_time: day.end,
                break_start: day.breakStart || null,
                break_end: day.breakEnd || null,
                is_working:1,
              })),
            };
            schedules = [...schedules, {
              id:`schedule-demo-${Date.now()}`, staff_id:selectedMember, name:payload.name,
              is_default:payload.is_default, effective_from:payload.effective_from,
              effective_until:payload.effective_until, is_active:1,
            }];
            emitCommand('staff.schedules.create', payload);
            nameInput.value = '';
            fromInput.value = '';
            untilInput.value = '';
            table.close();
            toast.message = 'Horario creado.';
            toast.color = 'success';
            toast.isOpen = true;
            queryPage();
          });
          toast.addEventListener('didDismiss', () => { toast.isOpen = false; });

          emitQuery('staff.schedules.list_for_member', { staff_id:selectedMember });
          queryPage();
        },
      });
    </script>
  </body>
</html>
