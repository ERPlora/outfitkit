<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crear Cloud Hub - ERPlora Cloud</title>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/ok-inline-feedback.js"></script>
    <style>
      .stack { display:grid;gap:1rem; }
      .selling-points { display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem;text-align:center; }
      .selling-points iconify-icon { color:var(--ion-color-primary); }
      .selling-points h3 { margin:.5rem 0 .25rem;font-size:1rem; }
      .selling-points p,.helper { margin:0;color:var(--ion-color-medium);font-size:.84rem; }
      .section-head { display:flex;align-items:center;gap:.5rem;margin:0 0 1rem;font-size:1rem; }
      .form-stack { display:grid;gap:1rem; }
      .slug-preview { padding:.8rem 1rem;border-radius:.75rem;background:var(--ion-color-step-50);font-size:.85rem; }
      .billing-row { display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap; }
      .billing-row ion-segment { width:auto;min-width:14rem; }
      .plan-summary { padding:1rem;border:1px solid var(--ion-color-step-150);border-radius:.75rem;background:var(--ion-color-step-50); }
      .terms { display:flex;align-items:flex-start;gap:.75rem; }
      @media (max-width:700px) { .selling-points { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      const footer = `
        <footer id="section-tabbar"><ion-segment value="create" aria-label="Navegación de Hubs">
          <ion-segment-button value="active"><iconify-icon icon="lucide:check-circle" width="20" height="20"></iconify-icon><ion-label>Activo</ion-label></ion-segment-button>
          <ion-segment-button value="inactive"><iconify-icon icon="lucide:pause-circle" width="20" height="20"></iconify-icon><ion-label>Inactivo</ion-label></ion-segment-button>
          <ion-segment-button value="create"><iconify-icon icon="lucide:plus-circle" width="20" height="20"></iconify-icon><ion-label>Crear</ion-label></ion-segment-button>
          <ion-segment-button value="domain"><iconify-icon icon="lucide:globe" width="20" height="20"></iconify-icon><ion-label>Dominio</ion-label></ion-segment-button>
        </ion-segment></footer>`;

      defineSaasDashboardPage({
        active: '/dashboard/hubs/',
        title: 'Crear Cloud Hub',
        body: `
          <form id="create-hub-form" class="stack">
            <ion-card>
              <ion-card-content class="selling-points">
                <div><iconify-icon icon="lucide:cloud" width="32" height="32"></iconify-icon><h3>Despliegue Cloud</h3><p>Tu Hub desplegado en la nube y accesible desde cualquier dispositivo.</p></div>
                <div><iconify-icon icon="lucide:shield-check" width="32" height="32"></iconify-icon><h3>Seguro y fiable</h3><p>Backups automáticos, certificados SSL y 99,9 % de disponibilidad.</p></div>
                <div><iconify-icon icon="lucide:zap" width="32" height="32"></iconify-icon><h3>Configuración inmediata</h3><p>Tu Hub estará listo en menos de cinco minutos.</p></div>
              </ion-card-content>
            </ion-card>
            <ion-card>
              <ion-card-content>
                <h2 class="section-head"><iconify-icon icon="lucide:home" width="17" height="17"></iconify-icon>Detalles del Hub</h2>
                <div class="form-stack">
                  <ion-input id="hub-name" label="Nombre del Hub" label-placement="floating" fill="outline"
                             placeholder="Mi tienda principal" required></ion-input>
                  <div id="hub-slug-preview" class="slug-preview">La URL de tu Hub aparecerá aquí mientras escribes.</div>
                </div>
              </ion-card-content>
            </ion-card>
            <ok-inline-feedback tone="warning" heading="Datos del negocio">
              Configurarás la razón social, la dirección, el NIF y los ajustes del recibo en el asistente inicial del Hub.
            </ok-inline-feedback>
            <ion-card>
              <ion-card-content>
                <div class="billing-row">
                  <h2 class="section-head"><iconify-icon icon="lucide:tag" width="17" height="17"></iconify-icon>Plan de suscripción</h2>
                  <ion-segment id="billing-interval" value="month">
                    <ion-segment-button value="month"><ion-label>Mensual</ion-label></ion-segment-button>
                    <ion-segment-button value="year"><ion-label>Anual · -17 %</ion-label></ion-segment-button>
                  </ion-segment>
                </div>
                <div class="form-stack">
                  <ion-select id="plan-select" label="Plan" label-placement="floating" fill="outline" interface="popover" value="standard">
                    <ion-select-option value="lite">Lite</ion-select-option>
                    <ion-select-option value="standard">Standard · Más popular</ion-select-option>
                    <ion-select-option value="pro">Pro</ion-select-option>
                  </ion-select>
                  <div class="plan-summary"><strong id="plan-name">Standard</strong><p class="helper" id="plan-price">49,00 € / mes</p></div>
                </div>
              </ion-card-content>
            </ion-card>
            <ion-card>
              <ion-card-content>
                <h2 class="section-head"><iconify-icon icon="lucide:credit-card" width="17" height="17"></iconify-icon>Método de pago</h2>
                <ion-radio-group value="stripe">
                  <ion-item lines="none"><ion-radio value="stripe" justify="space-between">Tarjeta de crédito/débito (Stripe)<small style="display:block">Visa, Mastercard, American Express</small></ion-radio></ion-item>
                </ion-radio-group>
              </ion-card-content>
            </ion-card>
            <ion-card>
              <ion-card-content class="terms">
                <ion-checkbox id="accept-terms" aria-label="Aceptar términos"></ion-checkbox>
                <ion-label>Acepto los términos y condiciones</ion-label>
              </ion-card-content>
            </ion-card>
            <ion-button type="submit" expand="block"><iconify-icon slot="start" icon="lucide:credit-card" width="16" height="16"></iconify-icon>Continuar al pago</ion-button>
          </form>
        `,
        footer,
        setup(doc) {
          const form = doc.getElementById('create-hub-form');
          const name = doc.getElementById('hub-name');
          const preview = doc.getElementById('hub-slug-preview');
          const plan = doc.getElementById('plan-select');
          const billing = doc.getElementById('billing-interval');
          const prices = { lite: [19, 190], standard: [49, 490], pro: [89, 890] };
          const syncSlug = () => {
            const slug = String(name?.value || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
            preview.textContent = slug ? `https://${slug}.erplora.com` : 'La URL de tu Hub aparecerá aquí mientras escribes.';
          };
          const syncPrice = () => {
            const selected = String(plan?.value || 'standard');
            const yearly = billing?.value === 'year';
            doc.getElementById('plan-name').textContent = selected.charAt(0).toUpperCase() + selected.slice(1);
            doc.getElementById('plan-price').textContent = `${prices[selected][yearly ? 1 : 0].toFixed(2).replace('.', ',')} € / ${yearly ? 'año' : 'mes'}`;
          };
          name?.addEventListener('ionInput', syncSlug);
          plan?.addEventListener('ionChange', syncPrice);
          billing?.addEventListener('ionChange', syncPrice);
          form?.addEventListener('submit', (event) => event.preventDefault());
        },
      });
    </script>
  </body>
</html>
