<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Crear hub</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* Geometría puntual de esta vista (estructura, sin colores de marca). */

      /* Stepper wrapper — separa visualmente del formulario */
      .ui-stepper-wrap {
        margin-bottom: 24px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
      }

      /* Cabecera del formulario dentro del wizard */
      .ui-wizard-title { margin: 0 0 4px; font-size: 1.15rem; font-weight: 700; }
      .ui-wizard-sub { margin: 0 0 20px; color: var(--ion-color-medium); font-size: .9rem; }

      /* Campos del formulario */
      .ui-fields { display: flex; flex-direction: column; gap: 20px; }
      .ui-label { display: block; font-weight: 600; font-size: .9rem; margin-bottom: 6px; }
      .ui-label--req::after { content: " *"; color: var(--ion-color-danger); }
      .ui-hint { display: block; margin-top: 6px; font-size: .78rem; color: var(--ion-color-medium); }
      .ui-hint--ok { color: var(--ion-color-success); display: flex; align-items: center; gap: 5px; }
      .ui-hint--error { color: var(--ion-color-danger); }

      /* Campo de subdominio con sufijo */
      .ui-domain-group {
        display: flex; align-items: stretch; gap: 0;
      }
      .ui-domain-group ion-input {
        flex: 1 1 auto;
        --border-radius: 8px 0 0 8px;
      }
      .ui-domain-suffix {
        display: flex; align-items: center; padding: 0 12px;
        background: var(--ion-color-step-100, rgba(127,127,127,.12));
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.3));
        border-left: 0;
        border-radius: 0 8px 8px 0;
        font-size: .88rem;
        color: var(--ion-color-medium);
        white-space: nowrap;
        font-family: var(--ion-font-family-mono, monospace);
      }

      /* Tarjetas de radio (tipo de hub) */
      .ui-radio-cards { display: flex; flex-wrap: wrap; gap: 10px; }
      .ui-radio-card { margin: 0; flex: 1 1 auto; min-width: 140px; }
      .ui-radio-card ion-radio { width: 100%; }
      .ui-radio-card__title { font-weight: 600; font-size: .9rem; }
      .ui-radio-card__desc { color: var(--ion-color-medium); font-size: .8rem; margin-top: 3px; }

      /* Panel lateral (URL preview + coste) */
      .ui-card-title { font-size: 1rem; font-weight: 700; }
      .ui-card-sub { color: var(--ion-color-medium); font-size: .8rem; margin-top: 2px; }

      /* Vista previa de URL (estilo barra de navegador) */
      .ui-url-bar {
        display: flex; align-items: center; gap: 8px;
        padding: 10px 12px;
        border: 1px solid var(--ion-border-color, rgba(127,127,127,.25));
        border-radius: 8px;
        background: var(--ion-color-step-50, rgba(127,127,127,.05));
        font-family: var(--ion-font-family-mono, monospace);
        font-size: .8rem;
      }
      .ui-url-bar__scheme { color: var(--ion-color-medium); }
      .ui-url-bar__slug { font-weight: 700; color: var(--ion-color-primary); }
      .ui-url-bar__domain { color: var(--ion-color-step-700, rgba(127,127,127,.8)); }
      .ui-url-hint { margin-top: 10px; font-size: .78rem; color: var(--ion-color-medium); }

      /* Tabla de costes */
      .ui-cost { display: flex; flex-direction: column; gap: 8px; font-size: .88rem; }
      .ui-cost__row { display: flex; justify-content: space-between; align-items: center; }
      .ui-cost__label { color: var(--ion-color-medium); }
      .ui-cost__val { font-variant-numeric: tabular-nums; }
      .ui-cost__val--incl { color: var(--ion-color-success); }
      .ui-cost__total {
        display: flex; justify-content: space-between; align-items: center;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.25));
        padding-top: 10px; margin-top: 6px;
      }
      .ui-cost__total-label { font-weight: 600; }
      .ui-cost__total-val { font-size: 1.1rem; font-weight: 700; font-variant-numeric: tabular-nums; }
      .ui-cost__vat { font-size: .72rem; color: var(--ion-color-medium); margin-top: 4px; }

      /* Footer del wizard */
      .ui-wizard-foot {
        display: flex; align-items: center; justify-content: space-between;
        flex-wrap: wrap; gap: 12px;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
      }
      .ui-wizard-foot__meta {
        font-size: .8rem; color: var(--ion-color-medium);
      }
      .ui-wizard-foot__actions { display: flex; gap: 10px; }

      /* Dos columnas de campos en el mismo renglón */
      .ui-field-row {
        display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      }
      @media (max-width: 560px) {
        .ui-field-row { grid-template-columns: 1fr; }
        .ui-radio-cards { flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Crear nuevo hub"
            description="Paso 2 de 5 · Nombre y dominio">
            <div slot="actions">
              <ion-button fill="clear" size="small">Cancelar</ion-button>
              <ion-button fill="outline" size="small">Guardar borrador</ion-button>
            </div>
          </ok-page-header>

          <!-- ── Stepper ── -->
          <div class="ui-stepper-wrap">
            <ok-stepper id="wizard-stepper" current="1"></ok-stepper>
          </div>

          <!-- ── Cuerpo del wizard: formulario (izq) + panel lateral (dcha) ── -->
          <div class="pg-cols" style="align-items: start">

            <!-- IZQUIERDA · formulario -->
            <ion-card>
              <ion-card-content>
                <h2 class="ui-wizard-title">Identifica tu nuevo hub</h2>
                <p class="ui-wizard-sub">Elige un nombre, un subdominio y la región donde se desplegará. Puedes añadir un dominio personalizado más adelante.</p>

                <div class="ui-fields">

                  <!-- Nombre del hub + Etiqueta interna -->
                  <div class="ui-field-row">
                    <div>
                      <label class="ui-label ui-label--req">Nombre del hub</label>
                      <ion-input
                        id="hub-name"
                        fill="outline"
                        value="Acme Tienda 2"
                        placeholder="ej. Tienda Norte"></ion-input>
                      <small class="ui-hint">Visible en facturación y en el topbar.</small>
                    </div>
                    <div>
                      <label class="ui-label">Etiqueta interna</label>
                      <ion-input
                        fill="outline"
                        placeholder="opcional · ej. tienda-norte"></ion-input>
                      <small class="ui-hint">Solo visible para el equipo.</small>
                    </div>
                  </div>

                  <!-- Subdominio -->
                  <div>
                    <label class="ui-label ui-label--req">Subdominio</label>
                    <div class="ui-domain-group">
                      <ion-input
                        id="hub-slug"
                        fill="outline"
                        value="acme-tienda-2"
                        placeholder="mi-hub"
                        style="--border-radius: 8px 0 0 8px"></ion-input>
                      <div class="ui-domain-suffix">.erplora.cloud</div>
                    </div>
                    <small class="ui-hint ui-hint--ok" id="slug-ok">
                      <ion-icon name="checkmark-circle" style="font-size:13px"></ion-icon>
                      Subdominio disponible
                    </small>
                    <small class="ui-hint ui-hint--error" id="slug-err" hidden>Subdominio ya en uso</small>
                  </div>

                  <!-- Dominio personalizado -->
                  <div>
                    <label class="ui-label">Dominio personalizado (opcional)</label>
                    <ion-input
                      fill="outline"
                      placeholder="ej. pos.acme.com"></ion-input>
                    <small class="ui-hint">
                      Necesitarás añadir un registro CNAME apuntando a
                      <code style="font-family:monospace;background:var(--ion-color-step-100);padding:1px 5px;border-radius:3px;font-size:11px">cname.erplora.cloud</code>.
                    </small>
                  </div>

                  <!-- Región -->
                  <div>
                    <label class="ui-label ui-label--req">Región</label>
                    <ion-select
                      id="hub-region"
                      fill="outline"
                      interface="popover"
                      value="eu-west-1"
                      label-placement="stacked">
                      <ion-select-option value="eu-west-1">EU-West-1 · Irlanda (recomendado para España)</ion-select-option>
                      <ion-select-option value="eu-central-1">EU-Central-1 · Frankfurt</ion-select-option>
                      <ion-select-option value="eu-south-1">EU-South-1 · Milán</ion-select-option>
                      <ion-select-option value="us-east-1">US-East-1 · Virginia</ion-select-option>
                      <ion-select-option value="us-west-2">US-West-2 · Oregón</ion-select-option>
                    </ion-select>
                    <small class="ui-hint">La región no se puede cambiar tras la creación.</small>
                  </div>

                  <!-- Tipo de hub (radio-cards) -->
                  <div>
                    <label class="ui-label ui-label--req">Tipo de hub</label>
                    <ion-radio-group id="hub-type" value="prod" class="ui-radio-cards">
                      <ion-card class="ui-radio-card">
                        <ion-card-content>
                          <ion-radio value="prod" label-placement="end" justify="start">
                            <span class="ui-radio-card__title">Producción</span>
                            <span class="ui-radio-card__desc">SLA 99,9% · backups diarios · soporte 24h.</span>
                          </ion-radio>
                        </ion-card-content>
                      </ion-card>
                      <ion-card class="ui-radio-card">
                        <ion-card-content>
                          <ion-radio value="staging" label-placement="end" justify="start">
                            <span class="ui-radio-card__title">Test / Staging</span>
                            <span class="ui-radio-card__desc">Entorno aislado para pruebas · sin SLA.</span>
                          </ion-radio>
                        </ion-card-content>
                      </ion-card>
                      <ion-card class="ui-radio-card">
                        <ion-card-content>
                          <ion-radio value="demo" label-placement="end" justify="start">
                            <span class="ui-radio-card__title">Demo</span>
                            <span class="ui-radio-card__desc">Datos de ejemplo precargados · 30 días.</span>
                          </ion-radio>
                        </ion-card-content>
                      </ion-card>
                    </ion-radio-group>
                  </div>

                </div>
              </ion-card-content>
            </ion-card>

            <!-- DERECHA · panel de vista previa y costes -->
            <div class="pg-stack">

              <!-- Vista previa de URL -->
              <ion-card>
                <ion-card-header>
                  <ion-card-title class="ui-card-title">Vista previa de URL</ion-card-title>
                  <div class="ui-card-sub">Así verán el hub tus usuarios.</div>
                </ion-card-header>
                <ion-card-content>
                  <div class="ui-url-bar">
                    <ion-icon name="lock-closed-outline" color="success" style="font-size:13px;flex:0 0 auto"></ion-icon>
                    <span class="ui-url-bar__scheme">https://</span><span class="ui-url-bar__slug" id="url-slug">acme-tienda-2</span><span class="ui-url-bar__domain">.erplora.cloud</span>
                  </div>
                  <p class="ui-url-hint">SSL automático · activo en menos de 2 minutos.</p>
                </ion-card-content>
              </ion-card>

              <!-- Cambios estimados (coste) -->
              <ion-card>
                <ion-card-header>
                  <ion-card-title class="ui-card-title">Cambios estimados</ion-card-title>
                  <div class="ui-card-sub">Coste mensual del nuevo hub.</div>
                </ion-card-header>
                <ion-card-content>
                  <div class="ui-cost">
                    <div class="ui-cost__row">
                      <span class="ui-cost__label">Plan Pro</span>
                      <span class="ui-cost__val">49,00 €</span>
                    </div>
                    <div class="ui-cost__row">
                      <span class="ui-cost__label">Terminales (1 incluido)</span>
                      <span class="ui-cost__val ui-cost__val--incl">incluido</span>
                    </div>
                    <div class="ui-cost__row">
                      <span class="ui-cost__label">Región EU-West-1</span>
                      <span class="ui-cost__val ui-cost__val--incl">incluido</span>
                    </div>
                    <div class="ui-cost__row">
                      <span class="ui-cost__label">Dominio personalizado</span>
                      <span class="ui-cost__val">+ 4,00 €</span>
                    </div>
                    <div class="ui-cost__total">
                      <span class="ui-cost__total-label">Total mensual</span>
                      <span class="ui-cost__total-val">53,00 €</span>
                    </div>
                    <p class="ui-cost__vat">IVA no incluido · facturación mensual.</p>
                  </div>
                </ion-card-content>
              </ion-card>

              <!-- Callout info: primer mes gratuito -->
              <ok-inline-feedback
                tone="info"
                heading="Primer mes gratuito">
                El primer mes es gratuito. Puedes cancelar antes y no se cobrará nada.
              </ok-inline-feedback>

            </div>

          </div>

          <!-- ── Footer de navegación del wizard ── -->
          <div class="ui-wizard-foot">
            <span class="ui-wizard-foot__meta">Paso 2 de 5 · <span id="foot-slug">acme-tienda-2</span>.erplora.cloud</span>
            <div class="ui-wizard-foot__actions">
              <ion-button fill="outline">
                <ion-icon slot="start" name="arrow-back-outline"></ion-icon>
                Atrás
              </ion-button>
              <ion-button>
                Siguiente
                <ion-icon slot="end" name="arrow-forward-outline"></ion-icon>
              </ion-button>
            </div>
          </div>
        `,
        setup(doc) {
          // ── ok-stepper: pasos del wizard ──
          const stepper = doc.getElementById('wizard-stepper');
          if (stepper) {
            stepper.steps = [
              { label: 'Organización', description: 'Acme Industries' },
              { label: 'Nombre y dominio', description: 'En curso' },
              { label: 'Plan', description: 'Pro · Enterprise' },
              { label: 'Módulos iniciales', description: 'POS · Stock · …' },
              { label: 'Pago', description: 'Confirmar' },
            ];
            stepper.labels = { stepCount: 'Paso {n} de {total}' };
          }

          // ── Sincronizar slug entre el input, la URL preview y el footer ──
          const slugInput = doc.getElementById('hub-slug');
          const urlSlug  = doc.getElementById('url-slug');
          const footSlug = doc.getElementById('foot-slug');
          const slugOk   = doc.getElementById('slug-ok');
          const slugErr  = doc.getElementById('slug-err');

          // Slugs "en uso" (mock de validación)
          const TAKEN = new Set(['acme-prod', 'bodegas-casadejus', 'ferreteria-puig']);

          function updateSlug(val) {
            const slug = (val || '').trim().toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-');
            if (urlSlug)  urlSlug.textContent  = slug || '…';
            if (footSlug) footSlug.textContent = slug || '…';
            const taken = TAKEN.has(slug);
            if (slugOk)  slugOk.hidden  = taken || !slug;
            if (slugErr) slugErr.hidden = !taken;
          }

          if (slugInput) {
            slugInput.addEventListener('ionInput', (e) => {
              updateSlug(e.detail && e.detail.value != null ? e.detail.value : (slugInput.value || ''));
            });
            // Estado inicial
            updateSlug('acme-tienda-2');
          }
        },
      });
    </script>
  </body>
</html>
