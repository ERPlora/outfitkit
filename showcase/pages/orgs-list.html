<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Organizaciones</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';
      import { html as h } from 'lit';

      const ORGS = [
        {
          name: 'Acme Industries SL',
          sector: 'Manufactura ligera',
          members: 12,
          hubs: 5,
          plan: 'Business',
          planColor: 'primary',
          rol: 'Owner',
          rolColor: 'primary',
          current: true,
        },
        {
          name: 'Bodegas Casadejus',
          sector: 'Vinos y crianza',
          members: 7,
          hubs: 3,
          plan: 'Pro',
          planColor: 'tertiary',
          rol: 'Admin',
          rolColor: 'primary',
          current: false,
        },
        {
          name: 'Pastelerías Mariola',
          sector: 'Repostería artesanal',
          members: 6,
          hubs: 2,
          plan: 'Pro',
          planColor: 'tertiary',
          rol: 'Member',
          rolColor: 'medium',
          current: false,
        },
        {
          name: 'Logística Peninsular',
          sector: 'Transporte y almacén',
          members: 3,
          hubs: 2,
          plan: 'Enterprise',
          planColor: 'dark',
          rol: 'Admin',
          rolColor: 'primary',
          current: false,
        },
      ];

      definePage({
        active: 'orgs',
        search: 'Buscar organizaciones, hubs…',
        bare: true,
        body: `
          <ok-page-header
            heading="Organizaciones"
            description="4 organizaciones en tu cuenta">
            <ion-button slot="actions">
              <ion-icon slot="start" name="add-outline"></ion-icon>
              Crear organización
            </ion-button>
          </ok-page-header>

          <ok-data-table id="orgs-dt" style="display:block"></ok-data-table>
        `,
        setup(doc) {
          const dt = doc.getElementById('orgs-dt');

          dt.rowKey = (r) => r.name;
          dt.columns = [
            {
              key: 'name',
              header: 'Organización',
              width: 'minmax(14rem,1.5fr)',
              render: (r) => h`
                <span style="display:inline-flex;align-items:center;gap:.6rem">
                  <ok-avatar name=${r.name} size="sm" tone=${r.current ? 'primary' : 'auto'}></ok-avatar>
                  <span>
                    <span style="font-weight:600">${r.name}</span>
                    ${r.current ? h`<ion-badge style="margin-left:.4rem;--background:color-mix(in srgb, var(--ion-color-success) 15%, transparent);--color:var(--ion-color-success);--padding-top:3px;--padding-bottom:3px">Tu org</ion-badge>` : ''}
                  </span>
                </span>`,
            },
            { key: 'sector', header: 'Sector', width: 'minmax(10rem,1fr)' },
            { key: 'members', header: 'Miembros', width: '7rem', align: 'right' },
            { key: 'hubs', header: 'Hubs', width: '5rem', align: 'right' },
            {
              key: 'plan',
              header: 'Plan',
              width: '8rem',
              render: (r) => {
                const c = r.planColor;
                return h`<ion-badge style="--background:color-mix(in srgb, var(--ion-color-${c}) 15%, transparent);--color:var(--ion-color-${c});--padding-top:5px;--padding-bottom:5px">${r.plan}</ion-badge>`;
              },
            },
            {
              key: 'rol',
              header: 'Rol',
              width: '7rem',
              render: (r) => {
                const c = r.rolColor;
                return h`<ion-badge style="--background:color-mix(in srgb, var(--ion-color-${c}) 15%, transparent);--color:var(--ion-color-${c});--padding-top:5px;--padding-bottom:5px">${r.rol}</ion-badge>`;
              },
            },
          ];
          dt.actions = [
            { id: 'open', icon: 'open-outline', label: 'Abrir organización', color: 'primary' },
          ];
          dt.rows = ORGS;

          dt.addEventListener('rowAction', (e) => {
            const { actionId, row } = e.detail || {};
            if (actionId !== 'open') return;
            const t = document.createElement('ion-toast');
            t.message = `Abriendo ${row?.name ?? 'organización'}…`;
            t.duration = 1200;
            t.position = 'bottom';
            document.body.appendChild(t);
            t.present();
            t.addEventListener('didDismiss', () => t.remove());
          });
        },
      });
    </script>
  </body>
</html>
