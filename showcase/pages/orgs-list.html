<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Organizaciones</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>

    <style>
      .role-filter {
        width: min(100%, 185px);
        min-height: 36px;
      }

      ok-data-table[fill] {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      // Datos representativos con el mismo contrato que OrganizationMember del SaaS.
      const ORGANIZATIONS = [
        { id: 'org-1', name: 'Demo Partner', slug: 'demo-partner', hubs: 3, members: 8, role: 'Propietario', roleValue: 'owner', joinedAt: '2025-01-12' },
        { id: 'org-2', name: 'Comercial Rambla', slug: 'comercial-rambla', hubs: 2, members: 5, role: 'Administrador', roleValue: 'admin', joinedAt: '2025-03-04' },
        { id: 'org-3', name: 'Servicios Norte', slug: 'servicios-norte', hubs: 1, members: 4, role: 'Miembro', roleValue: 'member', joinedAt: '2025-05-18' },
      ];

      const formatDate = (iso) => new Date(iso).toLocaleDateString('es-ES', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
      });

      function organizationCell(row) {
        const wrap = document.createElement('span');
        wrap.style.cssText = 'display:flex;align-items:center;gap:.65rem;min-width:0';

        const avatar = document.createElement('span');
        avatar.textContent = String(row.name || '?').charAt(0).toUpperCase();
        avatar.style.cssText =
          'display:grid;place-items:center;flex:none;width:34px;height:34px;border-radius:999px;' +
          'font-size:12px;font-weight:700;color:var(--ion-color-primary);' +
          'background:color-mix(in srgb,var(--ion-color-primary) 15%,transparent)';

        const copy = document.createElement('span');
        copy.style.cssText = 'display:grid;min-width:0';
        const name = document.createElement('strong');
        name.textContent = row.name;
        const slug = document.createElement('small');
        slug.textContent = row.slug;
        slug.style.color = 'var(--ion-color-medium)';
        copy.append(name, slug);
        wrap.append(avatar, copy);
        return wrap;
      }

      function roleCell(row) {
        const badge = document.createElement('ion-badge');
        const tone = row.roleValue === 'owner' ? 'primary' : row.roleValue === 'admin' ? 'warning' : 'medium';
        badge.textContent = row.role;
        badge.style.cssText =
          `--background:color-mix(in srgb,var(--ion-color-${tone}) 15%,transparent);` +
          `--color:var(--ion-color-${tone});--padding-top:5px;--padding-bottom:5px`;
        return badge;
      }

      defineSaasDashboardPage({
        active: '/dashboard/organizations/',
        title: 'Organizaciones',
        body: `
          <div class="dash-fill">
            <ok-data-table id="organizations-dt" server-side fill>
              <ion-select id="organizations-role-filter" class="role-filter" slot="toolbar"
                          interface="popover" aria-label="Rol" value="">
                <ion-select-option value="">Todos los roles</ion-select-option>
                <ion-select-option value="owner">Propietario</ion-select-option>
                <ion-select-option value="admin">Administrador</ion-select-option>
                <ion-select-option value="member">Miembro</ion-select-option>
              </ion-select>
            </ok-data-table>
          </div>
        `,
        setup(doc) {
          const table = doc.getElementById('organizations-dt');
          const roleFilter = doc.getElementById('organizations-role-filter');

          table.columns = [
            { key: 'name', header: 'Organización', sortable: true, render: organizationCell },
            { key: 'hubs', header: 'Hubs', align: 'left' },
            { key: 'members', header: 'Miembros', align: 'left' },
            { key: 'role', header: 'Rol', render: roleCell },
            { key: 'joinedAt', header: 'Alta', sortable: true, format: (row) => formatDate(row.joinedAt) },
          ];
          table.rows = ORGANIZATIONS;
          table.rowKey = (row) => row.id;
          table.searchKeys = ['name', 'slug'];
          table.searchPlaceholder = 'Buscar organizaciones…';
          table.primaryAction = { label: 'Nueva organización', icon: 'add' };
          table.actions = [{ id: 'view', label: 'Ver', icon: 'eye-outline' }];
          table.pageSize = 10;
          table.pageSizes = [10, 25, 50];

          const roles = [
            { value: 'owner', label: 'Propietario' },
            { value: 'admin', label: 'Administrador' },
            { value: 'member', label: 'Miembro' },
          ];
          table.columns[3].options = roles;

          roleFilter?.addEventListener('ionChange', (event) => {
            const role = event.detail.value;
            table.rows = role
              ? ORGANIZATIONS.filter((organization) => organization.roleValue === role)
              : ORGANIZATIONS;
          });
        },
      });
    </script>
  </body>
</html>
