<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Error de arranque</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <ok-error-page
            id="err-bootstrap"
            mode="bootstrap"
            variant="danger"
            code="Bootstrap failed"
            title="El Hub no ha podido arrancar"
            message="Una de las dependencias del sistema falló durante la inicialización. Revisa el diagnóstico para identificar el problema."
            retry-label="Reintento automático en"
            retry-seconds="60"
            details-label="Ver log técnico"
            meta="trace · 4f2a-bootstrap-3b81 · 2026-05-08 14:33 UTC"
            trace="[14:32:18] bootstrap: starting…
[14:32:18] db: connected (sqlite at /var/erplora/hub.db)
[14:32:21] migrations: applied 3 pending migrations
[14:32:21] cloud-sync: connecting to https://acme.erplora.cloud
[14:32:51] cloud-sync: ERROR: connection timeout after 30s
[14:32:51] cloud-sync: retrying… (1/3)
[14:33:21] cloud-sync: ERROR: connection timeout after 30s
[14:33:21] bootstrap: aborting — cloud sync required for first start

Trace ID:  4f2a-bootstrap-3b81-9c2e">

            <div slot="actions">
              <ion-button fill="outline" href="/errors/bootstrap-detail.html">
                <ion-icon slot="start" name="document-text-outline"></ion-icon>
                Ver detalle
              </ion-button>
              <ion-button id="btn-retry" color="danger">
                <ion-icon slot="start" name="refresh-outline"></ion-icon>
                Reintentar ahora
              </ion-button>
            </div>
          </ok-error-page>
        `,
        setup(doc) {
          const errPage = doc.getElementById('err-bootstrap');

          // Verificaciones de salud del arranque
          errPage.checks = [
            {
              name: 'Conexión a base de datos local',
              status: 'ok',
              time: '142 ms',
            },
            {
              name: 'Migraciones pendientes aplicadas',
              status: 'ok',
              time: '3.2 s',
            },
            {
              name: 'Sincronización con ERPlora Cloud',
              status: 'fail',
              message: 'connection timeout after 30s (3 reintentos)',
              time: 'timeout',
            },
            {
              name: 'Carga de módulos instalados',
              status: 'pending',
              time: 'esperando',
            },
            {
              name: 'Verificación de licencia',
              // "skip" no existe en el tipo OkErrorCheckStatus — se usa 'pending'
              // como lo más cercano visualmente (estado neutral/omitido).
              status: 'pending',
              message: 'omitido — depende de la sincronización con Cloud',
              time: 'omitido',
            },
          ];

          // Tiles de atajos rápidos
          errPage.shortcuts = [
            {
              title: 'Diagnóstico de red',
              href: '/diag/',
              icon: 'pulse-outline',
            },
            {
              title: 'Configurar Bridge',
              href: '/system/bridge-setup/',
              icon: 'settings-outline',
            },
            {
              title: 'Guía de arranque',
              href: '/help/bootstrap/',
              icon: 'help-circle-outline',
            },
          ];

          // Reintento manual: recarga la página
          const btnRetry = doc.getElementById('btn-retry');
          if (btnRetry) {
            btnRetry.addEventListener('click', () => {
              location.reload();
            });
          }

          // Cuando la cuenta atrás llega a 0, ok-error-page emite ok-retry
          errPage.addEventListener('ok-retry', () => {
            location.reload();
          });
        },
      });
    </script>
  </body>
</html>
