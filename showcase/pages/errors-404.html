<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · 404 — Página no encontrada</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <ok-error-page
            id="err-404"
            variant="info"
            code="404 · Not found"
            title="No hemos podido encontrar esta página"
            message="La URL que has seguido puede estar rota o el recurso ha sido movido. Prueba a buscar lo que necesitas o vuelve al inicio."
            meta="trace · 7a8b-4f12-2d · 2026-05-08 14:32 UTC">

            <!-- Buscador en slot "search" -->
            <ion-searchbar
              slot="search"
              id="err-search"
              placeholder="Buscar en ERPlora…"
              search-icon="search-outline"
              show-clear-button="focus">
            </ion-searchbar>

            <!-- Acciones principales -->
            <ion-button slot="actions" fill="outline" id="btn-back">
              <ion-icon slot="start" name="arrow-back-outline"></ion-icon>
              Atrás
            </ion-button>
            <ion-button slot="actions" href="/">
              <ion-icon slot="start" name="home-outline"></ion-icon>
              Volver al inicio
            </ion-button>

          </ok-error-page>
        `,
        setup(doc) {
          // Atajos (shortcuts) — asignados por prop JS (CSP-safe).
          const errPage = doc.getElementById('err-404');
          if (errPage) {
            errPage.shortcuts = [
              {
                title: 'Inicio',
                desc: 'Ir al panel principal',
                href: '/',
                icon: 'home-outline',
              },
              {
                title: 'Dashboard',
                desc: 'Vista general de tu cuenta',
                href: '/dashboard/',
                icon: 'grid-outline',
              },
              {
                title: 'Centro de ayuda',
                desc: 'Documentación y soporte',
                href: '/help/',
                icon: 'help-circle-outline',
              },
              {
                title: 'Estado del sistema',
                desc: 'Incidencias y disponibilidad',
                href: '/status/',
                icon: 'pulse-outline',
              },
            ];
          }

          // Botón "Atrás" — navega usando history.back() (CSP-safe, sin inline handler).
          const btnBack = doc.getElementById('btn-back');
          if (btnBack) {
            btnBack.addEventListener('click', () => {
              history.back();
            });
          }

          // Buscador — enter/ionChange redirige a búsqueda (demo sin navegación real).
          const searchBar = doc.getElementById('err-search');
          if (searchBar) {
            searchBar.addEventListener('keydown', (e) => {
              if (e.key === 'Enter') {
                const q = searchBar.value || '';
                if (q.trim()) {
                  // En la app real navegaría a /search/?q=…
                  console.info('[err-404] búsqueda:', q);
                }
              }
            });
          }
        },
      });
    </script>
  </body>
</html>
