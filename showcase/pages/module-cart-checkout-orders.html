<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERPlora Hub · Pedidos</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>

    <style>
      .cart-checkout-page { display: flex; flex-direction: column; height: 100%; min-height: 0; }
      .cart-checkout-page > ok-data-table { flex: 1 1 auto; min-height: 0; }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      // El módulo no publica seeds ni fixture de pedidos: estas filas de preview cubren los cuatro
      // estados cerrados de la migración y mantienen los importes en céntimos (ADR-0007).
      const ORDER_PREVIEW = [
        {
          "id": "checkout-1042",
          "cart_id": "c1",
          "order_number": "OS-20260718-1042",
          "customer_email": "ana@ejemplo.com",
          "shipping_method": "standard",
          "payment_method": "card",
          "status": "initiated",
          "placed_at": "2026-07-18T18:44:00Z",
          "paid_at": null,
          "completed_at": null,
          "total_amount": 3150,
          "currency": "EUR",
          "created_at": "2026-07-18T18:44:00Z"
        },
        {
          "id": "checkout-1041",
          "cart_id": "c3",
          "order_number": "OS-20260718-1041",
          "customer_email": "marta@ejemplo.com",
          "shipping_method": "pickup",
          "payment_method": "card",
          "status": "paid",
          "placed_at": "2026-07-18T15:49:00Z",
          "paid_at": "2026-07-18T15:50:00Z",
          "completed_at": null,
          "total_amount": 4825,
          "currency": "EUR",
          "created_at": "2026-07-18T15:49:00Z"
        },
        {
          "id": "checkout-1040",
          "cart_id": "c4",
          "order_number": "OS-20260718-1040",
          "customer_email": "lucia@ejemplo.com",
          "shipping_method": "standard",
          "payment_method": "transfer",
          "status": "completed",
          "placed_at": "2026-07-18T13:02:00Z",
          "paid_at": "2026-07-18T13:08:00Z",
          "completed_at": "2026-07-18T13:20:00Z",
          "total_amount": 2270,
          "currency": "EUR",
          "created_at": "2026-07-18T13:02:00Z"
        },
        {
          "id": "checkout-1039",
          "cart_id": "c5",
          "order_number": "OS-20260718-1039",
          "customer_email": "david@ejemplo.com",
          "shipping_method": "express",
          "payment_method": "card",
          "status": "failed",
          "placed_at": "2026-07-18T11:14:00Z",
          "paid_at": null,
          "completed_at": null,
          "total_amount": 6590,
          "currency": "EUR",
          "created_at": "2026-07-18T11:14:00Z"
        }
      ];

      const STATUS_LABELS = {
        initiated: 'Iniciado',
        paid: 'Pagado',
        failed: 'Fallido',
        completed: 'Completado',
      };
      let orders = ORDER_PREVIEW.map((row) => ({ ...row }));
      const state = { page: 0, pageSize: 50, sort: 'created_at', dir: 'desc', search: '', filters: {} };

      const formatMoney = (value, currency = 'EUR') => new Intl.NumberFormat('es-ES', {
        style: 'currency', currency,
      }).format((Number(value) || 0) / 100);

      function statusBadge(status) {
        const badge = document.createElement('ion-badge');
        badge.textContent = STATUS_LABELS[status] ?? status;
        badge.color = status === 'completed' ? 'success'
          : status === 'failed' ? 'danger'
            : status === 'paid' ? 'primary' : 'warning';
        return badge;
      }

      defineHubPage({
        active: '/m/cart_checkout/orders',
        title: 'Pedidos',
        body: `
          <div class="cart-checkout-page">
            <ok-data-table id="cart-checkout-orders-table" fill></ok-data-table>
          </div>
          <ion-toast id="cart-checkout-orders-toast" duration="2200" position="bottom"></ion-toast>
        `,
        setup(doc) {
          const table = doc.getElementById('cart-checkout-orders-table');
          const toast = doc.getElementById('cart-checkout-orders-toast');

          table.serverSide = true;
          table.fill = true;
          table.views = true;
          table.cardTitle = (row) => String(row.order_number || '—');
          table.cardIcon = () => 'receipt-outline';
          table.searchable = true;
          table.searchPlaceholder = 'Buscar pedido o email…';
          table.emptyMessage = 'Sin pedidos.';
          table.pageSize = 50;
          table.sort = 'created_at';
          table.sortDir = 'desc';
          table.columns = [
            { key: 'order_number', header: 'Pedido', sortable: true, filterable: true, filterType: 'text' },
            { key: 'customer_email', header: 'Email', sortable: true, filterable: true, filterType: 'text' },
            {
              key: 'status', header: 'Estado', sortable: true, filterable: true, filterType: 'select',
              options: [
                { value: 'initiated', label: 'Iniciado' },
                { value: 'paid', label: 'Pagado' },
                { value: 'failed', label: 'Fallido' },
                { value: 'completed', label: 'Completado' },
              ],
              render: (row) => statusBadge(row.status),
            },
            {
              key: 'payment_method', header: 'Pago', sortable: true, filterable: true,
              filterType: 'text', format: (row) => row.payment_method || '—',
            },
            {
              key: 'total_amount', header: 'Total', align: 'right', sortable: true,
              filterable: true, filterType: 'range', format: (row) => formatMoney(row.total_amount, row.currency || 'EUR'),
            },
          ];
          table.actions = [
            { id: 'pay', label: 'Marcar pagado', icon: 'card-outline', color: 'primary' },
            { id: 'complete', label: 'Completar', icon: 'checkmark-done-outline', color: 'success' },
            { id: 'fail', label: 'Fallar', icon: 'close-outline', color: 'danger' },
          ];

          function recordCommand(name, payload, message) {
            console.info('[showcase command]', name, payload);
            doc.dispatchEvent(new CustomEvent('erplora:preview-command', { detail: { name, payload } }));
            toast.message = message;
            toast.present();
          }

          function matchesRange(value, filter) {
            if (filter == null || filter === '') return true;
            if (typeof filter !== 'object') return String(value).includes(String(filter));
            const numeric = Number(value);
            const min = filter.min ?? filter.from;
            const max = filter.max ?? filter.to;
            return (min == null || min === '' || numeric >= Number(min))
              && (max == null || max === '' || numeric <= Number(max));
          }

          function queryPage() {
            const term = state.search.trim().toLocaleLowerCase('es');
            const filtered = orders
              .filter((order) => {
                if (term && !`${order.order_number} ${order.customer_email}`.toLocaleLowerCase('es').includes(term)) return false;
                return Object.entries(state.filters).every(([key, value]) => {
                  if (value == null || value === '' || (Array.isArray(value) && !value.length)) return true;
                  if (key === 'total_amount') return matchesRange(order[key], value);
                  if (Array.isArray(value)) return value.map(String).includes(String(order[key]));
                  return String(order[key] ?? '').toLocaleLowerCase('es').includes(String(value).toLocaleLowerCase('es'));
                });
              })
              .sort((left, right) => {
                const result = String(left[state.sort] ?? '').localeCompare(String(right[state.sort] ?? ''), 'es', { numeric: true });
                return state.dir === 'desc' ? -result : result;
              });
            const start = state.page * state.pageSize;
            table.rows = filtered.slice(start, start + state.pageSize);
            table.total = filtered.length;
            table.page = state.page;
            table.pageSize = state.pageSize;
            table.sort = state.sort;
            table.sortDir = state.dir;
          }

          table.addEventListener('rowAction', (event) => {
            const { actionId, row: order } = event.detail;
            if (actionId === 'pay') {
              recordCommand('cart_checkout.orders.mark_paid', { checkout_id: order.id }, 'Pedido marcado como pagado');
              orders = orders.map((current) => current.id === order.id
                ? { ...current, status: 'paid', paid_at: new Date().toISOString() }
                : current);
            } else if (actionId === 'complete') {
              recordCommand('cart_checkout.orders.complete', { checkout_id: order.id }, 'Pedido completado');
              orders = orders.map((current) => current.id === order.id
                ? { ...current, status: 'completed', completed_at: new Date().toISOString() }
                : current);
            } else if (actionId === 'fail') {
              recordCommand('cart_checkout.orders.fail', { checkout_id: order.id, reason: 'Cancelled by operator' }, 'Pedido marcado como fallido');
              orders = orders.map((current) => current.id === order.id ? { ...current, status: 'failed' } : current);
            } else return;
            queryPage();
          });

          table.addEventListener('pageChange', (event) => { state.page = Number(event.detail) || 0; queryPage(); });
          table.addEventListener('pageSizeChange', (event) => {
            state.pageSize = Number(event.detail) || 50;
            state.page = 0;
            queryPage();
          });
          table.addEventListener('sortChange', (event) => {
            state.sort = event.detail.sort;
            state.dir = event.detail.dir;
            queryPage();
          });
          table.addEventListener('searchChange', (event) => {
            state.search = String(event.detail || '');
            state.page = 0;
            queryPage();
          });
          table.addEventListener('filterChange', (event) => {
            state.filters[event.detail.col] = event.detail.value;
            state.page = 0;
            queryPage();
          });

          queryPage();
        },
      });
    </script>
  </body>
</html>
