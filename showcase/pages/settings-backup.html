<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Hub · Backup &amp; restauración</title>

    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />
  </head>
  <body>
    <!--
      SOBRIO como el Hub real (hub/apps/web/src/views/SettingsPage.vue):
      ok-page-header + ion-card con ion-list/ion-item para toggle+selects + ok-data-table para el historial.
      SIN chrome inventado: sin KPIs/stats, sin subtabs custom, sin barra de multi-filtro.
    -->
    <script type="module">
      import { definePage } from './_page.js';
      import { html as h } from 'lit';

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Backup &amp; restauración"
            description="Snapshots automáticos del Hub almacenados cifrados en S3">
            <ion-button slot="actions" fill="outline" size="small">
              <ion-icon slot="start" name="cloud-upload-outline"></ion-icon>
              Subir backup externo
            </ion-button>
            <ion-button slot="actions" size="small" id="btn-backup-now">
              <ion-icon slot="start" name="save-outline"></ion-icon>
              Backup ahora
            </ion-button>
          </ok-page-header>

          <!-- Configuración backup automático -->
          <ion-card class="pg-mb-4">
            <ion-card-header>
              <ion-card-title>Backup automático</ion-card-title>
              <ion-card-subtitle>Programación, intervalo y retención.</ion-card-subtitle>
            </ion-card-header>
            <ion-card-content class="ion-no-padding">
              <ion-list lines="none">
                <ion-item>
                  <ion-icon slot="start" name="sync-outline"></ion-icon>
                  <ion-label>
                    <h2>Activar backups automáticos</h2>
                    <p>Snapshot cifrado con AES-256 subido a S3 cada intervalo.</p>
                  </ion-label>
                  <ion-toggle id="auto-toggle" slot="end" checked></ion-toggle>
                </ion-item>

                <ion-item id="row-interval">
                  <ion-icon slot="start" name="time-outline"></ion-icon>
                  <ion-select
                    label="Intervalo"
                    label-placement="stacked"
                    fill="outline"
                    value="diario-03"
                    interface="popover">
                    <ion-select-option value="diario-03">Diario · 03:00</ion-select-option>
                    <ion-select-option value="6h">Cada 6 horas</ion-select-option>
                    <ion-select-option value="semanal-dom">Semanal · domingo</ion-select-option>
                  </ion-select>
                </ion-item>

                <ion-item id="row-retention">
                  <ion-icon slot="start" name="calendar-outline"></ion-icon>
                  <ion-select
                    label="Retención"
                    label-placement="stacked"
                    fill="outline"
                    value="14d"
                    interface="popover">
                    <ion-select-option value="7d">7 días</ion-select-option>
                    <ion-select-option value="14d">14 días</ion-select-option>
                    <ion-select-option value="30d">30 días</ion-select-option>
                    <ion-select-option value="90d">90 días</ion-select-option>
                  </ion-select>
                </ion-item>

                <ion-item id="row-encryption">
                  <ion-icon slot="start" name="lock-closed-outline"></ion-icon>
                  <ion-select
                    label="Cifrado"
                    label-placement="stacked"
                    fill="outline"
                    value="sse-kms"
                    interface="popover">
                    <ion-select-option value="sse-kms">AES-256 (S3 SSE-KMS)</ion-select-option>
                    <ion-select-option value="client">AES-256 (cliente)</ion-select-option>
                  </ion-select>
                </ion-item>
              </ion-list>
            </ion-card-content>
            <div style="display:flex;justify-content:flex-end;padding:8px 16px 16px">
              <ion-button fill="outline" size="small" id="btn-save-settings">
                <ion-icon slot="start" name="save-outline"></ion-icon>
                Guardar ajustes
              </ion-button>
            </div>
          </ion-card>

          <!-- Historial de backups -->
          <ok-data-table id="backup-dt" style="display:block"></ok-data-table>
        `,
        setup(doc) {
          // ── Toggle backup automático ──────────────────────────────────────────
          const autoToggle = doc.getElementById('auto-toggle');
          const autoRows = [
            doc.getElementById('row-interval'),
            doc.getElementById('row-retention'),
            doc.getElementById('row-encryption'),
          ];

          const applyAutoVisibility = () => {
            const enabled = autoToggle && autoToggle.checked;
            autoRows.forEach((r) => {
              if (r) r.style.display = enabled ? '' : 'none';
            });
          };

          if (autoToggle) {
            autoToggle.addEventListener('ionChange', applyAutoVisibility);
          }
          applyAutoVisibility();

          // ── Botón "Guardar ajustes" ───────────────────────────────────────────
          const btnSave = doc.getElementById('btn-save-settings');
          if (btnSave) {
            btnSave.addEventListener('click', () => {
              const t = document.createElement('ion-toast');
              t.message = 'Ajustes guardados.';
              t.duration = 1500;
              t.position = 'bottom';
              document.body.appendChild(t);
              t.present();
              t.addEventListener('didDismiss', () => t.remove());
            });
          }

          // ── Botón "Backup ahora" ──────────────────────────────────────────────
          const btnBackup = doc.getElementById('btn-backup-now');
          let creating = false;
          if (btnBackup) {
            btnBackup.addEventListener('click', () => {
              if (creating) return;
              creating = true;
              btnBackup.disabled = true;
              const icon = btnBackup.querySelector('ion-icon');
              const lastNode = btnBackup.childNodes[btnBackup.childNodes.length - 1];
              if (lastNode && lastNode.nodeType === 3) lastNode.textContent = ' Generando…';
              if (icon) icon.setAttribute('name', 'sync-outline');
              setTimeout(() => {
                creating = false;
                btnBackup.disabled = false;
                if (lastNode && lastNode.nodeType === 3) lastNode.textContent = ' Backup ahora';
                if (icon) icon.setAttribute('name', 'save-outline');
              }, 2200);
            });
          }

          // ── ok-data-table: historial de backups ──────────────────────────────
          const dt = doc.getElementById('backup-dt');

          dt.title = 'Historial';
          dt.rowKey = (r) => r.fecha;
          dt.views = ['table'];
          dt.searchable = false;
          dt.csv = true;

          dt.columns = [
            {
              key: 'fecha',
              header: 'Fecha',
              width: 'minmax(10rem,1.2fr)',
              render: (r) => h`<span style="font-variant-numeric:tabular-nums;font-family:monospace;font-size:.85rem">${r.fecha}</span>`,
            },
            {
              key: 'tipo',
              header: 'Tipo',
              width: '7rem',
              render: (r) => r.tipo === 'Manual'
                ? h`<ion-badge style="--background:color-mix(in srgb,var(--ion-color-primary) 15%,transparent);--color:var(--ion-color-primary);--padding-top:5px;--padding-bottom:5px">${r.tipo}</ion-badge>`
                : h`<ion-badge style="--background:color-mix(in srgb,var(--ion-color-medium) 15%,transparent);--color:var(--ion-color-medium);--padding-top:5px;--padding-bottom:5px">${r.tipo}</ion-badge>`,
            },
            {
              key: 'tamano',
              header: 'Tamaño',
              width: '7rem',
              align: 'right',
            },
            {
              key: 'estado',
              header: 'Estado',
              width: '8rem',
              render: (r) => {
                if (r.estado === 'OK') return h`<ok-status-pill tone="success" dot label="OK" size="sm"></ok-status-pill>`;
                if (r.estado === 'Parcial') return h`<ok-status-pill tone="warning" dot label="Parcial" size="sm"></ok-status-pill>`;
                return h`<ok-status-pill tone="neutral" dot label="${r.estado}" size="sm"></ok-status-pill>`;
              },
            },
            {
              key: 'origen',
              header: 'Origen',
              width: 'minmax(7rem,1fr)',
            },
          ];

          dt.actions = [
            { id: 'download', icon: 'download-outline', label: 'Descargar' },
            { id: 'restore', icon: 'refresh-outline', label: 'Restaurar', color: 'warning' },
            { id: 'log', icon: 'document-text-outline', label: 'Ver log' },
          ];

          dt.rows = [
            { fecha: '2026-05-08 03:00', tipo: 'Auto',   tamano: '142 MB', estado: 'OK',      origen: 'eu-west-1', _actions: ['download', 'restore'] },
            { fecha: '2026-05-07 18:42', tipo: 'Manual', tamano: '141 MB', estado: 'OK',      origen: 'Joan C.',   _actions: ['download', 'restore'] },
            { fecha: '2026-05-07 03:00', tipo: 'Auto',   tamano: '140 MB', estado: 'OK',      origen: 'eu-west-1', _actions: ['download', 'restore'] },
            { fecha: '2026-05-06 03:00', tipo: 'Auto',   tamano: '138 MB', estado: 'Parcial', origen: 'eu-west-1', _actions: ['log', 'restore'] },
            { fecha: '2026-05-05 03:00', tipo: 'Auto',   tamano: '137 MB', estado: 'OK',      origen: 'eu-west-1', _actions: ['download', 'restore'] },
          ];

          // Acciones por fila
          dt.addEventListener('rowAction', (e) => {
            const { actionId, row } = e.detail || {};
            const fecha = row?.fecha ?? '?';

            if (actionId === 'restore') {
              const alert = document.createElement('ion-alert');
              alert.header = 'Restaurar backup';
              alert.message = `¿Restaurar el backup del ${fecha}? Esta acción sobreescribirá los datos actuales.`;
              alert.buttons = [
                { text: 'Cancelar', role: 'cancel' },
                { text: 'Restaurar', role: 'destructive', cssClass: 'ion-color-danger' },
              ];
              document.body.appendChild(alert);
              alert.present();
              alert.addEventListener('didDismiss', () => alert.remove());
            } else if (actionId === 'download') {
              const toast = document.createElement('ion-toast');
              toast.message = `Descargando backup ${fecha}…`;
              toast.duration = 2000;
              toast.position = 'bottom';
              document.body.appendChild(toast);
              toast.present();
              toast.addEventListener('didDismiss', () => toast.remove());
            } else if (actionId === 'log') {
              const toast = document.createElement('ion-toast');
              toast.message = `Abriendo log del backup ${fecha}…`;
              toast.duration = 2000;
              toast.position = 'bottom';
              document.body.appendChild(toast);
              toast.present();
              toast.addEventListener('didDismiss', () => toast.remove());
            }
          });
        },
      });
    </script>
  </body>
</html>
