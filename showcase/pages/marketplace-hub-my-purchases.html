<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora · Marketplace · Mis compras</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';
      import { html as h } from 'lit';

      // Renderiza el icono del módulo como celda
      const moduleIcon = (iconName, tone) => {
        const c = tone || 'primary';
        return h`<span style="display:inline-flex;align-items:center;justify-content:center;
            width:40px;height:40px;border-radius:10px;flex-shrink:0;
            background:color-mix(in srgb,var(--ion-color-${c}) 12%,transparent);
            color:var(--ion-color-${c})">
          <ion-icon name="${iconName}" style="font-size:20px"></ion-icon>
        </span>`;
      };

      // Celda de nombre + meta: nombre + plan + fecha + pill de estado
      const nameMeta = (r) => h`<span>
        <span style="font-weight:700;font-size:15px;display:block;color:var(--ion-text-color)">${r.name}</span>
        <span style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:3px">
          <span style="font-size:12px;color:var(--ion-color-medium)">
            <ion-icon name="calendar-outline" style="font-size:11px;vertical-align:middle;margin-right:2px"></ion-icon>
            ${r.plan}
          </span>
          <span style="font-size:12px;color:var(--ion-color-medium);opacity:.4">·</span>
          <span style="font-size:12px;color:var(--ion-color-medium)">${r.purchasedLabel}</span>
          <span style="font-size:12px;color:var(--ion-color-medium);opacity:.4">·</span>
          <ok-status-pill tone="${r.statusTone}" dot label="${r.statusLabel}" size="sm"></ok-status-pill>
          ${r.badge ? h`<ion-badge color="primary" style="--padding-top:4px;--padding-bottom:4px;font-size:10px">${r.badge}</ion-badge>` : ''}
        </span>
      </span>`;

      // Celda de precio
      const priceCell = (r) => h`<span style="text-align:right;display:block">
        <span style="font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;
            color:var(--ion-text-color);display:block;line-height:1.1">${r.price}</span>
        <span style="font-size:11px;color:var(--ion-color-medium)">${r.priceUnit}</span>
      </span>`;

      // Celda de próximo cobro / estado temporal
      const nextCell = (r) => h`<span style="text-align:right;display:block;font-size:12px;color:var(--ion-color-medium)">
        ${r.nextLabel}
        <b style="display:block;font-size:13px;font-weight:700;color:var(--ion-text-color);margin-top:2px">${r.nextValue}</b>
      </span>`;

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Mis compras"
            description="Gestiona suscripciones, ve facturas y descarga recibos">
            <ion-button slot="actions" fill="outline" size="small">
              <ion-icon slot="start" name="document-text-outline"></ion-icon>
              Ver todas las facturas
            </ion-button>
            <ion-button slot="actions" fill="outline" size="small">
              <ion-icon slot="start" name="card-outline"></ion-icon>
              Métodos de pago
            </ion-button>
          </ok-page-header>

          <ok-data-table id="purchases-dt" style="display:block"></ok-data-table>
        `,
        setup(doc) {
          const dt = doc.getElementById('purchases-dt');

          dt.title = 'Compras';
          dt.rowKey = (r) => r.id;
          dt.views = ['table'];
          dt.viewMode = 'table';
          dt.searchable = false;

          dt.columns = [
            {
              key: 'icon',
              header: '',
              width: '56px',
              sortable: false,
              render: (r) => moduleIcon(r.icon, r.iconTone),
            },
            {
              key: 'name',
              header: 'Módulo / Producto',
              width: 'minmax(16rem,1fr)',
              sortable: false,
              render: (r) => nameMeta(r),
            },
            {
              key: 'price',
              header: 'Precio',
              width: '8rem',
              align: 'right',
              sortable: false,
              render: (r) => priceCell(r),
            },
            {
              key: 'next',
              header: 'Próxima fecha',
              width: '10rem',
              align: 'right',
              sortable: false,
              render: (r) => nextCell(r),
            },
          ];

          dt.rows = [
            {
              id: 'verifactu',
              icon: 'shield-checkmark-outline',
              iconTone: 'primary',
              name: 'VeriFactu',
              plan: 'Plan mensual',
              purchasedLabel: 'Comprado el 02 abr 2026',
              statusTone: 'success',
              statusLabel: 'Activo',
              badge: null,
              price: '€9,99',
              priceUnit: '/mes',
              nextLabel: 'Próximo cobro',
              nextValue: '23 may 2026',
              state: 'active',
            },
            {
              id: 'whatsapp',
              icon: 'chatbubble-ellipses-outline',
              iconTone: 'primary',
              name: 'WhatsApp Inbox',
              plan: 'Plan mensual',
              purchasedLabel: 'Comprado el 18 abr 2026',
              statusTone: 'info',
              statusLabel: 'En periodo de prueba',
              badge: null,
              price: '€29,99',
              priceUnit: '/mes',
              nextLabel: 'Fin de prueba',
              nextValue: '03 may 2026',
              state: 'active',
            },
            {
              id: 'ai-assistant',
              icon: 'happy-outline',
              iconTone: 'primary',
              name: 'AI Assistant Pro',
              plan: 'Plan anual',
              purchasedLabel: 'Comprado el 12 ene 2026',
              statusTone: 'success',
              statusLabel: 'Activo',
              badge: 'Pro',
              price: '€399,90',
              priceUnit: '/año',
              nextLabel: 'Renovación',
              nextValue: '12 ene 2027',
              state: 'active',
            },
            {
              id: 'backup-cloud',
              icon: 'moon-outline',
              iconTone: 'warning',
              name: 'Backup Cloud',
              plan: 'Plan mensual',
              purchasedLabel: 'Comprado el 05 mar 2026',
              statusTone: 'warning',
              statusLabel: 'Pago pendiente',
              badge: null,
              price: '€9,99',
              priceUnit: '/mes',
              nextLabel: 'Reintento de cobro',
              nextValue: '10 may 2026',
              state: 'payment',
            },
            {
              id: 'soporte',
              icon: 'help-circle-outline',
              iconTone: 'medium',
              name: 'Soporte Prioritario',
              plan: 'Plan mensual',
              purchasedLabel: 'Cancelado el 28 feb 2026',
              statusTone: 'danger',
              statusLabel: 'Cancelado',
              badge: null,
              price: '€29,99',
              priceUnit: '/mes',
              nextLabel: 'Acceso hasta',
              nextValue: '28 mar 2026',
              state: 'cancelled',
            },
            {
              id: 'formacion',
              icon: 'school-outline',
              iconTone: 'primary',
              name: 'Formación · Pack onboarding',
              plan: 'Pago único',
              purchasedLabel: 'Comprado el 22 ene 2026',
              statusTone: 'success',
              statusLabel: 'Completado',
              badge: null,
              price: '€199,00',
              priceUnit: 'único',
              nextLabel: 'Sesiones realizadas',
              nextValue: '4 / 4',
              state: 'onetime',
            },
            {
              id: 'nominas',
              icon: 'card-outline',
              iconTone: 'primary',
              name: 'Nóminas (ES)',
              plan: 'Plan mensual',
              purchasedLabel: 'Comprado el 14 abr 2026',
              statusTone: 'success',
              statusLabel: 'Activo',
              badge: null,
              price: '€19,99',
              priceUnit: '/mes',
              nextLabel: 'Próximo cobro',
              nextValue: '14 may 2026',
              state: 'active',
            },
          ];

          // Acciones por fila según estado de la suscripción
          dt.actions = (r) => {
            if (r.state === 'payment') {
              return [
                { id: 'update-payment', icon: 'card-outline', label: 'Actualizar pago', color: 'primary' },
              ];
            }
            if (r.state === 'cancelled') {
              return [
                { id: 'reactivar', icon: 'refresh-outline', label: 'Reactivar' },
              ];
            }
            if (r.state === 'onetime') {
              return [
                { id: 'invoice', icon: 'document-text-outline', label: 'Ver factura' },
              ];
            }
            // active / trial
            return [
              { id: 'invoice', icon: 'document-text-outline', label: 'Ver factura' },
              { id: 'cancel', icon: 'close-circle-outline', label: 'Cancelar', color: 'danger' },
            ];
          };

          // Manejo de acciones por fila → toast informativo (CSP-safe)
          dt.addEventListener('rowAction', (e) => {
            const { actionId, row } = e.detail || {};
            const msgs = {
              invoice: 'Descargando factura…',
              'update-payment': 'Redirigiendo a métodos de pago…',
              reactivar: 'Suscripción reactivada correctamente.',
              cancel: `Cancelando suscripción de ${row?.name}…`,
            };
            const colors = {
              invoice: 'primary',
              'update-payment': 'warning',
              reactivar: 'success',
              cancel: 'danger',
            };
            const msg = msgs[actionId];
            if (!msg) return;
            const toast = document.createElement('ion-toast');
            toast.message = msg;
            toast.duration = 2500;
            toast.position = 'bottom';
            toast.color = colors[actionId] || 'primary';
            document.body.appendChild(toast);
            toast.present();
            toast.addEventListener('didDismiss', () => toast.remove());
          });
        },
      });
    </script>
  </body>
</html>
