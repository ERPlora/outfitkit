<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stripe Connect · ERPlora Cloud</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_saas-developer.css" />
    <link rel="stylesheet" href="./_saas-developer-pages.css" />
  </head>
  <body>
    <script type="module">
      import { defineDeveloperPage } from './_saas-developer.js';

      defineDeveloperPage({
        activeTab: 'payouts',
        title: 'Stripe Connect',
        body: `
          <div class="developer-page developer-section-stack">
            <div class="developer-grid">
              <ion-card>
                <ion-card-content>
                  <h2 class="developer-card-title">Crear cuenta de Stripe Connect</h2>
                  <p class="developer-card-subtitle">Para recibir pagos por las ventas de tus módulos, conecta una cuenta bancaria mediante Stripe.</p>
                  <form class="developer-fields">
                    <ion-select id="country-select" label="País" label-placement="stacked" fill="outline" interface="popover" value="ES">
                      <ion-select-option value="ES">España</ion-select-option>
                      <ion-select-option value="PT">Portugal</ion-select-option>
                      <ion-select-option value="FR">Francia</ion-select-option>
                      <ion-select-option value="DE">Alemania</ion-select-option>
                    </ion-select>
                    <ion-button type="submit" expand="block">
                      <iconify-icon slot="start" icon="simple-icons:stripe" width="16" height="16"></iconify-icon>
                      Conectar con Stripe
                    </ion-button>
                  </form>
                </ion-card-content>
              </ion-card>

              <ion-card>
                <ion-card-content>
                  <h2 class="developer-card-title">Cómo funciona</h2>
                  <div class="developer-step"><div class="developer-step-number">1</div><div><strong>Crear cuenta</strong><small>Selecciona tu país y crea la cuenta de Stripe Connect.</small></div></div>
                  <div class="developer-step"><div class="developer-step-number">2</div><div><strong>Completar onboarding</strong><small>Verifica tu identidad y conecta tu cuenta bancaria.</small></div></div>
                  <div class="developer-step"><div class="developer-step-number">3</div><div><strong>Recibir pagos</strong><small>Solicita el pago cuando el saldo llegue a 50 €.</small></div></div>
                </ion-card-content>
              </ion-card>
            </div>

            <ok-inline-feedback tone="success" heading="Seguro y fiable">
              <p>Stripe protege y cifra tu información financiera y es utilizado por millones de empresas en todo el mundo.</p>
            </ok-inline-feedback>
          </div>`,
      });
    </script>
  </body>
</html>
