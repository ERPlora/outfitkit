<!doctype html>
<html lang="es" data-theme="erplora-light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Autenticación en dos pasos - ERPlora Cloud</title>

    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      defineSaasDashboardPage({
        active: '/dashboard/settings/',
        title: 'Autenticación en dos pasos',
        body: `
          <div style="max-width:800px;margin:0 auto">
            <div style="margin-bottom:1.25rem">
              <ion-button type="button" fill="clear" size="small">
                <iconify-icon slot="start" icon="lucide:arrow-left" width="16" height="16"></iconify-icon>
                Volver a ajustes
              </ion-button>
              <h1 style="margin:.4rem 0 .35rem;font-size:1.75rem">Autenticación en dos pasos</h1>
              <p style="margin:0;color:var(--ion-color-medium)">Gestiona el método de seguridad de tu inicio de sesión.</p>
            </div>

            <ion-card>
              <ion-card-header>
                <ion-card-title style="display:flex;align-items:center;gap:.6rem">
                  <iconify-icon icon="lucide:mail-check" width="22" height="22"
                                style="color:var(--ion-color-success)"></iconify-icon>
                  Verificación por email activada
                </ion-card-title>
              </ion-card-header>
              <ion-card-content>
                <div style="display:flex;align-items:flex-start;gap:.75rem">
                  <iconify-icon icon="lucide:mail" width="24" height="24"
                                style="color:var(--ion-color-primary);flex:none"></iconify-icon>
                  <div>
                    <strong>La verificación por email está activa</strong>
                    <p style="margin:.25rem 0 0;color:var(--ion-color-medium);line-height:1.55">
                      Se envía un código de 6 dígitos a tu email cuando inicias sesión desde un dispositivo nuevo.
                    </p>
                  </div>
                </div>
                <p style="color:var(--ion-color-medium);font-size:.875rem;line-height:1.55">
                  Este es el método predeterminado para todas las cuentas. Para mayor seguridad,
                  puedes usar una aplicación de autenticación.
                </p>
                <div style="display:flex;gap:.65rem;flex-wrap:wrap;margin-top:1.25rem">
                  <ion-button type="button" color="primary">
                    <iconify-icon slot="start" icon="lucide:shield-check" width="17" height="17"></iconify-icon>
                    Mejorar con una aplicación de autenticación
                  </ion-button>
                  <form method="post" action="">
                    <ion-button type="button" fill="outline" color="warning">
                      Desactivar verificación por email
                    </ion-button>
                  </form>
                </div>
              </ion-card-content>
            </ion-card>

            <ion-card>
              <ion-card-content>
                <div style="display:flex;align-items:flex-start;gap:.8rem">
                  <iconify-icon icon="lucide:info" width="22" height="22"
                                style="color:var(--ion-color-primary);flex:none"></iconify-icon>
                  <div>
                    <h2 style="margin:0 0 .5rem;font-size:1rem">Métodos de seguridad</h2>
                    <ion-list lines="none" style="padding:0">
                      <ion-item><ion-label>Verificación por email: recibes un código por correo (predeterminado)</ion-label></ion-item>
                      <ion-item><ion-label>Aplicación autenticadora: genera códigos sin conexión (recomendado)</ion-label></ion-item>
                    </ion-list>
                    <p style="margin:.6rem 0 0;color:var(--ion-color-medium);font-size:.875rem">
                      Aplicaciones recomendadas: Google Authenticator, Authy, Microsoft Authenticator y 1Password.
                    </p>
                  </div>
                </div>
              </ion-card-content>
            </ion-card>
          </div>`,
      });
    </script>
  </body>
</html>
