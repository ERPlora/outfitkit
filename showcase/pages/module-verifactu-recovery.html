<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ERPlora Hub · Recuperación VeriFactu</title>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <style>
      .verifactu-recovery-page { display:flex; flex-direction:column; gap:.75rem; max-width:72rem; margin:0 auto; }
      .verifactu-recovery-actions { display:flex; gap:.5rem; flex-wrap:wrap; }
      .verifactu-manual-form { display:grid; grid-template-columns:repeat(auto-fit,minmax(12rem,1fr)); gap:.7rem; align-items:end; }
      .verifactu-manual-form ion-button { margin:0; }
      [hidden] { display:none !important; }
    </style>
  </head>
  <body>
    <script type="module">
      import { defineHubPage } from './_hub.js';

      const HEX64 = /^[0-9a-fA-F]{64}$/;
      // Snapshot de ejemplo con la forma exacta de aeat_records_list.sql; el módulo no trae seed.
      const AEAT_FIXTURE = [
        { "id":"aeat-003", "issuer_nif":"B27593136", "invoice_number":"TICKET-2026-000004", "invoice_date":"2026-07-18", "record_type":"alta", "record_hash":"EF5A891C8A40467B35B0F8D21C922D27F6F1D0CC6E1BA8BE5EEBB72B6896DC21", "aeat_csv":"VF20260718A04", "estado":"Correcto", "query_timestamp":"2026-07-18T15:00:00" },
        { "id":"aeat-002", "issuer_nif":"B27593136", "invoice_number":"RECT-2026-000001", "invoice_date":"2026-07-18", "record_type":"alta", "record_hash":"A3217E0E1BC7596049DC0C3A83B17E1A645BC17AB33DEEA2519DEFF129928997", "aeat_csv":"VF20260718A03", "estado":"Correcto", "query_timestamp":"2026-07-18T15:00:00" },
        { "id":"aeat-001", "issuer_nif":"B27593136", "invoice_number":"TICKET-2026-000002", "invoice_date":"2026-07-18", "record_type":"alta", "record_hash":"78D63A412CA58F37846E0EC1F0EB2B60BFAD21EB2B01020E3A3E8118CE1E8174", "aeat_csv":"", "estado":"Pendiente", "query_timestamp":"2026-07-18T15:00:00" }
      ];

      defineHubPage({
        active: '/m/verifactu/recovery',
        title: 'Recuperación',
        body: `
          <div class="verifactu-recovery-page">
            <ok-inline-feedback id="verifactu-recovery-result" tone="success" icon="checkmark-circle-outline" hidden></ok-inline-feedback>
            <ion-card>
              <ion-list>
                <ion-item lines="none"><ion-input id="verifactu-recovery-nif" label="NIF del emisor" label-placement="stacked" value="B27593136" maxlength="15"></ion-input></ion-item>
              </ion-list>
            </ion-card>

            <ion-card>
              <ion-card-header><ion-card-title>Integridad de la cadena</ion-card-title></ion-card-header>
              <ion-card-content>
                <ok-inline-feedback id="verifactu-chain-status" tone="success" heading="Cadena íntegra" icon="shield-checkmark-outline">4 registros validados correctamente.</ok-inline-feedback>
                <div class="verifactu-recovery-actions">
                  <ion-button id="verifactu-validate" size="small">Validar cadena</ion-button>
                  <ion-button id="verifactu-consult" size="small" fill="outline">Consultar AEAT</ion-button>
                  <ion-button id="verifactu-recover-aeat" size="small" fill="outline" color="warning">Recuperar cadena desde la AEAT</ion-button>
                </div>
              </ion-card-content>
            </ion-card>

            <ion-card>
              <ion-card-header><ion-card-title>Últimos registros en la AEAT</ion-card-title></ion-card-header>
              <ion-card-content><ok-data-table id="verifactu-aeat-table"></ok-data-table></ion-card-content>
            </ion-card>

            <ion-card>
              <ion-card-header><ion-card-title>Continuar cadena manualmente</ion-card-title></ion-card-header>
              <ion-card-content>
                <ok-inline-feedback tone="info" icon="information-circle-outline">Pega la última huella de 64 caracteres hexadecimales de tu aplicación anterior.</ok-inline-feedback>
                <form id="verifactu-manual-form" class="verifactu-manual-form">
                  <ion-input id="verifactu-manual-hash" fill="outline" label="Última huella (64 hex)" label-placement="floating" maxlength="64" required></ion-input>
                  <ion-input id="verifactu-manual-invoice" fill="outline" label="Nº de factura (opcional)" label-placement="floating" maxlength="60"></ion-input>
                  <ion-input id="verifactu-manual-date" fill="outline" label="Fecha (opcional)" label-placement="floating" type="date"></ion-input>
                  <ion-button type="submit" color="warning">Continuar desde esta huella</ion-button>
                </form>
              </ion-card-content>
            </ion-card>
          </div>
        `,
        setup(doc) {
          const table = doc.getElementById('verifactu-aeat-table');
          const nif = doc.getElementById('verifactu-recovery-nif');
          const result = doc.getElementById('verifactu-recovery-result');
          const chainStatus = doc.getElementById('verifactu-chain-status');
          const manualForm = doc.getElementById('verifactu-manual-form');
          const manualHash = doc.getElementById('verifactu-manual-hash');
          const manualInvoice = doc.getElementById('verifactu-manual-invoice');
          const manualDate = doc.getElementById('verifactu-manual-date');
          const rows = AEAT_FIXTURE.map((row) => ({ ...row }));
          const state = { page:0, pageSize:50, sort:'query_timestamp', dir:'desc', search:'', filters:{} };

          function recordQuery(name, params = {}) {
            doc.dispatchEvent(new CustomEvent('erplora:preview-query', { detail:{ name, params } }));
          }
          function recordCommand(name, payload) {
            doc.dispatchEvent(new CustomEvent('erplora:preview-command', { detail:{ name, payload } }));
          }
          function feedback(message, tone = 'success') {
            result.hidden = false; result.tone = tone; result.textContent = message;
          }
          function issuerNif() { return String(nif.value || '').trim().toUpperCase(); }

          table.columns = [
            { key: 'invoice_number', header: 'Factura', sortable: true, filterable: true, filterType: 'text' },
            { key: 'invoice_date', header: 'Fecha', sortable: true, filterable: true, filterType: 'text' },
            { key: 'record_hash', header: 'Huella', sortable: true, format: (row) => row.record_hash ? `${String(row.record_hash).slice(0, 16)}…` : '' },
            { key: 'estado', header: 'Estado', sortable: true, filterable: true, filterType: 'text' },
            { key: 'aeat_csv', header: 'CSV', sortable: true, format: (row) => row.aeat_csv || '—' },
            { key: 'query_timestamp', header: 'Cuándo', sortable: true },
          ];
          table.serverSide = true;
          table.views = true;
          table.cardTitle = (row) => String(row.invoice_number || '—');
          table.cardIcon = () => 'cloud-done-outline';
          table.searchable = true;
          table.searchPlaceholder = 'Buscar factura, huella o CSV…';
          table.emptyMessage = 'Sin datos de la AEAT. Pulsa «Consultar AEAT».';
          table.pageSize = 50;
          table.sort = 'query_timestamp';
          table.sortDir = 'desc';

          function queryPage() {
            recordQuery('verifactu.aeat.records.list', { ...state });
            const term = state.search.trim().toLocaleLowerCase('es');
            const filtered = rows.filter((row) => {
              if (term && !`${row.invoice_number} ${row.record_hash} ${row.aeat_csv}`.toLocaleLowerCase('es').includes(term)) return false;
              return Object.entries(state.filters).every(([key, value]) => value == null || value === '' || String(row[key] ?? '').toLocaleLowerCase('es').includes(String(value).toLocaleLowerCase('es')));
            }).sort((a, b) => {
              const result = String(a[state.sort] ?? '').localeCompare(String(b[state.sort] ?? ''), 'es', { numeric:true });
              return state.dir === 'desc' ? -result : result;
            });
            const start = state.page * state.pageSize;
            table.rows = filtered.slice(start, start + state.pageSize); table.total = filtered.length;
            table.page = state.page; table.pageSize = state.pageSize; table.sort = state.sort; table.sortDir = state.dir;
          }

          doc.getElementById('verifactu-validate').addEventListener('click', () => {
            recordCommand('verifactu.chain.validate', { issuer_nif: issuerNif() });
            chainStatus.tone = 'success'; chainStatus.heading = 'Cadena íntegra';
            chainStatus.textContent = '4 registros validados correctamente.';
            feedback('Validación completada.');
          });
          doc.getElementById('verifactu-consult').addEventListener('click', () => {
            recordCommand('verifactu.aeat.query_recent', { issuer_nif: issuerNif() });
            feedback('Consulta a la AEAT solicitada.'); queryPage();
          });
          doc.getElementById('verifactu-recover-aeat').addEventListener('click', () => {
            recordCommand('verifactu.recovery.from_aeat', { issuer_nif: issuerNif() });
            feedback('Ancla de recuperación solicitada a la AEAT.');
          });
          manualForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const hash = String(manualHash.value || '').trim();
            if (!HEX64.test(hash)) { feedback('La huella debe tener 64 caracteres hexadecimales.', 'danger'); return; }
            recordCommand('verifactu.recovery.manual', {
              issuer_nif: issuerNif(), record_hash: hash,
              invoice_number: String(manualInvoice.value || ''), invoice_date: String(manualDate.value || ''),
            });
            feedback('Operación de recuperación manual completada.'); manualForm.reset();
          });
          table.addEventListener('pageChange', (event) => { state.page = Number(event.detail) || 0; queryPage(); });
          table.addEventListener('pageSizeChange', (event) => { state.pageSize = Number(event.detail) || 50; state.page = 0; queryPage(); });
          table.addEventListener('sortChange', (event) => { state.sort = event.detail.sort; state.dir = event.detail.dir; state.page = 0; queryPage(); });
          table.addEventListener('searchChange', (event) => { state.search = String(event.detail || ''); state.page = 0; queryPage(); });
          table.addEventListener('filterChange', (event) => { state.filters[event.detail.col] = event.detail.value; state.page = 0; queryPage(); });

          recordQuery('verifactu.config.get', {});
          recordQuery('verifactu.chain.status', {});
          queryPage();
        },
      });
    </script>
  </body>
</html>
