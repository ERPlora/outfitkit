<!doctype html>
<html lang="es" data-theme="erplora-light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sesiones activas - ERPlora Cloud</title>

    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/ok-inline-feedback.js"></script>
  </head>
  <body>
    <script type="module">
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      defineSaasDashboardPage({
        active: '/dashboard/settings/',
        title: 'Sesiones activas',
        body: `
          <div style="max-width:860px;margin:0 auto">
            <ok-inline-feedback tone="info" heading="Sesiones activas">
              Cada elemento es un Hub Desktop, Hub Local o aplicación móvil con una sesión iniciada.
              Los accesos desde navegador no aparecen aquí. Al revocar una sesión, el dispositivo se
              desconectará en un máximo de una hora.
            </ok-inline-feedback>

            <ion-card style="margin-top:1rem">
              <ion-card-header>
                <div style="display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap">
                  <ion-card-title>Sesiones</ion-card-title>
                  <form method="post" action="">
                    <input type="hidden" name="action" value="revoke_others" />
                    <ion-button type="submit" fill="outline" color="danger" size="small">
                      Cerrar sesión en los demás dispositivos
                    </ion-button>
                  </form>
                </div>
              </ion-card-header>

              <ion-list lines="full">
                <ion-item>
                  <iconify-icon slot="start" icon="lucide:monitor" width="22" height="22"></iconify-icon>
                  <ion-label>
                    <h2 style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
                      Hub Desktop · Mac de la oficina
                      <ion-badge color="success">Este dispositivo</ion-badge>
                    </h2>
                    <p>91.117.42.8 · visto por última vez 2026-07-18 22:42</p>
                  </ion-label>
                </ion-item>

                <ion-item>
                  <iconify-icon slot="start" icon="lucide:server" width="22" height="22"></iconify-icon>
                  <ion-label>
                    <h2>Hub Local · Restaurante Centro</h2>
                    <p>81.40.119.244 · visto por última vez 2026-07-18 18:05</p>
                  </ion-label>
                  <form method="post" action="" slot="end">
                    <input type="hidden" name="action" value="revoke" />
                    <input type="hidden" name="session_id" value="session-local-centro" />
                    <ion-button type="submit" fill="outline" color="danger" size="small">Revocar</ion-button>
                  </form>
                </ion-item>

                <ion-item>
                  <iconify-icon slot="start" icon="lucide:smartphone" width="22" height="22"></iconify-icon>
                  <ion-label>
                    <h2 style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
                      Aplicación móvil · iPhone
                      <ion-badge color="danger">Revocada</ion-badge>
                    </h2>
                    <p>80.58.114.22 · visto por última vez 2026-07-15 09:20</p>
                  </ion-label>
                </ion-item>
              </ion-list>
            </ion-card>
          </div>`,
        footer: `
          <footer id="section-tabbar">
            <ion-segment value="sessions" aria-label="Navegación de cuenta">
              <ion-segment-button value="settings"><iconify-icon icon="lucide:settings" width="20" height="20"></iconify-icon><ion-label>Ajustes</ion-label></ion-segment-button>
              <ion-segment-button value="devices"><iconify-icon icon="lucide:smartphone" width="20" height="20"></iconify-icon><ion-label>Dispositivos</ion-label></ion-segment-button>
              <ion-segment-button value="sessions"><iconify-icon icon="lucide:shield-check" width="20" height="20"></iconify-icon><ion-label>Sesiones</ion-label></ion-segment-button>
              <ion-segment-button value="profile"><iconify-icon icon="lucide:user" width="20" height="20"></iconify-icon><ion-label>Perfil</ion-label></ion-segment-button>
            </ion-segment>
          </footer>`,
      });
    </script>
  </body>
</html>
