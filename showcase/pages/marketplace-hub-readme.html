<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ERPlora Cloud · Marketplace · README del módulo</title>

    <!-- Misma carga que showcase/index.html, pero rutas relativas a showcase/pages/. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../../dist/theme.example.css" />
    <link rel="stylesheet" href="../../dist/layout.css" />
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_shell.css" />

    <style>
      /* Geometría puntual de esta vista (estructura, sin colores de marca). */

      /* Zona de staging (botón de apertura de la modal) */
      .rm-stage {
        display: flex;
        justify-content: center;
        padding: 40px 20px;
      }

      /* ion-modal personalizada para el README */
      .rm-modal {
        --width: min(720px, 95vw);
        --height: auto;
        --max-height: calc(100vh - 48px);
        --border-radius: 12px;
        --box-shadow: 0 8px 32px rgba(0,0,0,.18);
      }

      /* Cabecera de la modal: icono + título + botón cierre */
      .rm-header {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 20px 20px 0;
      }
      .rm-header__icon {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        background: color-mix(in srgb, var(--ion-color-primary) 12%, transparent);
        color: var(--ion-color-primary);
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .rm-header__icon ion-icon {
        font-size: 26px;
      }
      .rm-header__text {
        flex: 1 1 auto;
        min-width: 0;
      }
      .rm-header__title {
        margin: 0 0 2px;
        font-size: 1.2rem;
        font-weight: 700;
      }
      .rm-header__sub {
        margin: 0;
        font-size: 0.82rem;
        color: var(--ion-color-medium);
      }
      .rm-header__close {
        flex-shrink: 0;
        margin-top: -4px;
      }

      /* Tabs README / Changelog */
      .rm-tabs {
        padding: 0 16px;
        border-bottom: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        margin-top: 4px;
      }
      .rm-tabs ion-segment {
        --background: transparent;
        max-width: 320px;
      }
      .rm-tabs ion-segment-button {
        --color: var(--ion-color-medium);
        --color-checked: var(--ion-color-primary);
        --indicator-color: var(--ion-color-primary);
        min-height: 42px;
        font-size: 0.88rem;
      }

      /* Panel de contenido (área de scroll de readme/changelog) */
      .rm-panel {
        display: none;
        padding: 20px;
        max-height: 58vh;
        overflow-y: auto;
      }
      .rm-panel.active {
        display: block;
      }

      /* Tipografía del contenido Markdown renderizado */
      .rm-content {
        font-size: 14px;
        line-height: 1.65;
        color: var(--ion-text-color);
      }
      .rm-content h1 {
        font-size: 1.35rem;
        font-weight: 700;
        margin: 0 0 10px;
        letter-spacing: -0.01em;
      }
      .rm-content h2 {
        font-size: 1.05rem;
        font-weight: 700;
        margin: 22px 0 10px;
        letter-spacing: -0.005em;
      }
      .rm-content h3 {
        font-size: 0.9rem;
        font-weight: 700;
        margin: 16px 0 8px;
      }
      .rm-content p {
        margin: 8px 0;
        color: var(--ion-color-step-700, rgba(var(--ion-text-color-rgb), .8));
      }
      .rm-content code {
        background: var(--ion-color-step-100, rgba(127,127,127,.1));
        padding: 1px 6px;
        border-radius: 4px;
        font-family: var(--ion-font-family-code, monospace);
        font-size: 12.5px;
      }
      .rm-content pre {
        background: var(--ion-color-step-100, rgba(127,127,127,.1));
        padding: 12px 14px;
        border-radius: 8px;
        overflow-x: auto;
        font-family: var(--ion-font-family-code, monospace);
        font-size: 12.5px;
        line-height: 1.5;
        margin: 12px 0;
      }
      .rm-content pre code {
        background: transparent;
        padding: 0;
      }
      .rm-content ul,
      .rm-content ol {
        padding-left: 22px;
        margin: 8px 0;
      }
      .rm-content li {
        margin: 4px 0;
        color: var(--ion-color-step-700, rgba(var(--ion-text-color-rgb), .8));
      }
      .rm-content blockquote {
        border-left: 3px solid var(--ion-color-primary);
        padding: 6px 14px;
        margin: 12px 0;
        background: color-mix(in srgb, var(--ion-color-primary) 8%, transparent);
        border-radius: 0 6px 6px 0;
      }
      .rm-content blockquote p {
        margin: 0;
        font-style: italic;
      }

      /* Tabla de modos de funcionamiento */
      .rm-table {
        width: 100%;
        border-collapse: collapse;
        margin: 12px 0;
        font-size: 13px;
      }
      .rm-table th,
      .rm-table td {
        padding: 8px 10px;
        border-bottom: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        text-align: left;
      }
      .rm-table th {
        font-weight: 600;
        background: var(--ion-color-step-50, rgba(127,127,127,.05));
      }

      /* Versión del changelog */
      .rm-version {
        display: flex;
        gap: 8px;
        align-items: center;
        margin: 22px 0 8px;
      }
      .rm-version:first-of-type {
        margin-top: 0;
      }
      .rm-version__tag {
        font-size: 1.05rem;
        font-weight: 700;
        margin: 0;
      }
      .rm-version__date {
        margin-left: auto;
        font-size: 11px;
        color: var(--ion-color-medium);
        white-space: nowrap;
      }

      /* Footer de la modal */
      .rm-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 20px;
        border-top: 1px solid var(--ion-border-color, rgba(127,127,127,.2));
        flex-wrap: wrap;
      }
      .rm-footer__note {
        font-size: 0.75rem;
        color: var(--ion-color-medium);
      }
      .rm-footer__actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      @media (max-width: 600px) {
        .rm-modal { --width: 100%; --border-radius: 16px 16px 0 0; }
        .rm-panel { max-height: 45vh; }
        .rm-footer { flex-direction: column; align-items: stretch; }
        .rm-footer__actions { justify-content: flex-end; }
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { definePage } from './_page.js';

      definePage({
        bare: true,
        body: `
          <ok-page-header
            heading="Documentación del módulo"
            description="README y changelog de VeriFactu">
          </ok-page-header>

          <!-- Botón de apertura de la modal -->
          <div class="rm-stage">
            <ion-button id="btn-abrir-readme">
              <ion-icon slot="start" name="document-text-outline"></ion-icon>
              Abrir README
            </ion-button>
          </div>

          <!-- Modal README -->
          <ion-modal id="rm-modal" class="rm-modal">
            <ion-content scroll-y="false">

              <!-- Cabecera: icono + título + botón cierre -->
              <div class="rm-header">
                <div class="rm-header__icon">
                  <ion-icon name="shield-checkmark-outline"></ion-icon>
                </div>
                <div class="rm-header__text">
                  <h2 class="rm-header__title">VeriFactu</h2>
                  <p class="rm-header__sub">Documentación oficial del módulo · v1.0.0</p>
                </div>
                <div class="rm-header__close">
                  <ion-button id="btn-cerrar-readme" fill="clear" size="small" aria-label="Cerrar">
                    <ion-icon slot="icon-only" name="close-outline"></ion-icon>
                  </ion-button>
                </div>
              </div>

              <!-- Tabs: README / Changelog -->
              <div class="rm-tabs">
                <ion-segment id="rm-segment" value="readme">
                  <ion-segment-button value="readme">
                    <ion-icon name="document-text-outline" slot="start"></ion-icon>
                    <ion-label>README</ion-label>
                  </ion-segment-button>
                  <ion-segment-button value="changelog">
                    <ion-icon name="time-outline" slot="start"></ion-icon>
                    <ion-label>Changelog</ion-label>
                  </ion-segment-button>
                </ion-segment>
              </div>

              <!-- Panel README -->
              <div id="rm-panel-readme" class="rm-panel active">
                <div class="rm-content">
                  <h1>VeriFactu</h1>
                  <p>Sistema verificable de facturación para la <strong>Agencia Tributaria española</strong>. Permite emitir, registrar y firmar facturas conforme al Real Decreto 1007/2023.</p>

                  <blockquote>
                    <p>Obligatorio en España para empresas y autónomos desde julio 2026.</p>
                  </blockquote>

                  <h2>Instalación</h2>
                  <p>Desde el marketplace del Hub:</p>
                  <pre><code>hub modules install verifactu</code></pre>
                  <p>O directamente desde el marketplace web. Tras instalar, configura tu certificado digital en <code>/configuration/certificates/</code>.</p>

                  <h2>Configuración</h2>
                  <ol>
                    <li>Sube tu certificado <code>.p12</code> en Configuración &gt; Certificados.</li>
                    <li>Selecciona el modo: <code>VERIFACTU</code> (recomendado) o <code>NO-VERIFACTU</code>.</li>
                    <li>Activa el QR en plantillas de facturación.</li>
                    <li>Realiza una factura de prueba contra el entorno preproducción de la AEAT.</li>
                  </ol>

                  <h2>Modos de funcionamiento</h2>
                  <table class="rm-table">
                    <thead>
                      <tr>
                        <th>Modo</th>
                        <th>Envío</th>
                        <th>Recomendado para</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td><code>VERIFACTU</code></td>
                        <td>Tiempo real a AEAT</td>
                        <td>La mayoría de PYMEs y autónomos</td>
                      </tr>
                      <tr>
                        <td><code>NO-VERIFACTU</code></td>
                        <td>Almacenamiento local + huella encadenada</td>
                        <td>Solo si la AEAT te lo permite</td>
                      </tr>
                    </tbody>
                  </table>

                  <h2>Eventos publicados</h2>
                  <ul>
                    <li><code>verifactu.invoice.sent</code> — factura enviada con éxito.</li>
                    <li><code>verifactu.invoice.rejected</code> — factura rechazada por la AEAT.</li>
                    <li><code>verifactu.chain.broken</code> — incidencia en el encadenamiento (requiere atención).</li>
                  </ul>

                  <h2>Soporte</h2>
                  <p>Documentación completa en <code>docs.erplora.com/verifactu</code>. Para incidencias usa el módulo <code>support_priority</code> o abre un ticket desde la sección de ayuda.</p>
                </div>
              </div>

              <!-- Panel Changelog -->
              <div id="rm-panel-changelog" class="rm-panel">
                <div class="rm-content">
                  <h1>Historial de cambios</h1>

                  <div class="rm-version">
                    <h3 class="rm-version__tag">v1.0.0</h3>
                    <ion-badge color="success">actual</ion-badge>
                    <span class="rm-version__date">02 may 2026</span>
                  </div>
                  <ul>
                    <li>Liberación pública. Modo <code>VERIFACTU</code> y <code>NO-VERIFACTU</code> certificados con AEAT.</li>
                    <li>QR obligatorio en PDF y ticket POS.</li>
                    <li>Cola de reintentos persistente con backoff exponencial.</li>
                    <li>Soporte para anulaciones y facturas rectificativas.</li>
                  </ul>

                  <div class="rm-version">
                    <h3 class="rm-version__tag">v0.9.2</h3>
                    <ion-badge color="medium">beta</ion-badge>
                    <span class="rm-version__date">14 abr 2026</span>
                  </div>
                  <ul>
                    <li>Pruebas en producción con 50 hubs piloto.</li>
                    <li>Mejoras en el dashboard de auditoría: filtro por estado AEAT.</li>
                    <li>Fix: encadenamiento se rompía si se borraba una factura anulada.</li>
                  </ul>

                  <div class="rm-version">
                    <h3 class="rm-version__tag">v0.9.0</h3>
                    <ion-badge color="medium">beta</ion-badge>
                    <span class="rm-version__date">28 mar 2026</span>
                  </div>
                  <ul>
                    <li>Primera beta pública con encadenamiento y firma XAdES.</li>
                    <li>Conexión con entorno preproducción AEAT.</li>
                    <li>i18n: ES, EN, CA, GL, EU.</li>
                  </ul>

                  <div class="rm-version">
                    <h3 class="rm-version__tag">v0.5.0</h3>
                    <ion-badge color="warning">alpha</ion-badge>
                    <span class="rm-version__date">12 feb 2026</span>
                  </div>
                  <ul>
                    <li>Versión interna alpha. Solo modo <code>NO-VERIFACTU</code>.</li>
                    <li>Generación de QR y huella encadenada SHA-256.</li>
                  </ul>
                </div>
              </div>

              <!-- Footer -->
              <div class="rm-footer">
                <span class="rm-footer__note">Documentación oficial · ERPlora</span>
                <div class="rm-footer__actions">
                  <ion-button id="btn-cerrar-footer" fill="outline">
                    <ion-icon slot="start" name="close-outline"></ion-icon>
                    Cerrar
                  </ion-button>
                  <ion-button>
                    <ion-icon slot="start" name="download-outline"></ion-icon>
                    Instalar módulo
                  </ion-button>
                </div>
              </div>

            </ion-content>
          </ion-modal>
        `,
        setup(doc) {
          const modal = doc.getElementById('rm-modal');
          const btnAbrir = doc.getElementById('btn-abrir-readme');
          const btnCerrarHeader = doc.getElementById('btn-cerrar-readme');
          const btnCerrarFooter = doc.getElementById('btn-cerrar-footer');
          const segment = doc.getElementById('rm-segment');
          const panelReadme = doc.getElementById('rm-panel-readme');
          const panelChangelog = doc.getElementById('rm-panel-changelog');

          // Abrir modal
          if (btnAbrir && modal) {
            btnAbrir.addEventListener('click', () => {
              modal.isOpen = true;
            });
          }

          // Cerrar modal (botón X cabecera + botón Cerrar footer)
          function cerrarModal() {
            if (modal) modal.isOpen = false;
          }
          if (btnCerrarHeader) btnCerrarHeader.addEventListener('click', cerrarModal);
          if (btnCerrarFooter) btnCerrarFooter.addEventListener('click', cerrarModal);

          // Tabs README / Changelog
          function activatePanel(val) {
            if (!panelReadme || !panelChangelog) return;
            const isReadme = val === 'readme';
            panelReadme.classList.toggle('active', isReadme);
            panelChangelog.classList.toggle('active', !isReadme);
          }

          if (segment) {
            segment.addEventListener('ionChange', (e) => {
              const val = (e.detail && e.detail.value) || 'readme';
              activatePanel(val);
            });
          }
        },
      });
    </script>
  </body>
</html>
