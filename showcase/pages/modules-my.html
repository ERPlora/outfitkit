<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mis módulos · ERPlora Cloud</title>

    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="./_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
    <script type="module" src="../../dist/outfitkit.js"></script>
    <link rel="stylesheet" href="./_saas-developer.css" />
  </head>
  <body>
    <script type="module">
      import { html as h } from 'lit';
      import { defineSaasDashboardPage } from './_saas-dashboard.js';

      /* Datos demostrativos con el contrato actual de developer/modules/views.py. */
      const MODULES = [
        { id: 'mod-1', name: 'Inventario', moduleId: 'inventory', version: '1.8.0', downloads: 842, priceDisplay: '49,00 €', type: 'one_time', published: 'true', status: 'published' },
        { id: 'mod-2', name: 'Punto de venta', moduleId: 'pos', version: '2.3.1', downloads: 621, priceDisplay: 'Gratis', type: 'free', published: 'true', status: 'published' },
        { id: 'mod-3', name: 'Contabilidad', moduleId: 'accounting', version: '1.4.2', downloads: 418, priceDisplay: '19,00 €/mes', type: 'subscription', published: 'true', status: 'published' },
        { id: 'mod-4', name: 'Recursos humanos', moduleId: 'hr', version: '0.9.0', downloads: 0, priceDisplay: '29,00 €/mes', type: 'subscription', published: 'false', status: 'draft' },
        { id: 'mod-5', name: 'Copias de seguridad', moduleId: 'backup', version: '1.0.0', downloads: 156, priceDisplay: 'Gratis', type: 'free', published: 'false', status: 'inactive' },
      ];

      const TYPES = {
        free: 'Gratis',
        one_time: 'Pago único',
        subscription: 'Suscripción',
      };
      const STATUS = {
        published: ['Publicado', 'success'],
        draft: ['Borrador', 'medium'],
        inactive: ['Inactivo', 'danger'],
      };

      const moduleCell = (row) => h`
        <span style="display:flex;align-items:center;gap:.65rem;min-width:0">
          <ion-avatar style="display:grid;place-items:center;flex:none;width:2.1rem;height:2.1rem;color:var(--ion-color-primary);font-size:12px;font-weight:750;background:rgba(var(--ion-color-primary-rgb),.14)">
            <span style="display:grid;width:100%;height:100%;place-items:center">${row.name.charAt(0)}</span>
          </ion-avatar>
          <span style="display:grid;min-width:0">
            <strong style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${row.name}</strong>
            <small style="color:var(--ion-color-medium);font-family:ui-monospace,monospace">${row.moduleId}</small>
          </span>
        </span>`;

      const statusCell = (row) => {
        const [label, tone] = STATUS[row.status] || [row.status, 'medium'];
        return h`<ion-badge style="--background:rgba(var(--ion-color-${tone}-rgb),.14);--color:var(--ion-color-${tone});--padding-top:5px;--padding-bottom:5px">${label}</ion-badge>`;
      };

      const footer = `
        <footer id="section-tabbar">
          <ion-segment value="modules" aria-label="Secciones de desarrollador">
            <ion-segment-button value="overview"><iconify-icon icon="lucide:layout-grid" width="20" height="20"></iconify-icon><ion-label>Resumen</ion-label></ion-segment-button>
            <ion-segment-button value="earnings"><iconify-icon icon="lucide:wallet" width="20" height="20"></iconify-icon><ion-label>Ingresos</ion-label></ion-segment-button>
            <ion-segment-button value="payouts"><iconify-icon icon="lucide:banknote" width="20" height="20"></iconify-icon><ion-label>Pagos</ion-label></ion-segment-button>
            <ion-segment-button value="modules"><iconify-icon icon="lucide:box" width="20" height="20"></iconify-icon><ion-label>Mis módulos</ion-label></ion-segment-button>
            <ion-segment-button value="blueprints"><iconify-icon icon="lucide:layers" width="20" height="20"></iconify-icon><ion-label>Blueprints</ion-label></ion-segment-button>
            <ion-segment-button value="repositories"><iconify-icon icon="lucide:git-branch" width="20" height="20"></iconify-icon><ion-label>Repositorios</ion-label></ion-segment-button>
            <ion-segment-button value="apidocs"><iconify-icon icon="lucide:book-open" width="20" height="20"></iconify-icon><ion-label>API Docs</ion-label></ion-segment-button>
          </ion-segment>
        </footer>`;

      defineSaasDashboardPage({
        active: '/dashboard/developer/',
        title: 'Mis módulos',
        body: `
          <div class="developer-page">
            <section class="developer-kpis" aria-label="Resumen de módulos">
              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:box" width="12" height="12"></iconify-icon>Total de módulos</div>
                <div class="developer-kpi-value">5</div>
                <div class="developer-kpi-sub">Publicados + borradores</div>
              </div>
              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:download" width="12" height="12"></iconify-icon>Descargas totales</div>
                <div class="developer-kpi-value">2.037</div>
                <div class="developer-kpi-sub">Desde el inicio</div>
              </div>
              <div class="developer-kpi">
                <div class="developer-kpi-label"><iconify-icon icon="lucide:wallet" width="12" height="12"></iconify-icon>Ingresos totales</div>
                <div class="developer-kpi-value">4.682,00 €</div>
                <div class="developer-kpi-sub">Antes de la comisión</div>
              </div>
            </section>

            <div class="developer-table-wrap">
              <div class="dash-fill">
                <ok-data-table id="my-modules-dt" server-side fill>
                  <div slot="toolbar" class="okdt-filters">
                    <ion-select class="okdt-filter" data-okdt-param="module_type" interface="popover" aria-label="Tipo" placeholder="Todos los tipos">
                      <ion-select-option value="">Todos los tipos</ion-select-option>
                      <ion-select-option value="free">Gratis</ion-select-option>
                      <ion-select-option value="one_time">Pago único</ion-select-option>
                      <ion-select-option value="subscription">Suscripción</ion-select-option>
                    </ion-select>
                    <ion-select class="okdt-filter" data-okdt-param="is_published" interface="popover" aria-label="Estado" placeholder="Todos los estados">
                      <ion-select-option value="">Todos los estados</ion-select-option>
                      <ion-select-option value="true">Publicado</ion-select-option>
                      <ion-select-option value="false">Borrador</ion-select-option>
                    </ion-select>
                  </div>
                </ok-data-table>
              </div>
            </div>

            <ion-card class="developer-after-table">
              <ion-card-content class="developer-guide">
                <iconify-icon icon="lucide:help-circle" width="22" height="22" style="color:var(--ion-color-primary)"></iconify-icon>
                <div>
                  <h3>Guía para módulos</h3>
                  <ul>
                    <li>Los módulos se revisan antes de publicarse (24–48 horas).</li>
                    <li>Incluye documentación clara e instrucciones de instalación.</li>
                    <li>Los módulos de pago requieren configurar Stripe Connect.</li>
                    <li>ERPlora aplica una comisión del 15% a los módulos de pago.</li>
                  </ul>
                </div>
              </ion-card-content>
            </ion-card>
          </div>`,
        footer,
        setup(doc) {
          const table = doc.getElementById('my-modules-dt');
          if (!table) return;

          table.rowKey = 'id';
          table.columns = [
            { key: 'name', header: 'Módulo', width: 'minmax(14rem,1.5fr)', sortable: true, render: moduleCell },
            { key: 'version', header: 'Versión', width: '8rem' },
            { key: 'downloads', header: 'Descargas', width: '9rem', align: 'right', sortable: true, format: (row) => Number(row.downloads).toLocaleString('es-ES') },
            { key: 'priceDisplay', header: 'Precio', width: '10rem' },
            { key: 'status', header: 'Estado', width: '9rem', render: statusCell },
          ];
          table.searchable = true;
          table.searchPlaceholder = 'Buscar módulos…';
          table.actions = [
            { id: 'stats', label: 'Estadísticas', icon: 'stats-chart-outline' },
            { id: 'edit', label: 'Editar', icon: 'pencil-outline' },
          ];
          table.primaryAction = { label: 'Subir módulo', icon: 'add' };
          table.selectable = true;
          table.menuActions = [
            { id: 'publish', label: 'Publicar', icon: 'cloud-upload-outline' },
            { id: 'unpublish', label: 'Despublicar', icon: 'eye-off-outline' },
            { id: 'delete', label: 'Eliminar', icon: 'trash-outline', color: 'danger' },
          ];
          table.pageSize = 10;
          table.pageSizes = [10, 25, 50, 100];
          table.labels = {
            empty: 'No hay módulos',
            selected: '{n} seleccionados',
            columns: 'Columnas',
            columnsVisible: 'Columnas visibles',
            rowsPerPage: 'Filas por página',
            perPageShort: '{n} / pág.',
            showing: 'Mostrando {from}–{to} de',
            recordSingular: 'módulo',
            recordPlural: 'módulos',
            actions: 'Acciones',
          };

          const state = { query: '', sort: 'name', dir: 'asc' };
          const valueOf = (name) => doc.querySelector(`[data-okdt-param="${name}"]`)?.value || '';
          const refresh = () => {
            const query = state.query.trim().toLocaleLowerCase('es');
            const type = valueOf('module_type');
            const published = valueOf('is_published');
            let rows = MODULES.filter((row) =>
              (!query || [row.name, row.moduleId].some((value) => value.toLocaleLowerCase('es').includes(query))) &&
              (!type || row.type === type) && (!published || row.published === published));
            rows = [...rows].sort((a, b) => String(a[state.sort] ?? '').localeCompare(String(b[state.sort] ?? ''), 'es') * (state.dir === 'asc' ? 1 : -1));
            table.rows = rows;
            table.total = rows.length;
            table.page = 0;
          };
          doc.querySelectorAll('[data-okdt-param]').forEach((control) => control.addEventListener('ionChange', refresh));
          table.addEventListener('searchChange', (event) => { state.query = String(event.detail || ''); refresh(); });
          table.addEventListener('sortChange', (event) => { state.sort = event.detail.sort; state.dir = event.detail.dir; refresh(); });
          table.addEventListener('rowAction', (event) => console.info(event.detail.actionId, event.detail.row.id));
          table.addEventListener('menuAction', (event) => console.info(event.detail.actionId));
          table.addEventListener('primaryAction', () => console.info('/dashboard/developer/modules/upload/'));
          refresh();
        },
      });
    </script>
  </body>
</html>
