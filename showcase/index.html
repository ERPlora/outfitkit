<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OutfitKit — Docs</title>
    <link rel="icon" href="logo.png" />
    <meta
      name="description"
      content="@erplora/outfitkit — Web Components (Lit) que CONSTRUYEN lo que Ionic no tiene (data-table rica, tree, kpi/stat, stepper/wizard, calendar, kanban, inline-feedback…) sobre Ionic. Docs-app interactivo."
    />

    <!-- ── Carga CSP-safe (script-src 'self', sin eval) ──────────────────────────
         Ionic Core (registra los ion-* del chrome) + su tema, lit external vía import-map,
         ionicons, y OutfitKit desde el bundle CDN local + el theme de tokens --ok-*. -->
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <script src="pages/_ionic-config.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <link rel="stylesheet" href="../dist/theme.example.css" />
    <!-- Paletas opcionales (data-ok-palette) — la demo de ok-theme-picker las aplica en vivo. -->
    <link rel="stylesheet" href="../dist/palettes.css" />
    <link rel="stylesheet" href="../dist/layout.css" />
    <script type="module" src="../dist/outfitkit.js"></script>

    <link rel="stylesheet" href="showcase.css" />
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <!-- El chrome (ion-app + split-pane + menu + toolbar + content) lo monta app.js. -->
    <div id="app-root"></div>
  </body>
</html>
