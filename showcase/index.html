<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OutfitKit — Dashboard demo</title>
    <meta
      name="description"
      content="@outfitkit/core — wrapper completo de Web Components sobre Ionic. El showcase usa los propios ok-* (dogfooding)."
    />

    <!-- ── Carga CSP-safe (script-src 'self', sin eval) ─────────────────────
         1) Ionic Core (registra los ion-* que envuelven los ok-*) + su tema.
         2) lit como external vía import-map (una sola copia compartida).
         3) OutfitKit desde el bundle CDN local + el theme de tokens --ok-*. -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons/dist/ionicons/ionicons.esm.js"></script>
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../dist/theme.example.css" />
    <script type="module" src="../dist/outfitkit.js"></script>

    <link rel="stylesheet" href="showcase.css" />
  </head>
  <body>
    <!-- ── El showcase ENTERO es un ok-app-shell de la propia librería (dogfooding). El scroll
         vive dentro del ok-page (.content con overflow-y:auto), así el body-lock de Ionic no
         afecta. ──────────────────────────────────────────────────────────────────────────── -->
    <ok-app-shell id="shell">
      <!-- Sidebar = navegación del propio showcase (3 ítems entre páginas) -->
      <ok-sidebar id="sidebar" slot="sidebar" active-path="index.html">
        <span slot="brand"><strong style="font-size:1.1rem;letter-spacing:-0.01em;">OutfitKit</strong></span>
        <ok-segment id="switcher" slot="switcher"></ok-segment>
      </ok-sidebar>

      <!-- Contenido: topbar + dashboard demo (stats, tabs y data-table) -->
      <ok-page>
        <ok-topbar id="topbar" slot="header" heading="Dashboard demo"></ok-topbar>

        <div class="doc">
          <p class="lead">
            Esta página es un <code>ok-app-shell</code> real, con la sidebar, el topbar y un
            <code>ok-page</code> de la propia librería. El dashboard de abajo es el contenido del
            <code>ok-page</code>.
          </p>

          <div class="stats">
            <ok-card class="stat">
              <ok-card-content>
                <ok-card-subtitle>Ventas hoy</ok-card-subtitle>
                <div class="n">€2.480</div>
                <div class="delta up">▲ 12% vs ayer</div>
              </ok-card-content>
            </ok-card>
            <ok-card class="stat">
              <ok-card-content>
                <ok-card-subtitle>Tickets</ok-card-subtitle>
                <div class="n">137</div>
                <div class="delta up">▲ 4%</div>
              </ok-card-content>
            </ok-card>
            <ok-card class="stat">
              <ok-card-content>
                <ok-card-subtitle>Ticket medio</ok-card-subtitle>
                <div class="n">€18,10</div>
                <div class="delta">— estable</div>
              </ok-card-content>
            </ok-card>
            <ok-card class="stat">
              <ok-card-content>
                <ok-card-subtitle>Stock bajo</ok-card-subtitle>
                <div class="n">3</div>
                <div class="delta">artículos</div>
              </ok-card-content>
            </ok-card>
          </div>

          <ok-segment id="tabs" class="dash-segment"></ok-segment>

          <ok-data-table id="dt"></ok-data-table>
        </div>
      </ok-page>
    </ok-app-shell>

    <script type="module">
      // ── Sidebar: switcher Hub/Cloud (demo) + secciones = navegación del showcase ──────────
      const switcher = document.getElementById('switcher');
      switcher.items = [
        { value: 'hub', label: 'Hub', icon: 'storefront-outline' },
        { value: 'cloud', label: 'Cloud', icon: 'cloud-outline' },
      ];
      switcher.value = 'hub';

      const sidebar = document.getElementById('sidebar');
      // Navegación del propio showcase: el `path` es el nombre del fichero.
      sidebar.sections = [
        {
          label: 'Showcase',
          items: [
            { path: 'index.html', label: 'Dashboard', icon: 'grid-outline' },
            { path: 'components.html', label: 'Componentes', icon: 'cube-outline' },
            { path: 'guide.html', label: 'Guía', icon: 'book-outline' },
          ],
        },
      ];
      sidebar.user = { name: 'OutfitKit', email: '@outfitkit/core' };
      sidebar.addEventListener('ok-account', () => {
        window.location.href = 'https://github.com/ERPlora/outfitkit';
      });

      // ── Topbar: GitHub + tema (toggle ion-palette-dark) ───────────────────────────────────
      const topbar = document.getElementById('topbar');
      topbar.actions = [
        { id: 'github', label: 'GitHub', icon: 'logo-github', pinned: true },
        { id: 'theme', label: 'Tema', icon: 'contrast-outline', pinned: true },
      ];
      topbar.addEventListener('ok-action', (e) => {
        if (e.detail.id === 'theme') document.documentElement.classList.toggle('ion-palette-dark');
        else if (e.detail.id === 'github') window.location.href = 'https://github.com/ERPlora/outfitkit';
      });

      // ── Navegación: ok-sidebar emite ok-nav { path }; navegamos a la página (sin router). ──
      // El shell ya cierra el drawer móvil al recibir ok-nav; aquí enrutamos por location.
      document.getElementById('shell').addEventListener('ok-nav', (e) => {
        const path = e.detail.path;
        if (path && path !== 'index.html') window.location.href = path;
      });

      // ── Tabs del dashboard (ok-segment) ───────────────────────────────────────────────────
      const tabs = document.getElementById('tabs');
      tabs.items = [
        { value: 'all', label: 'Todos' },
        { value: 'low', label: 'Stock bajo' },
        { value: 'top', label: 'Más vendidos' },
      ];
      tabs.value = 'all';

      // ── Data-table con datos de ejemplo (property binding) ────────────────────────────────
      const allRows = [
        { id: 1, name: 'Café solo', cat: 'Bebidas', stock: 120, price: 1.2, sku: 'CAF-001' },
        { id: 2, name: 'Café con leche', cat: 'Bebidas', stock: 95, price: 1.6, sku: 'CAF-002' },
        { id: 3, name: 'Croissant', cat: 'Bollería', stock: 4, price: 1.9, sku: 'BOL-010' },
        { id: 4, name: 'Tostada', cat: 'Cocina', stock: 60, price: 2.4, sku: 'COC-101' },
        { id: 5, name: 'Zumo naranja', cat: 'Bebidas', stock: 3, price: 2.8, sku: 'BEB-200' },
        { id: 6, name: 'Bocadillo jamón', cat: 'Cocina', stock: 22, price: 3.5, sku: 'COC-130' },
        { id: 7, name: 'Magdalena', cat: 'Bollería', stock: 2, price: 1.1, sku: 'BOL-014' },
      ];
      const dt = document.getElementById('dt');
      dt.columns = [
        { key: 'name', header: 'Producto', sortable: true, filterable: true },
        { key: 'cat', header: 'Categoría', sortable: true, filterable: true },
        { key: 'stock', header: 'Stock', align: 'right', sortable: true },
        { key: 'price', header: 'Precio', align: 'right', sortable: true, format: (r) => `€${r.price.toFixed(2)}` },
        { key: 'sku', header: 'SKU', hidden: true },
      ];
      dt.rows = allRows;
      dt.searchKeys = ['name', 'sku', 'cat'];
      dt.pageSize = 5;
      dt.pageSizes = [5, 10, 25];
      dt.columnSelector = true;
      dt.views = ['table', 'card'];
      dt.exportable = true;
      dt.actions = [
        { id: 'edit', label: 'Editar', icon: 'create-outline' },
        { id: 'delete', label: 'Borrar', icon: 'trash-outline', color: 'danger' },
      ];
      dt.addEventListener('rowAction', (e) => alert(`${e.detail.actionId} → ${e.detail.row.name}`));

      // Filtrar por el tab activo del dashboard.
      tabs.addEventListener('ok-change', (e) => {
        const v = e.detail.value;
        if (v === 'low') dt.rows = allRows.filter((r) => r.stock <= 5);
        else if (v === 'top') dt.rows = [...allRows].sort((a, b) => b.stock - a.stock).slice(0, 3);
        else dt.rows = allRows;
      });
    </script>
  </body>
</html>
