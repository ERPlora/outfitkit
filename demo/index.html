<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OutfitKit — demo</title>
    <!-- Ionic core (web components) para ion-* dentro de ok-data-table, vía CDN -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <!-- lit external → import-map -->
    <script type="importmap">
      { "imports": { "lit": "https://esm.run/lit@3", "lit/": "https://esm.run/lit@3/" } }
    </script>
    <link rel="stylesheet" href="../dist/theme.example.css" />
    <!-- Carga TODO OutfitKit de una vez (bundle CDN) -->
    <script type="module" src="../dist/outfitkit.js"></script>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; }
      section { padding: 1.5rem; }
    </style>
  </head>
  <body>
    <ok-navbar sticky>
      <strong slot="brand">ERPlora</strong>
      <a href="#features">Características</a>
      <a href="#pricing">Precios</a>
      <a href="#contact">Contacto</a>
      <ion-button slot="actions" size="small">Empezar</ion-button>
    </ok-navbar>

    <ok-hero>
      <h1 slot="title">ERP/POS modular, multi-tenant</h1>
      <p slot="subtitle">Componentes web compartidos entre el Hub y el Cloud.</p>
      <ion-button slot="actions">Probar gratis</ion-button>
      <ion-button slot="actions" fill="outline">Ver demo</ion-button>
    </ok-hero>

    <ok-container>
      <section>
        <ok-data-table id="dt"></ok-data-table>
      </section>
    </ok-container>

    <ok-footer>
      <div><strong>Producto</strong><br /><a href="#">Hub</a><br /><a href="#">Cloud</a></div>
      <div><strong>Empresa</strong><br /><a href="#">Sobre</a><br /><a href="#">Contacto</a></div>
      <span slot="bottom">© 2026 ERPlora</span>
    </ok-footer>

    <script type="module">
      const dt = document.getElementById('dt');
      dt.columns = [
        { key: 'name', header: 'Nombre', sortable: true },
        { key: 'stock', header: 'Stock', align: 'right', sortable: true },
        { key: 'price', header: 'Precio', align: 'right', format: (r) => `€${r.price}` },
      ];
      dt.rows = [
        { id: 1, name: 'Café', stock: 12, price: 1.2 },
        { id: 2, name: 'Té', stock: 5, price: 1.5 },
        { id: 3, name: 'Agua', stock: 40, price: 0.8 },
      ];
      dt.searchKeys = ['name'];
      dt.pageSize = 2;
      dt.actions = [{ id: 'edit', label: 'Editar', icon: 'create-outline' }];
      dt.addEventListener('rowAction', (e) => alert(`${e.detail.actionId} → ${e.detail.row.name}`));
    </script>
  </body>
</html>
