name: Publish Package

# AUTO-RELEASE: un push a `main` que toque el CÓDIGO PUBLICADO (src/ o config de build)
# genera una versión nueva y la publica. Pushes de solo docs/showcase/CI NO releasean
# (filtro `paths`). El commit `chore: release` del bot solo toca package.json (fuera del
# filtro) → no dispara (anti-bucle nativo, además del guard y de que GITHUB_TOKEN no
# re-dispara). Cambios SOLO de dependencias (package.json) → release manual por
# `workflow_dispatch`.
# Flujo (todo en este workflow para no romper el Trusted Publishing, que npm tiene
# atado a `publish.yml`):
#   1. release-it bumpea patch, corre el gate (build + typecheck + verify:csp via
#      before:init de .release-it.json), commitea `chore: release vX.Y.Z`, taggea y
#      pushea.  (.release-it.json tiene npm.publish=false → NO publica aquí.)
#   2. `npm publish --access public` publica vía OIDC (Trusted Publishing, sin token).
# El push de vuelta lo hace GITHUB_TOKEN → NO re-dispara este workflow (sin bucle);
# el guard `if` es defensa extra por si algún día se usa un PAT.
#
# El Cloud carga OutfitKit desde jsDelivr en @latest, así que recoge la versión nueva
# sola (jsDelivr cachea @latest unas horas; purgar con purge.jsdelivr.net para verla ya).
#
# Trusted Publishing (npmjs, una sola vez): Trusted Publisher en la página del paquete
# con org/usuario=ERPlora · repo=outfitkit · workflow=publish.yml. Scope @erplora ya existe.

on:
  push:
    branches: [main]
    paths:
      # Solo lo que cambia el artefacto publicado (dist/). NO package.json (el bump del
      # bot lo toca → re-dispararía). Para un bump de solo-dependencias: workflow_dispatch.
      - 'src/**'
      - 'vite.config.ts'
      - 'vite.config.cdn.ts'
      - 'tsconfig*.json'
  workflow_dispatch:

permissions:
  id-token: write   # OBLIGATORIO para OIDC (Trusted Publishing)
  contents: write   # push del commit de bump + tag

# Serializa releases: si llegan dos pushes seguidos, el segundo espera (no cancela) y
# bumpea sobre el resultado del primero → una versión por push, sin carrera en el push.
concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # No relanzar sobre el propio commit de release (el push de GITHUB_TOKEN ya no
    # dispara workflows; esto cubre el caso de un PAT futuro).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore: release v')
    steps:
      # `ref: main` (no el SHA) → checkout ATADO a la rama; sin esto el push event
      # deja HEAD desacoplado y release-it no puede commitear/pushear.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0   # release-it necesita historia + tags para el bump

      # SIN registry-url A PROPÓSITO. setup-node con registry-url escribe un .npmrc con
      # _authToken placeholder → npm autentica por token inválido y NUNCA intenta OIDC.
      # Sin él, npm detecta el entorno OIDC y se autentica solo.
      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # `--no-package-lock`: el repo no versiona lockfile; si npm install lo crea, el
      # working dir queda sucio y release-it aborta por requireCleanWorkingDir.
      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Git identity (commit/tag de release)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Bump patch + gate (before:init: build/typecheck/csp) + commit + tag + push.
      # Si el gate falla, release-it aborta → no hay versión ni publish.
      - name: Release (bump + tag + push)
        run: npx --yes release-it patch --ci

      # La versión recién bumpeada nunca está publicada → publica siempre.
      - name: Publish to npm (OIDC, sin token)
        run: npm publish --access public
