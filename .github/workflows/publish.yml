name: Publish Package

# Publica @erplora/outfitkit en npm vía Trusted Publishing (OIDC) — SIN token ni secret.
# npm y GitHub establecen una relación de confianza; en cada publish se genera un token
# efímero, firmado y específico de este workflow. Como bonus, en repo público npm genera
# provenance automáticamente.
#
# Requisito (npmjs, una sola vez): configurar el Trusted Publisher en la página del
# paquete con  org/usuario=ERPlora · repo=outfitkit · workflow=publish.yml.
# El scope @erplora ya existe como org en npmjs (el publicador es owner).
#
# Disparador: push de tag `v*` (lo crea `npm run release` / release-it). El gate replica
# el CI: build + typecheck + verify:csp.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  id-token: write   # OBLIGATORIO para OIDC (Trusted Publishing)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24 (registro npmjs)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # OIDC/Trusted Publishing exige npm >= 11.5.1 (el de Node 24 puede ser anterior).
      - name: Update npm (>= 11.5.1 para OIDC)
        run: npm install -g npm@latest

      # No hay package-lock.json en el repo (mismo patrón que ci.yml).
      - name: Install dependencies
        run: npm install

      - name: Build (vite + tsc declarations)
        run: npm run build

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Verify CSP (sin eval / new Function en dist)
        run: npm run verify:csp

      # En releases por tag, la versión del tag debe coincidir con package.json.
      - name: Check tag == package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::El tag v$TAG_VERSION no coincide con package.json ($PKG_VERSION)"
            exit 1
          fi

      # No re-publicar una versión ya existente (npm la rechazaría con error).
      - name: Skip if version already published
        id: check
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "@erplora/outfitkit@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@erplora/outfitkit@$PKG_VERSION ya está publicada; no se republica."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      # Sin NODE_AUTH_TOKEN: npm detecta el entorno OIDC y se autentica solo.
      - name: Publish to npm (OIDC, sin token)
        if: steps.check.outputs.published == 'false'
        run: npm publish --access public
